[package]
name = "hostapd"
version = "2.11-r1"
license = "BSD-3-Clause"
description = "IEEE 802.11 AP, IEEE 802.1X/WPA/WPA2/EAP/RADIUS Authenticator"

[source]
url = "https://w1.fi/releases/hostapd-2.11.tar.gz"
sha256 = "2b3facb632fd4f65e32f4bf82a76b4b72c501f995a4f62e330219fe7aed1747a"

[build]
system = "custom"
# hostapd shares a Makefile pattern with wpa_supplicant (same hostap.git
# upstream). Two jmake issues trip it:
#
#   1. `-I$(abspath ../src)` / `-I$(abspath ../src/utils)` in
#      hostapd/Makefile end up as bare `-I` flags that clang
#      swallows the next arg as. Pre-substitute to absolute paths.
#
#   2. `CFLAGS += $(EXTRA_CFLAGS)` and the post-include `CFLAGS +=`
#      additions don't thread through to `$(CFLAGS)` at recipe-
#      expansion time when CFLAGS is pre-set via jpkg's environment
#      (always set by cmd_build.c). Inject -I paths into the CFLAGS
#      env directly.
#
# Same pair of fixes as wpa_supplicant 2.11-r2 — see that recipe's
# comment block for the full diagnosis and CI reproduction (run
# 24678196637 + 24679561680).
configure = """ROOT=$(pwd)
cd hostapd
cat > .config << 'CONF'
CONFIG_DRIVER_HOSTAP=y
CONFIG_DRIVER_NL80211=y
CONFIG_DRIVER_NONE=y
CONFIG_RSN_PREAUTH=y
CONFIG_IEEE80211W=y
CONFIG_IEEE80211N=y
CONFIG_IEEE80211AC=y
CONFIG_IEEE80211AX=y
CONFIG_TLS=openssl
CONFIG_EAP=y
CONFIG_EAP_MD5=y
CONFIG_EAP_TLS=y
CONFIG_EAP_PEAP=y
CONFIG_EAP_TTLS=y
CONFIG_EAP_MSCHAPV2=y
CONFIG_PKCS12=y
CONFIG_WPS=y
CONFIG_ACS=y
CONF
cd ..
sed -i 's#-I$(abspath ../src)#-I'"$ROOT"'/src#g' hostapd/Makefile
sed -i 's#-I$(abspath ../src/utils)#-I'"$ROOT"'/src/utils#g' hostapd/Makefile"""
build = """ROOT=$(pwd)
CFLAGS="${CFLAGS:-} -I$ROOT/src -I$ROOT/src/utils -I/include" \
    jmake V=1 -C hostapd \
        CC=clang \
        LDFLAGS="--rtlib=compiler-rt -fuse-ld=lld" \
        CONFIG_LIBNL32=y \
        LIBNL_INC=/include \
        -j$(nproc)"""
install = """mkdir -p $DESTDIR/bin $DESTDIR/etc/hostapd
install -m 755 hostapd/hostapd $DESTDIR/bin/hostapd
install -m 755 hostapd/hostapd_cli $DESTDIR/bin/hostapd_cli
llvm-strip --strip-all $DESTDIR/bin/hostapd $DESTDIR/bin/hostapd_cli 2>/dev/null || true"""

[depends]
runtime = ["musl", "libressl", "nloxide"]
build = ["clang", "jmake", "jonerix-headers", "libressl", "nloxide"]
