[package]
name = "hostapd"
version = "2.11"
license = "BSD-3-Clause"
description = "IEEE 802.11 AP, IEEE 802.1X/WPA/WPA2/EAP/RADIUS Authenticator"

[source]
url = "https://w1.fi/releases/hostapd-2.11.tar.gz"
sha256 = "2b3facb632fd4f65e32f4bf82a76b4b72c501f995a4f62e330219fe7aed1747a"

[build]
system = "custom"
configure = """cd hostapd
cat > .config << 'CONF'
CONFIG_DRIVER_HOSTAP=y
CONFIG_DRIVER_NL80211=y
CONFIG_DRIVER_NONE=y
CONFIG_RSN_PREAUTH=y
CONFIG_IEEE80211W=y
CONFIG_IEEE80211N=y
CONFIG_IEEE80211AC=y
CONFIG_IEEE80211AX=y
CONFIG_TLS=openssl
CONFIG_EAP=y
CONFIG_EAP_MD5=y
CONFIG_EAP_TLS=y
CONFIG_EAP_PEAP=y
CONFIG_EAP_TTLS=y
CONFIG_EAP_MSCHAPV2=y
CONFIG_PKCS12=y
CONFIG_WPS=y
CONFIG_ACS=y
CONF"""
# hostapd's Makefile uses $(abspath ../src) which bmake (jmake) does not
# implement — it expands to literally nothing, so the -I paths vanish. Supply
# ABSOLUTE paths via EXTRA_CFLAGS (honored at hostapd/Makefile's EXTRA_CFLAGS).
# CONFIG_LIBNL32=y + LIBNL_INC=/include bypasses the pkg-config probe in
# src/drivers/drivers.mak so jmake does not need a pkg-config binary.
build = """ROOT=$(pwd)
jmake -C hostapd \
  CC=clang \
  LDFLAGS="--rtlib=compiler-rt -fuse-ld=lld" \
  CONFIG_LIBNL32=y \
  LIBNL_INC=/include \
  EXTRA_CFLAGS="-I$ROOT/src -I$ROOT/src/utils -I/include" \
  -j$(nproc)"""
install = """mkdir -p $DESTDIR/bin $DESTDIR/etc/hostapd
install -m 755 hostapd/hostapd $DESTDIR/bin/hostapd
install -m 755 hostapd/hostapd_cli $DESTDIR/bin/hostapd_cli
llvm-strip --strip-all $DESTDIR/bin/hostapd $DESTDIR/bin/hostapd_cli 2>/dev/null || true"""

[depends]
runtime = ["musl", "libressl", "nloxide"]
build = ["clang", "jmake", "jonerix-headers", "libressl", "nloxide"]
