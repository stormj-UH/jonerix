[package]
name = "wpa_supplicant"
version = "2.11"
license = "BSD-3-Clause"
description = "WPA/WPA2/WPA3 supplicant for wireless network authentication"

[source]
url = "https://w1.fi/releases/wpa_supplicant-2.11.tar.gz"
sha256 = "912ea06f74e30a8e36fbb68064d6cdff218d8d591db0fc5d75dee6c81ac7fc0a"

[build]
system = "custom"
configure = """cd wpa_supplicant
cat > .config << 'CONF'
CONFIG_DRIVER_NL80211=y
CONFIG_DRIVER_WEXT=y
CONFIG_DRIVER_NONE=y
CONFIG_IEEE80211W=y
CONFIG_IEEE80211N=y
CONFIG_IEEE80211AC=y
CONFIG_IEEE80211AX=y
CONFIG_TLS=openssl
CONFIG_EAP_MD5=y
CONFIG_EAP_TLS=y
CONFIG_EAP_PEAP=y
CONFIG_EAP_TTLS=y
CONFIG_EAP_MSCHAPV2=y
CONFIG_PKCS12=y
CONFIG_WPS=y
CONFIG_CTRL_IFACE=y
CONF"""
# wpa_supplicant's Makefile uses GNU make features — build uses jmake.
# CONFIG_LIBNL32=y + LIBNL_INC=/include bypasses the pkg-config probe in
# src/drivers/drivers.mak so jmake does not need a pkg-config binary.
# EXTRA_CFLAGS supplies the -I paths that $(abspath ../src) normally provides;
# jmake's abspath evaluation differs from GNU make when -C is used.
build = """jmake -C wpa_supplicant \
  CC=clang \
  LDFLAGS="--rtlib=compiler-rt -fuse-ld=lld" \
  CONFIG_LIBNL32=y \
  LIBNL_INC=/include \
  EXTRA_CFLAGS="-I../src -I../src/utils -I/include" \
  -j$(nproc)"""
install = """mkdir -p $DESTDIR/bin $DESTDIR/etc/wpa_supplicant
install -m 755 wpa_supplicant/wpa_supplicant $DESTDIR/bin/wpa_supplicant
install -m 755 wpa_supplicant/wpa_cli $DESTDIR/bin/wpa_cli
install -m 755 wpa_supplicant/wpa_passphrase $DESTDIR/bin/wpa_passphrase
llvm-strip --strip-all $DESTDIR/bin/wpa_supplicant $DESTDIR/bin/wpa_cli $DESTDIR/bin/wpa_passphrase 2>/dev/null || true"""

[depends]
runtime = ["musl", "libressl", "nloxide"]
build = ["clang", "jmake", "jonerix-headers", "libressl", "nloxide"]
