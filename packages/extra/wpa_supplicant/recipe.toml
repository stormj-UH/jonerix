[package]
name = "wpa_supplicant"
version = "2.11-r2"
license = "BSD-3-Clause"
description = "WPA/WPA2/WPA3 supplicant for wireless network authentication"

[source]
url = "https://w1.fi/releases/wpa_supplicant-2.11.tar.gz"
sha256 = "912ea06f74e30a8e36fbb68064d6cdff218d8d591db0fc5d75dee6c81ac7fc0a"

[build]
system = "custom"
# wpa_supplicant's Makefile relies on two things jmake mishandles:
#
#   1. `-I$(abspath ../src)` / `-I$(abspath ../src/utils)` on
#      Makefile:50-51. Even when abspath returns the right answer
#      (verified via `grep -n '^CFLAGS' wpa_supplicant/Makefile`
#      in CI run 24676141487 which showed concrete absolute paths
#      after pre-substitution), the compile still errored with
#      `includes.h file not found` — so the bug is deeper than
#      abspath. We still pre-substitute so the Makefile is
#      self-documenting with concrete paths.
#
#   2. `CFLAGS += …` inside the Makefile. Both `CFLAGS += $(EXTRA_CFLAGS)`
#      (line 49) AND the `-I$(abspath …)` additions silently drop on
#      the floor under jmake when CFLAGS is set via the environment
#      (jpkg's Rust build sandbox always sets CFLAGS). We sidestep by writing
#      the -I paths directly into CFLAGS in the build shell, so jmake
#      sees them already when it reads the environment. V=1 is left on
#      so future regressions surface with a concrete CC command line.
#
# CONFIG_LIBNL32=y + LIBNL_INC=/include bypasses the pkg-config probe
# in src/drivers/drivers.mak so jmake does not need a pkg-config
# binary.
configure = """ROOT=$(pwd)
cd wpa_supplicant
cat > .config << 'CONF'
CONFIG_DRIVER_NL80211=y
CONFIG_DRIVER_WEXT=y
CONFIG_DRIVER_NONE=y
CONFIG_IEEE80211W=y
CONFIG_IEEE80211N=y
CONFIG_IEEE80211AC=y
CONFIG_IEEE80211AX=y
CONFIG_TLS=openssl
CONFIG_EAP_MD5=y
CONFIG_EAP_TLS=y
CONFIG_EAP_PEAP=y
CONFIG_EAP_TTLS=y
CONFIG_EAP_MSCHAPV2=y
CONFIG_PKCS12=y
CONFIG_WPS=y
CONFIG_CTRL_IFACE=y
CONF
cd ..
sed -i 's#-I$(abspath ../src)#-I'"$ROOT"'/src#g' wpa_supplicant/Makefile
sed -i 's#-I$(abspath ../src/utils)#-I'"$ROOT"'/src/utils#g' wpa_supplicant/Makefile"""
build = """ROOT=$(pwd)
CFLAGS="${CFLAGS:-} -I$ROOT/src -I$ROOT/src/utils -I/include" \
    jmake V=1 -C wpa_supplicant \
        CC=clang \
        LDFLAGS="--rtlib=compiler-rt -fuse-ld=lld" \
        CONFIG_LIBNL32=y \
        LIBNL_INC=/include \
        -j$(nproc)"""
install = """mkdir -p $DESTDIR/bin $DESTDIR/etc/wpa_supplicant
install -m 755 wpa_supplicant/wpa_supplicant $DESTDIR/bin/wpa_supplicant
install -m 755 wpa_supplicant/wpa_cli $DESTDIR/bin/wpa_cli
install -m 755 wpa_supplicant/wpa_passphrase $DESTDIR/bin/wpa_passphrase
llvm-strip --strip-all $DESTDIR/bin/wpa_supplicant $DESTDIR/bin/wpa_cli $DESTDIR/bin/wpa_passphrase 2>/dev/null || true"""

[depends]
runtime = ["musl", "libressl", "nloxide"]
build = ["clang", "jmake", "jonerix-headers", "libressl", "nloxide"]
