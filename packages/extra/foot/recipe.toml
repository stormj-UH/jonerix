# foot — fast, lightweight Wayland-native terminal emulator (dnkl).
# Cairo-free; uses pixman + fcft for all rendering.  MIT throughout.

[package]
name = "foot"
version = "1.27.0"
license = "MIT"
description = "Fast, lightweight Wayland-native terminal emulator. Cairo-free (pixman + fcft); footclient daemon mode"

[source]
url = "https://codeberg.org/dnkl/foot/archive/1.27.0.tar.gz"
sha256 = "4e6131cc859ec6a36569f1978cf3617cc3836a681d13d228ded1b4885dab7770"

[build]
system = "custom"
configure = """
set -e
export CFLAGS="-Os -pipe -fstack-protector-strong -fPIE -D_FORTIFY_SOURCE=2"
export LDFLAGS="-Wl,-z,relro,-z,now -pie --rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld"

CC=clang CXX=clang++ AR=llvm-ar RANLIB=llvm-ranlib STRIP=llvm-strip \
meson setup build \
  --prefix=/ \
  --libdir=lib \
  --buildtype=release \
  -Dterminfo=enabled \
  -Dime=true \
  -Dgrapheme-clustering=disabled \
  -Dthemes=false \
  -Ddocs=disabled
"""
build = "samu -C build"
install = """set -e
DESTDIR=$DESTDIR samu -C build install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find "$DESTDIR/bin" -type f -exec llvm-strip --strip-all {} ';' 2>/dev/null || true
"""

[depends]
runtime = ["musl", "wayland", "libxkbcommon", "fcft", "pixman", "freetype", "fontconfig", "harfbuzz", "ncurses"]
build = ["clang", "meson", "samurai", "pkgconf", "wayland", "wayland-protocols", "libxkbcommon", "fcft", "pixman", "freetype", "fontconfig", "harfbuzz", "ncurses", "jonerix-headers"]
