[package]
name = "docker"
version = "27.5.1-r3"
license = "Apache-2.0"
description = "Docker daemon (dockerd) — industry-standard container engine using containerd as the runtime backend"
replaces = []

[source]
url = "https://github.com/moby/moby/archive/refs/tags/v27.5.1.tar.gz"
sha256 = "0d071c1773c855778d85590e01b924c1857000fd786485f4b674a3be2d3b893c"

[build]
system = "custom"
build = """set -e
# moby v27 ships vendor.mod / vendor.sum at the repo root, NOT go.mod /
# go.sum.  Upstream's hack/make.sh renames them at build time; replicate
# that here so 'go build' can find a module file.
[ -f go.mod ] || cp vendor.mod go.mod
[ -f go.sum ] || cp vendor.sum go.sum

# Moby v27 builds with standard 'go build'; the Makefile wrapper is
# GNU-make-heavy and requires variables we do not have.  Build the two
# daemon binaries directly instead.
#
# VERSION is embedded by moby's internal/lazyregexp init path; without it the
# daemon starts but 'docker version' shows "(unknown)".  Set it explicitly.
export GOFLAGS="-mod=vendor"
export CGO_ENABLED=0
VERSION=27.5.1
GITCOMMIT=jonerix

go build -mod=vendor -trimpath \
  -ldflags "-s -w -X github.com/docker/docker/dockerversion.Version=${VERSION} \
    -X github.com/docker/docker/dockerversion.GitCommit=${GITCOMMIT}" \
  -o bundles/dockerd \
  ./cmd/dockerd

go build -mod=vendor -trimpath \
  -ldflags "-s -w" \
  -o bundles/docker-proxy \
  ./cmd/docker-proxy
"""
install = """set -e
mkdir -p "$DESTDIR/bin"
install -m755 bundles/dockerd       "$DESTDIR/bin/dockerd"
install -m755 bundles/docker-proxy  "$DESTDIR/bin/docker-proxy"

# Default daemon configuration.
mkdir -p "$DESTDIR/etc/docker"
printf '%s\n' '{"iptables": true, "userland-proxy": true}' \
  > "$DESTDIR/etc/docker/daemon.json"

# OpenRC service.
mkdir -p "$DESTDIR/etc/init.d"
install -m755 "$RECIPE_DIR/init.d/docker" "$DESTDIR/etc/init.d/docker"

# Data directory placeholder (owned by root; docker group set in post_install).
mkdir -p "$DESTDIR/var/lib/docker"

# Strip /lib64 references from ELF files only (Go embeds the dynamic
# linker path in its string table even for static binaries). Null-pad
# /lib64 -> /lib\0\0 (same length, terminates string early). Safe:
# jonerix has no /lib64, so the padded path dereferences to /lib.
ELF_LIST=$(mktemp)
find "$DESTDIR" -type f -exec sh -c '
    head -c 4 "$1" 2>/dev/null | od -An -tx1 | tr -d " " | grep -q "^7f454c46" && printf "%s\n" "$1"
' _ {} \; > "$ELF_LIST" 2>/dev/null || true
if [ -s "$ELF_LIST" ]; then
    python3 - "$ELF_LIST" <<'PYEOF' || true
import sys
with open(sys.argv[1]) as f:
    files = [ln.rstrip("\n") for ln in f if ln.strip()]
for p in files:
    with open(p, "rb") as fh: d = fh.read()
    n = d.count(b"/lib64")
    if not n: continue
    d = d.replace(b"/lib64", b"/lib\x00\x00")
    with open(p, "wb") as fh: fh.write(d)
    print(f"docker lib64-fix: {p} replaced {n} refs")
PYEOF
fi
rm -f "$ELF_LIST"

for bin in "$DESTDIR/bin/dockerd" "$DESTDIR/bin/docker-proxy"; do
    llvm-strip --strip-all "$bin" 2>/dev/null || true
done
"""

[hooks]
# Pre-install: dockerd needs several kernel modules that jonerix doesn't
# auto-load on boot:
#   overlay              — overlay2 storage driver
#   bridge               — docker0 bridge interface
#   br_netfilter         — so iptables/nft rules see bridged frames
#   veth                 — virtual ethernet pair for container networking
#   nft_reject           — `iptables -j REJECT` (any --reject-with form)
#   nft_reject_ipv4      — REJECT in ip4 family
#   nft_log              — `iptables -j LOG`
#   nft_limit            — `iptables -m limit`
#   nft_redir            — `iptables -j REDIRECT`
# The modules ship with the kernel package; they're just not loaded by
# default. Without nft_reject + nft_reject_ipv4, dockerd's libnetwork
# would silently install REJECT rules that error at packet-match time
# with ENOENT from the kernel. Also surface a warning if the kernel was
# built without CONFIG_SECCOMP (runc will fail to start containers
# unless `--security-opt seccomp=unconfined` is set).
#
# We check what's missing and prompt the user before calling modprobe.
# In a non-interactive context (no controlling tty — CI builds, scripted
# installs) we print what would have been loaded and skip — letting the
# user load them at first dockerd start instead of silently changing the
# running kernel state.
pre_install = """set -e
need=""
for mod in overlay bridge br_netfilter veth nft_reject nft_reject_ipv4 nft_log nft_limit nft_redir; do
    if ! awk '{print $1}' /proc/modules | grep -qx "$mod" 2>/dev/null; then
        # Built-in to the kernel? Treat that as already-loaded.
        if [ -d "/sys/module/$mod" ]; then continue; fi
        need="$need $mod"
    fi
done

# Seccomp is a separate, kernel-config-time concern — modprobe can't help.
# Surface it as a warning if absent; runc will refuse to start containers
# unless they're started with --security-opt seccomp=unconfined.
if [ -r /proc/config.gz ]; then
    if ! zcat /proc/config.gz 2>/dev/null | grep -q "^CONFIG_SECCOMP=y"; then
        echo "docker: WARNING: kernel was built without CONFIG_SECCOMP."
        echo "docker:          runc will refuse to start containers; pass"
        echo "docker:          --security-opt seccomp=unconfined to docker run,"
        echo "docker:          or rebuild the kernel with CONFIG_SECCOMP=y."
    fi
fi

if [ -z "$need" ]; then
    echo "docker: required kernel modules already present"
    exit 0
fi

echo "docker: the following kernel modules are required by dockerd but not loaded:"
echo "       $need"

if [ ! -t 0 ] || [ ! -t 1 ]; then
    echo "docker: non-interactive install — NOT loading modules. Run before starting dockerd:"
    for mod in $need; do
        echo "         modprobe $mod"
    done
    exit 0
fi

printf 'docker: load them now via modprobe? [Y/n] '
read ans
case "$ans" in
    n|N|no|No|NO)
        echo "docker: skipping modprobe; load them manually before starting dockerd."
        ;;
    *)
        for mod in $need; do
            if modprobe "$mod" 2>/dev/null; then
                echo "docker: modprobe $mod ok"
            else
                echo "docker: WARNING: modprobe $mod failed — dockerd may not start"
            fi
        done
        ;;
esac
"""

post_install = """set -e
# Create the docker system group if it does not exist.
# Use shadow-utils' /bin/groupadd (safe) instead of toybox's
# /bin/addgroup. The toybox addgroup variant truncates /etc/group to
# 0 bytes when its lookup-then-rewrite path errors out — reproduced
# 2026-05-09 on tormenta. The truncation is a side effect of the
# rewrite path, not the printed error, so `2>/dev/null || true`
# does NOT mask it. shadow's groupadd uses an atomic-rename pattern
# and is safe even when the group already exists (it returns 9
# without modifying the file). Falls back to a safe direct append
# if shadow isn't installed yet (first-pass bootstrap).
if ! grep -q "^docker:" /etc/group 2>/dev/null; then
    if command -v groupadd >/dev/null 2>&1; then
        groupadd -r docker 2>/dev/null || true
    else
        printf 'docker:x:998:\\n' >> /etc/group
    fi
fi

# dockerd's libnetwork bridge driver shells out to /usr/sbin/iptables
# and /sbin/iptables (hard-coded, not PATH).  jonerix is merged-usr-flat
# with no /sbin in the base rootfs, so plant compat symlinks pointing at
# stormwall's multicall binary here.  Moved from stormwall 1.1.11's
# post_install in 27.5.1-r3 / stormwall 1.1.12 — non-docker hosts no
# longer get /sbin/ created at all.  post_remove takes them back out.
names="iptables iptables-save iptables-restore ip6tables ip6tables-save ip6tables-restore nft"
for d in /sbin /usr/sbin; do
    [ -d "$d" ] || mkdir -p "$d"
    for n in $names; do
        ln -sf /bin/stormwall "$d/$n"
    done
done

# Seed daemon.json only when none is present on the live system.
if [ ! -e /etc/docker/daemon.json ]; then
    mkdir -p /etc/docker
    install -Dm644 /etc/docker/daemon.json /etc/docker/daemon.json 2>/dev/null || true
fi

# Register OpenRC service in the default runlevel.
# `cd /` before rc-update — librc resolves runlevels via the relative
# path "etc/runlevels/<name>", so running from any other cwd (e.g.
# jpkg's install temp dir) makes rc-update reject every runlevel name
# as "not a valid runlevel".
if command -v rc-update >/dev/null 2>&1; then
    if (cd / && rc-update add docker default) >/dev/null 2>&1; then
        echo "docker: registered with OpenRC (boot runlevel: default)."
        echo "docker: start now with: rc-service docker start"
    else
        echo "docker: WARNING: rc-update add failed — register manually:"
        echo "docker:   cd / && rc-update add docker default"
    fi
fi
"""

post_remove = """set -e
if command -v rc-service >/dev/null 2>&1 && [ -f /run/openrc/softlevel ]; then
    rc-service docker stop 2>/dev/null || true
fi
if command -v rc-update >/dev/null 2>&1; then
    (cd / && rc-update del docker default) 2>/dev/null || true
fi

# Tear down the /sbin and /usr/sbin libnetwork-compat symlinks planted
# in post_install.  Only remove symlinks that actually point at
# stormwall so we don't trample a manually placed binary.  Try to
# rmdir the compat dirs afterwards — empty /sbin shouldn't linger on
# a jonerix host where no other package uses it.
names="iptables iptables-save iptables-restore ip6tables ip6tables-save ip6tables-restore nft"
for d in /sbin /usr/sbin; do
    for n in $names; do
        target=$(readlink "$d/$n" 2>/dev/null) || continue
        [ "$target" = "/bin/stormwall" ] && rm -f "$d/$n"
    done
    rmdir "$d" 2>/dev/null || true
done
"""

[depends]
# stormwall is the runtime iptables provider — dockerd's libnetwork shells
# out to /usr/sbin/iptables and /sbin/iptables (hard-coded, not PATH) for
# bridge networking, masquerading, and -p port publishing. The iptables
# CLI dialect lands in stormwall 1.1.0+; user-chain auto-create on `-A`
# and the /usr/sbin + /sbin compatibility symlinks land in 1.1.2; and
# jump-target user-chain auto-create (`-I FORWARD -j DOCKER` after
# dockerd's own `-X DOCKER` cleanup) lands in 1.1.3. Without the 1.1.3
# fix dockerd aborts bridge bring-up with "iptables: No such file or
# directory". jpkg 2.2.x does not parse version-qualified deps so we
# list a plain name and enforce the floor out-of-band (CI matrix + this
# comment + PACKAGES.md). Switch to "stormwall >= 1.1.3" once jpkg 2.3+
# ships version-qualified dep parsing.
runtime = ["musl", "containerd", "runc", "cni-plugins", "tini", "iproute-go", "stormwall"]
build = ["go"]
