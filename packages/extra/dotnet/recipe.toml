[package]
name = "dotnet"
version = "10.0.203"
license = "MIT"
description = ".NET 10 SDK + runtime (WIP — source build against libc++, see docs/plans/dotnet.md)"

# This recipe is intentionally non-functional. The first attempt
# (commit 04566f3) repackaged Microsoft's official linux-musl tarballs;
# those binaries DT_NEEDED libstdc++.so.6 and libgcc_s.so.1, which the
# zero-GPL runtime policy does not allow. The recipe was reverted and
# the broken jpkgs yanked from the packages release.
#
# The path forward is to source-build dotnet/dotnet (the VMR) against
# clang + lld + libcxx, with patches in patches/dotnet/. Full plan,
# bootstrap strategy, libc++ migration scope, and phased rollout are in
# docs/plans/dotnet.md. Until phase 3 of that plan lands, this recipe
# fails fast so nothing accidentally ships.
#
# Do not add this to scripts/build-order.txt until phase 3.

[build]
system = "custom"
build = """
echo "dotnet recipe is WIP — see docs/plans/dotnet.md."
echo "Source build against libc++ has not landed; this recipe intentionally"
echo "fails so a half-broken jpkg cannot be published."
exit 1
"""
install = ""

[depends]
runtime = ["musl", "libcxx", "zlib", "gnu-compat-symlinks"]
build = ["clang", "cmake", "samurai", "python3", "libcxx"]
