# grim — Wayland screen-capture utility for wlroots compositors.
# MIT.  Outputs PNG (via libpng) or JPEG (via libjpeg — optional;
# disabled here since libjpeg isn't packaged yet).  Uses pixman for
# pixel format conversions; no cairo.

[package]
name = "grim"
version = "1.4.0"
license = "MIT"
description = "Wayland screen-capture utility (PNG via libpng, pixman pixel ops; for wlroots compositors)"

[source]
url = "https://github.com/emersion/grim/releases/download/v1.4.0/grim-1.4.0.tar.gz"
sha256 = "b6786e889ed93568634189a59f6b6429c041bf74883c10e8b6e2ed6772ae7ffb"

[build]
system = "custom"
configure = """
set -e
export CFLAGS="-Os -pipe -fstack-protector-strong -fPIE -D_FORTIFY_SOURCE=2"
export LDFLAGS="-Wl,-z,relro,-z,now -pie --rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld"
CC=clang CXX=clang++ AR=llvm-ar RANLIB=llvm-ranlib STRIP=llvm-strip \
meson setup build \
  --prefix=/ \
  --libdir=lib \
  --buildtype=release \
  -Dman-pages=disabled \
  -Djpeg=disabled
"""
build = "samu -C build"
install = """set -e
DESTDIR=$DESTDIR samu -C build install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find "$DESTDIR/bin" -type f -exec llvm-strip --strip-all {} ';' 2>/dev/null || true
"""

[depends]
runtime = ["musl", "wayland", "pixman", "libpng"]
build = ["clang", "meson", "samurai", "pkgconf", "wayland", "wayland-protocols", "pixman", "libpng"]
