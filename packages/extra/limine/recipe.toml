[package]
name = "limine"
version = "11.2.1"
license = "BSD-2-Clause"
description = "Modern, portable bootloader supporting UEFI and legacy BIOS (BSD-2-Clause)"

[source]
url = "https://github.com/limine-bootloader/limine/releases/download/v11.2.1/limine-11.2.1.tar.gz"
sha256 = "1d0ab886b8ee213418f626b5cf8a4a89df35f967d7f421945124147ef04f3e01"

[build]
system = "custom"
# Built in the normal jonerix builder environment where `make` resolves to
# `jmake`. On current aarch64 runs Limine only builds the host utility plus the
# UEFI payloads; BIOS artifacts stay disabled via `-DLIMINE_NO_BIOS`.
configure = """./configure \
  --prefix=/ \
  CC=clang \
  CFLAGS="-Os -pipe"
"""
build = "make -j$(nproc)"
install = """set -e
make install DESTDIR="$DESTDIR"

# Flatten usr/ for jonerix merged-usr layout (/usr -> /)
if [ -d "$DESTDIR/usr" ]; then
    cp -a "$DESTDIR/usr/." "$DESTDIR/"
    rm -rf "$DESTDIR/usr"
fi

# Limine installs its data files to share/limine/ — ensure they are present
mkdir -p "$DESTDIR/share/limine"

# Copy EFI binaries if not already placed by `make install`
for f in BOOTX64.EFI BOOTAA64.EFI limine-bios.sys limine-bios-pxe.bin; do
    [ -f "$f" ] && cp "$f" "$DESTDIR/share/limine/" 2>/dev/null || true
done

# Install the example config
install -m644 /workspace/packages/extra/limine/limine.conf.example \
    "$DESTDIR/share/limine/limine.conf.example" 2>/dev/null || true

# Strip the host utility
llvm-strip --strip-all "$DESTDIR/bin/limine" 2>/dev/null || true
"""

[depends]
# Runtime: the `limine` host utility (for bios-install) links musl.
# EFI/BIOS binaries are self-contained and need no runtime deps.
runtime = ["musl"]
# `make` is provided by jmake in the builder image.
build = ["clang", "jmake"]
