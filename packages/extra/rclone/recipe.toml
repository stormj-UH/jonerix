[package]
# "rsync for cloud storage" — single static Go binary that speaks ~70
# cloud backends (S3, GCS, Azure Blob, B2, Dropbox, OneDrive, Google Drive,
# SFTP, WebDAV, NFS, restic, …) plus a FUSE mount mode and HTTP/WebDAV/
# SFTP/NFS server modes.  Useful for: cron'd off-site backups of /etc and
# /var/cache/jpkg, fronting an S3 bucket as a local filesystem, or moving
# data between providers without a local round-trip.
name = "rclone"
version = "1.74.1"
license = "MIT"
description = "rsync for cloud storage — 70+ backends, single static Go binary"

[source]
# Canonical: github.com/rclone/rclone v1.74.1.
# Our tarball is repacked with vendor/ so the build is fully offline.
url = "https://github.com/stormj-UH/jonerix/releases/download/source-rclone-v1.74.1/rclone-1.74.1.tar.gz"
sha256 = "0df16e1c986b67bbcd30731050fb87bb50457b51ae9dc190d0bd235bf436f81d"

[build]
system = "custom"
build = """
set -e
# Disable network access to the Go module proxy — vendor/ is the source
# of truth.  CGO is off so the resulting binary is fully static, no
# musl/glibc dynamic dep at runtime.
export CGO_ENABLED=0
export GOFLAGS="-mod=vendor"
export GOPROXY=off
export GOSUMDB=off

# `noselfupdate` strips the self-update subcommand — a package-managed
# rclone shouldn't be able to replace itself out from under jpkg.
go build -mod=vendor -trimpath -tags noselfupdate \
  -ldflags "-s -w -X github.com/rclone/rclone/fs.Version=v1.74.1" \
  -o bin/rclone
"""
install = """
set -e
install -Dm755 bin/rclone "$DESTDIR/bin/rclone"

# Bash completion script (rclone embeds the generator; cross-arch safe
# because the binary we just built runs natively on this builder).
install -dm755 "$DESTDIR/share/bash-completion/completions"
./bin/rclone genautocomplete bash "$DESTDIR/share/bash-completion/completions/rclone" || true

# Man page (same caveat — generated by running the binary).
install -dm755 "$DESTDIR/share/man/man1"
./bin/rclone gendocs /tmp/rclone-docs 2>/dev/null && \
    cp /tmp/rclone-docs/rclone.1 "$DESTDIR/share/man/man1/rclone.1" 2>/dev/null || true

# Strip Go's embedded /lib64 dynamic-linker reference.  CGO_ENABLED=0
# binaries are fully static so /lib64 is never actually consulted, but
# binwalk / ELF readers still see it.  Null-pad to /lib\\0\\0 (same
# length, terminates the string early) — same trick the buildkit recipe
# uses.  Defensive: if grep doesn't find it the recipe still succeeds.
python3 - "$DESTDIR/bin/rclone" <<'PYEOF' || true
import sys
p = sys.argv[1]
with open(p, "rb") as fh: d = fh.read()
n = d.count(b"/lib64")
if n:
    d = d.replace(b"/lib64", b"/lib\\x00\\x00")
    with open(p, "wb") as fh: fh.write(d)
    print(f"rclone lib64-fix: replaced {n} refs in {p}")
PYEOF

llvm-strip --strip-all "$DESTDIR/bin/rclone" 2>/dev/null || true
"""

[depends]
# Pure-Go static binary: no shared libs, nothing else needed at runtime.
# `rclone mount` uses /dev/fuse via bazil.org/fuse (pure-Go syscalls);
# no userspace libfuse is required.
runtime = ["musl"]
build = ["go"]
