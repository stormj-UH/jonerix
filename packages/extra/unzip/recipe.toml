[package]
name = "unzip"
version = "0.1.0"
license = "Apache-2.0"
description = "Compatibility package: /bin/unzip → /bin/bsdunzip (libarchive)"
# Info-ZIP's unzip-6.0 from 2009 is K&R C that no longer survives
# clang-21; its own README recommends libarchive's bsdunzip as the
# drop-in replacement. This package ships only /bin/unzip as a
# symlink to bsdunzip, which is provided by the libarchive jpkg.
# Runtime-depends on libarchive so `jpkg install unzip` pulls
# bsdunzip in transitively.

# No [source] — local-only build.
[build]
system = "custom"
configure = ""
build = ""
install = """set -e
mkdir -p "$DESTDIR/bin"
ln -sf bsdunzip "$DESTDIR/bin/unzip"
# Sanity check: the symlink target must be a valid shape, though
# we can't verify the resolution until libarchive is installed
# alongside unzip at runtime.
[ -L "$DESTDIR/bin/unzip" ]"""

[depends]
runtime = ["libarchive"]
build = []
