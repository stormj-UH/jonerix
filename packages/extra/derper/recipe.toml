[package]
name = "derper"
version = "1.96.5"
license = "BSD-3-Clause"
description = "Tailscale DERP relay server"

[source]
url = "https://github.com/tailscale/tailscale/archive/refs/tags/v1.96.5.tar.gz"
sha256 = "1f0a56b077b7ea8ad272d34273a23873bbc534a6f272731654a3522b7080f0b4"

[build]
system = "custom"
build = """set -e
export GOCACHE=/tmp/go-cache
export CGO_ENABLED=0
go build -mod=vendor -trimpath -ldflags="-s -w" -o derper ./cmd/derper
"""
install = """install -Dm755 derper "$DESTDIR/bin/derper"
llvm-strip --strip-all "$DESTDIR/bin/derper" 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["go"]
