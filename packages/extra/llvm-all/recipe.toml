[package]
name = "llvm-all"
version = "21.1.2-r6"
license = "Apache-2.0"
description = "Full LLVM toolchain with all 80+ clang/llvm/lldb tools — pairs with slim llvm"

# llvm-all ships the full set of LLVM/clang/lld tools — llvm-dwp,
# llvm-mca, clang-tidy, clang-format, etc. — for development/debugging.
# The core toolchain is now split across libllvm + clang + lld packages;
# llvm-all is repacked from a combined build of all three.
#
# r6: updated for the libllvm/clang/lld split. Now depends on the split
#     packages at runtime instead of the monolithic llvm build.

[source]
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.2/llvm-project-21.1.2.src.tar.xz"
sha256 = "1a417d1c8faf8d93e73fec1cbb76d393ed3218974c2283c7bac9672d3d47c54b"

[build]
system = "custom"
build = """
echo "llvm-all is repackaged from the llvm source build — not built directly."
echo "See packages/develop/llvm/recipe.toml for the source build."
exit 1
"""
install = ""

[depends]
runtime = ["musl", "libllvm", "libcxx", "zstd", "zlib"]
build = ["libllvm", "clang", "lld", "cmake", "samurai", "python3", "libcxx"]
