[package]
name = "buildkit"
version = "0.20.2-r1"
license = "Apache-2.0"
description = "BuildKit — high-performance build backend for Docker and OCI images (buildkitd + buildctl)"

[source]
url = "https://github.com/moby/buildkit/archive/refs/tags/v0.20.2.tar.gz"
sha256 = "4f92af7dd3de8e2bee5564e6e4c5e8b0d2efbf8e94ef1f4e03bd02a7d3284a70"

[build]
system = "custom"
build = """set -e
export GOFLAGS="-mod=vendor"
export CGO_ENABLED=0
VERSION=0.20.2
REVISION=jonerix

go build -trimpath \
  -ldflags "-s -w \
    -X github.com/moby/buildkit/version.Version=${VERSION} \
    -X github.com/moby/buildkit/version.Revision=${REVISION}" \
  -o bin/buildkitd \
  ./cmd/buildkitd

go build -trimpath \
  -ldflags "-s -w \
    -X github.com/moby/buildkit/version.Version=${VERSION} \
    -X github.com/moby/buildkit/version.Revision=${REVISION}" \
  -o bin/buildctl \
  ./cmd/buildctl
"""
install = """set -e
mkdir -p "$DESTDIR/bin"
install -m755 bin/buildkitd "$DESTDIR/bin/buildkitd"
install -m755 bin/buildctl  "$DESTDIR/bin/buildctl"

# Strip /lib64 references from ELF files only (Go embeds the dynamic
# linker path in its string table even for static binaries). Null-pad
# /lib64 -> /lib\0\0 (same length, terminates string early). Safe:
# jonerix has no /lib64, so the padded path dereferences to /lib.
ELF_LIST=$(mktemp)
find "$DESTDIR" -type f -exec sh -c '
    head -c 4 "$1" 2>/dev/null | od -An -tx1 | tr -d " " | grep -q "^7f454c46" && printf "%s\n" "$1"
' _ {} \; > "$ELF_LIST" 2>/dev/null || true
if [ -s "$ELF_LIST" ]; then
    python3 - "$ELF_LIST" <<'PYEOF' || true
import sys
with open(sys.argv[1]) as f:
    files = [ln.rstrip("\n") for ln in f if ln.strip()]
for p in files:
    with open(p, "rb") as fh: d = fh.read()
    n = d.count(b"/lib64")
    if not n: continue
    d = d.replace(b"/lib64", b"/lib\x00\x00")
    with open(p, "wb") as fh: fh.write(d)
    print(f"buildkit lib64-fix: {p} replaced {n} refs")
PYEOF
fi
rm -f "$ELF_LIST"

for bin in "$DESTDIR/bin/buildkitd" "$DESTDIR/bin/buildctl"; do
    llvm-strip --strip-all "$bin" 2>/dev/null || true
done
"""

[depends]
runtime = ["musl", "containerd", "runc"]
build = ["go"]
