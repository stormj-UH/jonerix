[package]
name = "lsusb-rs"
version = "0.1.0-r0"
license = "MIT"
description = "Permissive-license lsusb drop-in (pure Rust, sysfs backend)"

[source]
# Canonical source of truth is the Forgejo repo — jonerik/lsusb-rs
# on castle.great-morpho.ts.net:3000. But that host sits behind
# Tailscale and GitHub's cloud-hosted runners can't reach it, so
# the tarball is mirrored byte-for-byte to a jonerix GH release
# (source-lsusb-rs-v0.1.0) for CI to fetch. sha256 matches the
# `git archive` output at tag v0.1.0 on either host.
#
# Forgejo URL (primary, reachable from inside the jonerix network):
#   https://castle.great-morpho.ts.net:3000/jonerik/lsusb-rs/archive/v0.1.0.tar.gz
url = "https://github.com/stormj-UH/jonerix/releases/download/source-lsusb-rs-v0.1.0/lsusb-rs-0.1.0.tar.gz"
sha256 = "98b177fa595a4398ef5906a3b370af47af872543fc15ec0d85dac2580acc735d"

[build]
system = "custom"
# Zero external-crate dependencies — the whole binary is a single
# src/main.rs that reads /sys/bus/usb/devices/ directly. `cargo
# --offline --frozen` works because there's nothing to resolve
# (matches the jfsck pattern).
#
# RUSTFLAGS: strip symbols for a small binary, dynamic-link against
# musl like gitoxide / most of the core stack (-crt-static turns off
# the default static-musl behaviour so the binary uses
# /lib/ld-musl-*.so.1 at runtime).
build = """
set -e
export CARGO_HOME=/tmp/lsusb-rs-cargo
export CARGO_TARGET_DIR=/tmp/lsusb-rs-target
export RUSTFLAGS="-C strip=symbols -C target-feature=-crt-static"
# Zero external crates — this is a single src/main.rs reading
# /sys/bus/usb/devices/. No Cargo.lock in the tarball and
# nothing to fetch, so skip --frozen / --offline (those want a
# lockfile that doesn't exist). CARGO_NET_OFFLINE=true remains
# as a belt-and-suspenders guard against crates.io traffic.
export CARGO_NET_OFFLINE=true
cargo build --release --bin lsusb
"""
install = """
set -e
BIN=/tmp/lsusb-rs-target/release/lsusb
install -Dm755 "$BIN" "$DESTDIR/bin/lsusb"
install -Dm644 LICENSE "$DESTDIR/share/licenses/lsusb-rs/LICENSE"
# Merged-usr flatten so the archive never carries a usr/ prefix
# (same dance gitoxide + other recipes do — jpkg's cmd_build expects
# a flat / layout).
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find "$DESTDIR/bin" -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]

# Vendor / product name resolution is runtime-optional — the tool
# falls back to the kernel-supplied sysfs manufacturer / product
# strings when /usr/share/hwdata/usb.ids isn't installed. Mark the
# database package as a suggestion rather than a hard dep so minimal
# images stay minimal.
# [depends.suggests]
# runtime = ["hwdata-usb"]
