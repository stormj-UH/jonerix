[package]
name = "zsh"
version = "5.9-r11"
license = "MIT"
description = "Z shell — feature-rich interactive shell"
# Upstream `make install` stages /bin/sh -> zsh. Strip that path from the
# package payload so mksh remains the system /bin/sh provider and zsh stays
# an interactive/login shell package.

[source]
url = "https://www.zsh.org/pub/zsh-5.9.tar.xz"
sha256 = "9b8d1ecedd5b5e81fbf1918e876752a7dd948e05c1a0dba10ab863842d45acd5"

[build]
system = "autoconf"
configure = "CFLAGS=\"-O2 -fomit-frame-pointer\" ./configure --prefix=/ --bindir=/bin --mandir=/share/man --infodir=/share/info --with-tcsetpgrp --enable-multibyte --enable-unicode9 --disable-gdbm --disable-dynamic --without-tcl CC=clang"
# zsh's build is two-phase: Src/mkmakemod.sh generates Src/Makemod (a
# Makefile fragment containing the `modules.stamp` rule). Src/Makefile
# `include`s Makemod — so on the FIRST make invocation, the rule isn't
# visible until after mkmakemod.sh has run, but mkmakemod.sh runs as a
# rule action mid-build. r10's `make prep` got mkmakemod.sh to run but
# the second `make` STILL didn't see Makemod (the include path is finicky
# under jmake's recursion). Fix: run mkmakemod.sh DIRECTLY before any
# make invocation, so Src/Makemod exists when make first reads
# Src/Makefile. After that the build is plain serial.
build = """set -e
# Generate Src/Makemod up front so the modules.stamp rule it defines is
# present in Src/Makefile from the start. mkmakemod.sh is run from the
# top-level dir per its own argv expectations; it writes to Src/Makemod.
top_srcdir=. /bin/sh Src/mkmakemod.sh Src Src/Makemod
ls -l Src/Makemod
MAKEFLAGS=-j1 make -j1
"""
install = """
make DESTDIR=$DESTDIR install
install -Dm644 "$RECIPE_DIR/zshrc" "$DESTDIR/etc/zshrc"
install -Dm644 "$RECIPE_DIR/_pick_variant" "$DESTDIR/share/zsh/site-functions/_pick_variant"
install -Dm644 "$RECIPE_DIR/_ls" "$DESTDIR/share/zsh/site-functions/_ls"
rm -f "$DESTDIR/bin/sh"
for gcc_comp in "$DESTDIR"/share/zsh/*/functions/_gcc; do
    [ -f "$gcc_comp" ] || continue
    tmp="$gcc_comp.tmp"
    sed 's#/usr/lib64#/lib#g; s#/usr/lib#/lib#g' "$gcc_comp" > "$tmp" && mv "$tmp" "$gcc_comp"
done
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true
"""

[hooks]
post_install = """refresh_completions() {
    site=/share/zsh/site-functions
    funcs=
    ver=

    for cand in /share/zsh/*/functions; do
        [ -d "$cand" ] || continue
        funcs=$cand
        ver=$(basename "$(dirname "$cand")")
        break
    done
    [ -n "$funcs" ] || return 0

    mkdir -p "$site"
    for cmdpath in /bin/*; do
        [ -e "$cmdpath" ] || continue
        cmd=$(basename "$cmdpath")
        case "$cmd" in
            ''|.*) continue
                ;;
        esac
        [ -f "$funcs/_$cmd" ] || continue
        dest=$site/_$cmd
        if [ -e "$dest" ] && [ ! -L "$dest" ]; then
            continue
        fi
        ln -sf "../$ver/functions/_$cmd" "$dest"
    done
}

if [ -f /etc/shells ]; then
    grep -qx '/bin/zsh' /etc/shells 2>/dev/null || printf '%s\\n' /bin/zsh >> /etc/shells
else
    printf '%s\\n' '# /etc/shells — valid login shells' '/bin/sh' '/bin/mksh' '/bin/zsh' > /etc/shells
fi

[ -x /bin/zsh ] && refresh_completions
exit 0"""

[depends]
runtime = ["musl", "ncurses"]
build = ["clang", "make"]
