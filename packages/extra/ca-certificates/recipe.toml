[package]
name = "ca-certificates"
version = "20260211"
license = "MPL-2.0"
description = "Mozilla CA certificate bundle for TLS verification"

[source]
url = "https://curl.se/ca/cacert.pem"
sha256 = "b6e66569cc3d438dd5abe514d0df50005d570bfc96c14dca8f768d020cb96171"

[build]
system = "custom"
build = ""
install = """
set -e
mkdir -p "$DESTDIR/etc/ssl/certs"
cp -a "$SRC" "$DESTDIR/etc/ssl/certs/ca-certificates.crt"
"""

[depends]
runtime = []
build = []
