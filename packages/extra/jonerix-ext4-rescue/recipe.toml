[package]
name = "jonerix-ext4-rescue"
version = "0.1.0"
license = "MIT"
description = "Reset a corrupted ext4 inode's extent header so the file can be rm'd"

# No [source] — local-only build using $RECIPE_DIR contents.

[build]
system = "custom"
build = """
set -e
cd "$RECIPE_DIR"

# Single-binary Rust tool. No external crates; stdlib only. Build
# with static-crt-musl so the binary runs on any jonerix regardless
# of libc state (this is a rescue tool — assume the system is hurt).
# Note: -C target-feature=+crt-static is the default for musl targets
# in 1.94+ but we also set it explicitly for safety.
export CARGO_HOME=/tmp/jonerix-ext4-rescue-cargo
export CARGO_TARGET_DIR=/tmp/jonerix-ext4-rescue-target
rustc_target=""
case "$(uname -m)" in
    aarch64) rustc_target="aarch64-unknown-linux-musl" ;;
    x86_64)  rustc_target="x86_64-unknown-linux-musl" ;;
    *) echo "unsupported arch: $(uname -m)"; exit 1 ;;
esac

cargo build --release --target "$rustc_target" --config 'target.'"$rustc_target"'.rustflags = ["-C", "target-feature=+crt-static"]'

install -Dm755 "$CARGO_TARGET_DIR/$rustc_target/release/ext4-rescue" "$DESTDIR/bin/ext4-rescue"

# Clean cargo scratch to keep the builder image small between runs.
rm -rf "$CARGO_HOME" "$CARGO_TARGET_DIR"
"""
install = ""

[depends]
# Static binary — no runtime shared lib deps.
runtime = []
build = ["rust"]
