[package]
name = "jonerix-ext4-rescue"
version = "0.1.0"
license = "MIT"
description = "Reset a corrupted ext4 inode's extent header so the file can be rm'd"

# No [source] — local-only build using $RECIPE_DIR contents.

[build]
system = "custom"
# Single-file Rust tool (stdlib only, no external crates) — skip
# cargo and use rustc directly. Same pattern as raspi5-fixups
# eee-tool. The jonerix builder's rust only has the self-built
# `*-jonerix-linux-musl` target installed, so asking cargo for
# --target=aarch64-unknown-linux-musl fails E0463 "can't find crate
# for std". rustc without --target uses the host triple and gets
# static-crt from `-C target-feature=+crt-static`.
build = """
set -e
cd "$RECIPE_DIR"
rustc --edition 2021 -O -C strip=symbols -C target-feature=+crt-static -o /tmp/ext4-rescue src/main.rs
install -Dm755 /tmp/ext4-rescue $DESTDIR/bin/ext4-rescue
rm -f /tmp/ext4-rescue
"""
install = ""

[depends]
# Static binary — no runtime shared lib deps.
runtime = []
build = ["rust"]
