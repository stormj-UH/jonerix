[package]
name = "pcre2"
version = "10.47"
license = "BSD-3-Clause"
description = "Perl Compatible Regular Expressions library (v2)"

[source]
url = "https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.47/pcre2-10.47.tar.gz"
sha256 = "c08ae2388ef333e8403e670ad70c0a11f1eed021fd88308d7e02f596fcd9dc16"

[build]
system = "cmake"
configure = """cmake -B build -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_C_COMPILER=clang \
  -DCMAKE_C_FLAGS="-fvisibility=default" \
  -DCMAKE_INSTALL_PREFIX=/ \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DBUILD_SHARED_LIBS=ON \
  -DBUILD_STATIC_LIBS=OFF \
  -DPCRE2_BUILD_PCRE2GREP=ON \
  -DPCRE2_SUPPORT_JIT=ON \
  -DPCRE2_SUPPORT_UNICODE=ON \
  -DPCRE2_BUILD_TESTS=OFF"""
build = "samu -C build -j$(nproc)"
install = """DESTDIR=$DESTDIR cmake --install build
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name '*.so*' -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true
rm -rf $DESTDIR/share/man $DESTDIR/share/doc $DESTDIR/lib/pkgconfig $DESTDIR/lib/cmake"""

[depends]
runtime = ["musl"]
build = ["clang", "cmake", "samurai"]
