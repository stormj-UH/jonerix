[package]
name = "jfsck"
version = "0.1.0-r0"
license = "BSD-2-Clause"
description = "Clean-room fsck for ext4 + FAT32 (Raspberry Pi scope) derived from Ghidra binary analysis of e2fsprogs and dosfstools"

[source]
url = "https://github.com/stormj-UH/jfsck/archive/refs/tags/v0.1.0.tar.gz"
sha256 = "d12ccf47a10cd2fda50b0c6e8b50d0ca3120b3eeeb20f17e24ea8e84ad8adb54"

[build]
system = "custom"
# Pure-Rust workspace, stdlib only — no external crate graph to
# fetch, so cargo --offline --frozen is correct. We drop statically
# linked against musl so the binary survives /lib being torn up by
# whatever we're cleaning (fsck runs at recovery time — it must not
# assume a working dynamic linker).
build = """
set -e
export CARGO_HOME=/tmp/jfsck-cargo
export CARGO_TARGET_DIR=/tmp/jfsck-target
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static"
# Zero external crates — path-only workspace — so --offline is safe
# and --frozen asserts Cargo.lock matches (it will, since there are
# no transitive deps to resolve).
cargo build --release --frozen --offline --bin jfsck
"""
install = """
set -e
BIN=/tmp/jfsck-target/release/jfsck

install -Dm755 "$BIN" "$DESTDIR/sbin/jfsck"

# fsck driver compat: when mount(8) / systemd-fsck invokes
# fsck.ext4, fsck.vfat, etc. it execs those exact names. jfsck's
# argv[0] dispatcher picks the backend from the suffix, so a
# symlink is all it takes to stand in for the util-linux callers.
for suf in ext2 ext3 ext4 vfat fat msdos; do
    ln -sf jfsck "$DESTDIR/sbin/fsck.$suf"
done
"""

[depends]
# Static-crt binary: only the kernel syscall interface at runtime.
runtime = []
build = ["rust"]
