[package]
name = "libevent"
version = "2.1.12-stable"
license = "BSD-3-Clause"
description = "Event notification library (prerequisite for tmux)"

[source]
url = "https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz"
sha256 = "92e6de1be9ec176428fd2367677e61ceffc2ee1cb119035037a27d346b0403bb"

[build]
system = "custom"
build = """set -e
# autoconf configure needs expr; jonerix doesn't ship one
cat > /tmp/expr.c <<'CEOF'
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <regex.h>
static long tolong(const char *s, int *ok) {
    char *e; long v = strtol(s, &e, 10); *ok = (*e == 0 && e != s); return v;
}
int main(int argc, char **argv) {
    if (argc == 3 && !strcmp(argv[1], "length")) {
        printf("%zu\n", strlen(argv[2])); return 0;
    }
    if (argc == 4 && !strcmp(argv[2], ":")) {
        regex_t re; regmatch_t m[2]; int has_group = !!strstr(argv[3], "\\(");
        if (regcomp(&re, argv[3], 0)) { fprintf(stderr, "expr: bad regex\n"); return 2; }
        if (regexec(&re, argv[1], 2, m, 0) == 0) {
            if (has_group && m[1].rm_so >= 0)
                printf("%.*s\n", (int)(m[1].rm_eo - m[1].rm_so), argv[1] + m[1].rm_so);
            else
                printf("%d\n", (int)(m[0].rm_eo - m[0].rm_so));
            regfree(&re); return 0;
        }
        regfree(&re); printf(has_group ? "\n" : "0\n"); return 1;
    }
    if (argc == 4) {
        int ok1, ok2; long a = tolong(argv[1], &ok1), b = tolong(argv[3], &ok2);
        if (ok1 && ok2) {
            long r = 0; char *op = argv[2];
            if (!strcmp(op,"+")) r=a+b; else if (!strcmp(op,"-")) r=a-b;
            else if (!strcmp(op,"*")) r=a*b;
            else if (!strcmp(op,"/")) { if(!b){fprintf(stderr,"expr: div/0\n");return 2;} r=a/b; }
            else if (!strcmp(op,"%")) { if(!b){fprintf(stderr,"expr: div/0\n");return 2;} r=a%b; }
            else if (!strcmp(op,"="))  r=(a==b); else if (!strcmp(op,"!=")) r=(a!=b);
            else if (!strcmp(op,"<"))  r=(a<b);  else if (!strcmp(op,">"))  r=(a>b);
            else if (!strcmp(op,"<=")) r=(a<=b); else if (!strcmp(op,">=")) r=(a>=b);
            else { fprintf(stderr, "expr: unknown op: %s\n", op); return 2; }
            printf("%ld\n", r); return r == 0 ? 1 : 0;
        }
    }
    if (argc == 2) { printf("%s\n", argv[1]); return 0; }
    fprintf(stderr, "expr: syntax error\n"); return 2;
}
CEOF
clang -Os --rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld -o /bin/expr /tmp/expr.c
rm -f /tmp/expr.c

GREP=/bin/grep EGREP="/bin/grep -E" FGREP="/bin/grep -F" \
  ./configure \
    --prefix=/ \
    --libdir=/lib \
    --bindir=/bin \
    --includedir=/include \
    --disable-samples \
    --disable-libevent-regress \
    --disable-debug-mode \
    --enable-shared \
    --disable-static \
    --enable-openssl \
    CC=clang \
    CFLAGS="-Os -fomit-frame-pointer --rtlib=compiler-rt --unwindlib=libunwind" \
    LDFLAGS="-fuse-ld=lld --rtlib=compiler-rt --unwindlib=libunwind -Wl,--disable-new-dtags"

make -j$(nproc)
"""
install = """set -e
make install DESTDIR=$DESTDIR
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name '*.so*' -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true
rm -rf $DESTDIR/share/man $DESTDIR/share/doc $DESTDIR/lib/pkgconfig
rm -f /bin/expr
"""

[depends]
runtime = ["musl", "libressl"]
build = ["clang", "make", "jonerix-headers", "libressl"]
