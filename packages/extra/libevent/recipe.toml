[package]
name = "libevent"
version = "2.1.12-stable"
license = "BSD-3-Clause"
description = "Event notification library (prerequisite for tmux)"

[source]
url = "https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz"
sha256 = "92e6de1be9ec176428fd2367677e61ceffc2ee1cb119035037a27d346b0403bb"

[build]
system = "custom"
build = """set -e
GREP=/bin/grep EGREP="/bin/grep -E" FGREP="/bin/grep -F" \
  ./configure \
    --prefix=/ \
    --libdir=/lib \
    --bindir=/bin \
    --includedir=/include \
    --disable-samples \
    --disable-libevent-regress \
    --disable-debug-mode \
    --enable-shared \
    --disable-static \
    --disable-openssl \
    CC=clang \
    CFLAGS="-Os -fomit-frame-pointer --rtlib=compiler-rt --unwindlib=libunwind" \
    LDFLAGS="-fuse-ld=lld --rtlib=compiler-rt --unwindlib=libunwind -Wl,--disable-new-dtags"

make -j$(nproc)
"""
install = """set -e
make install DESTDIR=$DESTDIR
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name '*.so*' -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true
rm -rf $DESTDIR/share/man $DESTDIR/share/doc $DESTDIR/lib/pkgconfig
"""

[depends]
runtime = ["musl", "libressl"]
build = ["clang", "make", "exproxide", "jonerix-headers", "libressl"]
