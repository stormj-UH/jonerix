[package]
name = "jonerix-raspi5-fixups"
version = "1.6.4"
arch = "aarch64"
license = "MIT"
description = "Hardware fixups for jonerix on Raspberry Pi 5 (EEE, fan, onboard WiFi, OpenRC-backed reboot, cold-reboot, wake-on-power, RTC coin-cell monitor, tty1 HDMI console) + adduser safety + legacy bootstrap cleanup + fstab rescue + errors=remount-ro"
# 1.6.0: absorbs the tty1-console HDMI getty from the retired
# jonerix-boot-helpers package (reboot-clean was already
# superseded by reboot-openrc, ntp-set-http / ntp-bootstrap
# split out to jonerix-ntp-http-bootstrap for RTC-less hosts).
#
# Claim toybox's /bin/reboot multicall symlink so jpkg can transfer
# file ownership instead of relying only on a post_install rewrite.
# Requires jpkg >= 1.0.4 (package.replaces support).
replaces = ["toybox", "jonerix-boot-helpers"]

# No [source] section — jpkg treats a missing source.url as a local-only
# build and hands control to the build script, which uses $RECIPE_DIR.

[build]
system = "custom"
build = """
set -e
cd "$RECIPE_DIR"
# eee-tool: single-file Rust program (no Cargo, no external deps).
# Static-musl link so it runs on jonerix without libc lookup.
rustc -O \
    -C strip=symbols \
    -C target-feature=+crt-static \
    -o /tmp/eee-tool \
    src/eee-tool.rs
install -Dm755 /tmp/eee-tool $DESTDIR/bin/eee-tool
install -Dm755 bin/disable-eee $DESTDIR/bin/disable-eee
install -Dm755 init.d/disable-eee $DESTDIR/etc/init.d/disable-eee
install -Dm755 init.d/fan-control $DESTDIR/etc/init.d/fan-control
# adduser-safe: safe replacement for toybox adduser, which truncates
# /etc/passwd and /etc/shadow on failure (see bin/adduser-safe header).
install -Dm755 bin/adduser-safe $DESTDIR/bin/adduser-safe
# Pi 5 onboard WiFi bring-up: see bin/modprobe-shim and init.d/pi5-wifi
# headers for the full story. Short version: jonerix ships no kmod, so
# the kernel can't request_module(brcmfmac-cyw) and the brcmfmac driver
# never attaches; and the 4345 firmware blob is packaged under its
# Cypress name (cyfmac43455) while the Pi 5 driver asks for the
# Broadcom name (brcmfmac43455). The shim handles the former; the
# firmware symlinks in post_install handle the latter.
install -Dm755 bin/modprobe-shim   $DESTDIR/usr/local/bin/modprobe-shim
install -Dm755 init.d/pi5-wifi     $DESTDIR/etc/init.d/pi5-wifi

# pi5-fw: direct /dev/vcio tool (stand-in for vcgencmd +
# rpi-eeprom-config reads). Static-musl, zero deps.
rustc -O \
    -C strip=symbols \
    -C target-feature=+crt-static \
    -o /tmp/pi5-fw \
    src/pi5-fw.rs
install -Dm755 /tmp/pi5-fw $DESTDIR/usr/local/bin/pi5-fw

# pi5-wake-on-power: reads/writes the EEPROM bootloader config via
# the VideoCore mailbox so the Pi 5 auto-boots after power is
# restored (WAKE_ON_GPIO / POWER_OFF_ON_HALT). Python 3 stdlib only
# (fcntl, os, struct, sys) — no pip deps, PSF-2.0.
install -Dm755 bin/pi5-wake-on-power $DESTDIR/usr/local/bin/pi5-wake-on-power

# apply-pi5-boot-settings: idempotent shell helper that patches
# /boot/cmdline.txt (reboot=c) and /boot/config.txt
# (hdmi_force_hotplug on both ports). Runs from post_install below.
install -Dm755 bin/apply-pi5-boot-settings $DESTDIR/usr/local/bin/apply-pi5-boot-settings

# reboot-openrc: Pi 5-safe reboot backend. The package owns
# /bin/reboot via replaces=["toybox"], while post_install also refreshes
# the live /sbin aliases because jpkg intentionally flattens /sbin into
# /bin during packaging.
install -Dm755 bin/reboot-openrc $DESTDIR/usr/local/bin/reboot-openrc
mkdir -p $DESTDIR/bin
ln -sf /usr/local/bin/reboot-openrc $DESTDIR/bin/reboot

# pi5-cold-reboot: OpenRC boot service that forces
# /sys/kernel/reboot/mode=cold every boot (belt-and-suspenders for
# the cmdline patch above) and logs pi5-wake-on-power status for
# auditability.
install -Dm755 init.d/pi5-cold-reboot $DESTDIR/etc/init.d/pi5-cold-reboot

# tty1-console: HDMI/serial getty on tty1. Absorbed from the
# retired jonerix-boot-helpers package — every Pi 5 image wants
# a login prompt on the HDMI-attached console.
install -Dm755 init.d/tty1-console $DESTDIR/etc/init.d/tty1-console
mksh -n $DESTDIR/etc/init.d/tty1-console

# pi5-rtc-battery-check: reads /sys/class/rtc/rtc0/battery_voltage
# and logs INFO / WARN / ERROR depending on the cell state. Paired
# with a snooze-cron entry that runs it daily.
install -Dm755 bin/pi5-rtc-battery-check $DESTDIR/usr/local/bin/pi5-rtc-battery-check
install -Dm644 cron.d/pi5-rtc-battery     $DESTDIR/etc/cron.d/pi5-rtc-battery

# jonerix is merged-usr-flat: /usr is a runtime symlink to /. jpkg >= 1.1.0
# refuses to silently flatten a DESTDIR/usr/ tree (layout bugs used to
# slip through), so do the flatten ourselves. After this, $DESTDIR/usr/
# is gone and files previously at $DESTDIR/usr/local/bin/* now live at
# $DESTDIR/local/bin/* — which the /usr → / runtime symlink resolves
# back to /usr/local/bin/* on the installed system.
if [ -d "$DESTDIR/usr" ]; then
    cp -a "$DESTDIR/usr/." "$DESTDIR/"
    rm -rf "$DESTDIR/usr"
fi
"""
install = ""

[hooks]
# Wire the disable-eee OpenRC service into the boot runlevel, and
# (on a live Raspberry Pi 5) run it now so the user doesn't need to reboot.
# Also repoint /bin/adduser at /bin/adduser-safe on every host, to block
# the toybox adduser passwd-file-truncation bug. The Pi-specific parts
# are guarded by /proc/device-tree/model; the adduser swap runs
# unconditionally because the toybox bug affects every host.
post_install = """# --- adduser safety (all hosts) ---
# Back up the current /bin/adduser symlink target (typically: toybox)
# so post_remove can restore it. Write it once; leave alone on re-install.
if [ -L /bin/adduser ] && [ ! -e /etc/jpkg/raspi5-fixups/adduser.prev ]; then
    mkdir -p /etc/jpkg/raspi5-fixups
    readlink /bin/adduser > /etc/jpkg/raspi5-fixups/adduser.prev 2>/dev/null || true
fi
ln -sf adduser-safe /bin/adduser

# --- fstab rescue (Pi images shipped before 2026-04-16) ---
# The initial jonerix Pi image baked a minimal /etc/fstab with only
# root + /boot partitions. Missing: devpts, sysfs, tmpfs /run,
# tmpfs /tmp. Consequences observed on jonerix-tormenta 2026-04-16:
#   - Interactive SSH failed with "PTY allocation request failed"
#     (no /dev/pts mount means sshd can't allocate slave PTYs)
#   - /run and /tmp grew on ext4 instead of being scratch
# Append each missing line idempotently. grep guards so repeat
# installs are no-ops, and we never clobber user edits.
if [ -f /etc/fstab ]; then
    cp /etc/fstab /etc/fstab.pre-raspi5-fixups 2>/dev/null || true

    # Heal fstabs left broken by jonerix-raspi5-fixups <= 1.4.0.
    # That version wrote a header via printf with escaped newlines
    # that, through TOML / shell / jpkg's here-doc layers, landed in
    # the file as a literal four-character backslash-n-hash sequence.
    # That malformed line stopped mount -a dead at the /boot partition
    # and left /boot unmounted at runtime. Remove any line starting
    # with a literal backslash.
    if grep -q '^\\\\' /etc/fstab 2>/dev/null; then
        sed -i '/^\\\\/d' /etc/fstab
        echo "raspi5-fixups: removed malformed header lines from /etc/fstab"
    fi

    _fstab_add() {
        # $1 = grep pattern to detect existing entry, $2 = line to append
        if ! grep -qE "$1" /etc/fstab 2>/dev/null; then
            echo "$2" >> /etc/fstab
            echo "raspi5-fixups: added fstab line: $2"
        fi
    }
    if ! grep -q "raspi5-fixups rescue" /etc/fstab 2>/dev/null; then
        # Two separate echoes — portable across busybox/toybox
        # printf, which don't all honour `\\n` the same way in
        # here-doc-delivered recipes.
        echo '' >> /etc/fstab
        echo '# --- added by jonerix-raspi5-fixups (base-image fstab rescue) ---' >> /etc/fstab
    fi
    # NOTE: no shell line-continuations here. jpkg's TOML parser does not
    # process escape sequences inside triple-basic recipe strings, so
    # `\\<newline>` would reach the shell as two backslashes followed by
    # LF — not a continuation — and the fstab line below would be
    # executed as a command. Reproduced 2026-04-20 in CI: sh: devpts
    # /dev/pts devpts ...: not found. Keep each call on one line.
    _fstab_add "^[[:space:]]*devpts[[:space:]]"         "devpts   /dev/pts   devpts   gid=5,mode=0620,ptmxmode=0666   0 0"
    _fstab_add "^[[:space:]]*sysfs[[:space:]]"          "sysfs    /sys       sysfs    defaults                         0 0"
    _fstab_add "[[:space:]]/run[[:space:]].*tmpfs"      "tmpfs    /run       tmpfs    defaults,nosuid,nodev,size=20%   0 0"
    _fstab_add "[[:space:]]/tmp[[:space:]].*tmpfs"      "tmpfs    /tmp       tmpfs    defaults,nosuid,nodev,size=20%   0 0"

    # Add errors=remount-ro to existing root ext4 line if not present.
    # mkimage.sh bakes this in for fresh images (PR #107), but existing
    # Pi images predating that change don't have it. Without this, ext4
    # corruption events (SD-card wear) allow damage to spread instead
    # of triggering a fail-safe read-only remount. Reproduced on
    # jonerix-tormenta 2026-04-16: inode 287372 had a bad extent header
    # and rm returned EUCLEAN when trying to truncate.
    if grep -E '^[^#].*[[:space:]]/[[:space:]]+ext4[[:space:]]' /etc/fstab | grep -vq 'errors='; then
        sed -i -E '/^[^#].*[[:space:]]\\/[[:space:]]+ext4[[:space:]]/{
            /errors=/!s|(ext4[[:space:]]+)([^[:space:]]+)|\\1\\2,errors=remount-ro|
        }' /etc/fstab
        echo "raspi5-fixups: added errors=remount-ro to root fstab entry"
        # Live-apply immediately (kernel accepts remount with new errors=).
        mount -o remount,errors=remount-ro / 2>/dev/null || true
    fi

    # Live-mount anything not currently mounted. Best-effort; failures
    # are OK (e.g. /dev/pts needs mkdir in devtmpfs which only root can
    # do — we are root during post_install so this works).
    if ! mountpoint -q /dev/pts 2>/dev/null; then
        [ -d /dev/pts ] || mkdir /dev/pts 2>/dev/null || true
        mount /dev/pts 2>/dev/null || true
    fi
    mountpoint -q /sys 2>/dev/null || mount /sys 2>/dev/null || true
    mountpoint -q /run 2>/dev/null || mount /run 2>/dev/null || true
    mountpoint -q /tmp 2>/dev/null || mount /tmp 2>/dev/null || true
fi

# --- Legacy bootstrap cleanup (all hosts) ---
# Some pre-jonerix Pi images shipped a bare /etc/init.d/networking
# script that spawned its own dhcpcd. On jonerix-tormenta this raced
# with the proper dhcpcd service and caused DHCPREQUEST-every-minute
# (see 2026-04-16 incident). Remove it if it exists AND no installed
# jpkg claims it. dhcpcd's own post_install also does this on upgrade;
# this hook handles hosts that don't bump dhcpcd right away.
if [ -e /etc/init.d/networking ] && [ ! -L /etc/init.d/networking ]; then
    owned=0
    for m in /var/db/jpkg/installed/*/files; do
        [ -f "$m" ] || continue
        if grep -q "/etc/init.d/networking\\(\\s\\|$\\)" "$m" 2>/dev/null; then
            owned=1
            break
        fi
    done
    if [ "$owned" = 0 ]; then
        rm -f /etc/runlevels/*/networking 2>/dev/null || true
        rm -f /etc/init.d/networking
        echo "raspi5-fixups: removed orphan /etc/init.d/networking"
    fi
fi

# --- reboot command: use OpenRC native reboot ---
# Reproduced on jonerix-tormenta 2026-04-19: toybox `reboot` cleanly
# stopped OpenRC and remounted / read-only, but the Pi stayed red-only
# until physical power cycle. `openrc-shutdown -r now` rebooted the
# same board successfully. /bin/reboot is package-owned; the hook below
# also takes over /sbin and /usr/sbin aliases that may exist in older
# images outside jpkg's file database.
if [ -x /usr/local/bin/reboot-openrc ]; then
    if [ -L /bin/reboot ] && [ ! -e /etc/jpkg/raspi5-fixups/reboot.prev ]; then
        mkdir -p /etc/jpkg/raspi5-fixups
        readlink /bin/reboot > /etc/jpkg/raspi5-fixups/reboot.prev 2>/dev/null || true
    fi
    ln -sf /usr/local/bin/reboot-openrc /bin/reboot
    [ -d /sbin ] && ln -sf /usr/local/bin/reboot-openrc /sbin/reboot
    [ -d /usr/sbin ] && ln -sf /usr/local/bin/reboot-openrc /usr/sbin/reboot
fi

# --- Pi 5 hardware fixups (only on a live Pi 5) ---
ln -sf /etc/init.d/disable-eee     /etc/runlevels/boot/disable-eee     2>/dev/null || true
ln -sf /etc/init.d/fan-control     /etc/runlevels/boot/fan-control     2>/dev/null || true
ln -sf /etc/init.d/pi5-wifi        /etc/runlevels/boot/pi5-wifi        2>/dev/null || true
ln -sf /etc/init.d/pi5-cold-reboot /etc/runlevels/boot/pi5-cold-reboot 2>/dev/null || true
# tty1-console: default runlevel so the HDMI login prompt comes up
# after boot — but ONLY if no other service has already claimed tty1.
# shadow's post_install installs /etc/init.d/shadow-login + a
# /etc/runlevels/default/shadow-login symlink, and the two services
# both spawn `/bin/login </dev/tty1`. Letting raspi5-fixups re-add
# tty1-console on top of an existing shadow-login leaves two mksh
# loops racing for keystrokes — the user's password gets split
# between them and login rejects every attempt. Reproduced
# 2026-04-24 on jonerix-tormenta after a back-to-back upgrade.
#
# Detection rule: if shadow-login is already wired into the default
# runlevel, skip our tty1-console hookup entirely. The user can
# `rc-update add tty1-console default` themselves on hosts that
# don't ship shadow.
if [ -e /etc/runlevels/default/shadow-login ] || [ -x /bin/shadow-login ]; then
    echo "raspi5-fixups: shadow-login owns tty1 — skipping tty1-console"
elif [ -d /etc/runlevels/default ]; then
    ln -sf /etc/init.d/tty1-console /etc/runlevels/default/tty1-console 2>/dev/null || true
fi

# Firmware symlinks for onboard WiFi (BCM4345). The brcmfmac driver
# asks for `brcmfmac43455-sdio.bin` and the Pi5-specific variant
# `brcmfmac43455-sdio.raspberrypi,5-model-b.bin`, but the blob we ship
# in /lib/firmware/brcm/ is under its Cypress name. Create the
# Broadcom-named symlinks once at install time; they persist on rootfs.
if [ -f /lib/firmware/brcm/cyfmac43455-sdio-standard.bin ]; then
    ln -sf cyfmac43455-sdio-standard.bin /lib/firmware/brcm/brcmfmac43455-sdio.bin 2>/dev/null || true
    ln -sf cyfmac43455-sdio-standard.bin /lib/firmware/brcm/brcmfmac43455-sdio.raspberrypi,5-model-b.bin 2>/dev/null || true
fi

if [ -r /proc/device-tree/model ] && grep -q "Raspberry Pi 5" /proc/device-tree/model 2>/dev/null; then
    [ -e /sys/class/net/eth0 ] && /bin/disable-eee eth0 || true
    KVER=$(uname -r)
    MOD="/lib/modules/$KVER/kernel/drivers/hwmon/pwm-fan.ko.xz"
    if [ -f "$MOD" ] && [ ! -d /sys/class/thermal/cooling_device0 ]; then
        xzcat "$MOD" > /tmp/pwm-fan.ko && insmod /tmp/pwm-fan.ko && rm -f /tmp/pwm-fan.ko || true
    fi
    # Live-apply the WiFi fixes so the user doesn't have to reboot:
    # point the kernel at a working modprobe and load the brcmfmac
    # stack if it isn't already up. pi5-wifi runs the same logic at
    # every boot; we duplicate it here only for the first-install
    # case. Prefer toybox's modprobe (0.8.11-r2+) over the shell shim.
    if toybox --help 2>&1 | grep -qw modprobe; then
        MP=/bin/modprobe
    else
        MP=/usr/local/bin/modprobe-shim
    fi
    if [ -w /proc/sys/kernel/modprobe ]; then
        echo -n "$MP" > /proc/sys/kernel/modprobe
    fi
    if [ ! -d /sys/class/ieee80211/phy0 ]; then
        "$MP" brcmfmac-cyw 2>/dev/null || true
        "$MP" brcmfmac      2>/dev/null || true
    fi

    # --- cold-reboot: patch cmdline.txt once + live-flip sysfs ---
    # Firmware prepends reboot=w to the kernel command line; our
    # reboot=c in cmdline.txt overrides that (kernel keeps the last
    # reboot= token). Without it, `reboot` hangs because the RP1
    # southbridge can't be reset on a warm reboot.
    /usr/local/bin/apply-pi5-boot-settings 2>/dev/null || true
    if [ -w /sys/kernel/reboot/mode ]; then
        echo cold > /sys/kernel/reboot/mode 2>/dev/null || true
    fi

    # --- wake-on-power: confirm current EEPROM state ---
    # Print, don't mutate. Factory defaults already auto-boot on
    # power restore (WAKE_ON_GPIO=1, POWER_OFF_ON_HALT=0), so most
    # installs need nothing. Users who want the inverse run
    # `sudo pi5-wake-on-power disable` and that preference sticks
    # in EEPROM across installs/reboots.
    if [ -x /usr/local/bin/pi5-wake-on-power ]; then
        /usr/local/bin/pi5-wake-on-power 2>&1 | sed 's/^/raspi5-fixups: /' || true
    fi

    # --- RTC coin-cell initial read + daily cron wiring ---
    # Run the check once now so the current voltage (or "no battery"
    # verdict) shows up in the install log. Idempotent otherwise —
    # the cron.d entry handles the daily recurrence after boot.
    if [ -x /usr/local/bin/pi5-rtc-battery-check ]; then
        /usr/local/bin/pi5-rtc-battery-check -v 2>&1 | sed 's/^/raspi5-fixups: /' || true
    fi
fi
exit 0"""

# Tear down the runlevel symlinks that post_install created.
# (jpkg removes manifest-owned files automatically; these symlinks are dynamic.)
# Also restore the original /bin/adduser symlink if we have a record of it.
post_remove = """rm -f /etc/runlevels/boot/disable-eee /etc/runlevels/boot/fan-control /etc/runlevels/boot/pi5-wifi /etc/runlevels/boot/pi5-cold-reboot /etc/runlevels/default/tty1-console
if [ -f /etc/jpkg/raspi5-fixups/adduser.prev ]; then
    prev=$(cat /etc/jpkg/raspi5-fixups/adduser.prev)
    [ -n "$prev" ] && ln -sf "$prev" /bin/adduser
    rm -f /etc/jpkg/raspi5-fixups/adduser.prev
    rmdir /etc/jpkg/raspi5-fixups 2>/dev/null || true
    rmdir /etc/jpkg 2>/dev/null || true
fi
_restore_reboot_link() {
    _path=$1
    _target=$2
    # On a jonerix image `/sbin` and `/usr/sbin` don't exist at
    # all (merged-usr-flat, no sbin). Skip cleanly instead of
    # noisy `ln: No such file or directory` when the parent dir
    # isn't there — the live `/bin/reboot` symlink that IS the
    # canonical path has already been handled by its own call.
    _parent=$(dirname "$_path")
    [ -d "$_parent" ] || return 0
    if [ -L "$_path" ]; then
        _cur=$(readlink "$_path" 2>/dev/null || true)
        case "$_cur" in
            /usr/local/bin/reboot-openrc|/local/bin/reboot-openrc)
                rm -f "$_path"
                ;;
        esac
    fi
    [ ! -e "$_path" ] && [ -x /bin/toybox ] && ln -sf "$_target" "$_path"
}
_reboot_bin_target=toybox
if [ -f /etc/jpkg/raspi5-fixups/reboot.prev ]; then
    _saved=$(cat /etc/jpkg/raspi5-fixups/reboot.prev)
    case "$_saved" in
        ""|/usr/local/bin/reboot-openrc|/local/bin/reboot-openrc)
            ;;
        *)
            _reboot_bin_target=$_saved
            ;;
    esac
    rm -f /etc/jpkg/raspi5-fixups/reboot.prev
fi
_restore_reboot_link /bin/reboot "$_reboot_bin_target"
_restore_reboot_link /sbin/reboot ../bin/toybox
_restore_reboot_link /usr/sbin/reboot ../bin/toybox
rmdir /etc/jpkg/raspi5-fixups 2>/dev/null || true
rmdir /etc/jpkg 2>/dev/null || true
exit 0"""

[depends]
# pi5-wake-on-power is a Python 3 stdlib script — no pip deps.
# python3 itself is PSF-2.0, on jonerix's permissive allowlist.
runtime = ["musl", "openrc", "python3"]
build = ["rust"]
