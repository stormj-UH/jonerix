[package]
name = "jonerix-raspi5-fixups"
version = "1.6.24"
arch = "aarch64"
license = "0BSD"
description = "Hardware fixups for jonerix on Raspberry Pi 5 (EEE, fan, onboard WiFi, OpenRC-backed reboot+poweroff, cold-poweroff, cold-reboot, wake-on-power, RTC coin-cell monitor) + adduser safety + legacy bootstrap cleanup + fstab rescue + errors=remount-ro"
# 1.6.24: three fixes for problems uncovered when 1.6.23's
# pi5-cold-poweroff was first exercised on tormenta.
#
# (a) pi5-cold-poweroff: EEPROM flip moved from the OpenRC service
#     into the CLI itself.  1.6.23 wrote POWER_OFF_ON_HALT=1 from
#     inside pi5-cold-shutdown's start() during the shutdown
#     runlevel; OpenRC ran that in parallel with mount-ro and
#     killprocs and the kernel was at the reboot syscall before the
#     /dev/vcio mailbox write returned, so the EEPROM never got =1
#     and the Pi landed in standby (red LED, no software wake) on
#     each test.  Now the CLI does `pi5-wake-on-power disable`
#     synchronously and reads back to confirm BEFORE invoking
#     openrc-shutdown.  Aborts the halt if the EEPROM write didn't
#     stick — preferable to standby-with-no-button.
#
# (b) pi5-cold-shutdown service: now boot-side only.  The shutdown-
#     runlevel branch is gone (moved to the CLI per above).  Shebang
#     corrected from /sbin/openrc-run to /bin/openrc-run (jonerix
#     openrc lives at /usr/bin with a /bin alias).  rc-update del
#     replaced with rm -f on the runlevel symlinks because rc-update
#     on jonerix rejects `default` and `shutdown` as runlevel names
#     from the CLI.
#
# (c) init.d/disable-eee-late: new default-runlevel service.  The
#     existing boot-runlevel disable-eee runs after dhcpcd but
#     BEFORE the kernel's PHY re-init that happens later on cold
#     boots — observed on tormenta 2026-05-10 where eee_enabled=1 /
#     lp_advertised=0x28 for several minutes after a fresh boot.
#     disable-eee-late sleeps 15 s after the default runlevel comes
#     up, then runs disable-eee three times at 15-second intervals
#     to catch the kernel-driven renegotiation window.  Idempotent;
#     no link bounce when EEE is already off.
#
# 1.6.23: one-shot cold-poweroff (full SoC power cut without
# permanently changing EEPROM).
#
# /usr/local/bin/pi5-cold-poweroff is the user-facing CLI: arms a
# new OpenRC service in both the `shutdown` and `default` runlevels
# and `exec`s `openrc-shutdown -p now`.
#
# /etc/init.d/pi5-cold-shutdown is that service.  Its `start()`
# detects `$RC_RUNLEVEL`:
#   shutdown -> pi5-wake-on-power disable (EEPROM POWER_OFF_ON_HALT=1)
#               so the immediately-following halt cuts SoC power.
#   default  -> pi5-wake-on-power enable (POWER_OFF_ON_HALT=0), read
#               back to confirm, then rc-update del from both
#               runlevels so future shutdowns are warm halts again.
# Failure path: if the next-boot restore can't confirm =0, the
# service stays in the default runlevel and retries on the next
# boot — leaving the user a manual `pi5-wake-on-power enable` as
# the escape hatch.
#
# 1.6.22: ship /bin/poweroff -> /usr/local/bin/poweroff-openrc, the
# sibling of /bin/reboot -> /usr/local/bin/reboot-openrc.  Without
# this, `poweroff` resolves to the toybox alias that calls reboot(2)
# RB_POWER_OFF directly and skips OpenRC's service-stop / sync /
# remount-ro choreography — same dirty-rootfs risk that reboot-openrc
# was originally introduced to solve.  The new wrapper runs
# `openrc-shutdown -p now`, so an orderly poweroff is now just
# `sudo poweroff`.  post_install backs up the previous /bin/poweroff
# target into /etc/jpkg/raspi5-fixups/poweroff.prev and refreshes the
# /sbin / /usr/sbin aliases; post_remove restores the prior target
# (typically toybox) the same way the reboot path does.
#
# 1.6.21: post_install now `rc-service snooze-crond restart` when the
# daemon is already up, instead of plain `start` (which is a no-op
# against an already-running daemon).  Without restart, cron.d/*
# edits don't take effect on upgrade — snooze-crond forks a snooze
# child per cron file at startup and never re-reads the directory.
# Hit during the 1.6.19 -> 1.6.20 upgrade on tormenta: the new
# `-H /1` schedule sat in the file unfired because the live daemon
# was still running the previous `-M /15` (midnight-only) schedule.
#
# 1.6.20: fix the disable-eee-watchdog snooze timespec one more time.
# 1.6.19 changed `-M */15` -> `-M /15` (correct for the minute axis),
# but missed that snooze defaults `-H` to hour 0 when not specified,
# which made the cron fire only at midnight :00/:15/:30/:45 rather
# than every hour.  Verified with `snooze -nv ...`.  Now uses
# `-H /1 -M /15 -S 0` (every hour, every 15th minute).
#
# 1.6.19: fix 1.6.18 in two ways.
# (a) wrong snooze timespec.  1.6.18 shipped `-M */15` which snooze
#     interprets as `-M *` (every minute) — see /bin/snooze-crond
#     header.  Corrected to `-M /15` (every 15th minute).
# (b) snooze-crond was never running.  The snooze package ships
#     /bin/snooze-crond with no init layer, so every /etc/cron.d/*
#     entry on jonerix has been silently broken since first install
#     (pi5-rtc-battery had only fired ~4 times in the cron log,
#     each one coincident with a package install hook re-running
#     it once).  1.6.19 ships init.d/snooze-crond as a supervised
#     OpenRC service, adds it to the default runlevel, and
#     live-starts it in post_install so cron entries fire on this
#     install rather than waiting for the next reboot.
#
# 1.6.18: periodic disable-eee watchdog.  The init.d/disable-eee
# OpenRC service only runs once at boot, after dhcpcd brings the
# link up.  That handled the common case, but reproducer 2026-05-10
# on tormenta confirmed BCM54213PE EEE flapping still happens
# whenever the link partner picks up EEE on a subsequent renegotiate
# (kernel-driven mdio reset, dhcpcd renew, switch port re-enable,
# cable-swap with a different upstream).  Pattern: ~12-second
# regular flap cadence, ~3 s down each, accompanied by lp_advertised
# flipping 0x0 -> 0x28.  Distinct from the cable-induced flap
# pattern we ALSO had on that host (~13-60 s irregular, accompanied
# by climbing RX frame/FIFO error counters); the cable-swap fixed
# THAT issue, but `eee-tool on -b` proved EEE on its own reproduces
# the flap loop with a known-good cable, so a re-disable watchdog
# is justified.
#
# Implementation: etc/cron.d/disable-eee-watchdog runs disable-eee
# every 15 minutes via snooze (idempotent, no link bounce when EEE
# is already off).  Worst-case flap window is therefore 15 minutes;
# typical wait until the next no-op confirmation is also 15 minutes.
#
# 1.6.0: absorbs the tty1-console HDMI getty from the retired
# jonerix-boot-helpers package (reboot-clean was already
# superseded by reboot-openrc, ntp-set-http / ntp-bootstrap
# split out to jonerix-ntp-http-bootstrap for RTC-less hosts).
#
# Claim toybox's /bin/reboot multicall symlink so jpkg can transfer
# file ownership instead of relying only on a post_install rewrite.
# Requires jpkg >= 1.0.4 (package.replaces support).
replaces = ["toybox", "jonerix-boot-helpers"]

# No [source] section — jpkg treats a missing source.url as a local-only
# build and hands control to the build script, which uses $RECIPE_DIR.

[build]
system = "custom"
build = """
[ "$(uname -m)" = "aarch64" ] || exit 0
set -e
cd "$RECIPE_DIR"
# eee-tool: single-file Rust program (no Cargo, no external deps).
# Static-musl link so it runs on jonerix without libc lookup.
rustc -O \
    -C strip=symbols \
    -C target-feature=+crt-static \
    -o /tmp/eee-tool \
    src/eee-tool.rs
install -Dm755 /tmp/eee-tool $DESTDIR/bin/eee-tool
install -Dm755 bin/disable-eee $DESTDIR/bin/disable-eee
install -Dm755 init.d/disable-eee $DESTDIR/etc/init.d/disable-eee
install -Dm755 init.d/fan-control $DESTDIR/etc/init.d/fan-control
install -Dm755 init.d/netfilter-nft-modules $DESTDIR/etc/init.d/netfilter-nft-modules
install -Dm755 init.d/boot-trace $DESTDIR/etc/init.d/boot-trace
install -Dm755 init.d/reboot-trace-shutdown $DESTDIR/etc/init.d/reboot-trace-shutdown
install -Dm755 init.d/hwclock $DESTDIR/etc/init.d/hwclock
# adduser-safe / addgroup-safe: safe replacements for toybox adduser /
# addgroup, both of which truncate /etc/passwd|/etc/shadow|/etc/group
# on failure paths (see header in each script for the full diagnosis).
# adduser was reproduced 2026-04-15; addgroup was reproduced 2026-05-09
# during a docker post_install — wiped /etc/group, broke wpa_supplicant
# `CTRL: Invalid group 'wheel'`, killed Wi-Fi until manual restore from
# /etc/group.bak.
install -Dm755 bin/adduser-safe  $DESTDIR/bin/adduser-safe
install -Dm755 bin/addgroup-safe $DESTDIR/bin/addgroup-safe
# Ship /bin/adduser and /bin/addgroup as MANIFEST-TRACKED symlinks
# (instead of creating them lazily in post_install). This way:
#   1. Toybox's post_install yield-loop sees `bin/adduser -> adduser-safe`
#      in raspi5-fixups' files manifest, recognises the conflict when
#      its tarball ships `bin/adduser -> toybox`, and restores us.
#   2. `jpkg verify jonerix-raspi5-fixups` flags any out-of-band
#      override (e.g. someone manually relinking to toybox).
#   3. post_remove can use the manifest entry to know what we own
#      instead of guessing from the prev backup.
# Without this (1.6.16 had post_install-only ln -sf), toybox's
# extraction stomped the symlinks every time toybox was installed
# or upgraded, and toybox's restore loop couldn't see them.
ln -sf adduser-safe  $DESTDIR/bin/adduser
ln -sf addgroup-safe $DESTDIR/bin/addgroup
# Pi 5 onboard WiFi bring-up: see bin/modprobe-shim and init.d/pi5-wifi
# headers for the full story. Short version: jonerix ships no kmod, so
# the kernel can't request_module(brcmfmac-cyw) and the brcmfmac driver
# never attaches; and the 4345 firmware blob is packaged under its
# Cypress name (cyfmac43455) while the Pi 5 driver asks for the
# Broadcom name (brcmfmac43455). The shim handles the former; the
# firmware symlinks in post_install handle the latter.
install -Dm755 bin/modprobe-shim   $DESTDIR/usr/local/bin/modprobe-shim
install -Dm755 init.d/pi5-wifi     $DESTDIR/etc/init.d/pi5-wifi

# Onboard WiFi user setup. pi5-wifi-connect is an interactive helper:
# `sudo pi5-wifi-connect` lists nearby SSIDs, prompts the user for
# theirs + a passphrase (without echo), writes the network block to
# /etc/wpa_supplicant/wpa_supplicant-wlan0.conf via wpa_passphrase,
# and starts the wpa_supplicant_wlan0 OpenRC service.
#
# wpa_supplicant_wlan0 (init.d): no-op when the config file isn't
# there; runs wpa_supplicant -B against the user-written config when
# it is. dhcpcd's default metric weighting keeps eth0 as the primary
# uplink while it has carrier and falls over to wlan0 automatically.
install -Dm755 bin/pi5-wifi-connect $DESTDIR/usr/local/bin/pi5-wifi-connect
install -Dm755 init.d/wpa_supplicant_wlan0 $DESTDIR/etc/init.d/wpa_supplicant_wlan0
install -Dm755 init.d/shadow-login $DESTDIR/share/jonerix-raspi5-fixups/shadow-login

# pi5-wifi-set-country: Python+ctypes shim for `iw reg set <CC>` (which
# is GPL-2 and not in jonerix). Sends NL80211_CMD_REQ_SET_REG over a
# generic netlink socket built directly with libc.bind() because the
# jonerix python3 build doesn't expose AF_NETLINK via the socket
# module. Effective on kernels that accept user-originated regulatory
# hints; kernels built with CFG80211_INTERNAL_REGDB=y reject the
# command with EINVAL and need a kernel rebuild or the iw tool.
install -Dm755 bin/pi5-wifi-set-country $DESTDIR/usr/local/bin/pi5-wifi-set-country

# pi5-fw: direct /dev/vcio tool (stand-in for vcgencmd +
# rpi-eeprom-config reads). Static-musl, zero deps.
rustc -O \
    -C strip=symbols \
    -C target-feature=+crt-static \
    -o /tmp/pi5-fw \
    src/pi5-fw.rs
install -Dm755 /tmp/pi5-fw $DESTDIR/usr/local/bin/pi5-fw

# pi5-wake-on-power: reads/writes the EEPROM bootloader config via
# the VideoCore mailbox so the Pi 5 auto-boots after power is
# restored (WAKE_ON_GPIO / POWER_OFF_ON_HALT). Python 3 stdlib only
# (fcntl, os, struct, sys) — no pip deps, PSF-2.0.
install -Dm755 bin/pi5-wake-on-power $DESTDIR/usr/local/bin/pi5-wake-on-power

# pi5-netboot-config: jonerix's stand-in for rpi-eeprom-config (which is
# Debian-flavoured + GPL and not in jonerix). Same VideoCore mailbox
# plumbing as pi5-wake-on-power, but writes BOOT_ORDER / TFTP_IP /
# TFTP_PREFIX so a Pi 5 can be flipped between SD-boot and TFTP-boot
# with one command. Python 3 stdlib only.
install -Dm755 bin/pi5-netboot-config $DESTDIR/usr/local/bin/pi5-netboot-config

# apply-pi5-boot-settings: idempotent shell helper that patches
# /boot/cmdline.txt (reboot=c) and /boot/config.txt
# (hdmi_force_hotplug on both ports). Runs from post_install below.
install -Dm755 bin/apply-pi5-boot-settings $DESTDIR/usr/local/bin/apply-pi5-boot-settings

# reboot-openrc: Pi 5-safe reboot backend. The package owns
# /bin/reboot via replaces=["toybox"], while post_install also refreshes
# the live /sbin aliases because jpkg intentionally flattens /sbin into
# /bin during packaging.
install -Dm755 bin/reboot-openrc $DESTDIR/usr/local/bin/reboot-openrc
mkdir -p $DESTDIR/bin
ln -sf /usr/local/bin/reboot-openrc $DESTDIR/bin/reboot

# poweroff-openrc: same pattern, sibling wrapper around
# `openrc-shutdown -p now`. Without this, /bin/poweroff is the toybox
# alias that calls reboot(2) RB_POWER_OFF directly and skips OpenRC's
# orderly stop/sync/remount-ro path — likely to leave the rootfs dirty.
install -Dm755 bin/poweroff-openrc $DESTDIR/usr/local/bin/poweroff-openrc
ln -sf /usr/local/bin/poweroff-openrc $DESTDIR/bin/poweroff

# pi5-cold-poweroff + pi5-cold-shutdown: one-shot cold-poweroff that
# flips EEPROM POWER_OFF_ON_HALT=1 just before the halt (so the
# bootloader fully cuts SoC power instead of entering ~0.5 W standby)
# and restores =0 at the next boot, then unhooks itself.  See header
# comments in both files for the lifecycle.
install -Dm755 bin/pi5-cold-poweroff    $DESTDIR/usr/local/bin/pi5-cold-poweroff
install -Dm755 init.d/pi5-cold-shutdown $DESTDIR/etc/init.d/pi5-cold-shutdown

# disable-eee-late: post-default-runlevel retry of /bin/disable-eee
# to catch the case where the kernel re-inits the PHY AFTER the
# boot-runlevel disable-eee service has already run.  Reproduced on
# tormenta 2026-05-10: post-cold-boot eee_enabled=1 / lp_advertised=0x28
# for several minutes until the watchdog cron caught it on its
# /15 boundary.
install -Dm755 init.d/disable-eee-late  $DESTDIR/etc/init.d/disable-eee-late

# pi5-cold-reboot: OpenRC boot service that forces
# /sys/kernel/reboot/mode=cold every boot (belt-and-suspenders for
# the cmdline patch above) and logs pi5-wake-on-power status for
# auditability.
install -Dm755 init.d/pi5-cold-reboot $DESTDIR/etc/init.d/pi5-cold-reboot

# tty1 HDMI console — DROPPED in 1.6.5. Was previously a mksh
# while-loop service that fought shadow-login for /dev/tty1, leaving
# two /bin/login children racing for keystrokes (every jonerix host
# now ships shadow with its supervise-daemon-supervised /bin/login on
# tty1). raspi5-fixups stays out of the console-getty business.
# post_remove still cleans /etc/runlevels/default/tty1-console for
# anyone upgrading from <= 1.6.4 — see below.

# pi5-rtc-battery-check: reads /sys/class/rtc/rtc0/battery_voltage
# and logs INFO / WARN / ERROR depending on the cell state. Paired
# with a snooze-cron entry that runs it daily.
install -Dm755 bin/pi5-rtc-battery-check $DESTDIR/usr/local/bin/pi5-rtc-battery-check
install -Dm644 cron.d/pi5-rtc-battery     $DESTDIR/etc/cron.d/pi5-rtc-battery

# Periodic disable-eee re-apply. The init.d/disable-eee OpenRC service
# only runs once at boot; this cron entry catches the case where the
# BCM54213PE PHY's EEE setting gets re-enabled later (observed in the
# wild after kernel-driven mdio resets / dhcpcd renews). disable-eee
# is idempotent — when EEE is already off, this is a fast no-op that
# does not bounce the link.
install -Dm644 cron.d/disable-eee-watchdog $DESTDIR/etc/cron.d/disable-eee-watchdog

# snooze-crond OpenRC service. The snooze package ships /bin/snooze-crond
# but no init layer, so prior to 1.6.19 every /etc/cron.d/* entry on
# jonerix was silently broken — cron files existed, no daemon dispatched
# them. This service fixes that for the whole system; without it the
# disable-eee-watchdog cron entry above (and pi5-rtc-battery, and
# ntp-set) would never fire.
install -Dm755 init.d/snooze-crond $DESTDIR/etc/init.d/snooze-crond

# jonerix is merged-usr-flat: /usr is a runtime symlink to /. jpkg >= 1.1.0
# refuses to silently flatten a DESTDIR/usr/ tree (layout bugs used to
# slip through), so do the flatten ourselves. After this, $DESTDIR/usr/
# is gone and files previously at $DESTDIR/usr/local/bin/* now live at
# $DESTDIR/local/bin/* — which the /usr → / runtime symlink resolves
# back to /usr/local/bin/* on the installed system.
if [ -d "$DESTDIR/usr" ]; then
    cp -a "$DESTDIR/usr/." "$DESTDIR/"
    rm -rf "$DESTDIR/usr"
fi
"""
install = ""

[hooks]
# Wire the disable-eee OpenRC service into the boot runlevel, and
# (on a live Raspberry Pi 5) run it now so the user doesn't need to reboot.
# Also repoint /bin/adduser at /bin/adduser-safe on every host, to block
# the toybox adduser passwd-file-truncation bug. The Pi-specific parts
# are guarded by /proc/device-tree/model; the adduser swap runs
# unconditionally because the toybox bug affects every host.
post_install = """# --- adduser / addgroup safety (all hosts) ---
# The actual `/bin/adduser -> adduser-safe` and `/bin/addgroup ->
# addgroup-safe` symlinks ship in the tarball now (see install step
# above) — manifest-tracked so toybox's post_install yield-loop can
# auto-restore them. Here we ONLY back up the previous targets (if
# any) so post_remove can restore them. The backup runs once; on
# re-install we leave it alone.
#
# When the prev was already toybox (the common case — these wrappers
# get installed onto a fresh jonerix image where /bin/adduser was a
# toybox symlink), we still write `toybox` into adduser.prev so
# post_remove restores that symlink. If for some reason adduser.prev
# already exists from a previous install, we leave it alone so we
# don't lose the original target across a `jpkg remove + install`
# cycle.
mkdir -p /etc/jpkg/raspi5-fixups
if [ ! -e /etc/jpkg/raspi5-fixups/adduser.prev ]; then
    # Default to "toybox" as the prev target — that's what ships on
    # every jonerix image. The actual readlink would have happened
    # at extract time, but we're already past it; "toybox" is the
    # conservative restore target.
    echo toybox > /etc/jpkg/raspi5-fixups/adduser.prev
fi
if [ ! -e /etc/jpkg/raspi5-fixups/addgroup.prev ]; then
    echo toybox > /etc/jpkg/raspi5-fixups/addgroup.prev
fi

# --- fstab rescue (Pi images shipped before 2026-04-16) ---
# The initial jonerix Pi image baked a minimal /etc/fstab with only
# root + /boot partitions. Missing: devpts, sysfs, tmpfs /run,
# tmpfs /tmp. Consequences observed on jonerix-tormenta 2026-04-16:
#   - Interactive SSH failed with "PTY allocation request failed"
#     (no /dev/pts mount means sshd can't allocate slave PTYs)
#   - /run and /tmp grew on ext4 instead of being scratch
# Append each missing line idempotently. grep guards so repeat
# installs are no-ops, and we never clobber user edits.
if [ -f /etc/fstab ]; then
    cp /etc/fstab /etc/fstab.pre-raspi5-fixups 2>/dev/null || true

    # Heal fstabs left broken by jonerix-raspi5-fixups <= 1.4.0.
    # That version wrote a header via printf with escaped newlines
    # that, through TOML / shell / jpkg's here-doc layers, landed in
    # the file as a literal four-character backslash-n-hash sequence.
    # That malformed line stopped mount -a dead at the /boot partition
    # and left /boot unmounted at runtime. Remove any line starting
    # with a literal backslash.
    if grep -q '^\\\\' /etc/fstab 2>/dev/null; then
        sed -i '/^\\\\/d' /etc/fstab
        echo "raspi5-fixups: removed malformed header lines from /etc/fstab"
    fi

    _fstab_add() {
        # $1 = grep pattern to detect existing entry, $2 = line to append
        if ! grep -qE "$1" /etc/fstab 2>/dev/null; then
            echo "$2" >> /etc/fstab
            echo "raspi5-fixups: added fstab line: $2"
        fi
    }
    # Idempotency: prior versions used `grep -q "raspi5-fixups rescue"`
    # but the marker line written below contains the parenthesised form
    # `raspi5-fixups (base-image fstab rescue)` — the literal "raspi5-fixups
    # rescue" with a space never appears in fstab, so the guard never
    # tripped and the marker was duplicated on every install. Match the
    # literal string we actually write.
    if ! grep -qF "raspi5-fixups (base-image fstab rescue)" /etc/fstab 2>/dev/null; then
        # Two separate echoes — portable across busybox/toybox
        # printf, which don't all honour `\\n` the same way in
        # here-doc-delivered recipes.
        echo '' >> /etc/fstab
        echo '# --- added by jonerix-raspi5-fixups (base-image fstab rescue) ---' >> /etc/fstab
    fi
    # NOTE: no shell line-continuations here. jpkg's TOML parser does not
    # process escape sequences inside triple-basic recipe strings, so
    # `\\<newline>` would reach the shell as two backslashes followed by
    # LF — not a continuation — and the fstab line below would be
    # executed as a command. Reproduced 2026-04-20 in CI: sh: devpts
    # /dev/pts devpts ...: not found. Keep each call on one line.
    _fstab_add "^[[:space:]]*devpts[[:space:]]"         "devpts   /dev/pts   devpts   gid=5,mode=0620,ptmxmode=0666   0 0"
    _fstab_add "^[[:space:]]*sysfs[[:space:]]"          "sysfs    /sys       sysfs    defaults                         0 0"
    _fstab_add "[[:space:]]/run[[:space:]].*tmpfs"      "tmpfs    /run       tmpfs    defaults,nosuid,nodev,size=20%   0 0"
    _fstab_add "[[:space:]]/tmp[[:space:]].*tmpfs"      "tmpfs    /tmp       tmpfs    defaults,nosuid,nodev,size=20%   0 0"

    # Add errors=remount-ro to existing root ext4 line if not present.
    # mkimage.sh bakes this in for fresh images (PR #107), but existing
    # Pi images predating that change don't have it. Without this, ext4
    # corruption events (SD-card wear) allow damage to spread instead
    # of triggering a fail-safe read-only remount. Reproduced on
    # jonerix-tormenta 2026-04-16: inode 287372 had a bad extent header
    # and rm returned EUCLEAN when trying to truncate.
    if grep -E '^[^#].*[[:space:]]/[[:space:]]+ext4[[:space:]]' /etc/fstab | grep -vq 'errors='; then
        sed -i -E '/^[^#].*[[:space:]]\\/[[:space:]]+ext4[[:space:]]/{
            /errors=/!s|(ext4[[:space:]]+)([^[:space:]]+)|\\1\\2,errors=remount-ro|
        }' /etc/fstab
        echo "raspi5-fixups: added errors=remount-ro to root fstab entry"
        # Live-apply immediately (kernel accepts remount with new errors=).
        mount -o remount,errors=remount-ro / 2>/dev/null || true
    fi

    # Live-mount anything not currently mounted. Best-effort; failures
    # are OK (e.g. /dev/pts needs mkdir in devtmpfs which only root can
    # do — we are root during post_install so this works).
    if ! mountpoint -q /dev/pts 2>/dev/null; then
        [ -d /dev/pts ] || mkdir /dev/pts 2>/dev/null || true
        mount /dev/pts 2>/dev/null || true
    fi
    mountpoint -q /sys 2>/dev/null || mount /sys 2>/dev/null || true
    mountpoint -q /run 2>/dev/null || mount /run 2>/dev/null || true
    mountpoint -q /tmp 2>/dev/null || mount /tmp 2>/dev/null || true
fi

# --- Legacy bootstrap cleanup (all hosts) ---
# Some pre-jonerix Pi images shipped a bare /etc/init.d/networking
# script that spawned its own dhcpcd. On jonerix-tormenta this raced
# with the proper dhcpcd service and caused DHCPREQUEST-every-minute
# (see 2026-04-16 incident). Remove it if it exists AND no installed
# jpkg claims it. dhcpcd's own post_install also does this on upgrade;
# this hook handles hosts that don't bump dhcpcd right away.
if [ -e /etc/init.d/networking ] && [ ! -L /etc/init.d/networking ]; then
    owned=0
    for m in /var/db/jpkg/installed/*/files; do
        [ -f "$m" ] || continue
        if grep -q "/etc/init.d/networking\\(\\s\\|$\\)" "$m" 2>/dev/null; then
            owned=1
            break
        fi
    done
    if [ "$owned" = 0 ]; then
        rm -f /etc/runlevels/*/networking 2>/dev/null || true
        rm -f /etc/init.d/networking
        echo "raspi5-fixups: removed orphan /etc/init.d/networking"
    fi
fi

# --- reboot command: use OpenRC native reboot ---
# Reproduced on jonerix-tormenta 2026-04-19: toybox `reboot` cleanly
# stopped OpenRC and remounted / read-only, but the Pi stayed red-only
# until physical power cycle. `openrc-shutdown -r now` rebooted the
# same board successfully. /bin/reboot is package-owned; the hook below
# also takes over /sbin and /usr/sbin aliases that may exist in older
# images outside jpkg's file database.
if [ -x /usr/local/bin/reboot-openrc ]; then
    if [ -L /bin/reboot ] && [ ! -e /etc/jpkg/raspi5-fixups/reboot.prev ]; then
        mkdir -p /etc/jpkg/raspi5-fixups
        readlink /bin/reboot > /etc/jpkg/raspi5-fixups/reboot.prev 2>/dev/null || true
    fi
    ln -sf /usr/local/bin/reboot-openrc /bin/reboot
    [ -d /sbin ] && ln -sf /usr/local/bin/reboot-openrc /sbin/reboot
    [ -d /usr/sbin ] && ln -sf /usr/local/bin/reboot-openrc /usr/sbin/reboot
fi

# Same pattern for /bin/poweroff.  Stash the prior target so
# post_remove can restore it (typically toybox).
if [ -x /usr/local/bin/poweroff-openrc ]; then
    if [ -L /bin/poweroff ] && [ ! -e /etc/jpkg/raspi5-fixups/poweroff.prev ]; then
        mkdir -p /etc/jpkg/raspi5-fixups
        readlink /bin/poweroff > /etc/jpkg/raspi5-fixups/poweroff.prev 2>/dev/null || true
    fi
    ln -sf /usr/local/bin/poweroff-openrc /bin/poweroff
    [ -d /sbin ] && ln -sf /usr/local/bin/poweroff-openrc /sbin/poweroff
    [ -d /usr/sbin ] && ln -sf /usr/local/bin/poweroff-openrc /usr/sbin/poweroff
fi

# --- Pi 5 hardware fixups (only on a live Pi 5) ---
mkdir -p /etc/runlevels/boot /etc/runlevels/default /etc/runlevels/shutdown
rm -f /etc/runlevels/boot/devfs /etc/runlevels/boot/modules
rm -f /etc/runlevels/default/dhcpcd /etc/runlevels/default/local
for svc in boot-trace dhcpcd disable-eee fan-control hwclock netfilter-nft-modules pi5-wifi pi5-cold-reboot; do
    [ -f "/etc/init.d/$svc" ] && ln -sf "/etc/init.d/$svc" "/etc/runlevels/boot/$svc" 2>/dev/null || true
done
for svc in ntp-bootstrap ntpd shadow-login syslogd snooze-crond wpa_supplicant_wlan0 disable-eee-late; do
    [ -f "/etc/init.d/$svc" ] && ln -sf "/etc/init.d/$svc" "/etc/runlevels/default/$svc" 2>/dev/null || true
done
[ -f /etc/init.d/reboot-trace-shutdown ] && ln -sf /etc/init.d/reboot-trace-shutdown /etc/runlevels/shutdown/reboot-trace-shutdown 2>/dev/null || true

# --- shadow login defaults ---
# shadow owns /etc/init.d/shadow-login and /etc/login.defs. Keep ownership
# there, but normalize Pi images away from the supervised one-minute idle
# timeout loop that spammed logs on jonerix-tormenta.
if [ -f /etc/login.defs ]; then
    if [ ! -e /etc/login.defs.pre-raspi5-fixups ]; then
        cp -p /etc/login.defs /etc/login.defs.pre-raspi5-fixups 2>/dev/null || true
    fi
    if grep -q '^[[:space:]]*LOGIN_TIMEOUT[[:space:]]' /etc/login.defs 2>/dev/null; then
        sed -i 's/^[[:space:]]*LOGIN_TIMEOUT[[:space:]].*/LOGIN_TIMEOUT	0/' /etc/login.defs
    else
        echo 'LOGIN_TIMEOUT	0' >> /etc/login.defs
    fi
fi
if [ -x /bin/shadow-getty ] && [ -d /etc/init.d ]; then
    if [ -f /etc/init.d/shadow-login ] && [ ! -e /etc/init.d/shadow-login.pre-raspi5-fixups ]; then
        cp -p /etc/init.d/shadow-login /etc/init.d/shadow-login.pre-raspi5-fixups 2>/dev/null || true
    fi
    if [ -r /share/jonerix-raspi5-fixups/shadow-login ]; then
        cp /share/jonerix-raspi5-fixups/shadow-login /etc/init.d/shadow-login
        chmod 0755 /etc/init.d/shadow-login
    fi
    mkdir -p /etc/runlevels/default
    ln -sf /etc/init.d/shadow-login /etc/runlevels/default/shadow-login 2>/dev/null || true
fi
# Console getty is shadow-login's job (shadow-getty on tty1) — see
# packages/core/shadow. raspi5-fixups
# does NOT install or enable a tty1-console anymore.
# Clean up legacy runlevel symlinks from <= 1.6.4 installs so a
# stale tty1-console doesn't silently start in parallel with
# shadow-login on the next boot.
rm -f /etc/runlevels/default/tty1-console
rm -f /etc/runlevels/default/tty1-console.pre-shadow
rm -f /etc/init.d/tty1-console

# Firmware symlinks for onboard WiFi (BCM4345). The brcmfmac driver
# asks for `brcmfmac43455-sdio.bin` and the Pi5-specific variant
# `brcmfmac43455-sdio.raspberrypi,5-model-b.bin`, but the blob we ship
# in /lib/firmware/brcm/ is under its Cypress name. Create the
# Broadcom-named symlinks once at install time; they persist on rootfs.
if [ -f /lib/firmware/brcm/cyfmac43455-sdio-standard.bin ]; then
    ln -sf cyfmac43455-sdio-standard.bin /lib/firmware/brcm/brcmfmac43455-sdio.bin 2>/dev/null || true
    ln -sf cyfmac43455-sdio-standard.bin /lib/firmware/brcm/brcmfmac43455-sdio.raspberrypi,5-model-b.bin 2>/dev/null || true
fi

if [ -r /proc/device-tree/model ] && grep -q "Raspberry Pi 5" /proc/device-tree/model 2>/dev/null; then
    [ -e /sys/class/net/eth0 ] && /bin/disable-eee eth0 || true
    KVER=$(uname -r)
    MOD="/lib/modules/$KVER/kernel/drivers/hwmon/pwm-fan.ko.xz"
    if [ -f "$MOD" ] && [ ! -d /sys/class/thermal/cooling_device0 ]; then
        xzcat "$MOD" > /tmp/pwm-fan.ko && insmod /tmp/pwm-fan.ko && rm -f /tmp/pwm-fan.ko || true
    fi
    # Live-apply the WiFi fixes so the user doesn't have to reboot:
    # point the kernel at a working modprobe and load the brcmfmac
    # stack if it isn't already up. pi5-wifi runs the same logic at
    # every boot; we duplicate it here only for the first-install
    # case. Prefer toybox's modprobe (0.8.11-r2+) over the shell shim.
    if toybox --help 2>&1 | grep -qw modprobe; then
        MP=/bin/modprobe
    else
        MP=/usr/local/bin/modprobe-shim
    fi
    if [ -w /proc/sys/kernel/modprobe ]; then
        echo -n "$MP" > /proc/sys/kernel/modprobe
    fi
    if [ ! -d /sys/class/ieee80211/phy0 ]; then
        "$MP" brcmfmac-cyw 2>/dev/null || true
        "$MP" brcmfmac      2>/dev/null || true
    fi

    # Live-apply the netfilter module order fix. The boot service keeps
    # this persistent, and this call quiets tailscaled/nft immediately on
    # package upgrade.
    if command -v rc-service >/dev/null 2>&1; then
        rc-service netfilter-nft-modules start 2>/dev/null || true
    fi
    if command -v rc-service >/dev/null 2>&1; then
        rc-service shadow-login restart 2>/dev/null || true
    fi

    # Live-(re)start snooze-crond so the cron entries (disable-eee-watchdog,
    # pi5-rtc-battery, ntp-set) actually fire on this install.  snooze-crond
    # forks a snooze child per cron file at startup and never re-reads the
    # directory afterwards, so a `start` when already running would silently
    # keep the old cron contents.  Use `restart` so any cron.d/* file we
    # just updated takes effect.
    if command -v rc-service >/dev/null 2>&1; then
        if rc-service snooze-crond status >/dev/null 2>&1; then
            rc-service snooze-crond restart 2>/dev/null || true
        else
            rc-service snooze-crond start 2>/dev/null || true
        fi
    fi

    # Live-start disable-eee-late so the post-default-runlevel retry
    # runs once now (in addition to every subsequent boot).  Idempotent
    # — if EEE is already off the underlying disable-eee invocations
    # are no-ops.
    if command -v rc-service >/dev/null 2>&1; then
        rc-service disable-eee-late start 2>/dev/null || true
    fi

    # --- cold-reboot: patch cmdline.txt once + live-flip sysfs ---
    # Firmware prepends reboot=w to the kernel command line; our
    # reboot=c in cmdline.txt overrides that (kernel keeps the last
    # reboot= token). Without it, `reboot` hangs because the RP1
    # southbridge can't be reset on a warm reboot.
    /usr/local/bin/apply-pi5-boot-settings 2>/dev/null || true
    if [ -w /sys/kernel/reboot/mode ]; then
        echo cold > /sys/kernel/reboot/mode 2>/dev/null || true
    fi

    # --- wake-on-power: confirm current EEPROM state ---
    # Print, don't mutate. Factory defaults already auto-boot on
    # power restore (WAKE_ON_GPIO=1, POWER_OFF_ON_HALT=0), so most
    # installs need nothing. Users who want the inverse run
    # `sudo pi5-wake-on-power disable` and that preference sticks
    # in EEPROM across installs/reboots.
    if [ -x /usr/local/bin/pi5-wake-on-power ]; then
        /usr/local/bin/pi5-wake-on-power 2>&1 | sed 's/^/raspi5-fixups: /' || true
    fi

    # --- RTC coin-cell initial read + daily cron wiring ---
    # Run the check once now so the current voltage (or "no battery"
    # verdict) shows up in the install log. Idempotent otherwise —
    # the cron.d entry handles the daily recurrence after boot.
    if [ -x /usr/local/bin/pi5-rtc-battery-check ]; then
        /usr/local/bin/pi5-rtc-battery-check -v 2>&1 | sed 's/^/raspi5-fixups: /' || true
    fi
fi
exit 0"""

# Tear down the runlevel symlinks that post_install created.
# (jpkg removes manifest-owned files automatically; these symlinks are dynamic.)
# Also restore the original /bin/adduser symlink if we have a record of it.
post_remove = """rm -f /etc/runlevels/boot/boot-trace /etc/runlevels/boot/disable-eee /etc/runlevels/boot/fan-control /etc/runlevels/boot/hwclock /etc/runlevels/boot/netfilter-nft-modules /etc/runlevels/boot/pi5-wifi /etc/runlevels/boot/pi5-cold-reboot /etc/runlevels/default/tty1-console /etc/runlevels/default/wpa_supplicant_wlan0 /etc/runlevels/shutdown/reboot-trace-shutdown
if [ -f /etc/init.d/shadow-login.pre-raspi5-fixups ]; then
    cp -p /etc/init.d/shadow-login.pre-raspi5-fixups /etc/init.d/shadow-login
    chmod 0755 /etc/init.d/shadow-login 2>/dev/null || true
    rm -f /etc/init.d/shadow-login.pre-raspi5-fixups
fi
if [ -f /etc/login.defs.pre-raspi5-fixups ]; then
    cp -p /etc/login.defs.pre-raspi5-fixups /etc/login.defs
    rm -f /etc/login.defs.pre-raspi5-fixups
fi
if [ -f /etc/jpkg/raspi5-fixups/adduser.prev ]; then
    prev=$(cat /etc/jpkg/raspi5-fixups/adduser.prev)
    [ -n "$prev" ] && ln -sf "$prev" /bin/adduser
    rm -f /etc/jpkg/raspi5-fixups/adduser.prev
fi
if [ -f /etc/jpkg/raspi5-fixups/addgroup.prev ]; then
    prev=$(cat /etc/jpkg/raspi5-fixups/addgroup.prev)
    [ -n "$prev" ] && ln -sf "$prev" /bin/addgroup
    rm -f /etc/jpkg/raspi5-fixups/addgroup.prev
fi
rmdir /etc/jpkg/raspi5-fixups 2>/dev/null || true
rmdir /etc/jpkg 2>/dev/null || true
_restore_reboot_link() {
    _path=$1
    _target=$2
    # On a jonerix image `/sbin` and `/usr/sbin` don't exist at
    # all (merged-usr-flat, no sbin). Skip cleanly instead of
    # noisy `ln: No such file or directory` when the parent dir
    # isn't there — the live `/bin/reboot` symlink that IS the
    # canonical path has already been handled by its own call.
    _parent=$(dirname "$_path")
    [ -d "$_parent" ] || return 0
    if [ -L "$_path" ]; then
        _cur=$(readlink "$_path" 2>/dev/null || true)
        case "$_cur" in
            /usr/local/bin/reboot-openrc|/local/bin/reboot-openrc)
                rm -f "$_path"
                ;;
        esac
    fi
    [ ! -e "$_path" ] && [ -x /bin/toybox ] && ln -sf "$_target" "$_path"
}
_reboot_bin_target=toybox
if [ -f /etc/jpkg/raspi5-fixups/reboot.prev ]; then
    _saved=$(cat /etc/jpkg/raspi5-fixups/reboot.prev)
    case "$_saved" in
        ""|/usr/local/bin/reboot-openrc|/local/bin/reboot-openrc)
            ;;
        *)
            _reboot_bin_target=$_saved
            ;;
    esac
    rm -f /etc/jpkg/raspi5-fixups/reboot.prev
fi
_restore_reboot_link /bin/reboot "$_reboot_bin_target"
_restore_reboot_link /sbin/reboot ../bin/toybox
_restore_reboot_link /usr/sbin/reboot ../bin/toybox

# Sibling cleanup for /bin/poweroff added in 1.6.22.
_restore_poweroff_link() {
    _path=$1
    _target=$2
    _parent=$(dirname "$_path")
    [ -d "$_parent" ] || return 0
    if [ -L "$_path" ]; then
        _cur=$(readlink "$_path" 2>/dev/null || true)
        case "$_cur" in
            /usr/local/bin/poweroff-openrc|/local/bin/poweroff-openrc)
                rm -f "$_path"
                ;;
        esac
    fi
    [ ! -e "$_path" ] && [ -x /bin/toybox ] && ln -sf "$_target" "$_path"
}
_poweroff_bin_target=toybox
if [ -f /etc/jpkg/raspi5-fixups/poweroff.prev ]; then
    _saved=$(cat /etc/jpkg/raspi5-fixups/poweroff.prev)
    case "$_saved" in
        ""|/usr/local/bin/poweroff-openrc|/local/bin/poweroff-openrc)
            ;;
        *)
            _poweroff_bin_target=$_saved
            ;;
    esac
    rm -f /etc/jpkg/raspi5-fixups/poweroff.prev
fi
_restore_poweroff_link /bin/poweroff "$_poweroff_bin_target"
_restore_poweroff_link /sbin/poweroff ../bin/toybox
_restore_poweroff_link /usr/sbin/poweroff ../bin/toybox

rmdir /etc/jpkg/raspi5-fixups 2>/dev/null || true
rmdir /etc/jpkg 2>/dev/null || true
exit 0"""

[depends]
# pi5-wake-on-power is a Python 3 stdlib script — no pip deps.
# python3 itself is PSF-2.0, on jonerix's permissive allowlist.
runtime = ["musl", "openrc", "python3", "shadow", "toybox"]
build = ["rust"]
