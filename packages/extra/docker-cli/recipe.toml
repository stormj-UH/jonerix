[package]
name = "docker-cli"
version = "27.5.1-r1"
license = "Apache-2.0"
description = "Docker CLI — the 'docker' command for interacting with a Docker daemon or containerd"
# nerdctl installs /bin/docker as a symlink; docker-cli takes that file over.
replaces = ["nerdctl"]

[source]
url = "https://github.com/docker/cli/archive/refs/tags/v27.5.1.tar.gz"
sha256 = "abd16e3911bc7bbd00596ebe4f58baf3d577160d99eefd749a908507ddfc587b"

[build]
system = "custom"
build = """set -e
# Upstream tarball extracts to cli-<version>/ (repo is docker/cli, not
# docker/docker-cli).  Step into the source tree explicitly.
cd cli-27.5.1

export GOFLAGS="-mod=vendor"
export CGO_ENABLED=0
VERSION=27.5.1
GITCOMMIT=jonerix

# docker/cli uses a generated version package; inject the version via ldflags.
go build -trimpath \
  -ldflags "-s -w \
    -X github.com/docker/cli/cli/version.Version=${VERSION} \
    -X github.com/docker/cli/cli/version.GitCommit=${GITCOMMIT}" \
  -o build/docker \
  ./cmd/docker
"""
install = """set -e
cd cli-27.5.1
mkdir -p "$DESTDIR/bin"
install -m755 build/docker "$DESTDIR/bin/docker"

# Strip /lib64 references from ELF files only (Go embeds the dynamic
# linker path in its string table even for static binaries). Null-pad
# /lib64 -> /lib\0\0 (same length, terminates string early). Safe:
# jonerix has no /lib64, so the padded path dereferences to /lib.
ELF_LIST=$(mktemp)
find "$DESTDIR" -type f -exec sh -c '
    head -c 4 "$1" 2>/dev/null | od -An -tx1 | tr -d " " | grep -q "^7f454c46" && printf "%s\n" "$1"
' _ {} \; > "$ELF_LIST" 2>/dev/null || true
if [ -s "$ELF_LIST" ]; then
    python3 - "$ELF_LIST" <<'PYEOF' || true
import sys
with open(sys.argv[1]) as f:
    files = [ln.rstrip("\n") for ln in f if ln.strip()]
for p in files:
    with open(p, "rb") as fh: d = fh.read()
    n = d.count(b"/lib64")
    if not n: continue
    d = d.replace(b"/lib64", b"/lib\x00\x00")
    with open(p, "wb") as fh: fh.write(d)
    print(f"docker-cli lib64-fix: {p} replaced {n} refs")
PYEOF
fi
rm -f "$ELF_LIST"

llvm-strip --strip-all "$DESTDIR/bin/docker" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["go"]
