[package]
name = "headscale"
version = "0.28.0"
license = "BSD-3-Clause"
description = "Open-source self-hosted Tailscale control server"

[source]
url = "https://github.com/juanfont/headscale/archive/refs/tags/v0.28.0.tar.gz"
sha256 = "cb38683998d13d2700df258a81c00add199dccb999b1dacc4491305cdaa67db3"

[build]
system = "custom"
build = """
cd headscale-0.28.0
export GOPATH=/tmp/go
export GOCACHE=/tmp/go-cache
export GOMODCACHE=/tmp/go/pkg/mod
export CGO_ENABLED=0
go build -buildmode=pie \
  -ldflags "-s -w -X github.com/juanfont/headscale/hscontrol.Version=0.28.0" \
  -o $DESTDIR/bin/headscale \
  ./cmd/headscale
"""
install = ""

[depends]
runtime = ["musl"]
build = ["go"]
