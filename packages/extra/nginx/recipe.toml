[package]
name = "nginx"
version = "1.28.3-r3"
license = "BSD-2-Clause"
description = "High-performance HTTP server and reverse proxy"

[source]
url = "https://nginx.org/download/nginx-1.28.3.tar.gz"
sha256 = "2c96a946bfb0882a21744ed429770a2123ae1828c7c48665092993ddee91a918"

[build]
system = "custom"
# jonerix uses compiler-rt instead of GCC CRT. nginx's configure tests
# compile with bare CC, so we must bake the rtlib/unwindlib flags into a
# wrapper script that nginx will use as its compiler.
configure = """cat > /tmp/clang-jonerix << 'WRAPPER'
#!/bin/sh
exec clang --rtlib=compiler-rt -fuse-ld=lld -Wno-unused-command-line-argument "$@"
WRAPPER
chmod +x /tmp/clang-jonerix
# jonerix ships libressl as a shared library only (.so, no .a).
# nginx's configure runs a link test with --with-ld-opt; using -Wl,-Bstatic
# with a shared-only libssl fails that test and aborts configure.  Link
# dynamically throughout (-lssl -lcrypto -lpcre2-8 -lz).
# All jonerix libraries live under /; no prefix variables needed.
./configure \
  --prefix=/etc/nginx \
  --sbin-path=/bin/nginx \
  --modules-path=/lib/nginx/modules \
  --conf-path=/etc/nginx/nginx.conf \
  --error-log-path=/var/log/nginx/error.log \
  --http-log-path=/var/log/nginx/access.log \
  --pid-path=/run/nginx.pid \
  --lock-path=/run/nginx.lock \
  --with-http_ssl_module \
  --with-http_v2_module \
  --with-http_realip_module \
  --with-http_gzip_static_module \
  --with-http_stub_status_module \
  --with-threads \
  --with-cc=/tmp/clang-jonerix \
  --with-cc-opt="-I/include -Os -Wno-error" \
  --with-ld-opt="-L/lib -lssl -lcrypto -lpcre2-8 -lz"
"""
build = "make -r -j$(nproc)"
install = """install -Dm755 objs/nginx "$DESTDIR/bin/nginx"
mkdir -p "$DESTDIR/etc/nginx" "$DESTDIR/var/log/nginx" "$DESTDIR/run"
cp -a conf/. "$DESTDIR/etc/nginx/"
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
rm -rf "$DESTDIR/etc/nginx/html" """

[depends]
runtime = ["musl", "libressl", "zlib", "pcre2"]
build = ["clang", "make", "mksh", "libressl", "zlib", "pcre2"]
