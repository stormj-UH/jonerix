[package]
name = "jonerix-util"
version = "0.1.0-r1"
license = "MIT"
description = "Clean-room permissive-licensed replacement for parts of util-linux (lscpu, hwclock, ionice, nsenter)"

# No [source] — local-only build from $RECIPE_DIR/src.

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/jonerix-util-cargo
export CARGO_TARGET_DIR=/tmp/jonerix-util-target
export RUSTFLAGS="-C strip=symbols -C target-feature=-crt-static"
cd "$RECIPE_DIR/src"
# No vendored crates — the whole crate is std + a handful of libc
# extern "C" bindings. cargo still wants an --offline --frozen build.
cargo build --release --offline --frozen
"""
install = """
set -e
BIN=/tmp/jonerix-util-target/release

mkdir -p "$DESTDIR/bin"
for t in lscpu hwclock ionice nsenter; do
    install -m 755 "$BIN/$t" "$DESTDIR/bin/$t"
done
"""

[depends]
runtime = ["musl"]
build = ["clang", "rust"]
