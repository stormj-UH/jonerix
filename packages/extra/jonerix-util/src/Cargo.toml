[package]
name = "jonerix-util"
version = "0.1.1"
edition = "2021"
license = "MIT"
description = "Clean-room permissive-licensed replacement for the GPL util-linux suite"
authors = ["jonerix contributors"]

[lib]
name = "jxutil"
path = "src/lib.rs"

[[bin]]
name = "lscpu"
path = "src/bin/lscpu.rs"

[[bin]]
name = "hwclock"
path = "src/bin/hwclock.rs"

[[bin]]
name = "ionice"
path = "src/bin/ionice.rs"

[[bin]]
name = "nsenter"
path = "src/bin/nsenter.rs"

[dev-dependencies]
# Kani model checker — only present when running `cargo kani`.
# Under normal `cargo test` / `cargo build` the kani crate is absent;
# all proof harnesses are gated behind `#[cfg(kani)]` so they compile
# away to nothing without it.
# kani = "0.57"   # pin when Kani toolchain is installed; kept commented
                  # so the project builds with stock rustc.

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
