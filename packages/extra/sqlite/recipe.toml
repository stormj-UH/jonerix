[package]
name = "sqlite"
version = "3.51.3"
license = "Public-Domain"
description = "Self-contained SQL database engine"

[source]
url = "https://sqlite.org/2026/sqlite-autoconf-3510300.tar.gz"
sha256 = "81f5be397049b0cae1b167f2225af7646fc0f82e4a9b3c48c9ea3a533e21d77a"

[build]
system = "custom"
build = """clang -O2 -fPIC -I. -DSQLITE_ENABLE_FTS5 -DSQLITE_ENABLE_JSON1 -DSQLITE_ENABLE_RTREE -DSQLITE_THREADSAFE=1 -DSQLITE_ENABLE_COLUMN_METADATA -DSQLITE_OMIT_LOAD_EXTENSION --rtlib=compiler-rt -fuse-ld=lld -shared -o libsqlite3.so sqlite3.c
clang -O2 -fPIC -I. -DSQLITE_ENABLE_FTS5 -DSQLITE_ENABLE_JSON1 -DSQLITE_ENABLE_RTREE -DSQLITE_THREADSAFE=1 -DSQLITE_ENABLE_COLUMN_METADATA -DSQLITE_OMIT_LOAD_EXTENSION --rtlib=compiler-rt -fuse-ld=lld -o sqlite3 shell.c sqlite3.c -lz"""
install = """mkdir -p $DESTDIR/bin $DESTDIR/lib $DESTDIR/include
install -m 755 sqlite3 $DESTDIR/bin/sqlite3
install -m 755 libsqlite3.so $DESTDIR/lib/libsqlite3.so
install -m 644 sqlite3.h $DESTDIR/include/sqlite3.h
install -m 644 sqlite3ext.h $DESTDIR/include/sqlite3ext.h
llvm-strip --strip-all $DESTDIR/bin/sqlite3 2>/dev/null || true
llvm-strip --strip-unneeded $DESTDIR/lib/libsqlite3.so 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang", "make"]
