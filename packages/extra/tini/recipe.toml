[package]
name = "tini"
version = "0.19.0-r1"
license = "MIT"
description = "Tiny init for containers — reaps zombies and forwards signals; used by 'docker run --init'"

[source]
url = "https://github.com/krallin/tini/archive/refs/tags/v0.19.0.tar.gz"
sha256 = "0fd35a7030052acd9f58948d1d900fe1e432ee37103c5561554408bdac6bbf0d"

[build]
system = "custom"
build = """set -e
# Build the static tini binary with cmake + Ninja (samurai).
# -DMINIMAL=ON strips the CLI flag parser and shaves ~5 kB from the binary.
#
# tini's CMakeLists.txt declares cmake_minimum_required(VERSION 2.8.2);
# CMake 4.x removed compat for <3.5 and refuses to configure.  Set the
# policy-version floor at the command line so the build proceeds.
cmake -B build -G Ninja \
    -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_C_COMPILER=clang \
    -DCMAKE_C_FLAGS="-Wno-unused-command-line-argument -Wno-error" \
    -DCMAKE_EXE_LINKER_FLAGS="-static" \
    -DMINIMAL=ON \
    .
cmake --build build
"""
install = """set -e
# Install the static binary as /bin/tini.
# tini-static is produced when linking with -static; fall back to tini
# if the static variant was not built (cmake variable MINIMAL=ON forces it).
if [ -f build/tini-static ]; then
    install -Dm755 build/tini-static "$DESTDIR/bin/tini"
else
    install -Dm755 build/tini "$DESTDIR/bin/tini"
fi
# Also expose as /sbin/tini for containers that use the traditional path.
mkdir -p "$DESTDIR/sbin"
ln -sf /bin/tini "$DESTDIR/sbin/tini"
llvm-strip --strip-all "$DESTDIR/bin/tini" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["clang", "cmake", "samurai"]
