[package]
name = "m4oxide"
version = "0.1.0-r0"
license = "MIT"
description = "Clean-room Rust implementation of m4 for jonerix"

[source]
url = "https://github.com/stormj-UH/jonerix/releases/download/packages/m4oxide-63a4efe221c8fb0f2fac1936a3bf0367161edf72.tar.gz"
sha256 = "18eb60a78da00329439aa637aa68b0e09e5ae559090810877174c3c813d8ae09"

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/m4oxide-cargo
export CARGO_TARGET_DIR="$PWD/target"
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static"
cargo test --locked
cargo build --release --locked --bin m4oxide
"""
install = """
set -e
BIN="$PWD/target/release/m4oxide"
install -Dm755 "$BIN" "$DESTDIR/bin/m4oxide"
ln -sf m4oxide "$DESTDIR/bin/m4"
llvm-strip --strip-all "$DESTDIR/bin/m4oxide" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]
