[package]
name = "m4oxide"
version = "0.1.2-r0"
license = "MIT"
description = "Clean-room Rust implementation of m4 for jonerix"

[source]
url = "https://github.com/stormj-UH/jonerix/releases/download/packages/m4oxide-40573c872ea5f076a70a78c51946d938ed80ae9c.tar.gz"
sha256 = "b221199f000cf2b22547c56c3c60bb7c4be2a20c27b4c21ae8e0dee5cb65a3cd"

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/m4oxide-cargo
export CARGO_TARGET_DIR="$PWD/target"
# Repo policy: zero rustc warnings (also enforced by #![deny(warnings)] at the
# crate root). crt-static for a fully musl-static binary. Cargo.toml ships a
# fat-LTO release profile so cargo build --release just consumes it.
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static -D warnings"
cargo test --frozen --offline
cargo build --release --frozen --offline --bin m4oxide
"""
install = """
set -e
BIN="$PWD/target/release/m4oxide"
install -Dm755 "$BIN" "$DESTDIR/bin/m4oxide"
ln -sf m4oxide "$DESTDIR/bin/m4"
llvm-strip --strip-all "$DESTDIR/bin/m4oxide" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]
