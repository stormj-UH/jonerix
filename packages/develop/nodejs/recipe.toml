[package]
name = "nodejs"
version = "24.15.0-r5"
license = "MIT"
description = "JavaScript runtime built on V8 (libc++ / compiler-rt / small-icu / zero GNU)"

# r5: cap CI parallelism at -j2 (was -j3). run 25658191102 OOM-killed
# at file 3318/4386 of v8 compile under -j3 — some torque-generated
# v8 files peak above 4 GB per cc1, so three in flight blew through
# the ~14 GB GitHub runners offer. -j2 gives one big file room while
# a smaller sibling keeps the pipeline warm.
#
# r4: bake distro identity into process.config.variables. Node has no
# built-in distro-identification API (process.platform is just "linux"),
# but the gyp variables it was configured with are dumped verbatim into
# process.config.variables at runtime — that's the well-known place
# ecosystem tools (npmcli/arborist, prebuild-install, etc.) look for
# build-environment hints. Post-configure we read /etc/os-release on
# the build host and add `distro`, `distro_id`, `distro_version` to
# config.gypi's variables block before samu runs. config.gypi is a
# plain JSON file (Node's configure.py emits it via json.dumps), so
# the surgery is one json.load + dict update + json.dump. No new build
# deps, no source patches, no behavioural change to the build itself —
# just three extra strings travel into the linked node binary as part
# of the embedded config blob.

[source]
url = "https://nodejs.org/dist/v24.15.0/node-v24.15.0.tar.gz"
sha256 = "729de494dd2872e5a3a6c32a1cd156a5413d4aca2772b2d873ee86bb5531bcd9"

[build]
system = "custom"
build = """
set -e

# Node 24 from source — zero GNU C++ runtime, full-icu.
#
# Changes vs the previous 24.14.1 recipe:
# - Upstream bump 24.14.1 -> 24.15.0 (latest Krypton LTS patch).
# - --with-intl=full-icu (was =none). Vite, Intl.*, and userland
#   regex property escapes like `\\p{Surrogate}` depend on this:
#   the old build left process.versions.icu undefined and RegExp
#   threw on Unicode property escapes, breaking downstream builds
#   (caught during the libreSRS deploy to watchtpwer). ICU data
#   is downloaded during configure and statically linked into the
#   node binary — no new runtime dependency, final image just has
#   a larger `node` binary.
# - Parallelism heuristic is CI-aware. GitHub ubuntu-latest and
#   ubuntu-24.04-arm runners are 4 vCPU / ~14 GiB MemAvailable;
#   V8 compiles want ~2 GB per job plus a ~3 GB linker step, so
#   -j3 is the largest safe setting. On beefier local hosts we
#   fall back to the original MemAvailable / 2 rule capped at
#   nproc.
#
# Build notes (see jonerix-built-jpkgs/NODE24_RECIPE_FIXES.md):
# - Must pass PATH explicitly: Python subprocess doesn't inherit jpkg's env.
# - Use --ninja; the generated top-level Makefile is GNU-make syntax.
# - --rtlib=compiler-rt + --unwindlib=libunwind requires that the LLVM
#   package has been installed with its GCC compat CRT dir populated
#   (clang_rt.crtbegin.o / crtend.o under lib/gcc/<triple>/<ver>/).
# - Remove -latomic gyp injections; compiler-rt builtins cover atomics.
# - asm/hwcap.h (needed by V8/Highway) requires linux-headers as a build
#   dep. Add linux-headers to [depends].build once that package exists.

export PATH=/bin:/usr/bin

# Python 3.14 in jonerix's builder image is currently compiled
# without the _bz2 extension (no libbz2 at python build time),
# so `import bz2` in configure.py fails at module load. We
# satisfy the import with a shim and — more importantly —
# pre-expand the only real consumer (deps/icu-small's
# icudt*l.dat.bz2, which configure_intl would otherwise decode
# via bz2.BZ2File) using libarchive's bsdcat. Once the .dat is
# present uncompressed, configure_intl takes its
# "file already exists" branch and never touches bz2.

mkdir -p /tmp/py-shim
cat > /tmp/py-shim/bz2.py <<'PYEOF'
class _Missing:
    def __call__(self, *a, **kw):
        raise NotImplementedError(
            "jonerix python3 missing _bz2; shim reached at runtime — "
            "pre-expand any .bz2 inputs in the recipe before invoking python")
BZ2File = _Missing(); BZ2Compressor = _Missing(); BZ2Decompressor = _Missing()
def compress(*a, **kw): raise NotImplementedError()
def decompress(*a, **kw): raise NotImplementedError()
def open(*a, **kw): raise NotImplementedError()
PYEOF
export PYTHONPATH=/tmp/py-shim:${PYTHONPATH:-}

find_vendored_file() {
    for want in "$@"; do
        oldifs=$IFS
        IFS=:
        for dir in ${JPKG_SOURCE_CACHE:-}; do
            [ -n "$dir" ] || continue
            if [ -f "$dir/$want" ]; then
                IFS=$oldifs
                printf '%s\n' "$dir/$want"
                return 0
            fi
        done
        IFS=$oldifs
        dir="$RECIPE_DIR/../../../sources"
        if [ -f "$dir/$want" ]; then
            printf '%s\n' "$dir/$want"
            return 0
        fi
    done
    return 1
}

# Pre-expand deps/icu-small's bzipped ICU data file. The
# builder's libarchive 3.8.6 was compiled without bzip2
# support and there's no bzip2/bunzip2 binary available
# either, so bsdcat refuses to touch .bz2. Compile a tiny
# bzcat from the vendored upstream bzip2 1.0.8 tarball in-place.
# It is used only at recipe build time and thrown away.
(
  set -e
  mkdir -p /tmp/bzip2-build
  cd /tmp/bzip2-build
  BZIP2_SRC=$(find_vendored_file bzip2-1.0.8.tar.gz bzip2-1.0.8-r1.tar.gz) || {
    printf '%s\n' "nodejs: missing vendored bzip2-1.0.8.tar.gz" >&2
    exit 1
  }
  cp "$BZIP2_SRC" bz.tgz
  echo "ab5a03176ee106d3f0fa90e381da478ddae405918153cca248e682cd0c4a2269  bz.tgz" \
    | sha256sum -c -
  bsdtar -xzf bz.tgz
  cd bzip2-1.0.8
  clang -O2 -D_FILE_OFFSET_BITS=64 -o /tmp/bzip2-build/bzcat \
    bzip2.c blocksort.c huffman.c crctable.c randtable.c compress.c \
    decompress.c bzlib.c
)
BZCAT=/tmp/bzip2-build/bzcat

for bz in deps/icu-small/source/data/in/*.bz2; do
  [ -f "$bz" ] || continue
  out="${bz%.bz2}"
  echo "Pre-expanding $bz -> $out"
  "$BZCAT" -dc "$bz" > "$out"
done

# Strip explicit -latomic injections that GYP adds for Linux+Clang.
# compiler-rt builtins provide the same symbols.
for f in node.gyp tools/v8_gypfiles/v8.gyp; do
  [ -f "$f" ] || continue
  tmp=${f}.tmp
  sed "s/'-latomic',//g; s/-latomic//g" "$f" > "$tmp"
  cat "$tmp" > "$f"
  rm -f "$tmp"
done

CC=clang \
CXX=clang++ \
AR=llvm-ar \
RANLIB=llvm-ranlib \
NM=llvm-nm \
CFLAGS="-O2 --rtlib=compiler-rt" \
CXXFLAGS="-O2 -stdlib=libc++ --rtlib=compiler-rt --unwindlib=libunwind" \
LDFLAGS="-stdlib=libc++ -lc++abi -fuse-ld=lld --rtlib=compiler-rt --unwindlib=libunwind" \
python3 configure.py \
    --prefix=/ \
    --ninja \
    --with-intl=small-icu \
    --shared-zlib \
    --without-snapshot \
    --without-node-snapshot
# --with-intl=small-icu uses the ICU source bundled in Node's
# deps/icu-small/ — no network download, no bz2 decompression.
# V8 gets its Unicode regex data from ICU either way, so
# \p{Surrogate} and other property escapes resolve correctly.
# Full locale data (formatDate/etc.) isn't needed for the
# build-time tools our consumers run. If a downstream workload
# needs full-icu, it can either require ICU data at runtime
# (NODE_ICU_DATA env var pointing to an icu4c-*.dat) or we
# rebuild this package after the python3 recipe learns _bz2.

# Inject distro identity into config.gypi['variables']. Node's
# configure.py emits config.gypi as plain JSON (json.dumps); that
# blob is embedded in the binary and surfaced at runtime via
# process.config. Read /etc/os-release on the build host and add
# distro / distro_id / distro_version. Falls back to "jonerix" /
# "jonerix" / "" if /etc/os-release is missing, so a builder
# without the file still produces a self-identifying node.
DISTRO_ID=jonerix
DISTRO_VERSION=
if [ -r /etc/os-release ]; then
    # POSIX-safe scrape — no `source`, no bashisms. ID and
    # VERSION_ID may or may not be quoted in os-release.
    DISTRO_ID=$(awk -F= '$1=="ID"{gsub(/"/,"",$2);print $2;exit}' /etc/os-release)
    DISTRO_VERSION=$(awk -F= '$1=="VERSION_ID"{gsub(/"/,"",$2);print $2;exit}' /etc/os-release)
    [ -n "$DISTRO_ID" ] || DISTRO_ID=jonerix
fi
echo "Injecting distro=jonerix distro_id=$DISTRO_ID distro_version=$DISTRO_VERSION into config.gypi"
DISTRO_ID="$DISTRO_ID" DISTRO_VERSION="$DISTRO_VERSION" python3 -c '
import json, os, pathlib
p = pathlib.Path("config.gypi")
txt = p.read_text()
# configure.py prepends a "# Do not edit..." comment line that is
# valid for ast.literal_eval (Python comment) and for js2c.cc
# (StripComments runs first) but not for json.loads. Skip any
# leading lines that are blank or start with "#".
lines = txt.splitlines(keepends=True)
i = 0
while i < len(lines) and (not lines[i].strip() or lines[i].lstrip().startswith("#")):
    i += 1
banner = "".join(lines[:i]) or "# Do not edit. Generated by configure.\n"
cfg = json.loads("".join(lines[i:]))
cfg.setdefault("variables", {})
cfg["variables"]["distro"] = "jonerix"
cfg["variables"]["distro_id"] = os.environ["DISTRO_ID"]
cfg["variables"]["distro_version"] = os.environ["DISTRO_VERSION"]
# Re-emit JSON (compatible with ast.literal_eval used by
# tools/install.py and with js2c.cc which strips the leading
# comment before parsing as JSON).
p.write_text(banner + json.dumps(cfg, indent=2) + "\n")
'

# Parallelism. V8 compilation peaks at ~2 GB for ordinary files but
# torque-generated files (builtins-*-from-dsl-gen.cc, regexp-bytecode-
# generator.cc) can spike past 4 GB per cc1 alone. The final link
# pulls another ~3 GB. GitHub runners give us 4 vCPU / ~14 GiB
# MemAvailable, so two of those big files in flight already eats
# the budget — drop to -j2 in CI (run 25658191102 OOM'd at file
# 3318/4386 under -j3). On a bigger local box (>= 28 GiB) we scale
# to nproc.
MEM_GB=$(awk '/MemAvailable/{printf "%d", $2/1048576}' /proc/meminfo 2>/dev/null || echo 2)
CPUS=$(nproc 2>/dev/null || echo 2)

if [ "${GITHUB_ACTIONS:-false}" = "true" ]; then
  JOBS=2
  [ "$MEM_GB" -ge 28 ] && JOBS=$CPUS
  [ "$JOBS" -gt "$CPUS" ] && JOBS=$CPUS
else
  JOBS=$((MEM_GB / 2))
  [ "$JOBS" -lt 1 ] && JOBS=1
  [ "$JOBS" -gt "$CPUS" ] && JOBS=$CPUS
fi
echo "Building with -j$JOBS (${MEM_GB}GB avail, ${CPUS} cpus, CI=${GITHUB_ACTIONS:-false})"
samu -C out/Release -j$JOBS

# Stage install using Node's own installer.
python3 tools/install.py install --dest-dir "$DESTDIR" --prefix /

# Verify: warn if GNU C++ runtime leaked in, and confirm ICU is present.
echo "=== Verifying node binary dependencies ==="
readelf -d "$DESTDIR/bin/node" 2>/dev/null | grep NEEDED || true
if readelf -d "$DESTDIR/bin/node" 2>/dev/null | grep -q 'libstdc++\\|libgcc_s'; then
    echo "WARNING: GNU C++ runtime dependencies detected in node binary!"
fi
echo "=== Verifying ICU is built in ==="
"$DESTDIR/bin/node" -e 'if(!process.versions.icu){console.error("ICU NOT built in");process.exit(1)}console.log("ICU version:",process.versions.icu)'
# Quote the `;` terminator. Same TOML + shell escape trap the
# anvil and bzip2 recipes hit: `\\;` inside a basic string
# arrives at find as a bare `;` and errors with
# "find: -exec without \\;". Single-quoted `;` survives both.
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} ';' 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} ';' 2>/dev/null || true
"""
install = ""

[depends]
runtime = ["musl", "zlib", "libcxx"]
build = ["clang", "python3", "samurai", "zlib", "libcxx", "jonerix-headers"]
