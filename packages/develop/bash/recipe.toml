[package]
name = "bash"
version = "5.2.37"
license = "GPL-3.0-or-later"
description = "GNU Bourne Again Shell — required by build scripts with bash-specific syntax"

[source]
url = "https://ftp.gnu.org/gnu/bash/bash-5.2.37.tar.gz"
sha256 = "9599b22ecd1d5787ad7d3b7bf0c59f312b3396d1e281175dd1f8a4014da621ff"

[build]
system = "autoconf"
configure = """./configure \
  --prefix=/ \
  --without-bash-malloc \
  --disable-nls \
  --with-curses \
  CC=clang"""
build = "make -j$(nproc)"
install = """make DESTDIR=$DESTDIR install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
llvm-strip --strip-all "$DESTDIR/bin/bash" 2>/dev/null || true"""

[depends]
runtime = ["musl", "ncurses"]
build = ["clang", "make"]
