[package]
name = "jmake"
version = "1.0.1"
license = "MIT"
description = "Clean-room drop-in replacement for GNU Make, written in Rust"

[source]
url = "https://cache.invalid/jmake-1.0.1.tar"
sha256 = "fba428c823a3aaca7836ab956562874561dec3048ea34b2c3c9f517d9f86f1b1"

[build]
system = "custom"
# Rust 1.94.1-r1 uses llvm-libunwind=system, so library/unwind emits
# -lunwind instead of -lgcc_s. No cc-wrapper or gnu-compat dep needed.
build = "cargo build --release"
install = """install -Dm755 target/release/jmake "$DESTDIR/bin/jmake"
llvm-strip --strip-all "$DESTDIR/bin/jmake" 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["rust"]
