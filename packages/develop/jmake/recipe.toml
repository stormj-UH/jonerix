[package]
name = "jmake"
version = "0.1.0"
license = "LicenseRef-AllRightsReserved"
pre_bootstrap = false
description = "Clean-room drop-in replacement for GNU Make, written in Rust"

[source]
type = "local"

[build]
system = "custom"
build = """set -e
RUSTFLAGS="-C strip=symbols" cargo build --release
"""
install = """set -e
install -Dm755 target/release/jmake "$DESTDIR/bin/jmake"
ln -sf jmake "$DESTDIR/bin/make"
ln -sf jmake "$DESTDIR/bin/gmake"
llvm-strip --strip-all "$DESTDIR/bin/jmake" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]
