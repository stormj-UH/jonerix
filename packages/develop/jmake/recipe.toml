[package]
name = "jmake"
version = "1.0.12"
license = "MIT"
description = "Clean-room drop-in replacement for GNU Make, written in Rust"
# 1.0.12 removes the diagnostic traces from 1.0.10/1.0.11. The REAL
# bug turned out to be in ci-build-*.sh — `jpkg install --force jmake`
# does not upgrade an existing installation, so CI has been running
# jmake 1.0.2 this whole time (!!). Fixed in scripts/ci-build-*.sh to
# use `jpkg upgrade jmake`. With that fix, 1.0.12's actual logic fixes
# (VPATH expansion, GNUmakefile preference, ifeq-colon dispatch) finally
# get exercised in CI.

[source]
url = "https://cache.invalid/jmake-1.0.12.tar"
sha256 = "50272eac40be7fb27da2ca615186f471091b2df8a321b246d0de1388319a225b"

[build]
system = "custom"
# Rust 1.94.1-r2 uses llvm-libunwind=system, so library/unwind emits
# -lunwind instead of -lgcc_s. No cc-wrapper or gnu-compat dep needed.
# Source /etc/profile.d/cargo.sh so CARGO_HTTP_CAINFO is set (cargo's
# bundled libcurl needs the jonerix CA bundle path; jpkg build runs in a
# non-login shell so profile.d isn't auto-sourced).
build = """export CARGO_HTTP_CAINFO=/etc/ssl/certs/ca-certificates.crt
export OPENSSL_DIR=/
export OPENSSL_INCLUDE_DIR=/include
export OPENSSL_LIB_DIR=/lib
cargo build --release"""
install = """install -Dm755 target/release/jmake "$DESTDIR/bin/jmake"
llvm-strip --strip-all "$DESTDIR/bin/jmake" 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["rust"]
