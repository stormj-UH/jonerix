[package]
name = "jmake"
version = "1.0.0"
license = "MIT"
description = "Clean-room drop-in replacement for GNU Make, written in Rust"

[source]
url = "https://castle.great-morpho.ts.net:3000/api/v1/repos/jonerik/jmake/archive/9daab69dc844e3c94059b95b852988c4a7d978d3.tar.gz"
sha256 = "8bd3b2054e065ea30018bfd10f385e51dcea6ef3b01250fa6334f87b0ac82e34"

[build]
system = "custom"
build = "cargo build --release"
install = """install -Dm755 target/release/jmake "$DESTDIR/bin/jmake"
llvm-strip --strip-all "$DESTDIR/bin/jmake" 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["rust"]
