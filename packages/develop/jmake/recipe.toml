[package]
name = "jmake"
version = "1.0.0"
license = "MIT"
description = "Clean-room drop-in replacement for GNU Make, written in Rust"

[source]
type = "local"

[build]
system = "custom"
configure = """if [ -z "$JPKG_SOURCE_DIR" ]; then
  echo "JPKG_SOURCE_DIR must point to the jmake repo root" >&2
  exit 1
fi
cp -a "$JPKG_SOURCE_DIR"/. ."""
build = "cargo build --release"
install = """install -Dm755 target/release/jmake "$DESTDIR/bin/jmake"
llvm-strip --strip-all "$DESTDIR/bin/jmake" 2>/dev/null || true"""

[hooks]
pre_install = """STATE_DIR=/var/db/jpkg/state/jmake
mkdir -p "$STATE_DIR"

save_state() {
  path="$1"
  name="$2"
  kind_file="$STATE_DIR/$name.kind"
  target_file="$STATE_DIR/$name.target"

  if [ -f "$kind_file" ]; then
    return 0
  fi

  if [ -L "$path" ]; then
    target="$(readlink "$path")"
    case "$target" in
      jmake|*/jmake)
        printf 'absent\n' > "$kind_file"
        ;;
      *)
        printf 'symlink\n' > "$kind_file"
        printf '%s\n' "$target" > "$target_file"
        ;;
    esac
  elif [ -e "$path" ]; then
    printf 'file\n' > "$kind_file"
  else
    printf 'absent\n' > "$kind_file"
  fi
}

save_state /bin/make make
save_state /bin/gmake gmake"""

post_install = """STATE_DIR=/var/db/jpkg/state/jmake
mkdir -p "$STATE_DIR"

take_over() {
  path="$1"
  name="$2"
  kind_file="$STATE_DIR/$name.kind"
  backup="$STATE_DIR/$name.backup"

  if [ -f "$kind_file" ] && [ "$(cat "$kind_file")" = "file" ] &&
     [ -e "$path" ] && [ ! -L "$path" ] && [ ! -e "$backup" ]; then
    mv "$path" "$backup"
  fi

  ln -sf jmake "$path"
}

take_over /bin/make make
take_over /bin/gmake gmake"""

post_remove = """STATE_DIR=/var/db/jpkg/state/jmake

restore_path() {
  path="$1"
  name="$2"
  kind_file="$STATE_DIR/$name.kind"
  target_file="$STATE_DIR/$name.target"
  backup="$STATE_DIR/$name.backup"

  if [ ! -f "$kind_file" ]; then
    return 0
  fi

  current_target=""
  if [ -L "$path" ]; then
    current_target="$(readlink "$path")"
  fi

  case "$current_target" in
    jmake|*/jmake)
      rm -f "$path"
      ;;
    "")
      :
      ;;
    *)
      rm -f "$kind_file" "$target_file"
      if [ -e "$backup" ]; then
        rm -rf "$backup"
      fi
      return 0
      ;;
  esac

  kind="$(cat "$kind_file")"
  case "$kind" in
    symlink)
      if [ -f "$target_file" ]; then
        ln -sf "$(cat "$target_file")" "$path"
      fi
      ;;
    file)
      if [ -e "$backup" ]; then
        mv "$backup" "$path"
      fi
      ;;
    absent)
      :
      ;;
  esac

  rm -f "$kind_file" "$target_file"
  if [ -e "$backup" ]; then
    rm -rf "$backup"
  fi
}

restore_path /bin/make make
restore_path /bin/gmake gmake
rmdir "$STATE_DIR" 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["rust"]
