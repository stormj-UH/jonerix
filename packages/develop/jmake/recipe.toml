[package]
name = "jmake"
version = "1.0.0"
license = "MIT"
description = "Clean-room drop-in replacement for GNU Make, written in Rust"

[source]
url = "https://castle.great-morpho.ts.net:3000/api/v1/repos/jonerik/jmake/archive/6c9dd2fe8ba38032b17440f07f9b85b45aa63501.tar.gz"
sha256 = "f38016278957de1f1869e652554cb40accff8402a877a79e9c13005807cd513c"

[build]
system = "custom"
build = "cargo build --release"
install = """install -Dm755 target/release/jmake "$DESTDIR/bin/jmake"
llvm-strip --strip-all "$DESTDIR/bin/jmake" 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["rust"]
