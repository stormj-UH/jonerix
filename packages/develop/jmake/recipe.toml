[package]
name = "jmake"
version = "1.0.7"
license = "MIT"
description = "Clean-room drop-in replacement for GNU Make, written in Rust"
# 1.0.5 fixed VPATH variable expansion when resolving prerequisites.
# 1.0.6 preferred GNUmakefile over Makefile when both exist.
# 1.0.7 fixes conditional-directive dispatch: lines like
#   ifeq ($(A):$(B),yes:yes)
# were being mis-classified as rule lines by the raw-line "rule colon"
# heuristic, then erroring "target pattern contains no '%'". jmake
# now recognises ifeq/ifneq/ifdef/ifndef (with optional `else`
# prefix) and skips the heuristic so parse_conditional runs first.

[source]
url = "https://cache.invalid/jmake-1.0.7.tar"
sha256 = "ed697a16c4c3ab7611aa477e63a6dc11e332d8c7a8548a256fcfe3aab6391098"

[build]
system = "custom"
# Rust 1.94.1-r2 uses llvm-libunwind=system, so library/unwind emits
# -lunwind instead of -lgcc_s. No cc-wrapper or gnu-compat dep needed.
# Source /etc/profile.d/cargo.sh so CARGO_HTTP_CAINFO is set (cargo's
# bundled libcurl needs the jonerix CA bundle path; jpkg build runs in a
# non-login shell so profile.d isn't auto-sourced).
build = """export CARGO_HTTP_CAINFO=/etc/ssl/certs/ca-certificates.crt
export OPENSSL_DIR=/
export OPENSSL_INCLUDE_DIR=/include
export OPENSSL_LIB_DIR=/lib
cargo build --release"""
install = """install -Dm755 target/release/jmake "$DESTDIR/bin/jmake"
llvm-strip --strip-all "$DESTDIR/bin/jmake" 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["rust"]
