[package]
name = "jmake"
version = "1.1.7"
license = "MIT"
description = "Clean-room drop-in replacement for GNU Make, written in Rust"
# 1.1.7: skip the wildcard re-prepend when dir_prefix is itself a glob.
# musl's Makefile builds globs out of glob patterns:
#     SRC_DIRS = $(addprefix $(srcdir)/, src/* src/malloc/$(MALLOC_DIR) ...)
#     BASE_GLOBS = $(addsuffix /*.c, $(SRC_DIRS))
#     BASE_SRCS = $(sort $(wildcard $(BASE_GLOBS)))
# so $(wildcard ...) sees patterns like `./src/*/*.c`. The Rust glob crate
# correctly returns `./src/aio/aio.c`, but jmake's "if glob dropped the
# directory prefix, put it back" logic computed dir_prefix = `./src/*/`
# (literal asterisk) and re-prepended it, producing the bogus
# `./src/*/src/aio/aio.c`. The path then survived patsubst+addprefix all
# the way to `obj/src/*/src/aio/aio.lo`, which crashed `llvm-ar` at the
# final libc.a step. Reproduced 2026-04-25 from a clean musl 1.2.6 build.
# Fix: only re-prepend when dir_prefix has no `*`, `?`, or `[`.
#
# 1.1.6: paren-aware colon search in target-specific variable parsing.
# Lines like
#   $(NOSSP_OBJS) $(NOSSP_OBJS:%.o=%.lo): CFLAGS_ALL += $(CFLAGS_NOSSP)
# (musl Makefile vintage) have a literal `:` inside the $(VAR:pat=sub)
# pattern-substitution reference. The previous TSV split used
# `name.find(':')` which is NOT paren-aware, hit the inner colon, and
# fell through to try_parse_rule — registering CFLAGS_ALL as a real
# prerequisite of every NOSSP_OBJS target (CRT_OBJS includes
# obj/crt/Scrt1.o), so `jmake obj/crt/Scrt1.o` would die with
# `No rule to make target 'CFLAGS_ALL'`. Switching to find_rule_colon
# (which honours $()/${} nesting depth) makes the TSV split align with
# the actual rule colon GNU make sees, and musl's whole bootstrap goes
# green again.
#
# 1.1.5: three compatibility fixes needed by the package repo audit:
#   - gate GNU Make `--version` impersonation behind JMAKE_TEST_MODE=1,
#     otherwise identify as jmake.
#   - keep bare `:` rules so Ruby 3.4's generated yjit.mk does not trip
#     "missing separator" when YJIT is disabled.
#   - make implicit-rule selection prefer the first satisfiable shortest-
#     stem candidate while avoiding recursive self-selection loops
#     (reproduced on strace's generated headers).
#
# 1.1.4: fix $(wildcard) preserving a leading "./" without duplicating
# the directory prefix. Rust's glob crate drops only the leading "./",
# but jmake 1.1.3 re-prepended the full pattern prefix and turned
# "./src/*.h" into "./src/src/*.h". Reproduced building dropbear-2024.86
# and revalidated against the full GNU Make 4.4.1 suite (1340/1340).
#
# 1.1.3: fix TAB-indented variable assignments inside conditional blocks.
# Some upstream makefiles indent `VAR=...` under ifeq/ifndef with a TAB.
# GNU Make still treats those lines as assignments outside a recipe, but
# jmake 1.1.2 mis-classified them as recipe text unless a real recipe was
# already active. That let dropbear's build/install phases collapse to
# "Nothing to be done", producing empty .jpkg payloads.
#
# 1.1.2: fix two remaining GNU Make 4.4.1 suite regressions and make the
# Forgejo CI fail hard on any upstream test-suite miss:
#   - parallel multi-target pattern rules now propagate completion through
#     also-make siblings, so dependents waiting on implicit peer outputs
#     (SV 54233 / SV 60435) unblock in the correct order under -j.
#   - path-alias lookups only normalize explicit path-like rule names, so
#     bare targets like `all` no longer collide with same-named cwd entries
#     during VPATH resolution.
#
# 1.1.1: fix $(wildcard) re-prepending a doubled directory prefix
# when the glob crate strips the leading `./`. Pattern `./src/*.h`
# was coming back from glob as `src/agentfwd.h` and fn_wildcard
# unconditionally re-prepended the full `./src/` → `./src/src/
# agentfwd.h`. Reproduced building dropbear-2024.86 whose
# Makefile expands `$(wildcard $(srcdir)/*.h *.h)` with srcdir=./
# src and every resulting HEADERS entry came out doubled. Fix
# re-prepends only the portion glob actually dropped.
#
# 1.1.0: GNU Make 4.4.1 upstream test suite clean (1369/1369) on
# gentoo castle (bash). Four fixes landed vs 1.0.14:
#   - Accept TAB after directive keywords (include / -include /
#     sinclude) — dhcpcd's src/Makefile:12 and any BSD-convention
#     makefile. Previously errored with "missing separator".
#   - Split short-option clusters containing -c (e.g. -ec) into
#     separate argv tokens. POSIX toybox sh rejects `-ec` as a
#     combined option; permissive shells accept either form.
#   - Expand .SHELLFLAGS / SHELL before tokenizing. Raw
#     `.value.clone()` skipped Make variable expansion so `$$`
#     escapes survived into the child process (broke perl-as-SHELL
#     in targets/ONESHELL subtest 10).
#   - Narrow the bare-name exit-127 "Permission denied" path to
#     is_dir() specifically — `exists()` mis-fired on regular
#     files in cwd that weren't on PATH.
#
# 1.0.14: fix parallel-scheduler deadlock that hung the builder
# forever when a CC fails with -j>1 and -k is not set.

[source]
# Canonical source is the Forgejo repo jonerik/jmake on
# castle.great-morpho.ts.net:3000. That host is Tailscale-only, so
# builders should consume the cached tarball in /workspace/sources/
# via JPKG_SOURCE_CACHE instead of reaching for the network.
#
# Forgejo URL is Tailscale-only, so we point at a GitHub-hosted source
# mirror that CI can reach without VPN. The mirror tarball is generated
# from the same v1.1.6 tag at castle.great-morpho.ts.net:3000.
url = "https://github.com/stormj-UH/jonerix/releases/download/source-jmake-v1.1.7/jmake-v1.1.7.tar.gz"
sha256 = "7467e3ccd0b56dad8fa64a37787874c15243b8e21f0c528de361edb82b91ea52"

[build]
system = "custom"
# Rust 1.94.1-r2 uses llvm-libunwind=system, so library/unwind emits
# -lunwind instead of -lgcc_s. No cc-wrapper or gnu-compat dep needed.
# Source /etc/profile.d/cargo.sh so CARGO_HTTP_CAINFO is set (cargo's
# bundled libcurl needs the jonerix CA bundle path; jpkg build runs in a
# non-login shell so profile.d isn't auto-sourced).
build = """export CARGO_HTTP_CAINFO=/etc/ssl/certs/ca-certificates.crt
export OPENSSL_DIR=/
export OPENSSL_INCLUDE_DIR=/include
export OPENSSL_LIB_DIR=/lib
cargo build --release"""
install = """install -Dm755 target/release/jmake "$DESTDIR/bin/jmake"
llvm-strip --strip-all "$DESTDIR/bin/jmake" 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["rust"]
