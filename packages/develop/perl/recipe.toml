[package]
name = "perl"
version = "5.40.0"
license = "Artistic-2.0"
description = "Practical Extraction and Report Language"

[source]
url = "https://www.cpan.org/src/5.0/perl-5.40.0.tar.xz"
sha256 = "d5325300ad267624cb0b7d512cfdfcd74fa7fe00c455c5b51a6bd53e5e199ef9"

[build]
configure = """sh Configure -des \
  -Dprefix=/ \
  -Dvendorprefix=/ \
  -Dsiteprefix=/ \
  -Dscriptdir=/bin \
  -Uuseshrplib \
  -Duseithreads \
  -Dlibc=/lib/libc.so \
  -Dlibpth='/lib /usr/lib' \
  -Dusrinc='/include' \
  -Dman1dir=/share/man/man1 \
  -Dman3dir=/share/man/man3 \
  -Dinstallman1dir=/share/man/man1 \
  -Dinstallman3dir=/share/man/man3 \
  -Dsiteman1dir=none \
  -Dsiteman3dir=none \
  -Dvendorman1dir=none \
  -Dvendorman3dir=none \
  -Dinstallusrbinperl=n \
  -Ud_eaccess \
  -Dcc=clang \
  -Dld=clang \
  -Dar=llvm-ar \
  -Dranlib=llvm-ranlib \
  -Dccflags="$CFLAGS -fno-strict-aliasing -Wno-error=incompatible-function-pointer-types -DUSE_ITHREADS -D_REENTRANT" \
  -Dldflags="$LDFLAGS -rtlib=compiler-rt -fuse-ld=lld" \
  -Dlddlflags="-shared -O2 $LDFLAGS -rtlib=compiler-rt -fuse-ld=lld" \
  -Dccdlflags="-Wl,-E $LDFLAGS -rtlib=compiler-rt -fuse-ld=lld" \
  -Dd_sigaction='define' """

build = """jmake -j1 MAKEDEPEND=
# Manual regen for extensions that jmake may skip during parallel/bootstrap phases
cd cpan/IPC-SysV && ../../miniperl -I../../lib -I../../lib regen.pl && cd ../..
"""

# Perl's core extension bootstrap is order-sensitive under jmake. Keep the
install = """jmake install MAKEDEPEND= DESTDIR=$DESTDIR
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find "$DESTDIR/lib/perl5" \\( -name Config.pm -o -name Config_heavy.pl \\) -exec sed -i 's|/lib64|/lib|g' {} +
find "$DESTDIR" -maxdepth 1 -type f -name '*.0' -delete
if find "$DESTDIR" -maxdepth 1 -type f -name '*.0' | grep -q .; then
  echo "FATAL: perl install still produced root-level *.0 payload"
  exit 1
fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name '*.so*' -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang", "jmake"]
