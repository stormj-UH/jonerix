[package]
name = "byacc"
version = "20241231-r1"
license = "public domain"
description = "Berkeley Yacc parser generator"

[source]
url = "https://invisible-island.net/archives/byacc/byacc-20241231.tgz"
sha256 = "192c2fae048d4e7f514ba451627f9c4e612765099f819c19191f9fde3e609673"

[build]
system = "custom"
# Autoconf in jonerix needs: GREP env overrides, exproxide for
# /bin/expr probes, and ulimit -n raised (default 1024 too low for
# autoconf's fd churn).
build = """set -e
ulimit -n 65536 || true

GREP=/bin/grep EGREP="/bin/grep -E" FGREP="/bin/grep -F" \
  CFLAGS="-O2 -fomit-frame-pointer" \
  ./configure --prefix=/ --bindir=/bin CC=clang
make -j$(nproc)"""
install = """make DESTDIR=$DESTDIR install
# Flatten merged-usr / lib64 first so subsequent /bin/* probes see the
# canonical jonerix layout.
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
# byacc's `make install` writes the binary to $bindir/yacc. We want the
# real file at /bin/yacc and a one-way /bin/byacc -> yacc symlink. POSIX
# only — no `readlink -f` (GNU). Approach:
#   1. If /bin/yacc is a regular file: keep it, refresh /bin/byacc symlink.
#   2. Otherwise (it's a symlink, broken, or absent), look at /bin/byacc
#      for the real file and rename. Worst case neither is a real file —
#      surface a clear error rather than ship a broken package.
if [ -f "$DESTDIR/bin/yacc" ] && [ ! -L "$DESTDIR/bin/yacc" ]; then
    : # already canonical
elif [ -f "$DESTDIR/bin/byacc" ] && [ ! -L "$DESTDIR/bin/byacc" ]; then
    rm -f "$DESTDIR/bin/yacc"
    mv "$DESTDIR/bin/byacc" "$DESTDIR/bin/yacc"
else
    echo "byacc recipe: neither /bin/yacc nor /bin/byacc is a real file after make install" >&2
    ls -la "$DESTDIR/bin/" >&2
    exit 1
fi
chmod 0755 "$DESTDIR/bin/yacc"
ln -sf yacc "$DESTDIR/bin/byacc"
# Strip the binary; symlink is unaffected. Single -exec, POSIX find.
find "$DESTDIR/bin" -type f -exec llvm-strip --strip-all {} \\; 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang", "make", "exproxide"]
