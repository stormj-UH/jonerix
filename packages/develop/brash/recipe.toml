[package]
name = "brash"
version = "1.0.0-r1"
license = "MIT"
description = "Clean-room Rust reimplementation of bash 5.3 (MIT)"
# Canonical source-of-truth is the Forgejo repo jonerik/brash on
# castle.great-morpho.ts.net:3000 at tag v1.0.0
# (f0567f86563dc933c21d9b4885797fef82c586b5).
# That host sits behind Tailscale and GitHub's runners cannot reach it,
# so the tarball is mirrored to a stormj-UH GH release for CI.
#
# Brash is built from the same vendored Rust toolchain as jmake/stormwall.
# At install time we lay down /bin/brash and a /bin/bash → brash symlink
# so any package whose upstream scripts insist on bash can run them under
# brash without patching shebangs to /bin/mksh. This is what lets
# `core/toybox` drop its 0001-mksh-compat.patch and lets `develop/rust`
# stop reimplementing install.sh in pure mksh.

[source]
url = "https://github.com/stormj-UH/jonerix/releases/download/source-brash-v1.0.0/brash-1.0.0.tar.gz"
sha256 = "b3464c9db0a53d148e87e00ca21a256fd10a9555cf869ffae3254b46763d52f8"

[build]
system = "custom"
build = """set -e
export CARGO_HTTP_CAINFO=/etc/ssl/certs/ca-certificates.crt
export OPENSSL_DIR=/
export OPENSSL_INCLUDE_DIR=/include
export OPENSSL_LIB_DIR=/lib
cargo build --release --locked --bin brash
"""
install = """set -e
install -Dm755 target/release/brash "$DESTDIR/bin/brash"
# /bin/bash points at brash so upstream scripts whose shebang is
# `#!/bin/bash` (toybox's scripts/make.sh, rust's install.sh, et al)
# work unmodified. NEVER replace /bin/sh — that stays mksh.
ln -sf brash "$DESTDIR/bin/bash"
# /bin/rash is a brash convenience alias from upstream's Makefile.
ln -sf brash "$DESTDIR/bin/rash"
install -Dm644 LICENSE "$DESTDIR/share/licenses/brash/LICENSE"
llvm-strip --strip-all "$DESTDIR/bin/brash" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]
