[package]
name = "rustup"
version = "1.29.0-r1"
license = "MIT OR Apache-2.0"
description = "Rust toolchain manager (standalone rustup/rustup-init, no jpkg-owned proxy replacement)"

# rustup is packaged separately from the jpkg-managed `rust` toolchain. This
# package installs rustup and rustup-init only; it deliberately does not install
# rustc/cargo/rustdoc proxy names over the system compiler owned by `rust`.

[build]
system = "custom"
build = """
set -e

find_vendored_file() {
    want=$1
    oldifs=$IFS
    IFS=:
    for dir in ${JPKG_SOURCE_CACHE:-}; do
        [ -n "$dir" ] || continue
        if [ -f "$dir/$want" ]; then
            IFS=$oldifs
            printf '%s\n' "$dir/$want"
            return 0
        fi
    done
    IFS=$oldifs
    dir="$RECIPE_DIR/../../../sources"
    if [ -f "$dir/$want" ]; then
        printf '%s\n' "$dir/$want"
        return 0
    fi
    return 1
}

ARCH=$(uname -m)
if [ "$ARCH" = "aarch64" ]; then
    FILE="rustup-init-1.29.0-aarch64-unknown-linux-musl"
    SHA="88761caacddb92cd79b0b1f939f3990ba1997d701a38b3e8dd6746a562f2a759"
else
    FILE="rustup-init-1.29.0-x86_64-unknown-linux-musl"
    SHA="9cd3fda5fd293890e36ab271af6a786ee22084b5f6c2b83fd8323cec6f0992c1"
fi

RUSTUP_SRC=$(find_vendored_file "$FILE") || {
    printf '%s\n' "rustup: missing vendored $FILE" >&2
    exit 1
}
cp "$RUSTUP_SRC" rustup-init
printf '%s  rustup-init\n' "$SHA" | sha256sum -c

install -d "$DESTDIR/bin" "$DESTDIR/etc/profile.d" "$DESTDIR/share/doc/rustup" "$DESTDIR/share/rustup"
install -m 0755 rustup-init "$DESTDIR/bin/rustup-init"
install -m 0755 rustup-init "$DESTDIR/bin/rustup"

cat > "$DESTDIR/etc/profile.d/rustup.sh" <<'PROF'
# /etc/profile.d/rustup.sh - rustup user environment.
#
# rustup installs per-user toolchains under $RUSTUP_HOME and proxy commands
# under $CARGO_HOME/bin. The jpkg package deliberately does not install those
# proxies into /bin, because /bin/rustc, /bin/cargo, /bin/rustdoc, and
# /bin/rustfmt are owned by jpkg-managed packages.
if [ -n "${HOME:-}" ]; then
    : "${RUSTUP_HOME:=$HOME/.rustup}"
    : "${CARGO_HOME:=$HOME/.cargo}"
    export RUSTUP_HOME CARGO_HOME

    case ":${PATH:-}:" in
        *":$CARGO_HOME/bin:"*) ;;
        *) [ -d "$CARGO_HOME/bin" ] && PATH="$CARGO_HOME/bin${PATH:+:$PATH}" ;;
    esac
    export PATH
fi
PROF
chmod 0644 "$DESTDIR/etc/profile.d/rustup.sh"

cat > "$DESTDIR/share/rustup/default-settings.toml" <<'CFG'
# /share/rustup/default-settings.toml - suggested rustup-init answers.
#
# This file is documentation/a template. It is not consumed automatically by
# jpkg and is not copied into user homes.
#
# Conservative jonerix defaults:
#   default_toolchain = "stable"
#   profile = "minimal"
#   modify_path = false
#
# `profile = "minimal"` avoids surprise downloads of optional tools and docs.
# Install extra upstream components explicitly, for example:
#   rustup component add rustfmt clippy rust-src
#
# `modify_path = false` keeps rustup-init from editing shell startup files.
# jpkg already ships /etc/profile.d/rustup.sh, which exports RUSTUP_HOME and
# CARGO_HOME and prepends $CARGO_HOME/bin only after rustup creates it.
#
# Do not set dist_server/update_root unless jonerix publishes a rustup channel
# mirror. The jpkg-managed system compiler remains the jonerix toolchain;
# rustup-managed toolchains are per-user upstream Rust toolchains.
default_toolchain = "stable"
profile = "minimal"
modify_path = false
CFG
chmod 0644 "$DESTDIR/share/rustup/default-settings.toml"

cat > "$DESTDIR/share/doc/rustup/JONERIX.md" <<'DOC'
# rustup on jonerix

This package installs only `rustup` and `rustup-init`. It does not install
rustup's proxy names (`rustc`, `cargo`, `rustdoc`, `rustfmt`, and related
tools), because those paths are owned by jpkg packages such as `rust`,
`rustdoc`, and `rustfmt`.

Use this package when a user wants rustup-managed toolchains in their home
directory. The system compiler remains the jpkg-managed jonerix toolchain.

The package also ships:

* `/etc/profile.d/rustup.sh` - sets `RUSTUP_HOME` and `CARGO_HOME`, then adds
  `$CARGO_HOME/bin` to `PATH` only after that directory exists.
* `/share/rustup/default-settings.toml` - a conservative rustup-init template:
  upstream `stable`, `profile = "minimal"`, and `modify_path = false`.

`rustup default stable` installs upstream Rust toolchains, not the jpkg-managed
`*-jonerix-linux-musl` system toolchain.
DOC
chmod 0644 "$DESTDIR/share/doc/rustup/JONERIX.md"

[ -x "$DESTDIR/bin/rustup" ] || {
    printf '%s\n' "rustup: install did not produce /bin/rustup" >&2
    exit 1
}
[ -x "$DESTDIR/bin/rustup-init" ] || {
    printf '%s\n' "rustup: install did not produce /bin/rustup-init" >&2
    exit 1
}
"""
install = ""

[hooks]
post_install = """# ensure /etc/profile sources /etc/profile.d
profile_root=${JPKG_ROOT:-}
case "$profile_root" in
    ""|"/") profile=/etc/profile ;;
    *) profile=$profile_root/etc/profile ;;
esac

if [ -f "$profile" ] && ! grep -q "/etc/profile.d" "$profile" 2>/dev/null; then
    cat >> "$profile" <<'PROF'

# --- /etc/profile.d (added by rustup jpkg) ---
if [ -d /etc/profile.d ]; then
    for f in /etc/profile.d/*.sh; do
        [ -r "$f" ] && . "$f"
    done
fi
PROF
fi
"""

[depends]
runtime = ["musl"]
build = []
