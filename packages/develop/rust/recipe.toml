[package]
name = "rust"
version = "1.95.0"
license = "MIT"
description = "Systems programming language (jonerix-linux-musl triple, no GNU runtime)"

# No [source] section: the build step consumes the arch-appropriate
# vendored dist tarball (self-built, jonerix-linux-musl triple) and
# verifies its sha256.
# 1.95.0 dist tarballs are built by .github/workflows/rust-dist.yml,
# uploaded to the source-rust-v1.95.0 release, and vendored into
# sources/ for offline-CI consumption. Build config: link-shared LLVM
# (libllvm jpkg), llvm-libunwind = system, -fuse-ld=lld,
# --rtlib=compiler-rt, --unwindlib=libunwind, -stdlib=libc++. Zero
# GCC runtime dependency in the produced rustc/cargo. Developer tools that are
# useful but not required for compiler-only installs are split into sibling
# packages: rustdoc, rustfmt, and rustup.

[build]
system = "custom"
build = """
find_vendored_file() {
    want=$1
    oldifs=$IFS
    IFS=:
    for dir in ${JPKG_SOURCE_CACHE:-}; do
        [ -n "$dir" ] || continue
        if [ -f "$dir/$want" ]; then
            IFS=$oldifs
            printf '%s\n' "$dir/$want"
            return 0
        fi
    done
    IFS=$oldifs
    dir="$RECIPE_DIR/../../../sources"
    if [ -f "$dir/$want" ]; then
        printf '%s\n' "$dir/$want"
        return 0
    fi
    return 1
}

ARCH=$(uname -m)
if [ "$ARCH" = "aarch64" ]; then
  FILE="rust-1.95.0-aarch64-jonerix-linux-musl.tar.gz"
  # 800cb1c2... = the patched 1.95.0 build that registers
  # aarch64-jonerix-linux-musl as a builtin target (so stable rustc
  # doesn't bail on "could not find specification for target") and
  # ships the "(jonerix)" version tag instead of the upstream default
  # "(built from a source tarball)".  See rust-dist.yml commits
  # 4c94edb5 (target patch + description) + 00413512 (deny-warnings).
  SHA="800cb1c2a0fb59a3843f1e6e284cd93f31dbbc8ac21b1a0c98296cdb2c166e08"
  TRIPLE="aarch64-jonerix-linux-musl"
else
  FILE="rust-1.95.0-x86_64-jonerix-linux-musl.tar.gz"
  # 111b75d1... = the patched 1.95.0 build, matching aarch64's
  # 800cb1c2... above.  See recipe.toml history + rust-dist commits
  # 4c94edb5 + 00413512.
  SHA="111b75d1a0bb41a30abcc45a44e38dfa577c27f12c91361f16a40246a437f2fe"
  TRIPLE="x86_64-jonerix-linux-musl"
fi

RUST_SRC=$(find_vendored_file "$FILE") || {
  printf '%s\n' "rust: missing vendored $FILE" >&2
  exit 1
}
cp "$RUST_SRC" rust.tar.gz
printf '%s  rust.tar.gz\n' "$SHA" | sha256sum -c
tar xf rust.tar.gz --strip-components=1

# Component install — prefer upstream's install.sh under brash if
# /bin/bash is present (brash provides full bash 5.3 surface). Falls
# back to the pure-mksh manual loop when brash hasn't built yet (first-
# pass bootstrap). The fallback mirrors install.sh: it copies bin/, lib/,
# etc/ and share/ from each component into DESTDIR.
if [ -x /bin/bash ] && [ -x install.sh ]; then
    echo "rust: installing via upstream install.sh under brash (/bin/bash)"
    /bin/bash ./install.sh \
        --prefix="$DESTDIR" \
        --components="rustc,rust-std-${TRIPLE},cargo" \
        --disable-ldconfig
else
    echo "rust: brash unavailable — using mksh manual component install"
    for comp in rustc rust-std-${TRIPLE} cargo; do
        compdir="$comp"
        [ -d "$compdir" ] || { echo "missing component: $compdir"; exit 1; }
        for d in bin lib etc share; do
            if [ -d "$compdir/$d" ]; then
                mkdir -p "$DESTDIR/$d"
                cp -a "$compdir/$d/." "$DESTDIR/$d/"
            fi
        done
    done
fi

# --- /etc/cargo/config.toml: jonerix-wide cargo defaults ---
# Cargo doesn't auto-load files from /etc/cargo (it only walks
# .cargo/config.toml from the workspace upward, plus the per-user
# $CARGO_HOME/config.toml), so this file isn't picked up on its own.
# Per-user configs include it via:
#   include = ["/etc/cargo/config.toml"]
# That makes /etc/cargo/config.toml the single editable source of
# truth for system-wide cargo defaults: TLS via the system CA bundle,
# openssl-sys env pointing at LibreSSL, git-fetch-with-cli to keep
# build chains off libgit2 (and its transitive openssl-sys dep).
#
# This is the cargo-side equivalent of /etc/clang/<triple>.cfg —
# plain text, edit-in-place, jpkg-owned (re-applied on upgrade).
# User-specific overrides go in ~/.cargo/config.toml AFTER the
# include line so they win.
install -d "$DESTDIR/etc/cargo"
cat > "$DESTDIR/etc/cargo/config.toml" <<'CFG'
# /etc/cargo/config.toml — jonerix system-wide cargo defaults.
#
# Loaded indirectly: per-user /root/.cargo/config.toml and
# /home/*/.cargo/config.toml carry an `include = ["/etc/cargo/config.toml"]`
# line that pulls these defaults into every cargo invocation. To override
# any of these, append the override to ~/.cargo/config.toml AFTER the
# include line — later sections in the merged config win.

[http]
# cargo's HTTPS client (used for crates.io downloads, registry lookups,
# git+https deps) honors a CA bundle via this config key. Without it,
# every `cargo fetch` errors with:
#   [60] SSL peer certificate or SSH remote key was not OK
#     (SSL certificate problem: unable to get local issuer certificate)
# because cargo's bundled libcurl has no compiled-in CA path.
cainfo = "/etc/ssl/certs/ca-certificates.crt"

[net]
# IMPORTANT: stay on cargo's built-in libgit2 fetcher (the default).
# jonerix's `git` is gitredoxide (drop-in /bin/git replacement), which
# implements 43 Git commands including clone/fetch/pull/push, but
# cargo's libgit2 fetcher is still preferred for offline/vendored builds.
# libgit2 itself is permissive (MIT-style with linking exception), so
# staying off the CLI shell-out keeps us inside the license envelope.
git-fetch-with-cli = false

[env]
# openssl-sys's pkg-config-free fallback uses these env vars to locate
# OpenSSL / LibreSSL headers + libs. jonerix ships LibreSSL with the
# merged-/usr layout (headers /include, libs /lib), so /=root works.
# Cargo applies this [env] table to subprocesses it spawns (build.rs,
# proc macros, rustc) — that's the only context where openssl-sys
# detection runs.
OPENSSL_DIR         = "/"
OPENSSL_INCLUDE_DIR = "/include"
OPENSSL_LIB_DIR     = "/lib"

# pkg-config probes cross-compile cleanly on jonerix (single-arch host).
# Some build.rs files refuse to call pkg-config without this when they
# detect a "cross-compile" because they see CARGO_CFG_TARGET_ARCH set.
PKG_CONFIG_ALLOW_CROSS = "1"
CFG
chmod 0644 "$DESTDIR/etc/cargo/config.toml"

# --- /etc/profile.d/cargo.sh: shell env for non-cargo openssl users ---
# /etc/cargo/config.toml's [env] table only applies inside cargo
# subprocesses. For shell users running raw ./configure / pkg-config /
# openssl directly (i.e. NOT through cargo), the env vars need to be
# in the login environment. Keep this fragment as a thin compat layer.
install -d "$DESTDIR/etc/profile.d"
cat > "$DESTDIR/etc/profile.d/cargo.sh" <<'PROF'
# /etc/profile.d/cargo.sh — jonerix openssl-sys env (shipped by rust jpkg).
# Inside cargo invocations, /etc/cargo/config.toml's [env] table covers
# the same ground; these exports are for shell + non-cargo build tools.
export CARGO_HTTP_CAINFO="/etc/ssl/certs/ca-certificates.crt"
export OPENSSL_DIR="/"
export OPENSSL_INCLUDE_DIR="/include"
export OPENSSL_LIB_DIR="/lib"
PROF
chmod 0644 "$DESTDIR/etc/profile.d/cargo.sh"

# --- per-user cargo config: include the system-wide file, no more ---
# Cargo's config-file walk reaches user $HOME/.cargo/config.toml but
# not /etc/cargo/config.toml. Each per-user config is a one-liner that
# pulls in the system defaults via cargo's `include` directive
# (stabilised in cargo 1.84 — well below our 1.94 floor). Users can
# add their own overrides AFTER the include so user config wins.
install -d "$DESTDIR/root/.cargo"
cat > "$DESTDIR/root/.cargo/config.toml" <<'CFG'
# /root/.cargo/config.toml — shipped by the rust jpkg.
# Pulls in /etc/cargo/config.toml (system-wide jonerix defaults).
# Add your overrides below the include line; they win against the
# system config on conflict.
include = ["/etc/cargo/config.toml"]
CFG

# --- skeleton copy for new users ---
# Write directly into /share/ — jonerix is merged-usr-flat, so the
# /usr/share/ → /share/ flatten round-trip below was just paperwork.
install -d "$DESTDIR/share/rust/skel/.cargo"
install -m 0644 "$DESTDIR/root/.cargo/config.toml" "$DESTDIR/share/rust/skel/.cargo/config.toml"

# Flat-layout cleanup: merge any stray /usr or /lib64 into /.
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi

# Keep optional developer tools in their own jpkgs even if a future Rust dist
# puts them inside the rustc/cargo component directories.
rm -f "$DESTDIR/bin/rustdoc" "$DESTDIR/bin/rustfmt" "$DESTDIR/bin/cargo-fmt" 2>/dev/null || true
"""
install = ""

[hooks]
# Make sure /etc/profile actually sources /etc/profile.d/*.sh (the
# jonerix base /etc/profile didn't always), and seed any existing
# non-system user homes with the cargo skeleton so non-root cargo
# runs pick up the CA bundle too.
post_install = """# ensure /etc/profile sources /etc/profile.d
if [ -f /etc/profile ] && ! grep -q "/etc/profile.d" /etc/profile 2>/dev/null; then
    cat >> /etc/profile <<'PROF'

# --- /etc/profile.d (added by rust jpkg) ---
if [ -d /etc/profile.d ]; then
    for f in /etc/profile.d/*.sh; do
        [ -r "$f" ] && . "$f"
    done
fi
PROF
fi

# Seed / migrate per-user cargo configs:
#
#   * No ~/.cargo/config.toml yet: drop the skel (one-liner that
#     includes /etc/cargo/config.toml).
#   * Has a config but doesn't reference /etc/cargo/config.toml:
#     prepend the `include` line so the user picks up the system
#     defaults without losing their custom edits. A backup of the
#     pre-migration file is written to .cargo/config.toml.bak-<date>
#     in case the user wants to roll back.
#   * Already has the `include` line: leave it alone.
SYSTEM_INCLUDE='include = ["/etc/cargo/config.toml"]'
if [ -d /home ]; then
    for home in /home/*; do
        [ -d "$home" ] || continue
        user=$(basename "$home")
        id -u "$user" >/dev/null 2>&1 || continue
        cfg="$home/.cargo/config.toml"
        if [ ! -f "$cfg" ]; then
            install -d "$home/.cargo"
            cp /usr/share/rust/skel/.cargo/config.toml "$cfg"
            chown -R "$user:$user" "$home/.cargo" 2>/dev/null || true
            continue
        fi
        if grep -qF "/etc/cargo/config.toml" "$cfg" 2>/dev/null; then
            continue
        fi
        bak="$cfg.bak-$(date +%Y%m%d%H%M%S)"
        cp -p "$cfg" "$bak"
        {
            printf '%s\n' "$SYSTEM_INCLUDE"
            printf '\n'
            cat "$cfg"
        } > "$cfg.tmp" && mv "$cfg.tmp" "$cfg"
        chown "$user:$user" "$cfg" "$bak" 2>/dev/null || true
    done
fi
exit 0"""

[depends]
runtime = ["musl", "libcxx", "libllvm"]
build = []
