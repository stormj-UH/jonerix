[package]
name = "llvm"
version = "21.1.2-r7"
license = "Apache-2.0"
description = "LLVM toolchain metapackage (pulls in libllvm + clang + lld, installs POSIX tool symlinks)"

# r7: rev-bump for the full-default-target LLVM 21 split rebuild.
# r6: converted from monolithic source build to metapackage.
# The actual build is now split across three packages:
#   libllvm  — LLVM core (libLLVM-21.so, headers, cmake configs, llvm-* tools)
#   clang    — clang compiler + compiler-rt builtins + /etc/clang configs
#   lld      — LLD linker
#
# This metapackage depends on all three and installs the traditional
# POSIX-name symlinks (cc, c++, ld, ar, nm, ranlib, strip, etc.) that
# point to the LLVM tools. Packages that list "llvm" as a dependency
# continue to work without changes.
#
# Previous versions (r1-r5) built LLVM + clang + lld + lldb monolithically
# from source. That 300-line build took 2-3 hours per architecture because
# LLVM was rebuilt every time clang or lld needed a patch. With the split,
# only the changed component rebuilds — and rust can use llvm-config to
# skip its own LLVM build entirely.

# No [source] — nothing to fetch; this is a metapackage.

[build]
system = "custom"
build = """
set -e

# Verify that the split packages are installed.
[ -x /bin/clang ] || { echo "llvm: /bin/clang not found (install clang first)"; exit 1; }
[ -x /bin/ld.lld ] || { echo "llvm: /bin/ld.lld not found (install lld first)"; exit 1; }
[ -x /bin/llvm-ar ] || { echo "llvm: /bin/llvm-ar not found (install libllvm first)"; exit 1; }

# POSIX-name symlinks — these let plain `cc`, `ar`, `strip` etc.
# resolve to the LLVM tools without every Makefile needing explicit
# CC=clang overrides.
mkdir -p "$DESTDIR/bin"
ln -sf clang       "$DESTDIR/bin/cc"
ln -sf clang++     "$DESTDIR/bin/c++"
ln -sf ld.lld      "$DESTDIR/bin/ld"
ln -sf llvm-ar     "$DESTDIR/bin/ar"
ln -sf llvm-nm     "$DESTDIR/bin/nm"
ln -sf llvm-ranlib "$DESTDIR/bin/ranlib"
ln -sf llvm-strip  "$DESTDIR/bin/strip"
ln -sf llvm-objcopy  "$DESTDIR/bin/objcopy"
ln -sf llvm-objdump  "$DESTDIR/bin/objdump"
"""
install = ""

[depends]
runtime = ["libllvm", "clang", "lld"]
build = []
