[package]
name = "python3"
version = "3.14.3-r6"
license = "PSF-2.0"
description = "Python programming language interpreter"

[source]
url = "https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tar.xz"
sha256 = "a97d5549e9ad81fe17159ed02c68774ad5d266c72f8d9a0b5a9c371fe85d902b"

[build]
system = "custom"
configure = """mkdir -p .jpkg-tools
printf '#!/bin/sh\nexec cmp -s "$@"\n' > .jpkg-tools/diff
chmod 755 .jpkg-tools/diff
sed -i 's/X509_VERIFY_PARAM_get_hostflags(ssl_verification_params)/0 \/* LibreSSL lacks get_hostflags *\//' Modules/_ssl.c
PATH="$PWD/.jpkg-tools:$PATH" \
  CFLAGS="$CFLAGS -I/include/ncursesw" \
  CC=clang CXX=clang++ ./configure \
  --prefix=/usr \
  --enable-shared \
  --with-ensurepip=no \
  --with-openssl=/ \
  --disable-test-modules"""
# --prefix=/usr (not /) because Python 3.14's bootstrap chokes on
# sys.prefix='' during _bootstrap_python → site.py import:
#   AttributeError: module 'sys' has no attribute 'prefix'
# On jonerix, /usr is a symlink to / (merged-usr), so paths like
# /usr/lib/python3.14/ resolve to /lib/python3.14/ at runtime. The
# install step below flattens the $DESTDIR/usr/ tree into $DESTDIR/
# so the jpkg contains paths rooted at /bin, /lib, /include, etc.
# This also fixes a class of `pip install` errors caused by sys.prefix
# being `/` (pip's file-path prefix check gets confused by double-
# slashes and reports "trying to install outside target directory").
# Force mksh for make's $(SHELL): Python 3.14's Makefile rules
# (check-app-store-compliance at line 974, check-clean-src at 956,
# python-gdb.py at 1193) use shell if/then syntax that toybox sh
# (the jonerix builder's default /bin/sh) can't parse — "syntax
# error: unexpected 'then'". mksh handles it cleanly.
#
# -j1 (serial): jmake 1.0.2's parallel scheduler deadlocks on
# Python 3.14's build graph — all worker threads end up blocked in
# futex_wait_queue after ~60 seconds of compilation with no forward
# progress. Reproduced locally in ghcr.io/stormj-uh/jonerix:
# builder-arm64 on 2026-04-17. -j1 completes cleanly. This is ~4x
# slower but reliable; revisit once jmake scheduler bug is fixed.
build = "make -j1 SHELL=/bin/mksh"
install = """make install DESTDIR=$DESTDIR SHELL=/bin/mksh
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
# NOTE: ensurepip is deliberately disabled at configure (--with-
# ensurepip=no) and moved to [hooks].post_install. Running it during
# build hangs on Python 3.14 when $DESTDIR/bin/python3's landmark-
# based sys.prefix detection walks into the staging tree (repro:
# 2026-04-17, run 24545778801 froze for 2+ min with no output after
# `make install` emitted libpython install commands, had to be
# cancelled). Running on the target system post-install sidesteps
# the issue entirely since sys.prefix is cleanly /usr.
find "$DESTDIR" -type f -name '*.py' -exec grep -l '/lib64' {} + 2>/dev/null | while read f; do sed -i 's|/lib64|/lib|g' "$f"; done
# Stale python packages bundled shared libs that already belong to other
# runtime packages; drop any duplicates from the staged payload.
rm -f "$DESTDIR"/lib/libbz2.so* \
      "$DESTDIR"/lib/libexpat.so* \
      "$DESTDIR"/lib/libffi.so* \
      "$DESTDIR"/lib/liblzma.so* \
      "$DESTDIR"/lib/libncursesw.so* \
      "$DESTDIR"/lib/libpanelw.so* \
      "$DESTDIR"/lib/libreadline.so* \
      "$DESTDIR"/lib/libstdc++.so*
ln -sf python3 $DESTDIR/bin/python 2>/dev/null || true
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name '*.so*' -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[hooks]
# ensurepip runs on the target at install time (not during build)
# to avoid the $DESTDIR/bin/python3 sys.prefix landmark-walk hang
# we hit on 3.14 with --prefix=/usr. On the target, sys.prefix is
# cleanly /usr (via /usr/lib/python3.14/ landmark) and the bundled
# pip wheel installs correctly.
#
# Pip's console scripts (pip, pip3, pip3.14) get shebanged with the
# real /bin/python3 path by default — no post-install sed needed.
post_install = """if [ -x /bin/python3 ]; then
    /bin/python3 -m ensurepip --upgrade --default-pip 2>&1 || true
    # Ensure /bin/pip -> pip3 symlink.
    [ -e /bin/pip ] || ln -sf pip3 /bin/pip
fi
exit 0"""

post_remove = """# Leave pip scripts in place — user may have installed things via pip.
# They can be cleaned up manually: rm /bin/pip{,3,3.14}
exit 0"""

[depends]
runtime = ["musl", "zlib", "zstd", "ncurses", "libressl", "xz", "libffi"]
build = ["clang", "libffi"]
