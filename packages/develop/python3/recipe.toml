[package]
name = "python3"
version = "3.14.3-r3"
license = "PSF-2.0"
description = "Python programming language interpreter"

[source]
url = "https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tar.xz"
sha256 = "a97d5549e9ad81fe17159ed02c68774ad5d266c72f8d9a0b5a9c371fe85d902b"

[build]
system = "custom"
configure = """mkdir -p .jpkg-tools
printf '#!/bin/sh\nexec cmp -s "$@"\n' > .jpkg-tools/diff
chmod 755 .jpkg-tools/diff
sed -i 's/X509_VERIFY_PARAM_get_hostflags(ssl_verification_params)/0 \/* LibreSSL lacks get_hostflags *\//' Modules/_ssl.c
PATH="$PWD/.jpkg-tools:$PATH" \
  CFLAGS="$CFLAGS -I/include/ncursesw" \
  CC=clang CXX=clang++ ./configure \
  --prefix=/ \
  --enable-shared \
  --with-ensurepip=install \
  --with-openssl=/ \
  --disable-test-modules"""
# Force mksh for make's $(SHELL): Python 3.14's Makefile rules
# (check-app-store-compliance at line 974, check-clean-src at 956,
# python-gdb.py at 1193) use shell if/then syntax that toybox sh
# (the jonerix builder's default /bin/sh) can't parse — "syntax
# error: unexpected 'then'". mksh handles it cleanly. Reproduced
# 2026-04-17 (Python 3.14.3 x86_64 aarch64).
build = "make -j$(nproc) SHELL=/bin/mksh"
install = """make install DESTDIR=$DESTDIR SHELL=/bin/mksh
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
LD_LIBRARY_PATH="$DESTDIR/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" \
  "$DESTDIR/bin/python3" -m ensurepip --upgrade --default-pip
# ensurepip writes pip's shebang from sys.executable of whatever
# python it runs under, which at this point is $DESTDIR/bin/python3.
# The resulting scripts ship with #!/tmp/jpkg-build-python3-XX/dest/
# bin/python3 shebangs that point at the build-time staging path —
# when installed, pip errors with "No such file or directory"
# because the interpreter path no longer exists. Reproduced on
# jonerix-tormenta 2026-04-16. Rewrite all /tmp/jpkg-build-* shebangs
# under $DESTDIR to #!/bin/<basename>. Covers pip, pip3, pip3.14,
# and any other ensurepip-installed console scripts.
find "$DESTDIR" -type f | while read -r f; do
    head1=$(head -1 "$f" 2>/dev/null) || continue
    case "$head1" in
        "#!/tmp/jpkg-build-"*)
            interp=$(printf '%s\n' "$head1" | sed -E 's|^#!/tmp/jpkg-build[^/]*/dest/bin/||' | awk '{print $1}')
            [ -n "$interp" ] || continue
            sed -i "1s|^#!.*|#!/bin/$interp|" "$f"
            ;;
    esac
done
find "$DESTDIR" -type f -name '*.py' -exec grep -l '/lib64' {} + 2>/dev/null | while read f; do sed -i 's|/lib64|/lib|g' "$f"; done
# Stale python packages bundled shared libs that already belong to other
# runtime packages; drop any duplicates from the staged payload.
rm -f "$DESTDIR"/lib/libbz2.so* \
      "$DESTDIR"/lib/libexpat.so* \
      "$DESTDIR"/lib/libffi.so* \
      "$DESTDIR"/lib/liblzma.so* \
      "$DESTDIR"/lib/libncursesw.so* \
      "$DESTDIR"/lib/libpanelw.so* \
      "$DESTDIR"/lib/libreadline.so* \
      "$DESTDIR"/lib/libstdc++.so*
ln -sf python3 $DESTDIR/bin/python 2>/dev/null || true
ln -sf pip3 $DESTDIR/bin/pip 2>/dev/null || true
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name '*.so*' -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl", "zlib", "zstd", "ncurses", "libressl", "xz", "libffi"]
build = ["clang", "libffi"]
