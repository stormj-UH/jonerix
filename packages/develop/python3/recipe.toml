[package]
name = "python3"
version = "3.14.5"
license = "PSF-2.0"
description = "Python programming language interpreter (computed-gotos, with _bz2)"

[source]
url = "https://www.python.org/ftp/python/3.14.5/Python-3.14.5.tar.xz"
sha256 = "7e32597b99e5d9a39abed35de4693fa169df3e5850d4c334337ffd6a19a36db6"

[build]
system = "custom"
# 3.14.5 (2026-05-10): bumped from 3.14.3-r10.
#   --with-computed-gotos   → faster CPython interpreter dispatch via
#                             threaded code (clang accepts label-as-value
#                             extension). Default-on with clang/gcc but
#                             explicit pin keeps the choice intentional.
#   --enable-loadable-sqlite-extensions → lets the _sqlite3 stdlib module
#                             load extension .so files (e.g. SQLean).
#                             No runtime cost when not used.
#
# --enable-optimizations (PGO) + --with-lto=full are NOT enabled yet
# because:
#   1. PGO instrumented build needs jmake ≥ 1.2.2 (the multi-rule prereq
#      merge bug in 1.2.1 made Python's Makefile pass header files as
#      compile inputs).  builder image still ships 1.2.1; rebuild image
#      + bump jmake build-dep here before turning PGO back on.
#   2. PGO link step needs `libclang_rt.profile.a` at
#      /lib/clang/21/lib/aarch64-jonerix-linux-musl/, but llvm-extra
#      installs it under /lib/clang/21/lib/linux/ (clang's default
#      "unknown" triple path).  Either the llvm-extra recipe needs to
#      ship profile.a in the per-triple dir, or we symlink at install
#      time, or python configure needs --with-clang-rt-profile-path.
# Re-enable both once those two blockers land — gives ~15-30% Python
# perf for free.
configure = """mkdir -p .jpkg-tools
printf '#!/bin/sh\nexec cmp -s "$@"\n' > .jpkg-tools/diff
chmod 755 .jpkg-tools/diff
sed -i 's/X509_VERIFY_PARAM_get_hostflags(ssl_verification_params)/0 \/* LibreSSL lacks get_hostflags *\//' Modules/_ssl.c
PATH="$PWD/.jpkg-tools:$PATH" \
  CFLAGS="$CFLAGS -I/include/ncursesw" \
  CC=clang CXX=clang++ ./configure \
  --prefix=/usr \
  --enable-shared \
  --with-computed-gotos \
  --enable-loadable-sqlite-extensions \
  --with-ensurepip=no \
  --with-openssl=/ \
  --disable-test-modules"""
# r4 (2026-04-27): dropped LIBSQLITE3_/LIBLZMA_/LIBBZIP2_CFLAGS/LIBS env-var
# overrides. They were short-circuits for Python's PKG_CHECK_MODULES probe
# back when jonerix had no pkgconf and the .pc files weren't shipped. Both
# conditions are now resolved: pkgconf is a build-dep (see [depends].build
# below) and the sqlite/xz/bzip2 recipes ship sqlite3.pc, liblzma.pc, and
# bzip2.pc respectively. configure now finds them via the regular
# pkg-config probe and the manual env-var bypass is no longer needed.
# --prefix=/usr (not /) because Python 3.14's bootstrap chokes on
# sys.prefix='' during _bootstrap_python → site.py import:
#   AttributeError: module 'sys' has no attribute 'prefix'
# On jonerix, /usr is a symlink to / (merged-usr), so paths like
# /usr/lib/python3.14/ resolve to /lib/python3.14/ at runtime. The
# install step below flattens the $DESTDIR/usr/ tree into $DESTDIR/
# so the jpkg contains paths rooted at /bin, /lib, /include, etc.
# This also fixes a class of `pip install` errors caused by sys.prefix
# being `/` (pip's file-path prefix check gets confused by double-
# slashes and reports "trying to install outside target directory").
# Force mksh for make's $(SHELL): Python 3.14's Makefile rules
# (check-app-store-compliance at line 974, check-clean-src at 956,
# python-gdb.py at 1193) use shell if/then syntax that toybox sh
# (the jonerix builder's default /bin/sh) can't parse — "syntax
# error: unexpected 'then'". mksh handles it cleanly.
#
# Full parallelism restored after jmake 1.0.4 fixed a pattern-rule
# lookup blowup (find_pattern_rule was called 1038× on the same header
# with no memoization, making `make install` hang on Python 3.14's
# thousands of header prereqs). ci-build-*.sh force-installs jmake
# from the INDEX to guarantee the builder has 1.0.4+.
build = "make -j$(nproc) SHELL=/bin/mksh"
install = """make install DESTDIR=$DESTDIR SHELL=/bin/mksh
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
# NOTE: ensurepip is deliberately disabled at configure (--with-
# ensurepip=no) and moved to [hooks].post_install. Running it during
# build hangs on Python 3.14 when $DESTDIR/bin/python3's landmark-
# based sys.prefix detection walks into the staging tree (repro:
# 2026-04-17, run 24545778801 froze for 2+ min with no output after
# `make install` emitted libpython install commands, had to be
# cancelled). Running on the target system post-install sidesteps
# the issue entirely since sys.prefix is cleanly /usr.
find "$DESTDIR" -type f -name '*.py' -exec grep -l '/lib64' {} + 2>/dev/null | while read f; do sed -i 's|/lib64|/lib|g' "$f"; done
# Stale python packages bundled shared libs that already belong to other
# runtime packages; drop any duplicates from the staged payload so the
# jpkg we ship doesn't conflict with the authoritative packages.
# libbz2 now genuinely comes from the `bzip2` jpkg; if python's install
# step copies one into staging we still want the bzip2 package's
# version on disk instead.
rm -f "$DESTDIR"/lib/libbz2.so* \
      "$DESTDIR"/lib/libexpat.so* \
      "$DESTDIR"/lib/libffi.so* \
      "$DESTDIR"/lib/liblzma.so* \
      "$DESTDIR"/lib/libncursesw.so* \
      "$DESTDIR"/lib/libpanelw.so* \
      "$DESTDIR"/lib/libreadline.so* \
      "$DESTDIR"/lib/libstdc++.so*
ln -sf python3 $DESTDIR/bin/python 2>/dev/null || true
# Verify optional stdlib modules that we depend on at later build
# steps (or that downstream recipes silently expect). A missing
# _bz2 took out the node 24 build in April 2026 — fail loud here
# instead of shipping a half-broken interpreter.
python_mod_check() {
    local name=$1
    if ! find "$DESTDIR/lib/python3.14/lib-dynload" -name "${name}*.so" 2>/dev/null | grep -q .; then
        echo "ERROR: python3 built without ${name} module" >&2
        return 1
    fi
}
python_mod_check _bz2     || exit 1
python_mod_check _lzma    || exit 1
python_mod_check _sqlite3 || exit 1
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name '*.so*' -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[hooks]
# ensurepip runs on the target at install time (not during build)
# to avoid the $DESTDIR/bin/python3 sys.prefix landmark-walk hang
# we hit on 3.14 with --prefix=/usr. On the target, sys.prefix is
# cleanly /usr (via /usr/lib/python3.14/ landmark) and the bundled
# pip wheel installs correctly.
#
# Pip's console scripts (pip, pip3, pip3.14) get shebanged with the
# real /bin/python3 path by default — no post-install sed needed.
post_install = """if [ -x /bin/python3 ]; then
    /bin/python3 -m ensurepip --upgrade --default-pip 2>&1 || true
    # Ensure /bin/pip -> pip3 symlink.
    [ -e /bin/pip ] || ln -sf pip3 /bin/pip
fi
exit 0"""

post_remove = """# Leave pip scripts in place — user may have installed things via pip.
# They can be cleaned up manually: rm /bin/pip{,3,3.14}
exit 0"""

[depends]
# sqlite added in 3.14.3-r8 so the `_sqlite3` stdlib module gets built.
# Needed by AWS CLI v2 and anything else that imports sqlite3. The sqlite
# package installs libsqlite3.so + headers to /lib and /include, where
# Python's setup.py auto-detects them.
#
# bzip2 added in 3.14.3-r9 so `_bz2` gets built — Python 3.14's
# setup.py links the stdlib bz2 extension iff bzlib.h + libbz2 are
# visible at configure time. Without it, `import bz2` throws
# ModuleNotFoundError, which breaks e.g. node configure.py.
runtime = ["musl", "zlib", "zstd", "ncurses", "libressl", "xz", "libffi", "sqlite", "bzip2"]
# xz added to build deps 2026-04-20: python's _lzma stdlib module
# needs lzma.h at configure / compile time. It was already a runtime
# dep (for libreadline-independent xz import) but was missing from
# the build list, so a clean aarch64 CI runner hit `'lzma.h' file
# not found` mid-build. Matches the sqlite / bzip2 / libffi pattern
# (headers needed both at build and runtime).
build = ["clang", "libffi", "sqlite", "bzip2", "xz", "pkgconf"]
