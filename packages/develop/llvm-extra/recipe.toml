[package]
name = "llvm-extra"
version = "21.1.2"
license = "Apache-2.0"
description = "LLVM extras — lldb debugger + compiler-rt sanitizers (asan/msan/tsan/ubsan/lsan/hwasan/scudo). Built standalone against installed libllvm + clang."

# llvm-extra ships the long tail of clang/llvm tooling that isn't part
# of the core toolchain. It builds out-of-tree against the installed
# libllvm + clang via LLVM's standalone build paths, so the LLVM core
# is NOT rebuilt — saving ~2h vs the old monolithic llvm-all path.
#
# What ships:
#   /bin/clang-tidy, /bin/clang-format, /bin/clangd, /bin/clang-rename,
#   /bin/clang-apply-replacements, /bin/clang-check, /bin/clang-doc,
#   /bin/clang-include-cleaner, /bin/clang-move, /bin/clang-query,
#   /bin/clang-reorder-fields, /bin/clang-tblgen, ...
#   /bin/lldb, /bin/lldb-server, /bin/lldb-argdumper, /bin/lldb-instr
#   /lib/clang/21/lib/linux/libclang_rt.{asan,msan,tsan,ubsan,lsan,
#     hwasan,scudo,profile,xray}*.{a,so}
#   /lib/clang/21/share/{asan,msan,tsan,ubsan}_*.txt   (suppression lists)
#
# What does NOT ship (lives in libllvm / clang / lld):
#   /bin/clang, /bin/clang++, /bin/clang-21
#   /bin/lld, /bin/ld.lld, /bin/lld-link
#   /bin/llvm-{ar,nm,ranlib,strip,objcopy,objdump,...}
#   /lib/libLLVM*.so*, /lib/libclang*.so*, /lib/liblld*.so*
#
# The previous llvm-all package (also at extra/llvm-all) is retired —
# this package replaces it with a leaner, focused payload.
# The previous standalone lldb package is retired — lldb now ships
# as part of llvm-extra.

[source]
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.2/llvm-project-21.1.2.src.tar.xz"
sha256 = "1a417d1c8faf8d93e73fec1cbb76d393ed3218974c2283c7bac9672d3d47c54b"

[build]
system = "custom"
build = """
set -e

# LLVM needs -fPIC, not -fPIE, for shared library code.
export CFLAGS="$(echo "$CFLAGS" | sed 's/-fPIE/-fPIC/g')"
export CXXFLAGS="$(echo "${CXXFLAGS:-$CFLAGS}" | sed 's/-fPIE/-fPIC/g')"
export LDFLAGS="$(echo "$LDFLAGS" | sed 's/ -pie / /g')"

case $(uname -m) in
    x86_64)  LLVM_BUILD_JOBS=2 ;;
    aarch64) LLVM_BUILD_JOBS=$(nproc) ;;
    *)       LLVM_BUILD_JOBS=$(nproc) ;;
esac

# libssp_nonshared.a stub — musl provides __stack_chk_fail natively.
[ -f /lib/libssp_nonshared.a ] || printf '!<arch>\n' > /lib/libssp_nonshared.a

SRC=$(pwd)
# Helper: cmake invocation common bits. We can't put flags-with-spaces
# in a single shell variable (word-split), so each cmake call lists
# the C/CXX flag args inline.

# clang-tools-extra is intentionally NOT built here.
#
# clang-tools-extra/CMakeLists.txt in LLVM 21 has no standalone-build
# boilerplate (no find_package(Clang) / include(AddClang) at the top).
# Running `cmake -S clang-tools-extra` therefore fails immediately at
# clang-apply-replacements/CMakeLists.txt:5 with:
#
#   CMake Error at clang-apply-replacements/CMakeLists.txt:5
#   (add_clang_library): Unknown CMake command "add_clang_library".
#
# Building it would require -S llvm with LLVM_ENABLE_PROJECTS=
# "clang;clang-tools-extra", which rebuilds clang too. That defeats
# the libllvm/clang split's whole point. If clang-tidy / clang-format
# / clangd become a hard need, ship them as their own jpkg with a
# clang-rebuild dependency, not via llvm-extra.

# ──────────────────────────────────────────────────────────────────────
# 1. lldb (standalone build against installed clang + libllvm)
# ──────────────────────────────────────────────────────────────────────
echo "=== Building lldb ==="
mkdir -p build-lldb
cmake -S lldb -B build-lldb -G Ninja \\
    -DCMAKE_BUILD_TYPE=Release \\
    -DCMAKE_C_COMPILER=clang \\
    -DCMAKE_CXX_COMPILER=clang++ \\
    -DCMAKE_C_FLAGS="-Os -fPIC" \\
    -DCMAKE_CXX_FLAGS="-Os -fPIC -stdlib=libc++" \\
    -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld \\
    -DCMAKE_SHARED_LINKER_FLAGS=-fuse-ld=lld \\
    -DCMAKE_POSITION_INDEPENDENT_CODE=ON \\
    -DLLVM_ENABLE_PIC=ON \\
    -DCMAKE_INSTALL_PREFIX=/ \\
    -DCMAKE_INSTALL_LIBDIR=lib \\
    -DLLVM_DIR=/lib/cmake/llvm \\
    -DClang_DIR=/lib/cmake/clang \\
    -DLLDB_BUILT_STANDALONE=ON \\
    -DLLDB_ENABLE_CURSES=OFF \\
    -DLLDB_ENABLE_PYTHON=OFF \\
    -DLLDB_ENABLE_LUA=OFF \\
    -DLLDB_ENABLE_LIBEDIT=OFF \\
    -DLLDB_ENABLE_LIBXML2=OFF \\
    -DLLVM_INCLUDE_TESTS=OFF \\
    -DLLDB_INCLUDE_TESTS=OFF \\
    -DLLDB_USE_SYSTEM_DEBUGSERVER=OFF
samu -C build-lldb -j"$LLVM_BUILD_JOBS"
DESTDIR=$DESTDIR cmake --install build-lldb

# ──────────────────────────────────────────────────────────────────────
# 2. compiler-rt sanitizers (standalone, against installed libllvm)
#    BUILD_BUILTINS=OFF — clang already shipped builtins.
#    Sanitizer libs land in /lib/clang/21/lib/linux/.
# ──────────────────────────────────────────────────────────────────────
echo "=== Building compiler-rt sanitizers ==="
mkdir -p build-rt
cmake -S compiler-rt -B build-rt -G Ninja \\
    -DCMAKE_BUILD_TYPE=Release \\
    -DCMAKE_C_COMPILER=clang \\
    -DCMAKE_CXX_COMPILER=clang++ \\
    -DCMAKE_C_FLAGS="-Os -fPIC" \\
    -DCMAKE_CXX_FLAGS="-Os -fPIC -stdlib=libc++" \\
    -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld \\
    -DCMAKE_SHARED_LINKER_FLAGS=-fuse-ld=lld \\
    -DCMAKE_POSITION_INDEPENDENT_CODE=ON \\
    -DCMAKE_INSTALL_PREFIX=/ \\
    -DCMAKE_INSTALL_LIBDIR=lib \\
    -DCOMPILER_RT_STANDALONE_BUILD=ON \\
    -DLLVM_CMAKE_DIR=/lib/cmake/llvm \\
    -DCOMPILER_RT_INCLUDE_TESTS=OFF \\
    -DLLVM_INCLUDE_TESTS=OFF \\
    -DCOMPILER_RT_BUILD_BUILTINS=OFF \\
    -DCOMPILER_RT_BUILD_CRT=OFF \\
    -DCOMPILER_RT_BUILD_SANITIZERS=ON \\
    -DCOMPILER_RT_BUILD_PROFILE=ON \\
    -DCOMPILER_RT_BUILD_XRAY=ON \\
    -DCOMPILER_RT_BUILD_LIBFUZZER=ON \\
    -DCOMPILER_RT_BUILD_MEMPROF=OFF \\
    -DCOMPILER_RT_BUILD_ORC=OFF \\
    -DCOMPILER_RT_USE_LIBCXX=ON \\
    -DCOMPILER_RT_DEFAULT_TARGET_TRIPLE="$(clang -dumpmachine)"
samu -C build-rt -j"$LLVM_BUILD_JOBS"
DESTDIR=$DESTDIR cmake --install build-rt

# ──────────────────────────────────────────────────────────────────────
# Cleanup: flatten /usr and /lib64, strip overlap with libllvm/clang/lld
# ──────────────────────────────────────────────────────────────────────
if [ -d "$DESTDIR/usr" ]; then
    cp -a "$DESTDIR/usr/." "$DESTDIR/"
    rm -rf "$DESTDIR/usr"
fi
if [ -d "$DESTDIR/lib64" ] && [ ! -L "$DESTDIR/lib64" ]; then
    cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/"
    rm -rf "$DESTDIR/lib64"
fi

# Defensive overlap removal — these belong to libllvm/clang/lld and
# must NOT be in llvm-extra's payload (would cause file conflicts on
# install). Standalone builds shouldn't produce most of these, but
# clang-tools-extra's install can sometimes drop a stray clang or
# libclang-cpp.so.
for f in clang clang++ clang-21 clang-cl clang-cpp cc c++ \\
         lld ld.lld ld64.lld lld-link wasm-ld ld \\
         llvm-ar llvm-ranlib llvm-nm llvm-objcopy llvm-strip \\
         llvm-objdump llvm-readobj llvm-readelf llvm-symbolizer \\
         llvm-addr2line llvm-cxxfilt llvm-cov llvm-config \\
         opt llc llvm-dlltool llvm-lib llvm-bitcode-strip \\
         llvm-install-name-tool llvm-otool ar nm objcopy strip \\
         objdump; do
    rm -f "$DESTDIR/bin/$f"
done

# Drop libraries / cmake configs / headers that already ship in
# libllvm, clang, or lld.
rm -f "$DESTDIR/lib/libLLVM"*.so*    "$DESTDIR/lib/libLLVM"*.a 2>/dev/null || true
rm -f "$DESTDIR/lib/libclang"*.so*   "$DESTDIR/lib/libclang"*.a 2>/dev/null || true
rm -f "$DESTDIR/lib/liblld"*.so*     "$DESTDIR/lib/liblld"*.a 2>/dev/null || true
rm -rf "$DESTDIR/lib/cmake/llvm"     "$DESTDIR/lib/cmake/clang" "$DESTDIR/lib/cmake/lld"
rm -rf "$DESTDIR/include/llvm"       "$DESTDIR/include/llvm-c"
rm -rf "$DESTDIR/include/clang"      "$DESTDIR/include/clang-c"
rm -rf "$DESTDIR/include/lld"

# Strip binaries
find "$DESTDIR/bin" -type f -executable \\
    -exec llvm-strip {} \\; 2>/dev/null || true
find "$DESTDIR/lib" -type f -name '*.so*' \\
    -exec llvm-strip --strip-debug {} \\; 2>/dev/null || true

# Drop man/docs to keep the package small
rm -rf "$DESTDIR/share/man" "$DESTDIR/share/doc"

# Normalize /lib64 references
python3 "$RECIPE_DIR/../../../scripts/normalize-lib64.py" \\
    "$DESTDIR/bin" "$DESTDIR/lib" 2>/dev/null || true

echo "=== llvm-extra payload ==="
ls "$DESTDIR/bin" | head -30
ls "$DESTDIR/lib/clang/21/lib/linux" 2>/dev/null | head -20 || true
"""
install = ""

[depends]
runtime = ["musl", "libllvm", "libcxx", "xz", "zstd", "zlib"]
build = ["libllvm", "clang", "lld", "cmake", "samurai", "libcxx", "jonerix-headers"]
