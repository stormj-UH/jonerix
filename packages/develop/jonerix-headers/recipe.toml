[package]
name = "jonerix-headers"
version = "4.19.88-r3"
license = "0BSD AND BSD-3-Clause"
description = "Linux UAPI kernel headers for jonerix package builds + BSD sys/queue.h compat"

[source]
url = "https://github.com/sabotage-linux/kernel-headers/archive/refs/tags/v4.19.88-1.tar.gz"
sha256 = "2806e2d689c6affb45ff8761a1011e6ab8a39369a617421fbff9c29f6dbefec6"

[build]
system = "custom"
build = ""
# sabotage-linux/kernel-headers ships arch trees named `arm64/` and
# `x86/` — NOT `x86_64/`. The old `sed 's/x86_64/x86_64/'` was a
# no-op, so `cp -a x86_64/include/*` silently found nothing and the
# x86_64 jpkg shipped with zero arch-specific headers. nodejs,
# wpa_supplicant, and every other x86_64 package that needs
# `asm/hwcap.h`, `asm/unistd.h`, `asm/byteorder.h`, etc. blew up as
# a result. Map x86_64 → x86 (and drop the silent-failure
# `|| true`). Reproduced 2026-04-20 in CI run 24682993326.
install = """set -e
KHARCH=$(uname -m | sed 's/aarch64/arm64/;s/x86_64/x86/')
if [ ! -d "$KHARCH/include/asm" ]; then
    echo "jonerix-headers: no arch dir '$KHARCH/include/asm' in upstream tree" >&2
    ls -1 2>&1 | head -20 >&2
    exit 1
fi
mkdir -p "$DESTDIR/include"
# sabotage-linux/kernel-headers arch trees contain exactly one real
# subdir — asm/ — and a family of convenience symlinks
# (asm-generic, drm, linux, mtd, rdma, scsi, sound, video, xen)
# that point back into ../../generic/include/<same>. Copying the
# symlinks into the staging tree either errors out ("Can't replace
# existing directory with non-directory" from bsdtar/tar, "Is a
# directory" from cp) OR produces dangling symlinks that escape
# the installed jpkg prefix. Skip them entirely: copy generic/*
# first, then only the real asm/ dir from the arch tree.
(cd generic/include && tar cf - .) | (cd "$DESTDIR/include" && tar xf -)
cp -a "$KHARCH/include/asm" "$DESTDIR/include/"
# Sanity check: asm/unistd.h is present on every supported arch
# and is included by most userland via libc. If it's missing, the
# arch copy didn't land.
if [ ! -f "$DESTDIR/include/asm/unistd.h" ]; then
    echo "jonerix-headers: asm/unistd.h missing after copy — $KHARCH tree incomplete" >&2
    exit 1
fi

# Ship a BSD sys/queue.h so packages that expect it (dhcpcd,
# unbound, openssh, wpa_supplicant privilege-separation layer,
# anything using TAILQ_* / LIST_* / SLIST_* macros) find one on
# the jonerix include path. musl libc doesn't provide queue.h
# (it's a BSD extension, not POSIX). Vendored from NetBSD 10's
# sys/sys/queue.h (BSD-3-Clause, Regents of UC Berkeley), no
# modifications.
mkdir -p "$DESTDIR/include/sys"
install -Dm644 "$RECIPE_DIR/vendor/queue.h" "$DESTDIR/include/sys/queue.h"
[ -f "$DESTDIR/include/sys/queue.h" ] || {
    echo "jonerix-headers: sys/queue.h install failed" >&2
    exit 1
}"""

[depends]
runtime = []
build = []
