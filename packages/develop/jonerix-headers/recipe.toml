[package]
name = "jonerix-headers"
version = "4.19.88"
license = "MIT"
description = "Linux UAPI kernel headers for jonerix package builds"

[source]
url = "https://github.com/sabotage-linux/kernel-headers/archive/refs/tags/v4.19.88-1.tar.gz"
sha256 = "2806e2d689c6affb45ff8761a1011e6ab8a39369a617421fbff9c29f6dbefec6"

[build]
system = "custom"
build = ""
install = """set -e
KHARCH=$(uname -m | sed 's/aarch64/arm64/;s/x86_64/x86_64/')
make ARCH=$KHARCH prefix=/ DESTDIR=$DESTDIR install"""

[depends]
runtime = []
build = []
