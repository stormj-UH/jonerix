[package]
name = "flex"
version = "2.6.4-r3"
license = "BSD-2-Clause"
description = "Fast lexical analyzer generator"

[source]
url = "https://github.com/westes/flex/releases/download/v2.6.4/flex-2.6.4.tar.gz"
sha256 = "e87aae032bf07c26f85ac0ed3250998c37621d95f8bd748b31f15b33c45ee995"

[build]
system = "autoconf"
configure = """# m4oxide does not accept -P; create a wrapper that drops the -P flag
# so flex's configure probe and build-time m4 invocations both succeed.
# Resolve the real m4 path BEFORE prepending the wrapper dir to PATH so
# the wrapper can hardcode it — avoids a runtime PATH walk that fails
# when the wrapper's own dir shadows every real m4 location.
REAL_M4=$(command -v m4)
[ -n "$REAL_M4" ] || { printf 'flex configure: no m4 found in PATH\\n' >&2; exit 1; }
mkdir -p _m4wrap
# Write the wrapper using sed substitution so the literal @REAL_M4@
# token is replaced with the resolved path without any quoting tangle.
sed "s|@REAL_M4@|$REAL_M4|g" > _m4wrap/m4 <<'WRAPEOF'
#!/bin/sh
# Drop -P from arguments; m4oxide rejects it but GNU m4 accepts it.
_saved="$@"
set --
for _a in $_saved; do [ "$_a" = "-P" ] || set -- "$@" "$_a"; done
exec @REAL_M4@ "$@"
WRAPEOF
chmod 755 _m4wrap/m4
PATH="$(pwd)/_m4wrap:$PATH" CFLAGS="-O2 -fomit-frame-pointer" ./configure --prefix=/ --bindir=/bin CC=clang"""
build = "make -j$(nproc)"
install = """make DESTDIR=$DESTDIR install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang", "make", "m4oxide"]
