[package]
name = "strace"
# 4.25 is the last release before the 2018-12 LGPL-2.1+ relicense (4.26
# onward switched). Modern strace cannot ship in jonerix runtime under
# the permissive-only policy, so we pin to the final BSD-3-Clause cut.
# Trade-off: misses post-2018 syscall decoders (io_uring, openat2,
# faccessat2, mount_setattr). Acceptable for a developer-image tool.
version = "4.25"
license = "BSD-3-Clause"
description = "ptrace-based syscall tracer (last BSD-3-Clause release)"

[source]
url = "https://github.com/strace/strace/releases/download/v4.25/strace-4.25.tar.xz"
sha256 = "d685f8e65470b7832c3aff60c57ab4459f26ff89f07c10f92bd70ee89efac701"

[build]
system = "custom"
# autoconf-vintage configure: needs /bin/expr (toybox lacks it) and
# raised ulimit. Pattern lifted from sudo / jq / byacc.
build = """set -e
ulimit -n 65536 || true

if [ ! -x /bin/expr ]; then
cat > /tmp/expr.c <<'CEOF'
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <regex.h>
static long tl(const char*s,int*o){char*e;long v=strtol(s,&e,10);*o=(*e==0&&e!=s);return v;}
int main(int c,char**v){
 if(c==3&&!strcmp(v[1],"length")){printf("%zu\\n",strlen(v[2]));return 0;}
 if(c==4&&!strcmp(v[2],":")){regex_t r;regmatch_t m[2];int h=!!strstr(v[3],"\\\\(");
  if(regcomp(&r,v[3],0))return 2;
  if(regexec(&r,v[1],2,m,0)==0){if(h&&m[1].rm_so>=0)printf("%.*s\\n",(int)(m[1].rm_eo-m[1].rm_so),v[1]+m[1].rm_so);else printf("%d\\n",(int)(m[0].rm_eo-m[0].rm_so));regfree(&r);return 0;}
  regfree(&r);printf(h?"\\n":"0\\n");return 1;}
 if(c==4){int o1,o2;long a=tl(v[1],&o1),b=tl(v[3],&o2);
  if(o1&&o2){long r=0;char*o=v[2];
   if(!strcmp(o,"+"))r=a+b;else if(!strcmp(o,"-"))r=a-b;else if(!strcmp(o,"*"))r=a*b;
   else if(!strcmp(o,"/"))r=a/b;else if(!strcmp(o,"%"))r=a%b;
   else if(!strcmp(o,"="))r=(a==b);else if(!strcmp(o,"!="))r=(a!=b);
   else if(!strcmp(o,"<"))r=(a<b);else if(!strcmp(o,">"))r=(a>b);
   else if(!strcmp(o,"<="))r=(a<=b);else if(!strcmp(o,">="))r=(a>=b);
   else return 2;printf("%ld\\n",r);return r==0?1:0;}}
 if(c==2){printf("%s\\n",v[1]);return 0;}
 return 2;}
CEOF
clang -Os --rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld -o /bin/expr /tmp/expr.c
rm -f /tmp/expr.c
fi

# strace 4.25 build notes for jonerix:
#   --enable-mpers=no       — multi-personality (32+64 bit decoders) requires
#                             a working 32-bit toolchain; jonerix is single-arch.
#   --disable-gcc-Werror    — clang21 surfaces warnings unknown to gcc-vintage
#                             code (e.g. -Wstring-plus-int in ucred.c).
#   --without-libdw         — optional elfutils stack-unwind backend; we don't
#                             ship libdw and -k stack traces aren't required.
#   --enable-secontext=no   — selinux (libselinux is GPL-incompat anyway).
#   CFLAGS -Wno-...         — silence the few warnings clang-21 still flags
#                             that older gcc didn't, so configure-time probe
#                             scripts don't accidentally treat them as fails.
GREP=/bin/grep EGREP="/bin/grep -E" FGREP="/bin/grep -F" CFLAGS="-O2 -fomit-frame-pointer -Wno-implicit-function-declaration -Wno-int-conversion -Wno-incompatible-pointer-types" LDFLAGS="-Wl,--disable-new-dtags" ./configure --prefix=/ --bindir=/bin --mandir=/share/man --enable-mpers=no --disable-gcc-Werror --without-libdw --enable-secontext=no CC=clang

# jmake's $(wildcard) + $(patsubst) chain on
#   ioctls_inc_h = $(wildcard $(srcdir)/$(OS)/$(ARCH)/ioctls_inc*.h)
#   ioctlent_h = $(patsubst $(srcdir)/$(OS)/$(ARCH)/ioctls_inc%,ioctlent%,$(ioctls_inc_h))
# produces a doubled path (./linux/ARCH/linux/ARCH/ioctls_inc0.h) that
# breaks `all`. Resolve the wildcard ourselves and hardcode it into the
# Makefile so neither function is involved.
ARCH=$(clang -dumpmachine | cut -d- -f1)
case "$ARCH" in
    aarch64*) ARCH=aarch64 ;;
    arm*) ARCH=arm ;;
esac
# xargs with no command defaults to echo, which collapses whitespace
# (including newlines) into single spaces — POSIX-portable, doesn't
# depend on tr's `\n` interpretation inside quotes.
INC_FILES=$(ls linux/$ARCH/ioctls_inc*.h | xargs)
INC_LIST=$(ls linux/$ARCH/ioctls_inc*.h | sed -n 's|.*/ioctls_inc\([0-9]*\)\.h|ioctlent\1.h|p' | xargs)
RED_LIST=$(echo "$INC_LIST" | sed 's/ioctlent0\.h//' | sed 's/ioctlent/ioctl_redefs/g')
sed -i "s|^ioctls_inc_h = .*|ioctls_inc_h = $INC_FILES|" Makefile
sed -i "s|^ioctlent_h = .*|ioctlent_h = $INC_LIST|" Makefile
sed -i "s|^ioctl_redefs_h = .*|ioctl_redefs_h = $RED_LIST|" Makefile

# musl portability: dirent64.c references `struct dirent64` from
# <dirent.h>, which is glibc-only (musl's `struct dirent` is already
# 64-bit). Define the kernel ABI struct ourselves — strace reads raw
# bytes from getdents64(), so the kernel layout is what matters.
sed -i "/^#include <dirent.h>\$/a\\
#ifndef __GLIBC__\\
struct dirent64 { unsigned long long d_ino; long long d_off; unsigned short d_reclen; unsigned char d_type; char d_name[]; };\\
#endif" dirent64.c

# Modern kernel headers ship constants whose values changed since
# 2018 (IPPROTO_MAX bumped from 256→263 when MPTCP landed, etc.).
# strace 4.25 hard-codes 5500+ static_assert()s asserting those
# 2018-era values. Disable them all — they're build-time sanity
# checks, not runtime correctness, and hitting one just stops the
# build over a constant we can't change anyway.
echo "#ifndef STRACE_STATIC_ASSERT_H
#define STRACE_STATIC_ASSERT_H
#define static_assert(expr, msg) typedef char _strace_sa_unused[1]
#endif" > static_assert.h

# Build BUILT_SOURCES (printers.h, scno.h, sen.h, sys_func.h,
# bpf_attr_check.c, ioctlent*.h) explicitly before strace itself. The
# strace target's deps are .c files that include these generated
# headers, but the dep chain is hidden inside .Po files which don't
# exist yet on first build — make doesn't know to build them first.
#
# Use -j1 only: jmake doesn't implement the make jobserver protocol,
# so recursive sub-makes (autotools emits all-recursive → all-am →
# nested make) deadlock when each spawns its own worker pool.
# strace+headers is ~150 .c files; serial runs in 5-10 min on CI.
# jmake's $(filter $(patsubst %,\%/%,...)) double-% pattern returns
# empty, so the Makefile rule `sen.h: $(syscallent_files)` builds an
# empty enum and downstream `case SEN_xxx:` switch labels become
# function-pointer expressions instead of integers. Generate sen.h
# directly from the same arch's syscallent files.
# sen.h must enumerate SEN_xxx for EVERY syscall name referenced in
# any arch's syscallent table — pathtrace.c (and others) are
# arch-generic and switch on names like SEN_sendfile that exist on
# i386 but not on x86_64. Upstream Makefile feeds the script every
# arch's syscallent.h via filter on EXTRA_DIST, so do the same.
SYSC_FILES=$(find linux -name 'syscallent*.h' -o -name 'subcall.h' | xargs)
cat $SYSC_FILES | ./generate_sen.sh > sen.h

make -j1 printers.h scno.h sys_func.h bpf_attr_check.c native_printer_decls.h native_printer_defs.h
# Generated ioctlent files (one per ioctls_inc input). We need them
# all because syscall.c #includes ioctlent0.h directly.
for h in $INC_LIST; do
    make -j1 "$h"
done
# ioctl_redefs*.h are only referenced through MPERS_{m32,mx32}_IOCTL_MACROS
# in defs.h, both gated by HAVE_M32_MPERS / HAVE_MX32_MPERS. Since
# we configure --enable-mpers=no, those macros never expand and the
# files are never included. Stub them out as empty so make's BUILT_SOURCES
# rule is satisfied without invoking the redefs rule (which jmake
# spins on indefinitely — pattern-rule expansion bug).
for h in $RED_LIST; do
    : > "$h"
done
make -j1 strace"""
install = """set -e
# Install manually rather than `make install` — that target depends on
# building tests/ too (which includes ~250 small test programs we
# don't ship), and jmake serial-build of those takes 30+ minutes.
install -Dm755 strace $DESTDIR/bin/strace
install -Dm644 strace.1 $DESTDIR/share/man/man1/strace.1
# strace-log-merge: perl helper for -ff multi-output. Useful and tiny.
if [ -f strace-log-merge ]; then
    install -Dm755 strace-log-merge $DESTDIR/bin/strace-log-merge
    install -Dm644 strace-log-merge.1 $DESTDIR/share/man/man1/strace-log-merge.1
fi
llvm-strip --strip-all $DESTDIR/bin/strace 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang", "make", "jonerix-headers"]
