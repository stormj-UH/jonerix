[package]
name = "lld"
version = "21.1.2-r2"
license = "Apache-2.0"
description = "LLD linker (linked against shared libllvm)"

# r2: keep the static liblld*.a archives. lld's CMake package files
# advertise those imported targets, and downstream packages such as Zig
# link against the LLD library API instead of only invoking /bin/ld.lld.
#
# r1: rebuild against the full-default-target LLVM 21 package set.
#
# lld is built using LLVM_ENABLE_PROJECTS=lld from the llvm-project
# root. The standalone-lld build pattern (`cmake -S lld -DLLVM_DIR=...`)
# hits the same duplicate-rule cmake bug clang does. With sccache
# warm from the libllvm build, the LLVM-side compiles are cache hits,
# so wall time is only "lld code + link".
# Install step filters out anything that overlaps with libllvm.

[source]
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.2/llvm-project-21.1.2.src.tar.xz"
sha256 = "1a417d1c8faf8d93e73fec1cbb76d393ed3218974c2283c7bac9672d3d47c54b"

[build]
system = "custom"
build = """
set -e

export CFLAGS="$(echo "$CFLAGS" | sed 's/-fPIE/-fPIC/g')"
export CXXFLAGS="$(echo "${CXXFLAGS:-$CFLAGS}" | sed 's/-fPIE/-fPIC/g')"
export LDFLAGS="$(echo "$LDFLAGS" | sed 's/ -pie / /g')"

LLVM_DEFAULT_TARGETS='AArch64;AMDGPU;ARM;AVR;BPF;Hexagon;Lanai;LoongArch;Mips;MSP430;NVPTX;PowerPC;RISCV;SPIRV;Sparc;SystemZ;VE;WebAssembly;X86;XCore'
LLVM_TARGETS_TO_BUILD=${LLVM_TARGETS_TO_BUILD:-$LLVM_DEFAULT_TARGETS}

case $(uname -m) in
    # ubuntu-latest 16 GB; local builders can override BUILD_JOBS.
    x86_64)  LLVM_TRIPLE="x86_64-jonerix-linux-musl";  BUILD_JOBS=${BUILD_JOBS:-1} ;;
    aarch64) LLVM_TRIPLE="aarch64-jonerix-linux-musl"; BUILD_JOBS=${BUILD_JOBS:-$(nproc)} ;;
    *)       LLVM_TRIPLE="unknown-jonerix-linux-musl"; BUILD_JOBS=${BUILD_JOBS:-$(nproc)} ;;
esac

LLVM_AR=$(which llvm-ar 2>/dev/null || echo /lib/llvm21/bin/llvm-ar)
LLVM_RANLIB=$(which llvm-ranlib 2>/dev/null || echo /lib/llvm21/bin/llvm-ranlib)

# libssp_nonshared.a stub
[ -f /lib/libssp_nonshared.a ] || printf '!<arch>\n' > /lib/libssp_nonshared.a

mkdir -p build
cmake -S llvm -B build -G Ninja \
    -DCMAKE_BUILD_TYPE=Release \
    -DLLVM_ENABLE_PROJECTS="lld" \
    -DLLVM_TARGETS_TO_BUILD="$LLVM_TARGETS_TO_BUILD" \
    -DLLVM_DEFAULT_TARGET_TRIPLE="$LLVM_TRIPLE" \
    -DLLVM_HOST_TRIPLE="$LLVM_TRIPLE" \
    -DCMAKE_C_COMPILER=clang \
    -DCMAKE_CXX_COMPILER=clang++ \
    -DCMAKE_C_COMPILER_LAUNCHER="${CMAKE_C_COMPILER_LAUNCHER:-}" \
    -DCMAKE_CXX_COMPILER_LAUNCHER="${CMAKE_CXX_COMPILER_LAUNCHER:-}" \
    -DCMAKE_AR="$LLVM_AR" \
    -DCMAKE_RANLIB="$LLVM_RANLIB" \
    -DCMAKE_C_FLAGS="-Os -fPIC --rtlib=compiler-rt" \
    -DCMAKE_CXX_FLAGS="-Os -fPIC -stdlib=libc++ --rtlib=compiler-rt --unwindlib=libunwind" \
    -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld --rtlib=compiler-rt" \
    -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld --rtlib=compiler-rt" \
    -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
    -DLLVM_ENABLE_PIC=ON \
    -DLLVM_ENABLE_LIBCXX=ON \
    -DLLVM_BUILD_LLVM_DYLIB=ON \
    -DLLVM_LINK_LLVM_DYLIB=ON \
    -DCMAKE_INSTALL_PREFIX=/ \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DLLVM_INCLUDE_TESTS=OFF \
    -DLLD_INCLUDE_TESTS=OFF \
    -DLLVM_INCLUDE_BENCHMARKS=OFF \
    -DLLVM_INCLUDE_EXAMPLES=OFF \
    -DLLVM_BUILD_UTILS=OFF \
    -DLLVM_INSTALL_UTILS=OFF \
    -DLLVM_ENABLE_PLUGINS=OFF \
    -DLLD_BUILD_TOOLS=ON \
    -DLLVM_PARALLEL_LINK_JOBS=2

samu -C build -j"$BUILD_JOBS"
DESTDIR=$DESTDIR cmake --install build

# Flatten usr/ and lib64/
if [ -d "$DESTDIR/usr" ]; then
    cp -a "$DESTDIR/usr/." "$DESTDIR/"
    rm -rf "$DESTDIR/usr"
fi
if [ -d "$DESTDIR/lib64" ] && [ ! -L "$DESTDIR/lib64" ]; then
    cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/"
    rm -rf "$DESTDIR/lib64"
fi

# Strip files that already ship in libllvm
rm -f  "$DESTDIR/lib/libLLVM"*.so* "$DESTDIR/lib/libLLVM"*.a 2>/dev/null || true
rm -rf "$DESTDIR/lib/cmake/llvm"
rm -rf "$DESTDIR/include/llvm" "$DESTDIR/include/llvm-c"
for f in llvm-ar llvm-ranlib llvm-nm llvm-objcopy llvm-strip llvm-objdump \
         llvm-readobj llvm-readelf llvm-symbolizer llvm-addr2line \
         llvm-cxxfilt llvm-cov llvm-config opt llc llvm-dlltool llvm-lib \
         llvm-bitcode-strip llvm-install-name-tool llvm-otool \
         ar nm objcopy strip objdump readelf; do
    rm -f "$DESTDIR/bin/$f"
done

# The static lld libraries are part of the supported downstream build
# surface. lld ships no shared liblld, and packages such as Zig link the
# linker drivers through these archives.
for lib in liblldCommon.a liblldELF.a liblldCOFF.a liblldWasm.a; do
    [ -f "$DESTDIR/lib/$lib" ] || {
        printf '%s\n' "lld: missing $lib" >&2
        exit 1
    }
done

# Symlink: ld → ld.lld for system-wide use
ln -sf ld.lld "$DESTDIR/bin/ld" 2>/dev/null || true

# Strip binaries
find "$DESTDIR/bin" -type f -executable \
    -exec llvm-strip {} \; 2>/dev/null || true

# Remove docs (lld cmake configs stay for downstream packages)
rm -rf "$DESTDIR/share/man" "$DESTDIR/share/doc"

# Normalize /lib64
python3 "$RECIPE_DIR/../../../scripts/normalize-lib64.py" \
    "$DESTDIR/bin" "$DESTDIR/lib" 2>/dev/null || true

echo "=== lld DESTDIR ==="
"$DESTDIR/bin/ld.lld" --version 2>/dev/null || true
"""
install = ""

[depends]
runtime = ["musl", "libllvm", "libcxx"]
build = ["libllvm", "cmake", "samurai", "libcxx", "jonerix-headers"]
