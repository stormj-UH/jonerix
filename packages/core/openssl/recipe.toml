[package]
name = "openssl"
version = "4.0.0"
license = "ISC"
pre_bootstrap = false
description = "LibreSSL — free TLS/crypto stack (provides libssl, libcrypto, libtls)"

[source]
url = "https://ftp.openbsd.org/pub/OpenBSD/LibreSSL/libressl-4.0.0.tar.gz"
sha256 = "4d841955f0acc3dfc71d0e3dd35f283af461222350e26843fea9731c0246a1e4"

[build]
system = "cmake"
configure = "cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/ -DCMAKE_INSTALL_LIBDIR=lib -DCMAKE_C_COMPILER=clang -DBUILD_SHARED_LIBS=ON -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF"
build = "cmake --build build -j$(nproc)"
install = """DESTDIR=$DESTDIR cmake --install build
if [ -d "$DESTDIR/usr" ]; then (cd "$DESTDIR/usr" && tar cf - .) | (cd "$DESTDIR" && tar xf -) && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then (cd "$DESTDIR/lib64" && tar cf - .) | (cd "$DESTDIR/lib" && tar xf -) && rm -rf "$DESTDIR/lib64"; fi"""

[depends]
runtime = ["musl"]
build = ["clang", "cmake", "samurai"]
