[package]
name = "pip"
version = "24.3.1"
license = "MIT"
description = "Python package installer"

[source]
url = "https://github.com/pypa/pip/archive/refs/tags/24.3.1.tar.gz"
sha256 = "1349240eff5fd44f4b9d834d503d87505a6cd0a8ab022f3f1665181d6a719a73"

[build]
configure = ""
build = "python3 setup.py build"
install = "python3 setup.py install --prefix=/ --root=$DESTDIR"

[depends]
runtime = ["python3"]
build = ["python3"]
