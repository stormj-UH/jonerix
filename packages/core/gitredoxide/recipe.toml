[package]
# Permissively licensed drop-in replacement for /bin/git, built on the
# gitoxide gix-* crate ecosystem.  43 Git commands implemented (29
# porcelain, 12 plumbing, 2 global).  302 tests passing, zero-warning
# release build.  MIT OR Apache-2.0.
#
# gitredoxide replaces the gitoxide package (gix + ein) as the primary
# Git provider on jonerix.  It installs as /bin/gitredoxide and provides
# /bin/git as a symlink.  The gix and ein plumbing tools remain available
# via the gitoxide package if needed, but this package owns /bin/git.
name = "gitredoxide"
version = "1.0.20"
license = "MIT OR Apache-2.0"
description = "Permissively licensed drop-in /bin/git replacement (1100+ flags, 0 real divergences vs real git, rPGP + SSH signing, LFS smudge, top-notch rustdoc)"

[source]
# Canonical source: Forgejo jonerik/gitoxide on castle.great-morpho.ts.net:3000.
# Vendored tarball mirrored to GitHub for CI access from outside Tailscale.
#
# 1.0.0: initial release. 43 Git commands, 302 tests, zero-warning build.
# 16-module architecture: mod.rs dispatch hub + 15 command modules.
# Full push/pull/clone/fetch, merge/cherry-pick/rebase/stash, checkout
# family, plumbing commands, log/show/diff/status, branch/tag/remote.
#
# 1.0.1: eliminate all passthrough-to-git calls.  When gitredoxide IS
# /bin/git, calling Command::new("git") forks itself infinitely.
# 16 unconditional passthrough sites removed across 8 modules.
# passthrough_git() deleted.  4 regression tests prevent reintroduction.
#
# 1.0.2: auto-discover system CA bundle for HTTPS transport.
# gix links libssl directly (not libcurl), so it needs SSL_CERT_FILE
# pointed at the system CA bundle.  probe_ssl_certs() in main.rs
# checks common paths at startup.
#
# 1.0.3: major feature-parity release.  17 new subcommands; parity test
# harness from 5% to 100% on 104 practical tests.  Adds bisect, worktree,
# submodule, archive, bundle, format-patch, am, grep, notes, show-branch,
# range-diff, replace, verify-commit/tag, gc, prune, repack, count-objects,
# fsck, pack-refs, plus upload-pack/receive-pack helper-mode dispatch on
# argv[0].  Closes the tormenta local-fetch IO error: gitredoxide now
# correctly serves git-upload-pack and git-receive-pack helper protocols
# instead of rejecting --stateless-rpc as an unknown global option.
# Per-command --help support added across all ~50 subcommands.  Test suite
# 427 passed, 0 failed, 0 warnings.
#
# 1.0.4: closes the documented-porcelain gap.  5 new subcommands:
# annotate (alias for blame), merge-tree (programmatic 3-way merge),
# rerere (reuse recorded resolution with full library API integrated
# into merge.rs), sparse-checkout (cone + non-cone modes with full
# subcommand surface), fast-export / fast-import (bidirectional
# git-fast-import stream support, round-trip verified).  Plus tag
# --sort=version:refname version-aware comparison fix.  Test suite
# 463 passed, 0 failed, 0 warnings.  Command surface 70 subcommands
# (95% of git's documented main porcelain + ancillary, excluding
# intentional skips for Tcl/Tk UIs and Microsoft scalar).
#
# 1.0.5: closes the nice-to-have gap.  7 new subcommands: maintenance
# (run/register/unregister, plus 6 housekeeping tasks: gc, commit-graph,
# prefetch, loose-objects, incremental-repack, pack-refs), backfill
# (partial-clone detection + reporting), difftool (external diff
# launcher with vimdiff/opendiff/meld/kdiff3/p4merge/bc3 builtins),
# mergetool (3-way external merge launcher with auto-stage on resolve),
# merge-tree legacy 3-arg form (inline conflict markers), bugreport
# (system+repo diagnostic dump), diagnose (zip archive of detailed
# diagnostics with password/token redaction).  Test suite 489 passed,
# 0 failed, 0 warnings.  Command surface 77 subcommands.
#
# 1.0.6: hotfix.  The 1.0.5 commit-graph task wrote a malformed
# file (CDAT chunk parent fields misencoded) that gix-commitgraph's
# reader rejected, breaking every subsequent log/walk operation.
# Stubbed task_commit_graph as a no-op until a verified writer
# lands via gix's official API.  The task now also removes any
# bad commit-graph file from prior 1.0.5 runs so users are
# auto-recovered on their next maintenance run.
#
# 1.0.7: closes the two 1.0.6 protocol-level limitations by adding
# the required APIs to the gix-* crates we hard-forked from upstream.
# gix-commitgraph gained a verified single-file writer (six round-trip
# tests against the existing reader); 'maintenance run --task=commit-
# graph' now writes real commit-graph files and subsequent log/walk
# operations use them.  gix-protocol gained an explicit-OID fetch
# path (v2 'want <oid>' lines) with ten new wire-format and end-to-end
# tests; 'git backfill' now actually fetches missing blobs from the
# promisor remote in configurable batches instead of just reporting
# them.  Test suite 491 passed, 0 failed, 0 warnings.
#
# 1.0.8: Git LFS smudge-on-checkout.  clone / pull / checkout now
# materialise real file content for LFS-tracked paths instead of
# leaving the 132-byte LFS pointer in the working tree.  New module
# gitredoxide/src/git_compat/lfs.rs implements the v1 pointer parser,
# the .git/lfs/objects/<aa>/<bb>/<oid> on-disk cache, the LFS Batch
# API client (POST <remote>/info/lfs/objects/batch with the
# application/vnd.git-lfs+json content type), per-object download
# via the resolved presigned URL, SHA-256 verification, and atomic
# worktree writes.  Hooked into clone.rs (post-checkout walk),
# pull.rs (FF + merge paths), rebase.rs (pull-merge integration
# point), and mod.rs cmd_checkout (every variant).  Smudge failures
# are non-fatal — a 403/404/auth/hash error logs 'warning: LFS
# smudge failed: <oid> from <url>: <reason>' and the outer command
# still returns success.  Test suite 502 passed, 0 failed, 3 ignored
# (network-dependent integration tests).  0 warnings.
#
# 1.0.9: ATTEMPTED slim vendor (vendor-prune.sh stripping cfg-gated
# crates).  Local cargo build worked because host-target resolution
# never reaches cfg(target_os="windows") deps, but CI's
# 'cargo build --frozen --offline' validates the *entire* Cargo.lock
# against the vendor directory and rejected pruned entries with
# 'error: no matching package named "windows" found'.  Reverted in
# 1.0.10.  Vendor trimming research deferred until we can regenerate
# the lockfile target-aware (cargo doesn't currently support
# generate-lockfile --target).
#
# 1.0.10: revert 1.0.9's vendor prune.  Full 990 MB vendor /
# 131 MB compressed tarball restored.  CI build succeeds again.
#
# 1.0.11: surface the inner curl error in pack-consume failures.
# On tormenta-class slow links (~20 KB/s to GitHub), git-upload-pack
# responses get cut off mid-stream by GitHub after roughly 7-10 minutes.
# 1.0.10 reported only the bare wrapper "Failed to consume the pack
# sent by the remote", because two layers of error suppression were
# eating the underlying curl error: gix-transport's curl backend used
# try_send to deliver perform() errors over a rendezvous body channel
# (always Full mid-read, so the err was dropped), and gitredoxide's
# clone/fetch formatter did not walk the #[source] chain.  1.0.11
# fixes both, so the same failure now reports e.g. "[92] Stream error
# in the HTTP/2 framing layer (CANCEL err 8)" or "[18] Transferred a
# partial file", giving users something they can route around (HTTP/1.1,
# shallow clone, or a faster mirror).  Test suite 503 passed, 0 failed,
# 3 ignored (network-dependent).  0 warnings.  The underlying server
# cutoff is unchanged — this release improves diagnostics, not transfer
# resilience.
#
# 1.0.12: three concrete fixes for the github.com fetch failure mode
# 1.0.11 set out to surface.
# (a) gix-features in_parallel_with_slice: prefer the FIRST worker to
#     error when joining results.  Previously the original cause of a
#     parallel pack-delta failure was masked by the cascade of
#     `Error::Interrupted` returned by peer workers after observing
#     `stop_everything`.  An AtomicUsize CAS records which thread
#     errored first; the join loop collects every result and returns
#     that thread's error.  Verified under disk-full pressure: pre-fix
#     "...Interrupted"; post-fix the full chain "...Data consistency
#     error (os error 117) at path .git/objects/pack/.tmpXXX".
# (b) gix-pack entry::decode::from_read: enrich the bare "Object type
#     0 is unsupported" error with pack_offset, decompressed_size, and
#     a "stream is corrupted at this offset" clarifier so it's obvious
#     this is wire-corruption rather than a logical bug.
# (c) gitredoxide run_fetch_transport (fetch.rs):
#     * inject_http_stall_defaults — sets http.lowSpeedLimit=1 /
#       http.lowSpeedTime=300 in the in-memory config when the user
#       hasn't configured them.  Five-minute floor on truly stuck
#       transfers (curl's default 0/0 lets a stalled response sit in
#       poll() indefinitely).
#     * verify_fetch_produced_results — defensive post-fetch check; if
#       gitoxide_core::repository::fetch returns Ok but no refs moved
#       and new .tmp* pack tempfiles remain in .git/objects/pack/,
#       returns a non-zero exit with the residual filenames named.
# Tormenta sweep at 350s budget: 28/28 succeeded post-fix (pre-fix
# ~10-15% Interrupted/ObjType0/hang).  Test suite 503 passed, 0 failed,
# 3 ignored (network-dependent).  0 warnings.
#
# 1.0.13: implements git's DWIM rule for `gitredoxide checkout <name>`.
# Previously, `gitredoxide checkout 3.15` against a fresh clone of
# python/cpython errored with "pathspec '3.15' did not match any
# file(s) known to gitredoxide" — even though refs/remotes/origin/3.15
# was right there.  Workarounds existed (`checkout origin/3.15` for
# detached, `checkout -b 3.15 origin/3.15` for a manual track), but
# they aren't what users type.  After 1.0.13, if <name> doesn't
# resolve to a local branch/tag/commit/path and exactly one remote
# has refs/remotes/<remote>/<name>, gitredoxide creates a local
# branch <name> tracking <remote>/<name> and prints the same
# "Switched to a new branch '<name>'" + "branch '<name>' set up to
# track '<remote>/<name>'." stderr that real git emits.  Multi-match
# returns git's "matched multiple (N) remote tracking branches"
# fatal (exit 128) with the hint block; checkout.defaultRemote
# disambiguation is honored.  Slash-bearing names (e.g.
# `gitredoxide checkout some/branch`) and `HEAD` are excluded from
# DWIM, matching git's behaviour.  Three integration tests cover
# single-match success (HEAD update + branch.<name>.remote/merge
# config), zero-match fall-through to the pathspec error, and
# multi-match error without side effects.  Test suite 506 passed,
# 0 failed, 3 ignored.  0 warnings.
#
# 1.0.14: closes the second half of the cpython workflow — `fetch`
# was silently dropping explicit refspecs against single-branch
# clones.  Concretely, after `gitredoxide clone --depth=N cpython`
# (which leaves remote.origin.fetch as +refs/heads/main:...origin/main),
# `gitredoxide fetch --depth=N origin "+refs/heads/3.14:refs/remotes/
# origin/3.14"` returned exit 0 in under a second, wrote no
# refs/remotes/origin/3.14, and silently produced nothing on the
# wire.  Root cause: fetch_refspec_is_default_tracking treated the
# explicit refspec as redundant with default tracking because the
# target syntactically matched refs/remotes/origin/3.14 and the
# explicit-sources set contained "3.14", WITHOUT checking that any
# configured refspec actually mapped refs/heads/3.14.  The rebuild
# loop then iterated explicit_sources × configured_specs and
# produced nothing (configured spec is for main, no wildcard).
# 1.0.14 tightens the check to also require that at least one
# configured refspec covers the branch — exact match
# refs/heads/<branch>:... or a wildcard whose source side matches.
# When no configured spec covers the branch, the explicit refspec
# stays on the wire and the fetch succeeds, restoring the user's
# `gitredoxide checkout 3.14` workflow.  Six new tests cover the
# fix (four unit tests on the predicate + two integration tests
# on the full clone→fetch→checkout pipeline).
#
# 1.0.14 also adds a defensive guard for `gitredoxide clone <url>`
# default semantics.  gix-core's clone is a porcelain tool with
# shallow-friendly fallbacks; gitredoxide is /bin/git on jonerix
# and must mirror real git's defaults exactly.  Three integration
# tests pin: no-flags clone → wildcard refspec + no .git/shallow
# + all remote branches as tracking refs; --depth=N → single-branch
# refspec + .git/shallow (per real git's man page); --depth=N
# --no-single-branch → wildcard + shallow.  Test suite 515 passed,
# 0 failed, 3 ignored.  0 warnings.
#
# 1.0.18: full git-flag-coverage release.  Wave 1 + Wave 2 + signing
# phases 1-2 + parity-divergence fixer shipped roughly 1100 implemented
# or pinned flags vs the 469 baseline at 1.0.14, across 23 parallel
# implementation workers in two waves.
#
# Wave 1 (13 workers): diff (102 flags), log (~80 option families),
# rebase (45 flags with state-machine semantics including --abort/
# --continue/--skip/--quit/--edit-todo/--show-current-patch), config
# (31 flags including --global/--system/--worktree precedence with
# HOME/XDG_CONFIG_HOME/GIT_CONFIG_* env honored), pull (42 flags
# including --rebase modes + --squash via a dedicated three-way
# pull_squash_merge), commit (25 flags including --author/--date/
# --trailer/--cleanup/--fixup/--squash/-C/-c/--reuse-message/
# --reset-author), merge/cherry-pick/revert (12 flags), fetch (4
# flags), push (--force-if-includes), tag/rev-parse/describe (12
# flags), branch (5 flags including --set-upstream-to/--track),
# clone (51 flags pinned + 9 behavioural live tests), checkout/
# switch/restore/reset (38 flags including switch --orphan, reset
# --keep/--merge/-N intent-to-add with EXTENDED flag-bit persistence
# fix).
#
# Wave 2 (10 workers): plumbing-read ls-files/ls-tree/cat-file/
# ls-remote (66 flags), plumbing-traverse rev-list/rev-parse/
# hash-object/update-ref/symbolic-ref (88 flags), worktree add/list/
# lock/move/prune/remove/repair (24 flags), submodule add/status/
# init/deinit/update/summary/foreach/sync/absorbgitdirs (29 flags
# across 9 subcommands), sparse-checkout/grep/notes (66 flags with
# grep -w fix from lookaround to \b word boundaries since Rust regex
# crate rejects lookaround), archive/bundle (15 flags; archive
# output now byte-identical to real git archive on extracted-tree
# diff), format-patch/am (all flags plus full round-trip integration
# test), bisect/reflog/blame/shortlog/for-each-ref (42 flags), final
# long-tail show/range-diff/replace/fsck/gc/repack/prune/rerere/
# pack-refs/mergetool/fast-export/fast-import/maintenance/backfill/
# bugreport/diagnose (141 flags across 19 commands), stash push -S/
# --pathspec-from-file/--include-untracked/--all/--keep-index and
# show/apply/branch/create/store (15 flags).
#
# Signing: rPGP 0.19.0 vendored under gitredoxide/third-party/ for
# the OpenPGP path, ssh-keygen used for the SSH path.  Phase 1
# vendored rPGP + signing module skeleton; phase 2 wired tag -s
# and verify-{commit,tag} via both paths driven by gpg.format.
# Phase 3 wiring of commit/merge/cherry-pick/revert/rebase/pull/log
# -S is queued for 1.0.19 (parsers recognise the flags already; only
# the commit-producing code paths need to consult the signing fields).
#
# rev-parse parity fix: matches real git's observable behaviour on
# unresolved refs (exit 128 not 1; stdout echo of the unresolved arg
# so rev-parse output streams still carry every requested ref;
# bare "fatal:" without "gitredoxide:" binary-name prefix; "Use '--'
# to separate paths from revisions" continuation hint).  Dispatcher
# heuristic in mod.rs: errors starting with "fatal:" bypass the
# binary-name prefix, matching real git.
#
# Test count: 213 (1.0.0 baseline) → 600 (+387 new tests).  Parity-
# smoke harness vs real git: 33/34 (the remaining 1 is a shell-script
# bug in the harness, not a gitredoxide divergence — 0 real
# behaviour gaps on the smoke corpus of 34 representative commands).
# 5 structs (AddArgs, RmArgs, MvArgs, CommitArgs, RebaseArgs) now
# impl Default for cleaner test-construction with ..Default::default().
# cargo build --release: zero warnings.  ~50,000 cumulative new
# source lines across waves 1+2.
#
# 1.0.19: stash full flag set + signing phase 3.  Stash gained
# 15 flags including --staged/-S (staged-only stash), --pathspec-
# from-file, -u/--include-untracked, -a/--all, -k/--keep-index,
# show --name-status / --include-untracked / --stat, apply --index,
# branch, create, store.  Signing phase 3 extends rPGP + ssh-keygen
# from tag-s/verify-* into every commit-producing command —
# commit/merge/cherry-pick/revert/rebase/pull all sign when -S or
# commit.gpgsign=true; log --show-signature and show --show-signature
# emit the verification block.  Cross-validated with real git both
# ways (we sign, real git verifies; real git signs, we verify) on
# both OpenPGP and SSH backends.  parses_rebase_abort_command test
# updated to match the wave-2 --quit/--edit-todo/--show-current-patch
# addition.  Test count 601 / 0 failed.  Parity-smoke vs real git:
# 33/34 (the 1 remaining is a shell-script harness bug, not a
# gitredoxide divergence).
#
# 1.0.20: documentation polish release.  No behaviour changes.
# README.md rewritten 133 → 775 lines (16-section TOC covering
# architecture, signing, configuration, parity-smoke harness,
# vendored offline builds, testing, repo layout, contributing,
# clean-room rules, full release history).  Rustdoc sweep brought
# module-level //! coverage to every src/ file and public-API ///
# coverage from 18.6% (68/366) to 71.3% (261/366).  100% of
# pub struct/enum/trait items now have type-level summaries; 100%
# of command_<cmd> dispatcher entry points document the git
# command, flag set, and exit-code semantics.  cargo doc warnings
# went to zero (side effect of the sweep cleared pre-existing
# unclosed-HTML-tag and unresolved-link warnings).  601 tests /
# 0 failed; cargo build --release: 0 warnings.  Endpoint of the
# "really works like git" documentation pass.
url = "https://github.com/stormj-UH/jonerix/releases/download/source-gitredoxide-v1.0.20/gitredoxide-1.0.20-vendored.tar.gz"
sha256 = "d7289a804195b70ad5925f39179a0ce2eb798004fb8ebc9ed07f719f1a66a8c4"

[build]
system = "custom"
# The vendored tarball extracts as gitoxide/ (the workspace root).
# gitredoxide is the [[bin]] target inside the gitredoxide/ member crate.
# The workspace includes all gix-* plumbing crates as path dependencies.
#
# Build notes:
# - --frozen --offline: vendored deps only, no network access.
# - -C strip=symbols: small binary, llvm-strip as backup.
# - -C target-feature=-crt-static: dynamic linking against musl libc.
# - OPENSSL_*: gitoxide transport crates link OpenSSL (via curl) for HTTPS.
#   On jonerix, LibreSSL headers are at /include, libs at /lib.
build = """
set -e
cd gitoxide
mkdir -p .cargo
cat > .cargo/config.toml << 'VENDOR_EOF'
[source.crates-io]
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "../gitredoxide-vendor"
VENDOR_EOF
export CARGO_HOME=/tmp/gitredoxide-cargo
export CARGO_TARGET_DIR="$PWD/target"
export OPENSSL_DIR=/
export OPENSSL_INCLUDE_DIR=/include
export OPENSSL_LIB_DIR=/lib
export PKG_CONFIG_ALLOW_CROSS=1
export RUSTFLAGS="-C strip=symbols -C target-feature=-crt-static"
cargo build --release --frozen --offline --bin gitredoxide
"""
install = """
set -e
BIN="$PWD/gitoxide/target/release/gitredoxide"
install -Dm755 "$BIN" "$DESTDIR/bin/gitredoxide"
ln -sf gitredoxide "$DESTDIR/bin/git"
llvm-strip --strip-all "$DESTDIR/bin/gitredoxide" 2>/dev/null || true
"""

[hooks]
# Take over /bin/git from whatever currently provides it (gitoxide's
# gix alias, or no provider at all).  This hook runs after the package
# files are installed, so /bin/gitredoxide and /bin/git -> gitredoxide
# are already in place.
#
# If there's a stale /bin/git pointing elsewhere (e.g. gix), our
# installed symlink already replaced it.  This hook just does cleanup
# and verification.
post_install = """
set -e

# Ensure /bin/git points to gitredoxide (should already be the case
# from install, but verify in case of package manager ordering issues).
if [ -e /bin/git ] && [ "$(readlink /bin/git 2>/dev/null)" != "gitredoxide" ]; then
    ln -sf gitredoxide /bin/git
fi

# Register in /etc/shells so gitredoxide and git are valid login shells
# (unlikely to be used as login shells, but consistent with convention).
ensure_in_shells() {
    target=$1
    if [ -f /etc/shells ]; then
        grep -qx "$target" /etc/shells 2>/dev/null || printf '%s\n' "$target" >> /etc/shells
    fi
}

# Provide /bin/git-upload-pack and /bin/git-receive-pack as symlinks
# to gitredoxide for protocol compatibility.  Git clients and servers
# call these directly during push/fetch.
for helper in git-upload-pack git-receive-pack; do
    if [ ! -e "/bin/$helper" ]; then
        ln -sf gitredoxide "/bin/$helper"
    fi
done

exit 0
"""

# On removal, restore /bin/git to gix if the gitoxide package is still
# installed.  Otherwise remove the /bin/git symlink entirely — better
# an honest "command not found" than a dangling symlink.
post_remove = """
set -e

# Clean up protocol helper symlinks if they still point to gitredoxide.
for helper in git-upload-pack git-receive-pack; do
    if [ "$(readlink /bin/$helper 2>/dev/null)" = "gitredoxide" ]; then
        rm -f "/bin/$helper"
    fi
done

# Restore /bin/git fallback.
if [ -e /bin/git ] || [ -L /bin/git ]; then
    exit 0
fi
if [ -x /bin/gix ]; then
    ln -sf gix /bin/git
fi
exit 0
"""

[depends]
runtime = ["musl"]
build = ["rust"]
