[package]
name = "samurai"
version = "1.2"
license = "Apache-2.0"
pre_bootstrap = false
description = "ninja-compatible build tool written in C"

[build]
system = "custom"
build = """
set -e
apk add --no-cache samurai
for pkg in samurai; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -Ev '(/$|^$)' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
ln -sf samu "${DESTDIR}/bin/ninja"
"""
install = ""

[depends]
runtime = ["musl"]
build = []
