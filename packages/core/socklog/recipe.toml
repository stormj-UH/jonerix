[package]
name = "socklog"
version = "2.2.3"
license = "BSD-3-Clause"
pre_bootstrap = false
description = "Small and secure syslogd replacement (DJB-style)"

[source]
url = "https://smarden.org/socklog/socklog-2.2.3.tar.gz"
sha256 = "FIXME"

[build]
system = "custom"
build = """cd src
for f in *.c; do
  clang -O2 -fomit-frame-pointer -o "${f%.c}" "$f" 2>/dev/null || true
done"""
install = """install -Dm755 src/socklog $DESTDIR/bin/socklog
install -Dm755 src/socklog-conf $DESTDIR/bin/socklog-conf 2>/dev/null || true
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang"]
