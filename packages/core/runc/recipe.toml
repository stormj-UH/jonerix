[package]
name = "runc"
version = "1.4.1"
license = "Apache-2.0"
pre_bootstrap = false
description = "OCI container runtime"

[source]
url = "https://github.com/opencontainers/runc/archive/refs/tags/v1.4.1.tar.gz"
sha256 = "FIXME"

[build]
system = "custom"
build = """go mod download
make static GOFLAGS="-trimpath" EXTRA_LDFLAGS="-s -w\""""
install = """install -Dm755 runc $DESTDIR/bin/runc
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["go", "make"]
