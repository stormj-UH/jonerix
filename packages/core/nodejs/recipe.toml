[package]
name = "nodejs"
version = "24.14.1"
license = "MIT"
pre_bootstrap = true
description = "JavaScript runtime built on V8"

[build]
system = "custom"
build = """
set -e
apk add --no-cache nodejs libgcc libstdc++ ada-libs brotli-libs c-ares icu-data-en icu-libs nghttp2-libs simdjson simdutf sqlite-libs zstd-libs
for pkg in nodejs libgcc libstdc++ ada-libs brotli-libs c-ares icu-data-en icu-libs nghttp2-libs simdjson simdutf sqlite-libs zstd-libs; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -Ev '(/$|^$)' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl"]
build = []
