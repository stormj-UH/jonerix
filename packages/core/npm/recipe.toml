[package]
name = "npm"
version = "10.9.2"
license = "Artistic-2.0"
pre_bootstrap = true
description = "Node.js package manager"

[build]
system = "custom"
build = """
set -e
apk add --no-cache npm
for pkg in npm; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -v '/\$' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["nodejs"]
build = []
