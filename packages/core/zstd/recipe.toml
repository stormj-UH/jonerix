[package]
name = "zstd"
version = "1.5.6"
license = "BSD-3-Clause"
description = "Zstandard compression library and tool"

[source]
url = "https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-1.5.6.tar.gz"
sha256 = "FIXME"

[build]
system = "cmake"
configure = "cmake build/cmake -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/ -DZSTD_BUILD_STATIC=ON -DZSTD_BUILD_SHARED=ON -DZSTD_BUILD_PROGRAMS=ON -DZSTD_BUILD_TESTS=OFF -DZSTD_BUILD_CONTRIB=OFF"
build = "ninja -j$(nproc)"
install = "DESTDIR=$DESTDIR ninja install"

[depends]
runtime = ["musl"]
build = ["clang", "cmake", "samurai"]
