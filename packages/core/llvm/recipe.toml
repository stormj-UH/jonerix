[package]
name = "llvm"
version = "21"
license = "Apache-2.0"
pre_bootstrap = true
description = "LLVM compiler infrastructure with clang and lld"

[build]
system = "custom"
build = """
set -e
apk add --no-cache clang lld gcc musl-dev linux-headers libstdc++-dev llvm

# Detect versioned package names (Alpine uses clang21, lld21, etc.)
CLANG_PKG=$(apk info 2>/dev/null | grep '^clang[0-9]' | grep -Ev 'headers|libs|dev|rt|tools' | head -1)
CLANG_LIBS=$(apk info 2>/dev/null | grep '^clang[0-9].*-libs' | head -1)
CLANG_HDRS=$(apk info 2>/dev/null | grep '^clang[0-9].*-headers' | head -1)
LLD_PKG=$(apk info 2>/dev/null | grep '^lld[0-9]' | grep -v 'libs' | head -1)
LLD_LIBS=$(apk info 2>/dev/null | grep '^lld[0-9].*-libs' | head -1)
LLVM_LIBS=$(apk info 2>/dev/null | grep '^llvm[0-9].*-libs$' | head -1)
LLVM_LINKER=$(apk info 2>/dev/null | grep '^llvm[0-9].*linker' | head -1)
# llvm21 base package provides llvm-ar, llvm-nm, llvm-ranlib (Apache-2.0)
LLVM_PKG=$(apk info 2>/dev/null | grep '^llvm[0-9]' | grep -Ev 'libs|linker|dev|test|tools' | head -1)

# ONLY extract clang/lld/llvm packages and their runtime deps.
# Do NOT extract musl-dev, linux-headers, or gcc — those are separate packages.
# DO extract libstdc++-dev (C++ headers needed for building C++ code).
for pkg in "$CLANG_PKG" "$CLANG_LIBS" "$CLANG_HDRS" \
           "$LLD_PKG" "$LLD_LIBS" "$LLVM_LIBS" "$LLVM_LINKER" "$LLVM_PKG" \
           libstdc++ libstdc++-dev libgcc libffi xz-libs libxml2 jansson; do
  [ -z "$pkg" ] && continue
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -Ev '(/$|^$)' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done

# Extract ONLY GCC runtime support files (CRT objects + libgcc) — not the full compiler
GCC_DIR=$(find /usr/lib/gcc -name "crtbeginS.o" 2>/dev/null | head -1 | sed 's|/crtbeginS.o||')
if [ -n "$GCC_DIR" ]; then
  mkdir -p "${DESTDIR}${GCC_DIR}"
  for f in crtbeginS.o crtendS.o crtbegin.o crtend.o libgcc.a libgcc_eh.a; do
    [ -f "${GCC_DIR}/${f}" ] && cp -aP "${GCC_DIR}/${f}" "${DESTDIR}${GCC_DIR}/" 2>/dev/null || true
  done
else
  echo "WARNING: GCC CRT files not found — gcc package may not be installed"
fi
# libssp_nonshared.a (needed by clang's default link)
cp -aP /usr/lib/libssp_nonshared.a "${DESTDIR}/lib/" 2>/dev/null || true

# Flatten usr/ FIRST, then create symlinks/configs that reference final paths
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi

# ld symlink: clang invokes bare 'ld' which must resolve to lld
ln -sf ld.lld "${DESTDIR}/bin/ld" 2>/dev/null || true

# libgcc_s.so symlink (linker needs .so, only .so.1 is shipped)
ln -sf libgcc_s.so.1 "${DESTDIR}/lib/libgcc_s.so" 2>/dev/null || true

# cc symlink: many configure scripts look for 'cc'
ln -sf clang "${DESTDIR}/bin/cc" 2>/dev/null || true

# ar/nm/ranlib symlinks: point to llvm binutils (Apache-2.0, not GPL)
# llvm-ar etc. are installed as llvm21-ar, llvm21-nm, etc.
LLVM_VER=$(ls "${DESTDIR}/bin/" 2>/dev/null | grep '^llvm[0-9]*-ar$' | sed 's/llvm\([0-9]*\)-ar/\1/' | head -1)
if [ -n "$LLVM_VER" ]; then
  ln -sf "llvm${LLVM_VER}-ar"     "${DESTDIR}/bin/ar"     2>/dev/null || true
  ln -sf "llvm${LLVM_VER}-nm"     "${DESTDIR}/bin/nm"     2>/dev/null || true
  ln -sf "llvm${LLVM_VER}-ranlib" "${DESTDIR}/bin/ranlib" 2>/dev/null || true
  ln -sf "llvm${LLVM_VER}-strip"  "${DESTDIR}/bin/strip"  2>/dev/null || true
fi

# clang.cfg: tell clang where to find C++ stdlib and GCC CRT support
GCC_VER=$(ls "${DESTDIR}/include/c++/" 2>/dev/null | head -1)
TRIPLE=$(clang -dumpmachine 2>/dev/null || true)
if [ -n "$GCC_VER" ] && [ -n "$TRIPLE" ]; then
  mkdir -p "${DESTDIR}/etc/clang"
  echo "--gcc-install-dir=/lib/gcc/${TRIPLE}/${GCC_VER}" \
    > "${DESTDIR}/etc/clang/${TRIPLE}.cfg"
fi
"""
install = ""

[depends]
runtime = ["musl", "zstd"]
build = []
