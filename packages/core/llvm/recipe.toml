[package]
name = "llvm"
version = "19"
license = "Apache-2.0"
pre_bootstrap = true
description = "LLVM compiler infrastructure with clang and lld"

[build]
system = "custom"
build = """
set -e
# clang, lld, and llvm-libs are pre-installed in the Alpine build environment.
# Package their files directly rather than building LLVM from source.
for pkg in clang lld llvm-libs; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -v '/\$' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
# Flatten /usr -> /
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl"]
build = []
