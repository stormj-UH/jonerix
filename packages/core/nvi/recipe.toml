[package]
name = "nvi"
version = "2.2.1"
license = "BSD-3-Clause"
pre_bootstrap = true
description = "nvi2 text editor (reimplementation of Berkeley vi)"

[build]
system = "custom"
build = """
set -e
apk add --no-cache nvi
for pkg in nvi; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl", "ncurses"]
build = []
