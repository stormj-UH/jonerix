[package]
name = "openntpd"
version = "6.8p1-r4"
license = "ISC"
description = "OpenBSD NTP daemon — lightweight, secure time synchronization"

[source]
url = "https://cdn.openbsd.org/pub/OpenBSD/OpenNTPD/openntpd-6.8p1.tar.gz"
sha256 = "8582db838a399153d4a17f2a76518b638cc3020f58028575bf54127518f55a46"

[build]
system = "custom"
# openntpd's configure leaks FDs and hits the default 1024 fd limit
# around configure.lineno[506] ("too many open files in shell"). Bump
# the limit for this build shell so it can finish. exproxide provides
# the /bin/expr autoconf probes expect.
build = """set -e
ulimit -n 65536 || true
GREP=/bin/grep EGREP="/bin/grep -E" FGREP="/bin/grep -F" \
  CC=clang LD=ld.lld \
  CFLAGS="-Os -fstack-protector-strong -fPIE -D_DEFAULT_SOURCE" \
  LDFLAGS="-fuse-ld=lld -pie" \
  ./configure --prefix=/ --sbindir=/bin --sysconfdir=/etc --with-privsep-user=_ntp
jmake -j$(nproc)"""
install = """set -e
DESTDIR=$DESTDIR jmake install
# Merged-usr flatten: autoconf honors --sbindir=/bin but hand-
# rolled install hooks can still drop into sbin/. Catch + fold.
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/sbin" ]; then cp -a "$DESTDIR/sbin/." "$DESTDIR/bin/" && rm -rf "$DESTDIR/sbin"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
mkdir -p $DESTDIR/etc
cat > $DESTDIR/etc/ntpd.conf <<EOF
# /etc/ntpd.conf — jonerix default
servers pool.ntp.org
server time.cloudflare.com
EOF
mkdir -p $DESTDIR/etc/init.d
cat > $DESTDIR/etc/init.d/ntpd <<'INITEOF'
#!/bin/openrc-run
name="ntpd"
description="OpenNTPD time synchronization daemon"
command="/bin/ntpd"
# `-d` keeps ntpd in the foreground; start-stop-daemon then backgrounds
# it with --make-pidfile so /run/ntpd.pid matches the live process.
# Without this pair, ntpd self-daemonizes, the init never learns the
# final child pid, and `rc-service ntpd status` perpetually reports
# "crashed" even when the daemon is healthy (reproduced 2026-04-16 on
# jonerix-tormenta).
command_args="-d ${NTPD_OPTS:-}"
command_background="yes"
pidfile="/run/ntpd.pid"

depend() {
    need net
    before sshd tailscaled
    use dns
}

start_pre() {
    # /var/db is the drift-file location — writable by _ntp.
    checkpath -d -m 0755 -o _ntp:_ntp /var/db
    # /var/empty is the privsep chroot — openntpd rejects anything
    # not owned by root (uid 0) with "bad privsep dir permissions".
    # Must be mode 0711 (exec-only access for others) and root-owned.
    checkpath -d -m 0711 /var/empty
}
INITEOF
chmod 755 $DESTDIR/etc/init.d/ntpd"""

[hooks]
# Register ntpd with OpenRC at install time: create the _ntp privsep user,
# prepare the state dirs, link the service into the default runlevel, and
# start it on live systems. Guard all file-touching so chroot/alt-root
# installs (jpkg --root /mnt/rootfs ...) stay idempotent.
post_install = """# 1) _ntp privsep user + group. openntpd drops privileges to this uid
# before doing anything unprivileged. Shell structure is kept flat
# (no line-continued || chains) because toybox sh parses those
# unreliably — reproduced on jonerix-tormenta 2026-04-16 where the
# previous post_install errored "syntax error: unexpected '||'".
if ! grep -q "^_ntp:" /etc/group 2>/dev/null; then
    addgroup -S _ntp 2>/dev/null
fi
if ! grep -q "^_ntp:" /etc/passwd 2>/dev/null; then
    if [ -x /bin/adduser-safe ]; then
        /bin/adduser-safe -S -D -H -h /var/empty -s /bin/false -G _ntp _ntp 2>/dev/null
    else
        adduser -S -D -H -h /var/empty -s /bin/false -G _ntp _ntp 2>/dev/null
    fi
fi

# 2) /var/db (drift file) — _ntp-owned, 0755.
mkdir -p /var/db
chown _ntp:_ntp /var/db 2>/dev/null
chmod 0755 /var/db

# 3) /var/empty (privsep chroot) — MUST be root-owned with mode 0711.
# openntpd's privsep check refuses to start if the dir is not owned
# by uid 0 (errors "bad privsep dir permissions: 40XXX"). Reproduced
# 2026-04-16 when we set it _ntp-owned.
mkdir -p /var/empty
chown root:root /var/empty
chmod 0711 /var/empty

# 4) Register with OpenRC default runlevel.
if [ -d /etc/runlevels/default ]; then
    ln -sf /etc/init.d/ntpd /etc/runlevels/default/ntpd
fi

# 5) Start now if OpenRC is driving PID 1 on this host.
if [ -d /run ] && [ -x /bin/rc-service ]; then
    if readlink /proc/1/exe 2>/dev/null | grep -q openrc; then
        rc-service ntpd start 2>/dev/null
    fi
fi
exit 0"""

post_remove = """set -e
# Stop the service first if it's running.
if [ -x /bin/rc-service ]; then
    rc-service ntpd stop 2>/dev/null || true
fi
# Unlink from the runlevel (the init.d script itself is removed by jpkg's
# normal file manifest, but the runlevel symlink is dynamic).
rm -f /etc/runlevels/default/ntpd
# Leave the _ntp user in place — removing it could orphan files.
# User can purge with: deluser _ntp; delgroup _ntp
exit 0"""

[depends]
runtime = ["musl", "libressl"]
build = ["clang", "jmake", "exproxide"]
