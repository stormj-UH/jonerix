[package]
name = "openntpd"
version = "6.8p1-r1"
license = "ISC"
description = "OpenBSD NTP daemon — lightweight, secure time synchronization"

[source]
url = "https://cdn.openbsd.org/pub/OpenBSD/OpenNTPD/openntpd-6.8p1.tar.gz"
sha256 = "8582db838a399153d4a17f2a76518b638cc3020f58028575bf54127518f55a46"

[build]
system = "custom"
# Install a minimal C expr shim before autoconf runs (jonerix doesn't
# ship /bin/expr; the shim is identical to the one used in sudo, jq,
# pico, tzdata, libevent recipes). Then configure + build as usual.
#
# openntpd's configure leaks FDs and hits the default 1024 fd limit
# around configure.lineno[506] ("too many open files in shell"). Bump
# the limit for this build shell so it can finish.
build = """set -e
ulimit -n 65536 || true
cat > /tmp/expr.c <<'CEOF'
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <regex.h>
static long tl(const char*s,int*o){char*e;long v=strtol(s,&e,10);*o=(*e==0&&e!=s);return v;}
int main(int c,char**v){
 if(c==3&&!strcmp(v[1],"length")){printf("%zu\n",strlen(v[2]));return 0;}
 if(c==4&&!strcmp(v[2],":")){regex_t r;regmatch_t m[2];int h=!!strstr(v[3],"\\(");
  if(regcomp(&r,v[3],0))return 2;
  if(regexec(&r,v[1],2,m,0)==0){if(h&&m[1].rm_so>=0)printf("%.*s\n",(int)(m[1].rm_eo-m[1].rm_so),v[1]+m[1].rm_so);else printf("%d\n",(int)(m[0].rm_eo-m[0].rm_so));regfree(&r);return 0;}
  regfree(&r);printf(h?"\n":"0\n");return 1;}
 if(c==4){int o1,o2;long a=tl(v[1],&o1),b=tl(v[3],&o2);
  if(o1&&o2){long r=0;char*o=v[2];
   if(!strcmp(o,"+"))r=a+b;else if(!strcmp(o,"-"))r=a-b;else if(!strcmp(o,"*"))r=a*b;
   else if(!strcmp(o,"/"))r=a/b;else if(!strcmp(o,"%"))r=a%b;
   else if(!strcmp(o,"="))r=(a==b);else if(!strcmp(o,"!="))r=(a!=b);
   else if(!strcmp(o,"<"))r=(a<b);else if(!strcmp(o,">"))r=(a>b);
   else if(!strcmp(o,"<="))r=(a<=b);else if(!strcmp(o,">="))r=(a>=b);
   else return 2;printf("%ld\n",r);return r==0?1:0;}}
 if(c==2){printf("%s\n",v[1]);return 0;}
 return 2;}
CEOF
clang -Os --rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld -o /bin/expr /tmp/expr.c
rm -f /tmp/expr.c

GREP=/bin/grep EGREP="/bin/grep -E" FGREP="/bin/grep -F" \
  CC=clang LD=ld.lld \
  CFLAGS="-Os -fstack-protector-strong -fPIE -D_DEFAULT_SOURCE" \
  LDFLAGS="-fuse-ld=lld -pie" \
  ./configure --prefix=/ --sbindir=/bin --sysconfdir=/etc --with-privsep-user=_ntp
jmake -j$(nproc)"""
install = """set -e
DESTDIR=$DESTDIR jmake install
mkdir -p $DESTDIR/etc
cat > $DESTDIR/etc/ntpd.conf <<EOF
# /etc/ntpd.conf — jonerix default
servers pool.ntp.org
server time.cloudflare.com
EOF
mkdir -p $DESTDIR/etc/init.d
cat > $DESTDIR/etc/init.d/ntpd <<'INITEOF'
#!/bin/openrc-run
name="ntpd"
description="OpenNTPD time synchronization daemon"
command="/bin/ntpd"
command_args="${NTPD_OPTS:-}"
pidfile="/run/ntpd.pid"

depend() {
    need net
    before sshd tailscaled
    use dns
}

start_pre() {
    checkpath -d -m 0755 -o _ntp:_ntp /var/db
    checkpath -d -m 0755 -o _ntp:_ntp /var/empty
}
INITEOF
chmod 755 $DESTDIR/etc/init.d/ntpd"""

[hooks]
# Register ntpd with OpenRC at install time: create the _ntp privsep user,
# prepare the state dirs, link the service into the default runlevel, and
# start it on live systems. Guard all file-touching so chroot/alt-root
# installs (jpkg --root /mnt/rootfs ...) stay idempotent.
post_install = """set -e
# 1) _ntp privsep user (openntpd drops privileges to this uid).
if ! getent passwd _ntp >/dev/null 2>&1; then
    addgroup -S _ntp 2>/dev/null || groupadd -r _ntp 2>/dev/null || true
    adduser -S -D -H -h /var/empty -s /bin/false -G _ntp _ntp 2>/dev/null \\
        || useradd -r -d /var/empty -s /bin/false -g _ntp _ntp 2>/dev/null \\
        || true
fi

# 2) State dirs referenced by start_pre and by openntpd's chroot.
mkdir -p /var/db /var/empty
chown _ntp:_ntp /var/db /var/empty 2>/dev/null || true
chmod 0755 /var/db /var/empty

# 3) Register with OpenRC default runlevel.
ln -sf /etc/init.d/ntpd /etc/runlevels/default/ntpd 2>/dev/null || true

# 4) Start now if OpenRC is driving PID 1 on this host (live install).
# On chroot / container-image builds, /run typically isn't a writable
# tmpfs and rc-service won't succeed — the || true keeps us idempotent.
if [ -d /run ] && [ -x /bin/rc-service ] && readlink /proc/1/exe 2>/dev/null | grep -q openrc; then
    rc-service ntpd start 2>/dev/null || true
fi
exit 0"""

post_remove = """set -e
# Stop the service first if it's running.
if [ -x /bin/rc-service ]; then
    rc-service ntpd stop 2>/dev/null || true
fi
# Unlink from the runlevel (the init.d script itself is removed by jpkg's
# normal file manifest, but the runlevel symlink is dynamic).
rm -f /etc/runlevels/default/ntpd
# Leave the _ntp user in place — removing it could orphan files.
# User can purge with: deluser _ntp; delgroup _ntp
exit 0"""

[depends]
runtime = ["musl", "libressl"]
build = ["clang", "jmake"]
