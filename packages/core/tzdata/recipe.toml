[package]
name = "tzdata"
version = "2026a"
license = "Public-Domain"
description = "IANA time zone database (zoneinfo data plus zic/zdump tools)"

# Upstream ships two tarballs: tzcode (zic/zdump/Makefile) and tzdata (zone
# source files). jpkg only supports a single [source] URL, so we let jpkg
# fetch+verify the code tarball and fetch the data tarball inside the build
# script with a pinned sha256. Both tarballs extract into the same directory.
#
# We intentionally do NOT invoke the upstream Makefile — it uses a
# multi-line variable assignment (SET_TIMESTAMP_N = sh -c '\) that jmake
# (jonerix's Make) does not parse. The two programs we need (zic, zdump)
# are tiny and self-contained, so we compile them directly with clang.
[source]
url = "https://data.iana.org/time-zones/releases/tzcode2026a.tar.gz"
sha256 = "f80a17a2eddd2b54041f9c98d75b0aa8038b016d7c5de72892a146d9938740e1"

[build]
system = "custom"
build = """set -e
# Fetch and verify the tzdata source, then extract it alongside tzcode.
TZDATA_URL="https://data.iana.org/time-zones/releases/tzdata2026a.tar.gz"
TZDATA_SHA="77b541725937bb53bd92bd484c0b43bec8545e2d3431ee01f04ef8f2203ba2b7"
curl -fsSL -o /tmp/tzdata.tar.gz "$TZDATA_URL"
echo "$TZDATA_SHA  /tmp/tzdata.tar.gz" | sha256sum -c -
tar xf /tmp/tzdata.tar.gz
rm -f /tmp/tzdata.tar.gz

# Generate version.h and tzdir.h the way the Makefile would, but without
# invoking make. Format matches what the upstream Makefile produces: version
# identifiers as `static char const` arrays; TZDIR/TZDEFAULT as #define.
# Heredocs (not printf) because the TOML->sh escape dance was eating \n.
VERSION=$(cat version 2>/dev/null || echo 2026a)
cat > version.h <<VHEOF
static char const PKGVERSION[]="(tz) ";
static char const TZVERSION[]="$VERSION";
static char const REPORT_BUGS_TO[]="tz@iana.org";
VHEOF
cat > tzdir.h <<'DHEOF'
#ifndef TZDEFAULT
# define TZDEFAULT "/etc/localtime"
#endif
#ifndef TZDIR
# define TZDIR "/share/zoneinfo"
#endif
DHEOF

# --rtlib=compiler-rt / --unwindlib=libunwind keep GCC runtime out of the
# binaries; -DHAVE_GETTEXT=0 disables the gettext/libintl dependency.
CC=clang
CFLAGS="-Os -fomit-frame-pointer -DHAVE_GETTEXT=0"
LDFLAGS="--rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld"

# zic: TZCOBJS = zic.o  (Makefile: zic: zic.o)
$CC $CFLAGS $LDFLAGS -o zic zic.c

# zdump: TZDOBJS = zdump.o localtime.o strftime.o
$CC $CFLAGS $LDFLAGS -o zdump zdump.c localtime.c strftime.c

# Compile the zoneinfo database directly from the zone source files.
# This bypasses tzdata.zi / the awk-based shrinker (which the Makefile
# normally runs via ziguard.awk + zishrink.awk). zic accepts the raw
# sources and produces the same runtime output. One-line form because the
# TOML \\-newline continuation left a literal `\` arg in zic's argv.
rm -rf _zoneinfo
mkdir -p _zoneinfo
./zic -b slim -d _zoneinfo africa antarctica asia australasia europe northamerica southamerica etcetera backward

# Ship the tz tab files so tzselect-style tools can find them.
cp -f iso3166.tab zone.tab zone1970.tab zonenow.tab _zoneinfo/
"""
install = """set -e
mkdir -p "$DESTDIR/bin" "$DESTDIR/share/zoneinfo"
install -m 755 zic   "$DESTDIR/bin/zic"
install -m 755 zdump "$DESTDIR/bin/zdump"
llvm-strip --strip-all "$DESTDIR/bin/zic"   2>/dev/null || true
llvm-strip --strip-all "$DESTDIR/bin/zdump" 2>/dev/null || true
# Copy the compiled zoneinfo tree. Use cp -a to preserve the subdirectory
# layout (Africa/, America/, etc.) that zic produced.
cp -a _zoneinfo/. "$DESTDIR/share/zoneinfo/"
# Flat-layout cleanup, matching the convention used by musl/snooze recipes.
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi"""

[depends]
runtime = ["musl"]
# onetrueawk is no longer needed at build time — we bypass the awk shrinker
# and feed zone source files directly to zic. Only clang is required.
build = ["clang"]
