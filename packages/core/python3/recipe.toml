[package]
name = "python3"
version = "3.12.12"
license = "PSF-2.0"
pre_bootstrap = false
description = "Python programming language interpreter"

[build]
system = "custom"
build = """
set -e
apk add --no-cache python3 libbz2 libexpat libffi gdbm xz-libs libgcc libstdc++ mpdecimal ncurses-terminfo-base libncursesw libpanelw readline sqlite-libs
for pkg in python3 python3-pycache-pyc0 pyc python3-pyc libbz2 libexpat libffi gdbm xz-libs libgcc libstdc++ mpdecimal ncurses-terminfo-base libncursesw libpanelw readline sqlite-libs; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -Ev '(/$|^$)' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl", "zstd", "ncurses"]
build = []
