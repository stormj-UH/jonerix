[package]
name = "python3"
version = "3.12.8"
license = "PSF-2.0"
description = "Python programming language interpreter"

[build]
system = "custom"
build = """
set -e
apk add --no-cache python3
for pkg in python3; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl"]
build = []
