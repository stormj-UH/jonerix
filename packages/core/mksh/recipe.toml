[package]
name = "mksh"
version = "R59c-r2"
license = "MirOS"
description = "MirBSD Korn Shell — POSIX shell for /bin/sh"
# mksh is the system /bin/sh provider. Toybox's sh applet is a
# minimal fallback; claim /bin/sh away from it so jpkg verify stays
# clean after install. Requires jpkg >= 1.0.4 (the first version that
# parses package.replaces).
replaces = ["toybox"]

[source]
url = "https://www.mirbsd.org/MirOS/dist/mir/mksh/mksh-R59c.tgz"
sha256 = "77ae1665a337f1c48c61d6b961db3e52119b38e58884d1c89684af31f87bc506"

[build]
system = "custom"
configure = ""
build = """CC=clang LDFLAGS="--rtlib=compiler-rt -fuse-ld=lld" /bin/sh Build.sh -r"""
install = """mkdir -p $DESTDIR/bin $DESTDIR/share/man/man1 $DESTDIR/etc/skel $DESTDIR/share/mksh/skel
install -m 755 mksh $DESTDIR/bin/mksh
install -m 644 mksh.1 $DESTDIR/share/man/man1/mksh.1
install -m 644 lksh.1 $DESTDIR/share/man/man1/lksh.1
install -m 644 $RECIPE_DIR/dot.mkshrc $DESTDIR/etc/skel/.mkshrc
install -m 644 $RECIPE_DIR/dot.mkshrc $DESTDIR/share/mksh/skel/.mkshrc
ln -sf mksh $DESTDIR/bin/sh
llvm-strip --strip-all $DESTDIR/bin/mksh 2>/dev/null || true"""

[hooks]
post_install = """seed_mkshrc() {
    home=$1
    owner=$2
    src=/share/mksh/skel/.mkshrc
    dest=$home/.mkshrc
    [ -r "$src" ] || return 0

    if [ ! -f "$dest" ] ||
       grep -q '^# Shipped by the mksh jpkg\\.' "$dest" 2>/dev/null ||
       grep -q '^# Dark blue + light gray prompt with time and CWD$' "$dest" 2>/dev/null; then
        cp "$src" "$dest"
        chown "$owner" "$dest" 2>/dev/null || true
    fi
}

[ -d /root ] && seed_mkshrc /root root:root
if [ -d /home ]; then
    for home in /home/*; do
        [ -d "$home" ] || continue
        user=$(basename "$home")
        id -u "$user" >/dev/null 2>&1 || continue
        seed_mkshrc "$home" "$user:$user"
    done
fi
exit 0"""

post_remove = "[ ! -e /bin/sh ] && [ -x /bin/toybox ] && ln -sf toybox /bin/sh"

[depends]
runtime = ["musl"]
build = ["clang"]
