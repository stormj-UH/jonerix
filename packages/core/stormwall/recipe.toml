[package]
name = "stormwall"
version = "1.1.2"
license = "MIT"
description = "Drop-in firewall front-end — accepts nft, pf and iptables CLI dialects against the same in-kernel netfilter backend"

[source]
# Canonical source: castle.great-morpho.ts.net:3000/jonerik/stormwall tag v1.1.2
# Mirrored to GitHub for CI (castle is behind Tailscale).
#
# 1.1.2: docker bridge-init unblock.  ensure_table_and_chain() now
# emits a bare `add chain <fam> <table> <chain>` preamble for user
# chains (previously only built-ins got a chain preamble).  `add chain`
# is idempotent in nft, so callers that did `-N USERCHAIN` first are
# unaffected, but callers that jump straight to `-A USERCHAIN` (which
# dockerd's libnetwork bridge driver does for the per-network DOCKER-*
# isolation chains) no longer see ENOENT from the kernel — which was
# being surfaced as "iptables: No such file or directory" and causing
# dockerd to abort bridge bring-up.
#
# Also installs /usr/sbin/iptables and /sbin/iptables symlinks so
# dockerd's hard-coded path lookups find a working iptables without
# extra setup at install time.
#
# 1.1.1 (prior): help-text refresh.  The nft-mode usage() now describes
# all three dialects (nft, pfctl, iptables) and lists the argv[0]
# dispatch names + symlink paths.  The iptables-mode print_help()
# expanded to cover the full operation/match/target/option surface.
url = "https://github.com/stormj-UH/jonerix/releases/download/source-stormwall-v1.1.2/stormwall-1.1.2.tar.gz"
sha256 = "92172d55c1837d716474569cb56b79b2dee1d46cb4bdb85e8a8edb71445ebccb"

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/stormwall-cargo
export CARGO_TARGET_DIR="$PWD/target"
export CARGO_NET_OFFLINE=true
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static"
cargo build --release --frozen --offline --bin stormwall --bin pfctl
"""
install = """
set -e
install -Dm755 "$PWD/target/release/stormwall" "$DESTDIR/bin/stormwall"
install -Dm755 "$PWD/target/release/pfctl" "$DESTDIR/bin/pfctl"
# Single-binary dispatch by argv[0]: stormwall switches between
# nft, iptables, ip6tables, and the *-save / *-restore variants
# based on its invocation name. The symlinks below put the
# expected binary names on PATH so dockerd's libnetwork (and any
# other tool that shells out to iptables) finds a working tool.
ln -sf stormwall "$DESTDIR/bin/nft"
ln -sf stormwall "$DESTDIR/bin/iptables"
ln -sf stormwall "$DESTDIR/bin/iptables-save"
ln -sf stormwall "$DESTDIR/bin/iptables-restore"
ln -sf stormwall "$DESTDIR/bin/ip6tables"
ln -sf stormwall "$DESTDIR/bin/ip6tables-save"
ln -sf stormwall "$DESTDIR/bin/ip6tables-restore"
# Some tools (notably dockerd's libnetwork bridge driver) hard-code
# /usr/sbin/iptables / /sbin/iptables and don't fall back to PATH
# when those don't exist. Plant compatibility symlinks so they
# resolve back to /bin/stormwall — no behavioural impact for
# anything that already finds /bin/iptables on PATH.
mkdir -p "$DESTDIR/usr/sbin" "$DESTDIR/sbin"
ln -sf ../../bin/stormwall "$DESTDIR/usr/sbin/iptables"
ln -sf ../../bin/stormwall "$DESTDIR/usr/sbin/iptables-save"
ln -sf ../../bin/stormwall "$DESTDIR/usr/sbin/iptables-restore"
ln -sf ../../bin/stormwall "$DESTDIR/usr/sbin/ip6tables"
ln -sf ../../bin/stormwall "$DESTDIR/usr/sbin/ip6tables-save"
ln -sf ../../bin/stormwall "$DESTDIR/usr/sbin/ip6tables-restore"
ln -sf ../../bin/stormwall "$DESTDIR/usr/sbin/nft"
ln -sf ../bin/stormwall "$DESTDIR/sbin/iptables"
ln -sf ../bin/stormwall "$DESTDIR/sbin/iptables-save"
ln -sf ../bin/stormwall "$DESTDIR/sbin/iptables-restore"
ln -sf ../bin/stormwall "$DESTDIR/sbin/ip6tables"
ln -sf ../bin/stormwall "$DESTDIR/sbin/ip6tables-save"
ln -sf ../bin/stormwall "$DESTDIR/sbin/ip6tables-restore"
ln -sf ../bin/stormwall "$DESTDIR/sbin/nft"
install -Dm644 LICENSE "$DESTDIR/share/licenses/stormwall/LICENSE"
llvm-strip --strip-all "$DESTDIR/bin/stormwall" 2>/dev/null || true
llvm-strip --strip-all "$DESTDIR/bin/pfctl" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]
