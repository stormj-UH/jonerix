[package]
name = "stormwall"
version = "1.0.4"
license = "MIT"
description = "Drop-in firewall front-end — accepts both Linux nftables (nft) and OpenBSD pf (pfctl) DSLs against the same in-kernel netfilter backend"

[source]
# Canonical source: castle.great-morpho.ts.net:3000/jonerik/stormwall tag v1.0.0
# Mirrored to GitHub for CI (castle is behind Tailscale).
url = "https://github.com/stormj-UH/jonerix/releases/download/source-stormwall-v1.0.4/stormwall-1.0.4.tar.gz"
sha256 = "d4004b003816d032e20eb98b6a198ffdec4a81e351e8121b0a6a03e3450e36f7"

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/stormwall-cargo
export CARGO_TARGET_DIR="$PWD/target"
export CARGO_NET_OFFLINE=true
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static"
cargo build --release --frozen --bin stormwall --bin pfctl
"""
install = """
set -e
install -Dm755 "$PWD/target/release/stormwall" "$DESTDIR/bin/stormwall"
install -Dm755 "$PWD/target/release/pfctl" "$DESTDIR/bin/pfctl"
ln -sf stormwall "$DESTDIR/bin/nft"
install -Dm644 LICENSE "$DESTDIR/share/licenses/stormwall/LICENSE"
llvm-strip --strip-all "$DESTDIR/bin/stormwall" 2>/dev/null || true
llvm-strip --strip-all "$DESTDIR/bin/pfctl" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]
