[package]
name = "stormwall"
version = "1.1.11"
license = "MIT"
description = "Drop-in firewall front-end — accepts nft, pf and iptables CLI dialects against the same in-kernel netfilter backend"

[source]
# Canonical source: castle.great-morpho.ts.net:3000/jonerik/stormwall tag v1.1.11
# Mirrored to GitHub for CI (castle is behind Tailscale).
#
# 1.1.11: parallel-worker integration — three Sonnet subagents
# implemented orthogonal feature additions in isolated worktrees, then
# the diffs were layer-merged into a single release.
#
# Match modules (10 new):
#   -m hashlimit                 (rate-limit per IP/port hash)
#                                core flags lower to nft `limit rate
#                                [over] N/unit burst B packets`; hash-
#                                config (mode/masks/htable tunables)
#                                preserved as comment markers.
#   -m policy                    (IPsec policy match)
#                                --pol ipsec → `meta secpath exists`;
#                                --pol none  → `meta secpath missing`;
#                                xfrm-specific fields (reqid/spi/proto/
#                                mode/tunnel-src/dst) preserved as
#                                comment markers.
#   -m ah                        `ah spi N`
#   -m esp                       `esp spi N`
#   -m frag                      `frag id N` / `frag length N` /
#                                `frag more-fragments 1` / `frag
#                                reserved 0`
#   -m hbh                       `hbh hdrlength N` (TLV options as comment)
#   -m mh                        `mh type N` (RFC 3775 symbolic names
#                                resolved at parse time)
#   -m rt                        `rt type T` / `rt segs-left N` /
#                                `rt hdrlength N` (rt-0-* opts as comment)
#   -m dst                       `dst hdrlength N` (TLV options as comment)
#   -m ipv6header                `ip6 nexthdr N` or `ip6 nexthdr {…}`
#                                (--soft as comment)
#
# Renderer fixes (4 round-trip bugs):
#   - `ip dscp set N` was rendered as `ip dscp 0` because the iptables
#     parser at the dscp branch consumed "set" as the value via parse_value.
#     Now detects `peek == "set"` before parse_cmp_op and emits the
#     correct Immediate + PayloadSet pair (nft format: `ip dscp set N`).
#   - `meta day { monday, friday }` previously rendered as `{ }` because
#     the AnonSet scalar parser had no weekday-name fallback. Added
#     weekday→tm_wday lookup before the integer parse, paired with
#     output.rs format_weekday_elem dispatch on NFT_META_TIME_DAY context.
#   - `numgen` was an unhandled token in parse_rule_exprs and ended up
#     as Expr::Unimplemented. Added a full `numgen (inc|random) mod M
#     [offset N]` branch that recognises the < / <= / > / >= comparators
#     parse_cmp_op doesn't, plus an Expr::Byteorder bridge to the cmp
#     operand for ordered comparisons.
#   - `fib saddr . iif oif != 0` cmp-fold path now emits ` eq ` (not
#     bare ` `) for the non-type-result EQ case, so rpfilter rules
#     round-trip through `nft list`.
#
# 21 new unit tests integrated; 261/261 cargo total (was 245).
#
# 1.1.10 (prior): -m recent + -m connbytes + meta day/hour parser fixes.
#
# Match modules added:
#   -m recent --set | --rcheck | --update | --remove
#             [--name X] [--seconds N] [--hitcount N]
#             [--rsource | --rdest]    nft set ops on a named timeout
#                                       set:
#                                         --rcheck → `ip saddr @NAME`
#                                         --set/--update → `update @NAME
#                                           { ip saddr timeout Ns }`
#                                         --remove → `delete @NAME { ip saddr }`
#                                       The named set must exist on the
#                                       host (no auto-create from the
#                                       iptables side; persistent nft.conf
#                                       is the conventional source).
#   -m connbytes --connbytes N[:M]
#                --connbytes-dir <d>
#                --connbytes-mode <m>   nft `ct {pkts|bytes|avgpkt} >= N`
#                                       (or `ct {…} N-M` for ranges).
#
# Renderer fixes (issues that surfaced when 1.1.9 -m time installed
# correctly but `nft list` showed `meta length { }` instead of
# `meta day { monday, friday }`):
#   - `meta_key()` extended to recognise "day" → NFT_META_TIME_DAY
#     and "hour" → NFT_META_TIME_HOUR. Without this, the bare "day"
#     token fell through to the (0, 4) default which collides with
#     NFT_META_LEN, so the kernel stored the rule as a length match.
#   - `parse_value()` extended to map weekday names (sunday/monday/
#     ... or sun/mon/...) to their tm_wday values (0=Sunday … 6=Saturday)
#     when reading `meta day { monday, friday }`-style anon-set
#     elements. Without this the kernel got `[0, 0]` instead of
#     `[1, 5]`, and the rule matched no days.
#
# 5 new unit tests; 245/245 cargo total.
#
# 1.1.9 (prior): Tier 2 expansion — TOS/DSCP/TTL/HL/statistic/connlimit/
# helper/time/rpfilter matches + CLASSIFY/CHECKSUM/NETMAP/SET targets.
# 1.1.8 (prior): CONNMARK register-width fix. — TOS/DSCP/TTL/HL match modules and
# their corresponding target families, plus -m statistic, -m connlimit,
# -m helper (distinct from -j CT --helper), -m time, -m rpfilter, and
# the CLASSIFY / CHECKSUM / NETMAP / SET targets.
#
# Match modules added:
#   -m tos --tos N[/M]            nft `ip dscp N`
#   -m dscp --dscp N |
#           --dscp-class CLASS    nft `ip dscp N` (class names BE/EF/AFxx/CSx
#                                  pre-resolved at parse time)
#   -m ttl --ttl-eq|gt|lt N       nft `ip ttl == N` / `> N` / `< N`
#   -m hl  --hl-eq|gt|lt N        IPv6 sibling of ttl
#   -m statistic --mode random
#                  --probability F nft `numgen random mod 1e9 < F*1e9`
#                                  (probability stored as ppb to keep
#                                  the AST `Eq`-friendly)
#                --mode nth
#                  --every N
#                  --packet P     nft `numgen inc mod N == P`
#   -m connlimit --connlimit-above|upto N
#                [--connlimit-mask M]
#                [--connlimit-saddr|--connlimit-daddr]
#                                 nft `ct count over|le N` — install
#                                 currently fails on jonerix kernel
#                                 (nft_connlimit loaded; bare inline
#                                 form needs a stateful object on this
#                                 kernel-config; tracked as a known
#                                 limitation in IPTABLES_COMPAT.md)
#   -m helper --helper "ftp"     nft `ct helper "ftp"` (disambiguated
#                                 from -j CT --helper via in_module
#                                 parser state)
#   -m time --timestart hh:mm[:ss]
#           --timestop hh:mm[:ss]
#           [--weekdays days]    nft `meta hour "..."-"..."` plus
#                                 optional `meta day { … }`
#   -m rpfilter [--invert]       nft `fib saddr . iif oif != 0`
#                                 (`eq 0` for --invert)
#
# Targets added:
#   -j TOS --set-tos|--and|--or|--xor-tos N
#                                 nft `ip dscp set N` for Set; And/Or/Xor
#                                 lower to comment markers (no nft form)
#   -j DSCP --set-dscp N |
#           --set-dscp-class C   nft `ip dscp set N`
#   -j TTL --ttl-set|dec|inc N   nft `ip ttl set N` /
#                                 `ip ttl set ip ttl - N` / `+ N`
#   -j HL --hl-set|dec|inc N     nft `ip6 hoplimit set N` (and ± N)
#   -j CLASSIFY --set-class M:N  nft `meta priority set 0xM:0xN`
#   -j CHECKSUM --checksum-fill  comment marker (kernel auto-fills on egress)
#   -j NETMAP --to PREFIX        nft `dnat to PREFIX` (POSTROUTING → snat)
#   -j SET --add-set|--del-set NAME dirs
#                                 nft `add @NAME { ip saddr [. ip daddr] }`
#                                 / `delete @NAME { … }`
#
# 17 new unit tests (240/240 cargo total). Real-kernel install
# verified for tos / dscp / ttl / statistic / time / rpfilter and
# both directions of connmark (which 1.1.8 rounded out). connlimit
# documented as a known limitation pending the stateful-object form.
#
# 1.1.8 (prior): CONNMARK register-width fix — complete bidirectional
# `meta mark set ct mark and M` round-trip.
# 1.1.7 (prior): CONNMARK --nfmask / --ctmask masks parsed and lowered.
# 1.1.6 (prior): STORMWALL_TEST_MODE=iptables drop-in for tailscaled. 1.1.7's parser made
# `meta mark set ct mark and M` parse, but the resulting expression
# chain had a register-width mismatch — Expr::Ct/Bitwise picked
# NFT_REG32_00 via reg_for_width(4) while Expr::MetaSet hard-codes
# NFT_REG_1. The kernel accepted the rule but the renderer couldn't
# decode it AND (more seriously) the meta-set portion was silent on
# packets because the bytes lived in the wrong register relative to
# what the kernel's nft_meta_set_eval reads.
#
# Two new explicit-register expression variants — Expr::CtReg and
# Expr::MetaReg — let parse_meta_set_source pin the source-side load
# to NFT_REG_1 unambiguously. Mirrors the existing BitwiseReg pattern.
# Adds Expr::CtSet (NFTA_CT_SREG=NFT_REG_1) for the symmetric write
# direction, plus a `ct KEY set <expr>` parser branch that 1.1.7
# missed (the comment in the meta arm referenced a "parallel ct set
# path" that wasn't actually wired up).
#
# Renderer (output.rs) also extended: the meta-SREG and ct-SREG arms
# now consume the preceding ct/meta + bitwise context to print the
# combined `meta KEY set ct KEY and MASK` (and symmetric) form. The
# previous behaviour was emitting empty rule bodies. format_mask_native_u32
# helper turns the kernel's CPU-native mask bytes back into `0x….` text.
#
# Net: tailscale's connmark slicing is now fully bidirectional and
# `nft list ruleset` matches what was installed via iptables. CONNMARK
# without masks (1.1.6 path) and the 1.1.7 mask parsing both still
# pass through the unchanged ConnmarkOp lowering arms.
#
# 1.1.7 (prior): parse `-j CONNMARK --save-mark/--restore-mark --nfmask V
# --ctmask V` mask sub-options.  Tailscale's healthcheck installs
# `-t mangle -I PREROUTING 1 -m conntrack --ctstate ESTABLISHED,RELATED
# -j CONNMARK --restore-mark --nfmask 0xff0000 --ctmask 0xff0000` and
# 1.1.6 rejected the masks as unknown flags, breaking `tailscale up`.
# The fix has two halves:
#   - iptables/lower.rs: emit the masked nft form `meta mark set ct
#     mark and 0xff0000` (and the symmetric `ct mark set meta mark
#     and ...` for save-mark).  ctmask wins on save / nfmask wins on
#     restore when both are set to different values — matches
#     iptables-translate's preference for the dominant-direction mask.
#   - parser.rs (nft text parser): teach the `meta KEY set <expr>` /
#     `ct KEY set <expr>` shapes to consume `ct/meta KEY [and MASK]`
#     on the right-hand side, emitting the corresponding Ct/Meta load
#     plus an Expr::Bitwise.  Without this the lowered text round-
#     tripped to a rule with no terminal verdict (kernel got just the
#     conntrack match), so the iptables call returned 0 but tailscaled
#     still saw the connmark rule missing.
# The strictly-correct multi-statement nft form
# `(ct mark & ~ctmask) | (meta mark & nfmask)` is left for follow-up;
# the symmetric-mask common case (which tailscale uses) is satisfied
# by the simpler `and <mask>` emit.
#
# 1.1.6 (prior): STORMWALL_TEST_MODE=iptables impersonation for
# tailscaled / firewalld / NetworkManager / docker libnetwork
# version-string parsers.
# parsing `iptables --version` (tailscaled, firewalld, NetworkManager,
# docker libnetwork) accept us as a drop-in.  test_mode() now returns
# a TestMode enum (Off/Nft/Iptables); STORMWALL_TEST_MODE=1 still
# means Nft for back-compat.  The iptables-family dispatch path
# (basename-resolved via /bin/iptables → /bin/stormwall) auto-sets
# STORMWALL_TEST_MODE=iptables when unset, so `iptables --version`
# emits the byte-exact `iptables vMAJOR.MINOR.PATCH (backend)` format
# that tailscaled's `iptables\\s+v(\\d+)\\.(\\d+)\\.(\\d+)` regex
# requires.  Without this, tailscaled refuses to start with
# "failed to extract iptables version from [stormwall iptables ...]".
#
# Impersonates iptables 1.8.10 with backend "nf_tables".  Manual
# `STORMWALL_TEST_MODE=iptables stormwall ...` also works for tests
# that want to drive the impersonation path directly without going
# through the iptables symlink.
#
# 1.1.5 (prior): feature-completeness pass guided by upstream
# iptables-extensions(8)
# and wiki.nftables.org translation tables (descriptive docs only — no
# GPL source consulted, per the project's clean-room policy). Adds:
#
#   Operations:
#     -E / --rename-chain        nft `rename chain <fam> <table> <old> <new>`
#     -c / --set-counters        compat-parsed (no nft equivalent)
#     -X with no chain argument  enumerates user chains via NFT_MSG_GETCHAIN
#                                and emits delete chain for each non-builtin
#
#   Targets:
#     -j NOTRACK                 nft `notrack`
#     -j NFQUEUE [--queue-num N | --queue-balance LO:HI]
#                  [--queue-bypass] [--queue-cpu-fanout]
#                                nft `queue num N[-HI] [bypass[,fanout]]`
#     -j TCPMSS --set-mss N      nft `tcp option maxseg size set N`
#     -j TCPMSS --clamp-mss-to-pmtu
#                                nft `tcp option maxseg size set rt mtu`
#     -j CT --notrack | --helper X | --zone N
#                                nft `notrack` / `ct helper set "X"` / `ct zone set N`
#     SNAT/DNAT/MASQUERADE --random-fully
#                                nft `fully-random` flag (modern NAT randomisation)
#     LOG --log-tcp-sequence | --log-tcp-options | --log-ip-options | --log-uid
#                                nft `log flags tcp sequence,options` /
#                                `log flags ip options` (uid → comment marker)
#
#   Match modules:
#     -m iprange --src-range LO-HI / --dst-range LO-HI
#                                nft `ip saddr LO-HI` / `ip daddr LO-HI`
#     -m length --length N[:M]   nft `meta length N[-M]`
#     -m pkttype --pkt-type X    nft `meta pkttype X`
#     -m connmark --mark V[/M]   nft `ct mark [and M] V` (distinct from -m mark)
#     -m tcpmss --mss N[:M]      nft `tcp option maxseg size N[-M]`
#
# 19 new unit tests covering each addition; 220/220 cargo tests pass.
# All shapes match the canonical translations in the nftables wiki's
# "Quick reference: nftables in 10 minutes" and the iptables-extensions
# man page on manpages.debian.org (descriptive references only).
#
# 1.1.4 (prior): REJECT no-args + port range parser + legacy `-s ! V`.
# 1.1.3 (prior): jump-target user-chain auto-create + `ct state { … }`.
# 1.1.2 (prior): user-chain auto-create on the operating chain.
# 1.1.1 (prior): help-text refresh.
url = "https://github.com/stormj-UH/jonerix/releases/download/source-stormwall-v1.1.11/stormwall-1.1.11.tar.gz"
sha256 = "697a67812920665c6d467d5af135a452ffd3ec076f45c4e92179239c193c5aa7"

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/stormwall-cargo
export CARGO_TARGET_DIR="$PWD/target"
export CARGO_NET_OFFLINE=true
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static"
cargo build --release --frozen --offline --bin stormwall --bin pfctl
"""
install = """
set -e
install -Dm755 "$PWD/target/release/stormwall" "$DESTDIR/bin/stormwall"
install -Dm755 "$PWD/target/release/pfctl" "$DESTDIR/bin/pfctl"
# Single-binary dispatch by argv[0]: stormwall switches between
# nft, iptables, ip6tables, and the *-save / *-restore variants
# based on its invocation name. The symlinks below put the
# expected binary names on PATH so dockerd's libnetwork (and any
# other tool that shells out to iptables) finds a working tool.
ln -sf stormwall "$DESTDIR/bin/nft"
ln -sf stormwall "$DESTDIR/bin/iptables"
ln -sf stormwall "$DESTDIR/bin/iptables-save"
ln -sf stormwall "$DESTDIR/bin/iptables-restore"
ln -sf stormwall "$DESTDIR/bin/ip6tables"
ln -sf stormwall "$DESTDIR/bin/ip6tables-save"
ln -sf stormwall "$DESTDIR/bin/ip6tables-restore"
install -Dm644 LICENSE "$DESTDIR/share/licenses/stormwall/LICENSE"
llvm-strip --strip-all "$DESTDIR/bin/stormwall" 2>/dev/null || true
llvm-strip --strip-all "$DESTDIR/bin/pfctl" 2>/dev/null || true
"""

[hooks]
# dockerd's libnetwork bridge driver hard-codes /usr/sbin/iptables and
# /sbin/iptables — it doesn't fall back to PATH lookup. Plant compat
# symlinks back to /bin/stormwall in those paths at install time, since
# jpkg payloads can only land in /bin /lib /share /etc and the
# /usr/sbin and /sbin directories aren't in the package layout.
post_install = """set -e
names="iptables iptables-save iptables-restore ip6tables ip6tables-save ip6tables-restore nft"
for d in /sbin /usr/sbin; do
    [ -d "$d" ] || mkdir -p "$d"
    for n in $names; do
        ln -sf /bin/stormwall "$d/$n"
    done
done
"""
post_remove = """set -e
# Clean up the libnetwork-compat symlinks we planted in post_install.
# Only remove if they still point at our binary so we don't trample a
# manually placed iptables.
names="iptables iptables-save iptables-restore ip6tables ip6tables-save ip6tables-restore nft"
for d in /sbin /usr/sbin; do
    for n in $names; do
        target=$(readlink "$d/$n" 2>/dev/null) || continue
        [ "$target" = "/bin/stormwall" ] && rm -f "$d/$n"
    done
done
"""

[depends]
runtime = ["musl"]
build = ["rust"]
