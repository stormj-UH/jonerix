[package]
# jonerix-netutils — permissively-licensed Go reimplementations of
# the Linux network userspace toolkit.  Subsumes iproute-go (which
# only shipped /bin/ip) and replaces every networking applet toybox
# does poorly with a clean-room Go implementation.
#
# v0.2.0 SCOPE (current — full v0.2.0 charter delivered):
#   FROM u-root v0.16.0 (BSD-3-Clause):
#     /bin/ip       — iproute2-style binary
#     /bin/brctl    — Linux bridge utility
#     /bin/netstat  — classic socket/route/interface table dump
#   WRITTEN FROM SCRATCH (jonerix BSD-3-Clause):
#     /bin/arp      — kernel ARP cache (rtnetlink RTM_GETNEIGH dump,
#                     NeighSet for static entries, NeighDel for -d)
#     /bin/arping   — ARP probe / DAD / gratuitous announce via
#                     AF_PACKET raw socket
#     /bin/ifconfig — interface up/down/MTU/HW addr + primary IP
#                     assignment via netlink
#     /bin/route    — kernel route table list + RTM_NEWROUTE /
#                     RTM_DELROUTE for add/del; default-route support
#     /bin/iptunnel — IPv4-in-IPv4 / GRE / SIT tunnel create / del
#     /bin/tunctl   — persistent TUN/TAP create / destroy via
#                     /dev/net/tun ioctls
#     /bin/ss       — TCP / UDP / UNIX socket dump via sock_diag
#                     netlink
#     /bin/ethtool  — SIOCETHTOOL via safchain/ethtool: driver info,
#                     features, stats, perm-addr, channels, coalesce
#
# All 11 commands build from the same curated u-root module tree
# (see source-jonerix-netutils-v0.2.0 GH release for the source
# tarball — 1.9 MB compressed). Pure-Go, static, CGO_ENABLED=0.

name = "jonerix-netutils"
version = "0.2.0"
license = "BSD-3-Clause"
description = "Network userspace tools (ip, brctl, netstat, arp, arping, ifconfig, route, iptunnel, tunctl, ss, ethtool) — Go implementations, replaces iproute-go + toybox network applets"

# `replaces` lets jpkg accept the conflict for /bin/{ip,brctl,netstat,
# arp,arping,ifconfig,route,iptunnel,tunctl,ss,ethtool} with whoever
# ships them today: iproute-go (only /bin/ip) and toybox (the rest).
# Together with toybox r14's install-time skip list, the takeover
# survives every toybox upgrade.
replaces = ["toybox", "iproute-go"]

[source]
# Curated u-root v0.16.0 subset: only the 11 cmds/core dirs we ship,
# the 3 pkg/ dirs they depend on, and a regenerated vendor/ from
# `go mod vendor` after `go mod tidy`. 1.9 MB compressed.
url = "https://github.com/stormj-UH/jonerix/releases/download/source-jonerix-netutils-v0.2.0/jonerix-netutils-0.2.0.tar.gz"
sha256 = "5cfb00db74ae57af006889455d2c7945b28c754dbb22c716406ea1496baa23b1"

[build]
system = "custom"
build = """
set -e
# Pure-Go, statically linked. Same flags iproute-go used so the
# resulting binaries behave identically.
export CGO_ENABLED=0
export GOFLAGS="-mod=vendor"
export GOPROXY=off
export GOSUMDB=off
mkdir -p bin

# All 11 commands live under cmds/core/<name>/. Loop so we get an
# explicit failure for any missing dir rather than a silent skip.
for cmd in ip brctl netstat arp arping ifconfig route iptunnel tunctl ss ethtool; do
    if [ ! -d "cmds/core/$cmd" ]; then
        echo "jonerix-netutils: missing cmds/core/$cmd — tarball mismatch?" >&2
        exit 1
    fi
    go build -mod=vendor -trimpath -ldflags="-s -w" -o "bin/$cmd" "./cmds/core/$cmd"
done
"""
install = """
set -e
for cmd in ip brctl netstat arp arping ifconfig route iptunnel tunctl ss ethtool; do
    install -Dm755 "bin/$cmd" "$DESTDIR/bin/$cmd"
done

# Strip Go's embedded /lib64 dynamic-linker reference. Same trick the
# rclone and buildkit recipes use — null-pad /lib64 -> /lib\\0\\0 so
# an ELF reader doesn't see a phantom interpreter path. CGO is off so
# nothing actually consults the field at runtime; this is cosmetic
# for binwalk / debuggers.
python3 - "$DESTDIR" <<'PYEOF' || true
import os, sys
root = sys.argv[1]
bindir = os.path.join(root, "bin")
for name in os.listdir(bindir):
    p = os.path.join(bindir, name)
    if not os.path.isfile(p): continue
    with open(p, "rb") as fh: d = fh.read()
    n = d.count(b"/lib64")
    if n:
        d = d.replace(b"/lib64", b"/lib\\x00\\x00")
        with open(p, "wb") as fh: fh.write(d)
        print(f"netutils lib64-fix: replaced {n} refs in {p}")
PYEOF

for cmd in ip brctl netstat arp arping ifconfig route iptunnel tunctl ss ethtool; do
    llvm-strip --strip-all "$DESTDIR/bin/$cmd" 2>/dev/null || true
done
"""

[depends]
# Pure-Go static binaries: no shared library deps. musl listed for
# every package install, no other runtime requirements.
runtime = ["musl"]
build = ["go"]
