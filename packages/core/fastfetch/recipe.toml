[package]
name = "fastfetch"
version = "2.36.1"
license = "MIT"
description = "Feature-rich system information tool"

[source]
url = "https://github.com/fastfetch-cli/fastfetch/archive/refs/tags/2.36.1.tar.gz"
sha256 = "FIXME"

[build]
system = "cmake"
configure = "cmake -B build -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DENABLE_VULKAN=OFF -DENABLE_WAYLAND=OFF -DENABLE_XCB=OFF -DENABLE_XRANDR=OFF -DENABLE_X11=OFF -DENABLE_GIO=OFF -DENABLE_DCONF=OFF -DENABLE_DBUS=OFF -DENABLE_EGL=OFF -DENABLE_GLX=OFF -DENABLE_OPENCL=OFF -DENABLE_DRM=OFF"
build = "cmake --build build -j$(nproc)"
install = "DESTDIR=$DESTDIR cmake --install build"

[depends]
runtime = ["musl"]
build = ["clang", "cmake", "samurai"]
