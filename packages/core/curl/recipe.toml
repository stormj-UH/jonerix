[package]
name = "curl"
version = "8.11.1"
license = "MIT"
description = "Command-line tool and library for transferring data with URLs"

[source]
url = "https://curl.se/download/curl-8.11.1.tar.xz"
sha256 = "FIXME"

[build]
system = "configure"
configure = "./configure --prefix=/usr --with-openssl"
build = "make -j$(nproc)"
install = "make install DESTDIR=$DESTDIR"

[depends]
runtime = ["musl", "libressl"]
build = ["clang", "libressl"]
