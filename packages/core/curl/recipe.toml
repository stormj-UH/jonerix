[package]
name = "curl"
version = "8.11.1-r6"
license = "MIT"
description = "Command-line tool and library for transferring data with URLs"

[source]
url = "https://curl.se/download/curl-8.11.1.tar.gz"
sha256 = "a889ac9dbba3644271bd9d1302b5c22a088893719b72be3487bc3d401e5c4e80"

[build]
system = "cmake"
configure = """# CMake's FindOpenSSL creates imported targets OpenSSL::SSL and
# OpenSSL::Crypto only when it locates both libssl and libcrypto.
# On jonerix (merged-usr, no /usr prefix) the libraries live under /lib
# and headers under /include. Setting OPENSSL_ROOT_DIR=/ and
# CMAKE_PREFIX_PATH=/ lets FindOpenSSL probe /lib and /include directly.
# Dropping OPENSSL_FOUND=TRUE (which was added in r3) is intentional:
# forcing OPENSSL_FOUND bypasses the target-creation codepath in
# FindOpenSSL.cmake, leaving OpenSSL::SSL undefined and causing the
# "target was not found" CMake error at generate time.
cmake -B build -G Ninja \
  -DCURL_USE_OPENSSL=ON \
  -DOPENSSL_ROOT_DIR=/ \
  -DOPENSSL_INCLUDE_DIR=/include \
  -DOPENSSL_SSL_LIBRARY=/lib/libssl.so \
  -DOPENSSL_CRYPTO_LIBRARY=/lib/libcrypto.so \
  -DUSE_NGHTTP2=ON \
  -DNGHTTP2_INCLUDE_DIR=/include \
  -DNGHTTP2_LIBRARY=/lib/libnghttp2.so \
  -DCURL_ZLIB=ON \
  -DZLIB_INCLUDE_DIR=/include \
  -DZLIB_LIBRARY=/lib/libz.a \
  -DBUILD_SHARED_LIBS=ON \
  -DBUILD_CURL_EXE=ON \
  -DCURL_DISABLE_LDAP=ON \
  -DCURL_USE_LIBSSH2=OFF \
  -DBUILD_TESTING=OFF \
  -DBUILD_EXAMPLES=OFF \
  -DCMAKE_INSTALL_PREFIX=/ \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DCMAKE_PREFIX_PATH=/ \
  -DCMAKE_C_COMPILER=clang \
  -DCMAKE_BUILD_TYPE=Release"""
build = "samu -C build -j$(nproc)"
install = """DESTDIR=$DESTDIR samu -C build install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
if [ -f "$DESTDIR/bin/curl-config" ]; then sed -i 's#/lib64#/lib#g' "$DESTDIR/bin/curl-config"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl", "libressl", "zlib", "libnghttp2"]
build = ["clang", "cmake", "samurai", "libressl", "zlib", "libnghttp2"]
