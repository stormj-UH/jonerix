[package]
name = "curl"
version = "8.11.1"
license = "MIT"
description = "Command-line tool and library for transferring data with URLs"

[source]
url = "https://curl.se/download/curl-8.11.1.tar.xz"
sha256 = "c7ca7db48b0909743eaef34250da02c19bc61d4f1dcedd6603f109409536ab56"

[build]
system = "configure"
configure = "./configure --prefix=/ --with-openssl --without-libpsl"
build = "make -j$(nproc)"
install = "make install DESTDIR=$DESTDIR"

[depends]
runtime = ["musl", "libressl"]
build = ["clang", "libressl"]
