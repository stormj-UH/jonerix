[package]
name = "curl"
version = "8.11.1"
license = "MIT"
pre_bootstrap = false
description = "Command-line tool and library for transferring data with URLs"

[build]
system = "custom"
build = """
set -e
apk add --no-cache curl libcurl brotli-libs c-ares libunistring libidn2 nghttp2-libs nghttp3 libpsl
for pkg in curl libcurl brotli-libs c-ares libunistring libidn2 nghttp2-libs nghttp3 libpsl; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -Ev '(/$|^$)' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl", "openssl"]
build = []
