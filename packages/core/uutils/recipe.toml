[package]
name = "uutils"
version = "0.4.0"
license = "MIT"
pre_bootstrap = false
description = "Rust rewrite of GNU coreutils (tr, expr, sort, wc, cut, and 70+ more)"

[source]
url = "https://github.com/uutils/coreutils/archive/refs/tags/0.4.0.tar.gz"
sha256 = "5f0c3f97b807e72edccc844c6a685ec9862199f16a665df07de5b1d20ec21233"

[build]
system = "custom"
build = """cargo fetch
RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static" cargo build --release"""
install = """make PROFILE=release DESTDIR=$DESTDIR PREFIX=/ install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[hooks]
post_remove = """# Restore toybox symlinks for commands uutils replaced
CMDS="base64 basename cat chgrp chmod chown chroot cksum comm cp cut
 date dd df dirname du echo env expand factor false fold groups head
 id install kill link ln logname ls md5sum mkdir mkfifo mknod mktemp
 mv nice nl nohup nproc od paste printf pwd readlink realpath rm rmdir
 seq sha1sum sha256sum sha512sum shred sleep sort split stat sync tail
 tee test timeout touch tr true truncate tty uname unexpand uniq unlink
 uptime wc who whoami yes"
for cmd in $CMDS; do
  [ ! -e "/bin/$cmd" ] && [ -x /bin/toybox ] && ln -sf toybox "/bin/$cmd"
done"""

[depends]
runtime = ["musl"]
build = ["rust", "make"]
