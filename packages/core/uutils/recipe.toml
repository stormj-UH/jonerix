[package]
name = "uutils"
version = "0.7.0-r2"
license = "MIT"
description = "Rust rewrite of GNU coreutils (tr, sort, wc, cut, and 70+ more)"
# Claim toybox's multicall /bin/* symlinks for every command uutils
# provides. Without this, `jpkg install uutils` errors out on every
# /bin/<cmd> file already owned by toybox. Requires jpkg >= 1.0.4.
#
# 0.7.0-r2: drop /bin/expr from the takeover set so we don't overwrite
# exproxide's POSIX-strict expr.  Audit run 2026-05-08 found that was
# the only command in the CMDS list with a non-toybox owner; everything
# else is either toybox-or-uutils or uutils-only.  toybox 0.8.11-r5
# now restores uutils' winning symlinks in its post_install so that
# `jpkg upgrade toybox` doesn't silently stomp the takeover via tarball
# extraction.
replaces = ["toybox"]

[source]
url = "https://github.com/uutils/coreutils/archive/refs/tags/0.7.0.tar.gz"
sha256 = "adf555817bd13f9600dd6f86e4087c46c4bd47876f732646110e36c8e00c1db1"

[build]
system = "custom"
# Build the multicall binary directly. Hand-rolled install below avoids
# the upstream GNUmakefile entirely — its install-manpages depends on
# building uudoc (which drags in clap_mangen + zip), and its tab-indented
# PROFILE_CMD ifeq trips a jmake parser bug in 0.4.0's GNUmakefile
# (see uutils drill-down 2026-04-15).
build = """export CARGO_HTTP_CAINFO=/etc/ssl/certs/ca-certificates.crt
export RUSTFLAGS="-C strip=symbols -C target-feature=-crt-static"
# feat_os_unix bundles all 80+ applets for a unix-platform multicall.
# Using MULTICALL=y via feature, not the upstream GNUmakefile, since we
# drive cargo directly (see header comment). The previous `grep PROGS :=`
# hack silently produced a 720 KB stub because upstream defines PROGS as
# a multi-line sed extraction, not a single-line assignment — our grep
# matched nothing and `--features "" --no-default-features` built empty.
cargo build --release --frozen --offline --features feat_os_unix --no-default-features"""
install = """set -e
install -Dm755 target/release/coreutils "$DESTDIR/bin/uutils"

# Create per-command symlinks (mirrors upstream GNUmakefile MULTICALL=y layout).
CMDS="arch base32 base64 basename basenc cat chgrp chmod chown chroot cksum
 comm cp csplit cut date dd df dir dircolors dirname du echo env expand
 factor false fmt fold groups hashsum head hostname id install join
 kill link ln logname ls md5sum mkdir mkfifo mknod mktemp more mv nice
 nl nohup nproc numfmt od paste pr printenv printf ptx pwd readlink
 realpath rm rmdir seq sha1sum sha224sum sha256sum sha384sum sha512sum
 shred shuf sleep sort split stat stdbuf stty sum sync tac tail tee
 test timeout touch tr true truncate tsort tty uname unexpand uniq
 unlink uptime users vdir wc who whoami yes"
# Note: expr is owned by exproxide (POSIX-strict standalone).  We don't
# claim it here; `replaces = ["toybox"]` is targeted at toybox-only
# overlaps.
for cmd in $CMDS; do
  ln -sf uutils "$DESTDIR/bin/$cmd"
done
# [ is a symlink to test
ln -sf uutils "$DESTDIR/bin/["

if command -v readelf >/dev/null 2>&1 && \
   readelf -d "$DESTDIR/bin/uutils" 2>/dev/null | grep -Eq 'libgcc_s|libstdc\\+\\+'; then
  echo "FATAL: uutils still links against GCC runtime"
  exit 1
fi
llvm-strip --strip-all "$DESTDIR/bin/uutils" 2>/dev/null || true"""

[hooks]
# post_install runs on the live system AFTER the staged files extract.
# Belt-and-suspenders: the install step above already writes the per-
# command symlinks into $DESTDIR/bin/, so tar-extraction usually handles
# it. But if a /bin/<cmd> was something non-symlink before (e.g. a user
# wrapper script), tar may leave it in place. Re-ln here to guarantee
# the takeover. Uses the same CMDS list as post_remove so the two stay
# in sync.
post_install = """CMDS="arch base32 base64 basename basenc cat chgrp chmod chown
 chroot cksum comm cp csplit cut date dd df dir dircolors dirname du
 echo env expand factor false fmt fold groups hashsum head hostname
 id install join kill link ln logname ls md5sum mkdir mkfifo mknod
 mktemp more mv nice nl nohup nproc numfmt od paste pr printenv printf
 ptx pwd readlink realpath rm rmdir seq sha1sum sha224sum sha256sum
 sha384sum sha512sum shred shuf sleep sort split stat stdbuf stty sum
 sync tac tail tee test timeout touch tr true truncate tsort tty uname
 unexpand uniq unlink uptime users vdir wc who whoami yes"
for cmd in $CMDS; do
  ln -sf uutils "/bin/$cmd" 2>/dev/null || true
done
ln -sf uutils "/bin/[" 2>/dev/null || true
exit 0"""

post_remove = """# Restore toybox symlinks for commands uutils took over.
# Only restore ones that no longer exist AND toybox is still present.
CMDS="arch base32 base64 basename basenc cat chgrp chmod chown chroot
 cksum comm cp csplit cut date dd df dir dircolors dirname du echo env
 expand factor false fmt fold groups hashsum head hostname id
 install join kill link ln logname ls md5sum mkdir mkfifo mknod mktemp
 more mv nice nl nohup nproc numfmt od paste pr printenv printf ptx
 pwd readlink realpath rm rmdir seq sha1sum sha224sum sha256sum
 sha384sum sha512sum shred shuf sleep sort split stat stdbuf stty sum
 sync tac tail tee test timeout touch tr true truncate tsort tty uname
 unexpand uniq unlink uptime users vdir wc who whoami yes"
for cmd in $CMDS; do
  [ ! -e "/bin/$cmd" ] && [ -x /bin/toybox ] && ln -sf toybox "/bin/$cmd"
done
[ ! -e "/bin/[" ] && [ -x /bin/toybox ] && ln -sf toybox "/bin/["
# Hand /bin/expr back to exproxide if it's installed.
[ ! -e "/bin/expr" ] && [ -x /bin/exproxide ] && ln -sf exproxide "/bin/expr"
exit 0"""

[depends]
runtime = ["musl"]
build = ["rust", "jmake"]
