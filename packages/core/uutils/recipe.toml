[package]
name = "uutils"
version = "0.4.0"
license = "MIT"
pre_bootstrap = true
description = "Rust rewrite of GNU coreutils (tr, expr, sort, wc, cut, and 70+ more)"

[build]
system = "custom"
build = """
set -e
apk add --no-cache uutils oniguruma libgcc
for pkg in uutils oniguruma libgcc; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -Ev '(/$|^$)' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl"]
build = []
