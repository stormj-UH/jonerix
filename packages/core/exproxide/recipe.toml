[package]
# Clean-room Rust implementation of expr(1). Naming matches the
# other "-oxide" Rust reimplementations in jonerix (anvil, nloxide,
# m4oxide). Cargo crate, binary on disk, and jpkg package are all
# named `exproxide`; a /bin/expr symlink is installed so autoconf
# ./configure scripts resolve `expr` to the Rust implementation
# instead of toybox's multicall.
name = "exproxide"
version = "0.1.1-r0"
license = "MIT"
description = "Clean-room Rust implementation of expr for jonerix"
# Claim /bin/expr from whichever package was previously providing it
# — toybox's multicall shim on a fresh jonerix, or uutils on a host
# that has already pulled in the Rust coreutils reimplementation.
# Without replaces, jpkg rejects the install on a file-conflict and
# the /bin/expr symlink never flips over to exproxide.
replaces = ["toybox", "uutils"]

[source]
# Canonical source: Forgejo jonerik/exproxide on
# castle.great-morpho.ts.net:3000. That host is behind Tailscale and
# unreachable from GitHub-hosted runners, so the tarball is mirrored
# to a jonerix GH release tag for CI to fetch.
#
# Forgejo URL (primary, reachable from inside the jonerix network):
#   https://castle.great-morpho.ts.net:3000/jonerik/exproxide/archive/v0.1.1.tar.gz
#   (or commit ed9ddcf which the v0.1.1 tag points to)
url = "https://github.com/stormj-UH/jonerix/releases/download/source-exproxide-v0.1.1/exproxide-0.1.1.tar.gz"
sha256 = "c59a941317b69d9330368a004ee7ba958956aed7025b0af75f96c40394b145d9"

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/exproxide-cargo
export CARGO_TARGET_DIR="$PWD/target"
export CARGO_NET_OFFLINE=true
# Repo policy: zero rustc warnings (also enforced by #![deny(warnings)] +
# #![forbid(unsafe_code)] at the crate root). crt-static for a fully
# musl-static binary. Cargo.toml ships a fat-LTO release profile.
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static -D warnings"
cargo test --frozen --offline
cargo build --release --frozen --offline --bin exproxide
"""
install = """
set -e
BIN="$PWD/target/release/exproxide"
install -Dm755 "$BIN" "$DESTDIR/bin/exproxide"
ln -sf exproxide "$DESTDIR/bin/expr"
llvm-strip --strip-all "$DESTDIR/bin/exproxide" 2>/dev/null || true
"""

[hooks]
# Takeover logic. install(1) above already put /bin/exproxide and a
# /bin/expr -> exproxide symlink into $DESTDIR, and jpkg carries
# those onto the live rootfs with replaces = [toybox, uutils]
# transferring ownership of /bin/expr away from whichever package
# previously owned it. This post_install is a belt-and-suspenders
# refresh for two real-world cases:
#   1. Upgrading from the typo'd `expre` package where /bin/expr
#      might still be a dangling symlink to /bin/expre.
#   2. A rare jpkg race where replaces transfer happens after
#      extraction and another package's post-install hook (toybox
#      re-link, uutils symlink sweep) was fired first and clobbered
#      /bin/expr back to its own multicall.
# We unconditionally relink to /bin/exproxide so the target lands on
# the Rust implementation once this hook runs.
post_install = """
if [ -x /bin/exproxide ]; then
    ln -sf exproxide /bin/expr 2>/dev/null || true
fi
exit 0
"""

# Hand /bin/expr back on removal. Prefer uutils (full Rust coreutils
# reimplementation — closer semantics than toybox's minimal expr) if
# it's installed; fall back to toybox; otherwise leave /bin/expr
# absent so the user sees an honest "command not found" instead of
# silently running an incompatible implementation. jpkg will have
# already removed /bin/exproxide and /bin/expr since they were ours;
# this hook only re-creates /bin/expr, not /bin/exproxide.
post_remove = """
if [ -e /bin/expr ] || [ -L /bin/expr ]; then
    # Something already owns /bin/expr — don't clobber.
    exit 0
fi
if [ -x /bin/uutils ]; then
    ln -sf uutils /bin/expr
elif [ -x /bin/toybox ]; then
    ln -sf toybox /bin/expr
fi
exit 0
"""

[depends]
runtime = ["musl"]
build = ["rust"]
