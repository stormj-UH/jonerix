[package]
name = "xz"
version = "5.8.2-r2"
license = "0BSD"
description = "XZ compression utilities and liblzma (with development headers)"

[source]
url = "https://github.com/tukaani-project/xz/releases/download/v5.8.2/xz-5.8.2.tar.xz"
sha256 = "890966ec3f5d5cc151077879e157c0593500a522f413ac50ba26d22a9a145214"

[build]
system = "cmake"
configure = "cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_INSTALL_PREFIX=/ -DCMAKE_INSTALL_LIBDIR=lib -DBUILD_SHARED_LIBS=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON"
build = "samu -C build -j$(nproc)"
# xz 5.8+ splits its install() rules into two CMake components:
#   liblzma_Runtime      — liblzma.so.5.* + xz/xzdec/lzma* binaries
#   liblzma_Development  — lzma.h headers, lib/liblzma.so namelink,
#                          lib/pkgconfig/liblzma.pc, lib/cmake/liblzma/
# `samu install` only catches Runtime, which is why python3 builds
# hit "lzma.h file not found" — reproduced CI run 24688259688.
# `cmake --install` per-component pulls both. Runtime must come
# first so the namelink has something to point at.
install = """set -e
# xz 5.8.2 defines a handful of install components; iterate all
# the ones we want (excludes Documentation since we strip man
# pages from jonerix images anyway). The liblzma runtime and
# development components are mandatory; the command symlink sets
# remain optional across upstream CMake changes.
for comp in liblzma_Runtime liblzma_Development; do
    DESTDIR="$DESTDIR" cmake --install build --component "$comp"
done
for comp in xz_Runtime lzmainfo_Runtime scripts_Runtime; do
    DESTDIR="$DESTDIR" cmake --install build --component "$comp" || true
done
# Merged-usr flatten FIRST — cmake with PREFIX=/ still writes
# headers + cmake/pkgconfig exports under $DESTDIR/usr/... (cmake
# treats absolute prefix + DESTDIR as prefix-relative, so
# /include ends up at $DESTDIR/usr/include). Collapse /usr/ into
# / so the jpkg ships merged-usr paths.
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
# Sanity: the header MUST be present post-flatten — python3 and
# every other lzma consumer needs it. Fail loud if CMake changed
# the component layout out from under us.
[ -f "$DESTDIR/include/lzma.h" ] || { echo "xz: lzma.h missing after install+flatten" >&2; find "$DESTDIR" -name '*.h' | head -20 >&2; exit 1; }
[ -e "$DESTDIR/lib/liblzma.so.5" ] || { echo "xz: liblzma.so.5 missing after install+flatten" >&2; find "$DESTDIR/lib" -maxdepth 1 \( -type f -o -type l \) | sort >&2; exit 1; }
find "$DESTDIR/bin" -type f -exec llvm-strip --strip-all {} ';' 2>/dev/null || true
find "$DESTDIR/lib" -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} ';' 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang", "cmake", "samurai"]
