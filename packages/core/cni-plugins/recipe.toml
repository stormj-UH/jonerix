[package]
name = "cni-plugins"
version = "1.9.1"
license = "Apache-2.0"
pre_bootstrap = true
description = "CNI network plugins for container networking"
# From-source build requires Go compiler (not yet bootstrapped on jonerix)

[build]
system = "custom"
build = """
set -e
ARCH=$(uname -m)
if [ "$ARCH" = "aarch64" ]; then
  URL="https://github.com/containernetworking/plugins/releases/download/v1.9.1/cni-plugins-linux-arm64-v1.9.1.tgz"
  SHA="56171987d3947707c3563db2f4001bccaf50fd63468611b9f3cbecb1375ee7ec"
else
  URL="https://github.com/containernetworking/plugins/releases/download/v1.9.1/cni-plugins-linux-amd64-v1.9.1.tgz"
  SHA="b98f74a0f8522f0a83867178729c1aa70f2158f90c45a2ca8fa791db1c76b303"
fi
curl -fsSL "$URL" -o cni-plugins.tgz
printf '%s  cni-plugins.tgz\n' "$SHA" | sha256sum -c
mkdir -p "$DESTDIR/lib/cni"
tar xf cni-plugins.tgz -C "$DESTDIR/lib/cni"
rm -f "$DESTDIR/lib/cni/README.md" "$DESTDIR/lib/cni/LICENSE"
"""
install = ""

[depends]
runtime = ["musl"]
build = []
