[package]
name = "doas"
version = "6.8.2-r5"
license = "ISC"
description = "Lightweight privilege escalation tool (OpenDoas)"

[source]
url = "https://github.com/Duncaen/OpenDoas/releases/download/v6.8.2/opendoas-6.8.2.tar.xz"
sha256 = "4e98828056d6266bd8f2c93e6ecf12a63a71dbfd70a5ea99ccd4ab6d0745adf0"

[build]
system = "autoconf"
configure = """CFLAGS="-O2 -fomit-frame-pointer" CC=clang ./configure --prefix=/ --bindir=/bin
# OpenDoas's GNUmakefile lists parse.y in SRCS but has no explicit .y→.c
# rule; it relies on make's built-in implicit rule. jmake (jonerix make)
# does not carry that built-in, so parse.c is never generated and the build
# fails with "parse.y: inaccessible or not found" (exit 127).
# Pre-generate parse.c here so make finds it already built.
byacc -o parse.c parse.y"""
build = "make -j$(nproc)"
install = """set -e
install -Dm755 doas "$DESTDIR/bin/doas"
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true
chmod 4755 "$DESTDIR/bin/doas" """

[depends]
runtime = ["musl"]
build = ["clang", "make", "byacc"]
