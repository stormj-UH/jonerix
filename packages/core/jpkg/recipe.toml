[package]
name = "jpkg"
version = "2.2.3"
license = "0BSD"
description = "jonerix package manager (Rust 2.0 — supersedes the C jpkg 1.1.5)"
# 2.2.3 — proper upgrade-clean + better collision error messages.  Fixes
# the ncurses-6.5-r3 -> r4 upgrade failure where `sudo jpkg install --force
# ncurses` died with `I/O error: File exists (os error 17)` and no path:
# r3 ships /lib/terminfo as a populated directory, r4 ships it as a symlink
# to ../share/terminfo, and install_files' fs::remove_dir only succeeds on
# empty directories so the symlink call hit EEXIST.  Three compounding
# changes ship together:
#   1. Implement real upgrade-clean.  When db.get(name) returns an old
#      version, diff the old manifest against the new manifest and remove
#      old-owned files that no longer exist in the new layout.  This is
#      what apt/rpm/pacman have always done.
#   2. Allow dir -> symlink (and symlink -> dir) layout flips when the same
#      package owned the directory before.  remove_dir_all is gated on
#      every file under the doomed dir appearing in the OLD manifest — any
#      foreign content (user data, another package's file) aborts the
#      upgrade with a clear message naming the offending paths instead of
#      silently nuking it.
#   3. Plumb the conflicting path into the InstallError display.  The
#      bare `File exists (os error 17)` is replaced with `cannot create
#      symlink at /lib/terminfo: File exists (os error 17)` so the
#      failing path is visible in the first line of the user's terminal.
#
# 2.2.2 — add the `jpkg -uu` shortcut (Arch-style "refresh repos then
# upgrade everything", equivalent to `pacman -Syu`).  Composes the existing
# `update` and `upgrade` entry points so all flag handling stays in one
# place; if `update` fails, `upgrade` is skipped and the combined op exits
# with `update`'s exit code.  Help text and the verb-dispatch table both
# advertise the new form.
#
# jpkg 2.0 is the from-scratch Rust port of the C jpkg 1.1.5 — same wire
# format (`JPKG\x00\x01\x00\x00` magic + LE32 hdr + TOML metadata + zstd(tar)
# payload), same /var/db/jpkg/installed/<name>/{metadata.toml,files} on-disk
# layout, same INDEX TOML grammar, same Ed25519 detached `.sig` flow, same
# merged-/usr layout audit, same `replaces = […]` ownership transfer.  The
# 1.1.5 series shipped from packages/jpkg/{src,build.ninja} as C; that tree
# was retired when this recipe took the package name.  See the README's
# "Rust drop-in replacements" section for the in-house port background.
#
# Two binaries are installed: /bin/jpkg (subcommand dispatcher + the
# network-touching verbs: install, update, upgrade, remove, search, info,
# verify, license-audit, keygen, sign) and /bin/jpkg-local (the local-only
# verbs: install <file.jpkg|url|->, build <recipe>).  Unknown verbs fall
# through to PATH-resolved `jpkg-<verb>` binaries, so /bin/jpkg-conform
# (shell script, shipped in this same package) continues to work as
# `jpkg conform <ver>` per the 1.1.x convention.
#
# Zero `unsafe` Rust (`#![forbid(unsafe_code)]` at the crate root).

[source]
# Local-only build from $RECIPE_DIR — no external upstream URL.

[build]
system = "custom"
configure = "cp -a $RECIPE_DIR/Cargo.toml $RECIPE_DIR/Cargo.lock $RECIPE_DIR/src $RECIPE_DIR/.cargo $RECIPE_DIR/vendor ."
build = """set -e
export CARGO_HTTP_CAINFO=/etc/ssl/certs/ca-certificates.crt
export OPENSSL_DIR=/
export OPENSSL_INCLUDE_DIR=/include
export OPENSSL_LIB_DIR=/lib
# crt-static + strip=symbols mirror packages/core/stormwall/recipe.toml.
# Passing --target $HOST_TRIPLE splits cargo's compilation lanes so the
# proc-macros (serde_derive, der_derive, …) build for the host without
# crt-static while the target binaries link statically against musl.
TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static"
cargo build --release --frozen --target "$TRIPLE" --bin jpkg --bin jpkg-local
mkdir -p target/release
cp -f "target/$TRIPLE/release/jpkg" target/release/jpkg
cp -f "target/$TRIPLE/release/jpkg-local" target/release/jpkg-local
# Null-pad any residual `/lib64` reference (the rust runtime can leave
# the dynamic-linker fallback string in the binary even with crt-static).
# Use Python's bytestring replace — sed implementations across the build
# environments (Alpine BusyBox, jonerix bsdsed) handle `\x00` differently
# and some output literal `\x00` instead of NUL bytes, corrupting the ELF.
# See packages/extra/runc/recipe.toml for the canonical pattern.
for b in target/release/jpkg target/release/jpkg-local; do
    python3 -c "
import sys
p = sys.argv[1]
d = open(p,'rb').read()
n = d.count(b'/lib64')
if n:
    open(p,'wb').write(d.replace(b'/lib64', b'/lib\\x00\\x00'))
    print(f'{p}: nulled {n} /lib64 refs', file=sys.stderr)
" "$b" || true
done
"""
install = """set -e
install -Dm755 target/release/jpkg "$DESTDIR/bin/jpkg"
install -Dm755 target/release/jpkg-local "$DESTDIR/bin/jpkg-local"
install -Dm755 "$RECIPE_DIR/bin/jpkg-conform" "$DESTDIR/bin/jpkg-conform"
llvm-strip --strip-all "$DESTDIR/bin/jpkg" 2>/dev/null || true
llvm-strip --strip-all "$DESTDIR/bin/jpkg-local" 2>/dev/null || true
# Ship the standard jpkg directory tree so a fresh install doesn't need
# any post-install bootstrap.
install -d "$DESTDIR/etc/jpkg/keys"
install -d "$DESTDIR/var/db/jpkg/installed"
install -d "$DESTDIR/var/cache/jpkg"
"""

[depends]
# mksh is required at runtime: /bin/jpkg-conform has `#!/bin/mksh` because
# toybox sh (jonerix's other /bin/sh provider) rejects `set -e`, has no
# `trap` builtin, and has no `command` builtin — all of which jpkg-conform
# uses. Without this dep, `jpkg conform <ver>` on a host whose /bin/sh is
# toybox dies with "set: bad -e" / "sh: trap: No such file or directory"
# / "curl not found" (the latter from `command -v curl` returning
# command-not-found because toybox sh has no `command` builtin).
runtime = ["musl", "mksh"]
build = ["rust"]
