[package]
name = "nerdctl"
version = "2.2.1"
license = "Apache-2.0"
pre_bootstrap = false
description = "Docker-compatible CLI for containerd"

[source]
url = "sources/nerdctl-2.2.1.tar.gz"  # vendored in sources/
sha256 = "f39c34d3a285e087f2b2869f06fea343d8285ad9bfb9417b9c5b6dd4e78d6fad"

[build]
system = "custom"
build = """go mod download
CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" ./cmd/nerdctl"""
install = """install -Dm755 nerdctl $DESTDIR/bin/nerdctl
ln -sf nerdctl $DESTDIR/bin/docker
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl", "containerd", "runc", "cni-plugins"]
build = ["go"]
