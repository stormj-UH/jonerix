[package]
name = "zsh"
version = "5.9"
license = "MIT"
pre_bootstrap = false
description = "Z shell — feature-rich interactive shell"

[source]
url = "https://www.zsh.org/pub/zsh-5.9.tar.xz"
sha256 = "9b8d1ecedd5b5e81fbf1918e876752a7dd948e05c1a0dba10ab863842d45acd5"

[build]
system = "autoconf"
configure = "CFLAGS=\"-O2 -fomit-frame-pointer\" ./configure --prefix=/ --bindir=/bin --mandir=/share/man --infodir=/share/info --with-tcsetpgrp --enable-multibyte --enable-unicode9 --disable-gdbm --without-tcl CC=clang"
build = "make -j$(nproc)"
install = """
make DESTDIR=$DESTDIR install
printf '# /etc/zshrc — jonerix system-wide zsh interactive config\n\nautoload -Uz colors && colors\n\nPROMPT='"'"'%%F{cyan}%%~%%f %%F{yellow}%%m%%f %%# '"'"'\n' > $DESTDIR/etc/zshrc
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true
"""

[depends]
runtime = ["musl", "ncurses"]
build = ["clang", "make"]
