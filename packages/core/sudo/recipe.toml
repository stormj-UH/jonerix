[package]
name = "sudo"
version = "1.9.17p2"
license = "ISC"
description = "Privilege escalation utility"

[source]
url = "https://www.sudo.ws/dist/sudo-1.9.17p2.tar.gz"
sha256 = "4a38a1ab3adb1199257edc2a7c4a2bd714665eb605b04368843b06dada2cfcfb"

[build]
system = "custom"
build = """set -e
# autoconf's configure needs `expr` which jonerix doesn't ship (not in toybox).
# Install a minimal POSIX expr shim before running configure.
# Autoconf's configure uses `expr STRING : BRE` with \(...\) group extraction.
# jonerix has no expr binary (not in toybox). Compile a minimal C implementation
# inline — handles regex groups, arithmetic, length, and comparisons (~40 LOC).
cat > /tmp/expr.c <<'CEOF'
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <regex.h>
static long tolong(const char *s, int *ok) {
    char *e; long v = strtol(s, &e, 10); *ok = (*e == 0 && e != s); return v;
}
int main(int argc, char **argv) {
    if (argc == 3 && !strcmp(argv[1], "length")) {
        printf("%zu\n", strlen(argv[2])); return 0;
    }
    if (argc == 4 && !strcmp(argv[2], ":")) {
        regex_t re; regmatch_t m[2]; int has_group = !!strstr(argv[3], "\\(");
        if (regcomp(&re, argv[3], 0)) { fprintf(stderr, "expr: bad regex\n"); return 2; }
        if (regexec(&re, argv[1], 2, m, 0) == 0) {
            if (has_group && m[1].rm_so >= 0)
                printf("%.*s\n", (int)(m[1].rm_eo - m[1].rm_so), argv[1] + m[1].rm_so);
            else
                printf("%d\n", (int)(m[0].rm_eo - m[0].rm_so));
            regfree(&re); return 0;
        }
        regfree(&re); printf(has_group ? "\n" : "0\n"); return 1;
    }
    if (argc == 4) {
        int ok1, ok2; long a = tolong(argv[1], &ok1), b = tolong(argv[3], &ok2);
        if (ok1 && ok2) {
            long r = 0; char *op = argv[2];
            if (!strcmp(op,"+")) r=a+b; else if (!strcmp(op,"-")) r=a-b;
            else if (!strcmp(op,"*")) r=a*b;
            else if (!strcmp(op,"/")) { if(!b){fprintf(stderr,"expr: division by zero\n");return 2;} r=a/b; }
            else if (!strcmp(op,"%")) { if(!b){fprintf(stderr,"expr: division by zero\n");return 2;} r=a%b; }
            else if (!strcmp(op,"="))  r=(a==b); else if (!strcmp(op,"!=")) r=(a!=b);
            else if (!strcmp(op,"<"))  r=(a<b);  else if (!strcmp(op,">"))  r=(a>b);
            else if (!strcmp(op,"<=")) r=(a<=b); else if (!strcmp(op,">=")) r=(a>=b);
            else { fprintf(stderr, "expr: unknown op: %s\n", op); return 2; }
            printf("%ld\n", r); return r == 0 ? 1 : 0;
        }
    }
    if (argc == 2) { printf("%s\n", argv[1]); return 0; }
    fprintf(stderr, "expr: syntax error\n"); return 2;
}
CEOF
clang -Os --rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld -o /bin/expr /tmp/expr.c
rm -f /tmp/expr.c

GREP=/bin/grep EGREP="/bin/grep -E" FGREP="/bin/grep -F" CFLAGS="-O2 -fomit-frame-pointer" LDFLAGS="-Wl,--disable-new-dtags" ./configure --prefix=/ --bindir=/bin --sbindir=/bin --libexecdir=/lib --sysconfdir=/etc --with-rundir=/run/sudo --with-vardir=/var/db/sudo --with-logpath=/var/log/sudo.log --without-pam --without-skey --without-opie --disable-nls --disable-rpath --enable-static-sudoers --with-env-editor CC=clang
make -j$(nproc)
"""
install = """set -e
make DESTDIR=$DESTDIR install
rm -f /bin/expr
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
rm -rf "$DESTDIR/share/doc" "$DESTDIR/include"
rm -f "$DESTDIR/lib/sudo/libsudo_util.a" "$DESTDIR/lib/sudo/libsudo_util.la"
find $DESTDIR/lib -name "*.la" -delete

# Strip /lib64 references from ALL files (RPATH, DT_NEEDED, embedded
# strings — anywhere it appears). Null-pad /lib64 -> /lib\0\0 (same length,
# terminates string early). Safe: jonerix has no /lib64, so the padded
# path dereferences to /lib. Run on everything because /lib64 can appear
# in strings, symbol names, debug info, etc — not just RPATH.
for f in $(find $DESTDIR -type f); do
    if grep -l "/lib64" "$f" >/dev/null 2>&1; then
        matches=$(strings "$f" 2>/dev/null | grep "/lib64" | head -2 | tr '\\n' '|')
        python3 -c "
import sys
p = sys.argv[1]
with open(p,'rb') as f: d = f.read()
n = d.count(b'/lib64')
d = d.replace(b'/lib64', b'/lib\\x00\\x00')
with open(p,'wb') as f: f.write(d)
print(f'sudo lib64-fix: {p} replaced {n} refs (saw: $matches)')
" "$f" 2>&1 || true
    fi
done

chmod 4755 $DESTDIR/bin/sudo
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl", "libressl"]
build = ["clang", "make", "jonerix-headers"]
