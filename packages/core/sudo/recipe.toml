[package]
name = "sudo"
version = "1.9.17p2-r1"
license = "ISC"
description = "Privilege escalation utility"

[source]
url = "https://www.sudo.ws/dist/sudo-1.9.17p2.tar.gz"
sha256 = "4a38a1ab3adb1199257edc2a7c4a2bd714665eb605b04368843b06dada2cfcfb"

[build]
system = "custom"
build = """set -e
GREP=/bin/grep EGREP="/bin/grep -E" FGREP="/bin/grep -F" CFLAGS="-O2 -fomit-frame-pointer" LDFLAGS="-Wl,--disable-new-dtags" ./configure --prefix=/ --bindir=/bin --sbindir=/bin --libexecdir=/lib --sysconfdir=/etc --with-rundir=/run/sudo --with-vardir=/var/db/sudo --with-logpath=/var/log/sudo.log --without-pam --without-skey --without-opie --disable-nls --disable-rpath --disable-intercept --disable-noexec --enable-static-sudoers --with-env-editor CC=clang
make -j$(nproc)
"""
install = """set -e
make DESTDIR=$DESTDIR install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
# Merged-usr flatten for /sbin — sudo honors --sbindir=/bin but
# hand-rolled install hooks / man-page dirs / visudo have been
# observed dropping files into sbin/ on some autotools vintages.
if [ -d "$DESTDIR/sbin" ]; then cp -a "$DESTDIR/sbin/." "$DESTDIR/bin/" && rm -rf "$DESTDIR/sbin"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
rm -rf "$DESTDIR/share/doc" "$DESTDIR/include"
rm -f "$DESTDIR/lib/sudo/libsudo_util.a" "$DESTDIR/lib/sudo/libsudo_util.la"
find $DESTDIR/lib -name "*.la" -delete

# Strip /lib64 references from ALL files (RPATH, DT_NEEDED, embedded
# strings — anywhere it appears). Null-pad /lib64 -> /lib\0\0 (same length,
# terminates string early). Safe: jonerix has no /lib64, so the padded
# path dereferences to /lib. Run on everything because /lib64 can appear
# in strings, symbol names, debug info, etc — not just RPATH.
for f in $(find $DESTDIR -type f); do
    if grep -l "/lib64" "$f" >/dev/null 2>&1; then
        matches=$(strings "$f" 2>/dev/null | grep "/lib64" | head -2 | tr '\\n' '|')
        python3 -c "
import sys
p = sys.argv[1]
with open(p,'rb') as f: d = f.read()
n = d.count(b'/lib64')
d = d.replace(b'/lib64', b'/lib\\x00\\x00')
with open(p,'wb') as f: f.write(d)
print(f'sudo lib64-fix: {p} replaced {n} refs (saw: $matches)')
" "$f" 2>&1 || true
    fi
done

chmod 4755 $DESTDIR/bin/sudo
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl", "libressl"]
build = ["clang", "make", "exproxide", "jonerix-headers"]
