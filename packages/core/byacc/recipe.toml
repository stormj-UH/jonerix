[package]
name = "byacc"
version = "20241231"
license = "Public-Domain"
pre_bootstrap = true
description = "Berkeley Yacc parser generator"

[build]
system = "custom"
build = """
set -e
apk add --no-cache byacc
for pkg in byacc; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -Ev '(/$|^$)' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
ln -sf byacc "${DESTDIR}/bin/yacc"
"""
install = ""

[depends]
runtime = ["musl"]
build = []
