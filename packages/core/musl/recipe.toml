[package]
name = "musl"
version = "1.2.6"
license = "MIT"
pre_bootstrap = false
description = "Lightweight, fast, and standards-conformant C library"

[source]
url = "https://musl.libc.org/releases/musl-1.2.6.tar.gz"
sha256 = "d585fd3b613c66151fc3249e8ed44f77020cb5e6c1e635a616d3f9f82460512a"

[build]
system = "autoconf"
configure = "CFLAGS=\"-Os -fomit-frame-pointer\" ./configure --prefix=/ --syslibdir=/lib CC=clang"
build = "make -j$(nproc)"
install = """make DESTDIR=$DESTDIR install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/lib -name "libc.musl-*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = []
build = ["clang", "make"]
