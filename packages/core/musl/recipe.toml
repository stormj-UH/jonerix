[package]
name = "musl"
version = "1.2.5"
license = "MIT"
pre_bootstrap = true
description = "Lightweight, fast, and standards-conformant C library"

[build]
system = "custom"
build = """
set -e
apk add --no-cache musl
for pkg in musl; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -v '/\$' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = []
build = []
