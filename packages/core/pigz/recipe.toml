[package]
name = "pigz"
version = "2.8"
license = "Zlib"
description = "Parallel implementation of gzip"

[source]
url = "https://zlib.net/pigz/pigz-2.8.tar.gz"
sha256 = "FIXME"

[build]
system = "make"
build = "make CC=clang CFLAGS=\"-Os -pipe -fstack-protector-strong -fPIE\" LDFLAGS=\"-Wl,-z,relro,-z,now -pie\" -j$(nproc)"
install = "install -Dm755 pigz $DESTDIR/bin/pigz && ln -s pigz $DESTDIR/bin/gzip && ln -s pigz $DESTDIR/bin/gunzip && ln -s pigz $DESTDIR/bin/zcat"

[depends]
runtime = ["musl", "zlib"]
build = ["clang"]
