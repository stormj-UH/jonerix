[package]
name = "pigz"
version = "2.8"
license = "Zlib"
pre_bootstrap = false
description = "Parallel implementation of gzip"

[source]
url = "sources/pigz-2.8.tar.gz"  # vendored in sources/
sha256 = "2f7f6a6986996d21cb8658535fff95f1c7107ddce22b5324f4b41890e2904706"

[build]
system = "custom"
build = "make CC=clang CFLAGS=\"-O2 -fomit-frame-pointer\" -j$(nproc)"
install = """install -Dm755 pigz $DESTDIR/bin/pigz
ln -sf pigz $DESTDIR/bin/unpigz
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl", "zlib"]
build = ["clang", "make"]
