[package]
name = "mandoc"
version = "1.14.6"
license = "ISC"
pre_bootstrap = false
description = "UNIX manpage compiler and viewer"

[source]
url = "sources/mandoc-1.14.6.tar.gz"  # vendored in sources/
sha256 = "8bf0d570f01e70a6e124884088870cbed7537f36328d512909eb10cd53179d9c"

[build]
system = "custom"
build = """./configure PREFIX=/ BINDIR=/bin MANDIR=/share/man
make -j$(nproc)"""
install = """make DESTDIR=$DESTDIR install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang", "make"]
