[package]
name = "bsdtar"
version = "3.8.6-r7"
license = "Apache-2.0"
description = "Compatibility package providing /bin/tar via libarchive bsdtar"
# bsdtar is the system /bin/tar provider (via libarchive). Toybox's tar
# applet is a minimal fallback. Claim /bin/tar away from it so jpkg
# verify stays clean. Requires jpkg >= 1.0.4.
replaces = ["toybox"]

[build]
build = ""
# Install a tiny wrapper script (not a symlink) so the archive has a real file
# that toybox tar can extract. The script just execs bsdtar.
install = """mkdir -p $DESTDIR/bin
cat > $DESTDIR/bin/tar <<'EOF'
#!/bin/sh
exec bsdtar "$@"
EOF
chmod 755 $DESTDIR/bin/tar"""

[hooks]
post_remove = "[ ! -e /bin/tar ] && [ -x /bin/toybox ] && ln -sf toybox /bin/tar"

[depends]
runtime = ["libarchive"]
build = []
