[package]
name = "bsdtar"
version = "3.8.5"
license = "Apache-2.0"
pre_bootstrap = true
description = "BSD tar from libarchive (static binary, handles symlinks correctly)"

[build]
system = "custom"
build = """
set -e
apk add --no-cache clang lld llvm musl-dev cmake samurai curl \
  zlib-dev zlib-static openssl-dev openssl-libs-static \
  zstd-dev zstd-static xz-dev xz-static \
  expat-dev expat-static bzip2-dev bzip2-static linux-headers

curl -fsSL https://github.com/libarchive/libarchive/releases/download/v3.8.5/libarchive-3.8.5.tar.gz | tar xz
cd libarchive-3.8.5

cmake -B build -G Ninja \
  -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
  -DENABLE_TAR=ON -DENABLE_CPIO=ON -DENABLE_CAT=ON -DENABLE_TEST=OFF \
  -DENABLE_OPENSSL=ON -DENABLE_ZLIB=ON -DENABLE_LZMA=ON \
  -DENABLE_ZSTD=ON -DENABLE_LZ4=OFF -DENABLE_BZip2=ON \
  -DENABLE_EXPAT=ON -DENABLE_ACL=OFF

cmake --build build -j$(nproc)

# Static re-link bsdtar (zero shared lib deps)
clang -static -fuse-ld=lld -o bsdtar-static \
  build/tar/CMakeFiles/bsdtar.dir/*.o \
  build/tar/CMakeFiles/bsdtar.dir/__/libarchive_fe/*.o \
  -Wl,--start-group \
  build/libarchive/libarchive.a \
  /usr/lib/libz.a /usr/lib/libbz2.a /usr/lib/liblzma.a \
  /usr/lib/libzstd.a /usr/lib/libcrypto.a /usr/lib/libssl.a \
  /usr/lib/libexpat.a \
  -Wl,--end-group
llvm-strip bsdtar-static

mkdir -p "${DESTDIR}/bin"
install -m755 bsdtar-static "${DESTDIR}/bin/bsdtar"
"""
install = ""

[depends]
runtime = []
build = []
