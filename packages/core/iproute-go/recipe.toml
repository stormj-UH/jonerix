[package]
name = "iproute-go"
version = "0.16.0"
license = "BSD-3-Clause"
description = "u-root's ip command — Go reimplementation of iproute2's ip(8)"
# Ships /bin/ip; takes the path over from toybox (whose ip applet doesn't
# understand TUN devices like tailscale0 — reproduced 2026-04-15:
# `ip link` prints "Invalid link." and omits tailscale0 entirely even
# though /sys/class/net/tailscale0 exists and is in use).
replaces = ["toybox"]

[source]
# Canonical source is the upstream u-root v0.16.0 tag. The full
# upstream tarball is ~130MB and carries ~200 commands, which is too
# large to vendor directly in git. jonerix only builds cmds/core/ip
# and its local unixflag helper, so we mirror a minimal source snapshot
# to a jonerix GH release for CI and vendoring.
#
# Upstream URL (primary):
#   https://github.com/u-root/u-root/archive/refs/tags/v0.16.0.tar.gz
url = "https://github.com/stormj-UH/jonerix/releases/download/source-iproute-go-v0.16.0/iproute-go-0.16.0.tar.gz"
sha256 = "33bf3361d9815b7533e4ef742d446a105963f313e07d3ae5d0de64715c3b3ce7"

[build]
system = "custom"
# The mirrored snapshot contains go.mod/go.sum, vendor/, LICENSE,
# cmds/core/ip, and pkg/uroot/unixflag.
# CGO_ENABLED=0 + -trimpath -ldflags "-s -w" gives a static musl binary
# (~5-8MB) with no runtime deps.
build = """CGO_ENABLED=0 go build -mod=vendor -trimpath -ldflags="-s -w" -o ip ./cmds/core/ip"""
install = """install -Dm755 ip $DESTDIR/bin/ip
# Keep the binary itself; u-root's ip is a single-binary command.
# No stripping pass — go -ldflags -s -w already drops the debug symbols.
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi"""

[depends]
# Static binary — no runtime shared libs needed.
runtime = []
build = ["go"]
