[package]
name = "perl"
version = "5.40.0"
license = "Artistic-2.0"
pre_bootstrap = true
description = "Practical Extraction and Report Language"

[build]
system = "custom"
build = """
set -e
apk add --no-cache perl
for pkg in perl; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -Ev '(/$|^$)' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl"]
build = []
