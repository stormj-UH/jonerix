[package]
name = "btop"
version = "1.4.5"
license = "Apache-2.0"
pre_bootstrap = false
description = "Terminal resource monitor with CPU, memory, disk, network, and process views"

[source]
url = "https://github.com/aristocratos/btop/archive/refs/tags/v1.4.5.tar.gz"
sha256 = "0ffe03d3e26a3e9bbfd5375adf34934137757994f297d6b699a46edd43c3fc02"

[build]
system = "cmake"
configure = "cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_INSTALL_PREFIX=/ -DBTOP_GPU=OFF"
build = "samu -C build -j$(nproc)"
install = """DESTDIR=$DESTDIR cmake --install build
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl", "libcxx"]
build = ["clang", "cmake", "samurai"]
