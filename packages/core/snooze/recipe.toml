[package]
name = "snooze"
version = "0.5"
license = "CC0"
pre_bootstrap = false
description = "Lightweight cron alternative for running a command at a specific time"

[source]
url = "sources/snooze-0.5.tar.gz"  # vendored in sources/
sha256 = "d63fde85d9333188bed5996baabd833eaa00842ce117443ffbf8719c094be414"

[build]
system = "custom"
build = "make CC=clang CFLAGS=\"-O2 -fomit-frame-pointer\" PREFIX=/"
install = """install -Dm755 snooze $DESTDIR/bin/snooze
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang", "make"]
