[package]
name = "expat"
version = "2.6.4"
license = "MIT"
description = "Stream-oriented XML parser library (libexpat)"

[source]
url = "https://github.com/libexpat/libexpat/releases/download/R_2_6_4/expat-2.6.4.tar.gz"
sha256 = "fd03b7172b3bd7427a3e7a812063f74754f24542429b634e0db6511b53fb2278"

[build]
system = "custom"
# Shipped tarball has a pre-generated configure script; skip cmake to
# keep the build dep set minimal (just clang + make). `--without-docbook`
# avoids pulling in xmlto / docbook2x at build time; we don't ship the
# xmlwf man page. `--without-tests` skips the cxx tests that would pull
# a full libcxx runtime in.
build = """set -e
CFLAGS="-O2 -fomit-frame-pointer -fPIC" CC=clang \\
  ./configure --prefix=/ --libdir=/lib --includedir=/include \\
    --disable-static \\
    --without-docbook \\
    --without-examples \\
    --without-tests
make -j$(nproc)"""
install = """make DESTDIR=$DESTDIR install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \\; 2>/dev/null || true
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \\; 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang", "make"]
