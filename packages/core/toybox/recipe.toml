[package]
name = "toybox"
version = "0.8.11"
license = "0BSD"
description = "BSD-licensed coreutils replacement"

[source]
url = "http://landley.net/toybox/downloads/toybox-0.8.11.tar.gz"
sha256 = "15aa3f832f4ec1874db761b9950617f99e1e38144c22da39a71311093bfe67dc"

[build]
system = "custom"
build = """set -e
cp "$RECIPE_DIR/toybox.config" .config
# All bash->mksh and tr->sed fixes are in patches/0001-mksh-compat.patch
# (applied by jpkg before this script runs).
# Fix shebangs so sub-scripts invoked by make.sh use mksh too.
sed -i 's|#!/bin/bash|#!/bin/mksh|' scripts/*.sh configure
# Install kernel headers — toybox needs linux/*.h for blockdev, ip, route, etc.
# Check if they already exist at /include/linux, otherwise fetch a minimal set.
if [ ! -d /include/linux ]; then
  ARCH=$(uname -m | sed 's/aarch64/aarch64/;s/x86_64/x86_64/')
  curl -sL "https://dl-cdn.alpinelinux.org/alpine/v3.21/main/$ARCH/linux-headers-6.6-r1.apk" -o /tmp/kh.apk
  mkdir -p /tmp/kh && cd /tmp/kh && tar xf /tmp/kh.apk 2>/dev/null
  cp -a usr/include/linux /include/linux 2>/dev/null || true
  cp -a usr/include/asm /include/asm 2>/dev/null || true
  cp -a usr/include/asm-generic /include/asm-generic 2>/dev/null || true
  cd -
  rm -rf /tmp/kh /tmp/kh.apk
fi
rm -rf generated/*
DEBUG=1 V=1 CC=clang CFLAGS="-Os -fomit-frame-pointer" CPUS=$(nproc) mksh scripts/make.sh || {
  echo "=== generated/config.h (first 20 lines) ===" >&2
  head -20 generated/config.h >&2 || echo "config.h missing" >&2
  echo "=== generated/newtoys.h (acpi) ===" >&2
  grep -i acpi generated/newtoys.h >&2 || echo "acpi not in newtoys.h" >&2
  echo "=== generated/flags.raw (first 10 lines) ===" >&2
  head -10 generated/flags.raw >&2 || echo "flags.raw missing" >&2
  exit 1
}
"""
install = """set -e
mkdir -p $DESTDIR/bin
install -m755 generated/unstripped/toybox $DESTDIR/bin/toybox
llvm-strip --strip-all $DESTDIR/bin/toybox 2>/dev/null || true
# Create applet symlinks; skip bash to avoid overwriting any installed bash
for applet in $(./generated/unstripped/toybox --long 2>/dev/null || ./generated/unstripped/toybox 2>&1 | sed 's/ /\n/g'); do
  [ "$applet" = "toybox" ] && continue
  [ "$applet" = "bash" ] && continue
  ln -sf toybox "$DESTDIR/bin/$applet" 2>/dev/null || true
done"""

[depends]
runtime = ["musl"]
build = ["clang"]
