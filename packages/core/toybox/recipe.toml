[package]
name = "toybox"
version = "0.8.11"
license = "0BSD"
description = "BSD-licensed coreutils replacement"

[source]
url = "http://landley.net/toybox/downloads/toybox-0.8.11.tar.gz"
sha256 = "15aa3f832f4ec1874db761b9950617f99e1e38144c22da39a71311093bfe67dc"

[build]
system = "custom"
build = """set -e
# scripts/make.sh uses bash-specific constructs (<() process substitution,
# ${var:off:len} substring, set -o pipefail, source) that toybox sh and mksh
# do not fully support.  A bash build dep ensures /bin/bash is present so
# invoking scripts/make.sh via bash bypasses the shebang requirement.
# CPUS is read by scripts/make.sh to control parallelism.
cp "$RECIPE_DIR/toybox.config" .config
CC=clang CFLAGS="-Os -fomit-frame-pointer" CPUS=$(nproc) bash scripts/make.sh
"""
install = """set -e
mkdir -p $DESTDIR/bin
install -m755 generated/unstripped/toybox $DESTDIR/bin/toybox
llvm-strip --strip-all $DESTDIR/bin/toybox 2>/dev/null || true
# Create applet symlinks; skip bash to avoid overwriting the build-dep binary.
for applet in $(./generated/unstripped/toybox --long 2>/dev/null || ./generated/unstripped/toybox 2>&1 | tr ' ' '\n'); do
  [ "$applet" = "toybox" ] && continue
  [ "$applet" = "bash" ] && continue
  ln -sf toybox "$DESTDIR/bin/$applet" 2>/dev/null || true
done"""

[depends]
runtime = ["musl"]
build = ["clang", "bash"]
