[package]
name = "toybox"
version = "0.8.11-r6"
license = "0BSD"
description = "BSD-licensed coreutils replacement"
# 0.8.11-r5: post_install yields to uutils.  When uutils is installed it
# takes ownership of ~100 /bin/<cmd> symlinks via `replaces = ["toybox"]`,
# but tarball extraction during a later `jpkg upgrade toybox` was silently
# stomping the takeover by re-laying down /bin/<cmd> -> toybox symlinks
# from toybox's own install layout.  post_install now reads uutils's
# manifest and restores its winning symlinks for every /bin/* entry it
# claims.  Together with uutils 0.7.0-r2 this keeps the takeover sticky
# across toybox upgrades.

[source]
url = "http://landley.net/toybox/downloads/toybox-0.8.11.tar.gz"
sha256 = "15aa3f832f4ec1874db761b9950617f99e1e38144c22da39a71311093bfe67dc"

[build]
system = "custom"
build = """set -e
cp "$RECIPE_DIR/toybox.config" .config
# Shell selection — prefer brash (a bash-compatible Rust shell shipped
# at /bin/bash on jonerix). Brash understands the full bash 5.3 surface
# upstream's scripts/*.sh and configure use, so we can run them
# unmodified. If /bin/bash isn't present (first-pass bootstrap before
# brash exists in the host image), fall back to applying the
# mksh-compat patch and running everything under mksh.
if [ -x /bin/bash ]; then
    BUILD_SHELL=/bin/bash
    echo "toybox: using brash (/bin/bash) — upstream sources unmodified"
else
    BUILD_SHELL=/bin/mksh
    echo "toybox: brash unavailable — applying patches.optional/0001-mksh-compat.patch"
    patch -p1 < "$RECIPE_DIR/patches.optional/0001-mksh-compat.patch"
    for f in scripts/*.sh configure; do
        tmp=${f}.tmp
        sed 's|#!/bin/bash|#!/bin/mksh|' "$f" > "$tmp"
        cat "$tmp" > "$f"
        rm -f "$tmp"
    done
fi
# Kernel UAPI headers: needed by blockdev, ip, brctl, fdisk, losetup, etc.
# Install into ./linux/ etc so -I. resolves linux/fs.h during compilation.
if [ ! -f linux/fs.h ]; then
  # Copy from jonerix-headers to the toybox source tree (needed because -I. only).
  _KH_SRCDIR=/include
  [ -d /usr/include/linux ] && _KH_SRCDIR=/usr/include
  if [ -d "${_KH_SRCDIR}/linux" ]; then
    cp -a "${_KH_SRCDIR}/linux" linux
    cp -a "${_KH_SRCDIR}/asm-generic" asm-generic 2>/dev/null || true
    [ -d "${_KH_SRCDIR}/asm" ] && cp -a "${_KH_SRCDIR}/asm" asm || true
  else
    echo "ERROR: could not obtain kernel headers" >&2
    exit 1
  fi
fi
rm -rf generated/*
DEBUG=1 V=1 CC=clang CFLAGS="-Os -fomit-frame-pointer" CPUS=$(nproc) "$BUILD_SHELL" scripts/make.sh || {
  echo "=== generated/config.h (first 20 lines) ===" >&2
  head -20 generated/config.h >&2 || echo "config.h missing" >&2
  echo "=== generated/flags.raw (first 10 lines) ===" >&2
  head -10 generated/flags.raw >&2 || echo "flags.raw missing" >&2
  exit 1
}
"""
install = """set -e
mkdir -p $DESTDIR/bin
cp generated/unstripped/toybox $DESTDIR/bin/toybox
chmod 755 $DESTDIR/bin/toybox
llvm-strip --strip-all $DESTDIR/bin/toybox 2>/dev/null || true
# Compile instlist helper to get a clean applet list (one per line)
clang -I . scripts/install.c -o /tmp/_instlist
/tmp/_instlist > /tmp/_applets.txt
while read applet; do
  [ "$applet" = "bash" ] && continue
  ln -sf toybox "$DESTDIR/bin/$applet"
done < /tmp/_applets.txt
rm -f /tmp/_instlist /tmp/_applets.txt
install -Dm755 "$RECIPE_DIR/init.d/syslogd" "$DESTDIR/etc/init.d/syslogd"
install -Dm644 "$RECIPE_DIR/conf.d/syslogd" "$DESTDIR/etc/conf.d/syslogd"
"""

[hooks]
post_install = """mkdir -p /etc/runlevels/default
[ -f /etc/init.d/syslogd ] && ln -sf /etc/init.d/syslogd /etc/runlevels/default/syslogd 2>/dev/null || true

# Yield /bin/<cmd> symlinks to packages that own a conflicting path.
# Tarball extraction has just laid down /bin/<cmd> -> toybox for every
# applet we provide; if another package's manifest claims one of those
# paths, restore the rightful owner so the takeover stays sticky
# across `jpkg upgrade toybox`.
#
# Two kinds of conflict are handled:
#
#  (a) `replaces=["toybox"]` semantics — the other package ships
#      `/bin/<cmd> -> <owner>` (a symlink to its own multicall
#      binary). Pattern: uutils (Rust GNU-coreutils rewrite),
#      exproxide (POSIX-strict expr), shadow (passwd/login etc).
#      We re-create the symlink directly.
#
#  (b) Real-binary conflict — the other package ships /bin/<cmd>
#      as an ELF binary (no `->` field). Pattern: iproute-go
#      (which owns /bin/ip and /bin/iproute as Go-built ELF). The
#      symlink we just laid down OVERWROTE the real binary, so we
#      can't restore from disk; we have to force-reinstall the
#      conflicting package. Reproduced 2026-05-09 on tormenta —
#      `ip a` returned "Invalid link." because /bin/ip was the
#      toybox symlink, and `jpkg verify iproute-go` confirmed the
#      manifest hash mismatch. `jpkg install -f iproute-go`
#      restored it.
#
# The loop is generic so any future replaces-toybox or owns-/bin/X
# package is honored without recipe changes here.
#
# IMPORTANT: jpkg's manifest stores paths as RELATIVE (no leading
# slash) — `bin/ip`, not `/bin/ip`. The previous version of this loop
# matched `^\/bin\//` which never matched anything in any real
# manifest, so the "yield" loop was a no-op for years. We strip-or-add
# the leading slash deliberately when constructing $_path for
# readlink/ln (which need absolute paths).
for _mfst in /var/db/jpkg/installed/*/files; do
    [ -f "$_mfst" ] || continue
    _owner=$(basename "$(dirname "$_mfst")")
    [ "$_owner" = "toybox" ] && continue
    _need_reinstall=""
    # Collect all bin/* paths this package's manifest claims (whether
    # symlink or regular file). Manifest paths have NO leading slash.
    _claims=$(awk '$3 ~ /^bin\\// { print $3 }' "$_mfst" 2>/dev/null)
    [ -z "$_claims" ] && continue
    for _rel in $_claims; do
        _path="/$_rel"
        _curr=$(readlink "$_path" 2>/dev/null || echo "")
        [ "$_curr" = "toybox" ] || continue
        # Look at this manifest line — is the entry a symlink (->X)
        # or a regular file?
        _line=$(awk -v p="$_rel" '$3 == p { print; exit }' "$_mfst")
        case "$_line" in
            *" -> "*)
                # (a) Symlink case: re-link to the named target if the
                # owner's multicall binary still exists.
                _target=$(printf '%s\n' "$_line" | awk '
                    { for(i=1;i<=NF;i++) if($i=="->") { print $(i+1); exit } }
                ')
                if [ -n "$_target" ] && [ -e "/bin/$_target" ]; then
                    ln -sf "$_target" "$_path" 2>/dev/null || true
                fi
                ;;
            *)
                # (b) Real-binary case: needs reinstall to restore.
                # Mark and act once per owner at end of loop, since
                # `jpkg install -f` reinstalls the whole package.
                _need_reinstall="yes"
                ;;
        esac
    done
    if [ -n "$_need_reinstall" ]; then
        jpkg install -f "$_owner" >/dev/null 2>&1 || true
    fi
done
exit 0
"""
post_remove = """rm -f /etc/runlevels/default/syslogd
"""

[depends]
runtime = ["musl"]
# brash is best-effort: install_target_build_deps WARNs and continues if
# brash isn't yet built (first-pass bootstrap), so the recipe falls back
# to mksh+patch via the build-time check above.
build = ["clang", "brash", "jonerix-headers"]
