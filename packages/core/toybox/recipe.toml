[package]
name = "toybox"
version = "0.8.11"
license = "0BSD"
pre_bootstrap = false
description = "BSD-licensed coreutils replacement"

[source]
url = "http://landley.net/toybox/downloads/toybox-0.8.11.tar.gz"
sha256 = "15aa3f832f4ec1874db761b9950617f99e1e38144c22da39a71311093bfe67dc"

[build]
system = "custom"
build = """set -e
# Generate default config, then enable pending commands (sh, getty, etc.)
# Uses scripts/make.sh instead of GNU make — requires bash at build time.
bash scripts/genconfig.sh defconfig
for opt in SH CD DECLARE EXIT SET UNSET EVAL EXEC EXPORT JOBS LOCAL READ RETURN SHIFT SOURCE TRAP WAIT GETTY LOGIN PASSWD SU; do
  sed -i "s/# CONFIG_${opt} is not set/CONFIG_${opt}=y/" .config
done
CC=clang CFLAGS="-Os -fomit-frame-pointer" bash scripts/make.sh
"""
install = """set -e
mkdir -p $DESTDIR/bin
install -m755 generated/unstripped/toybox $DESTDIR/bin/toybox
llvm-strip --strip-all $DESTDIR/bin/toybox 2>/dev/null || true
# Create applet symlinks
for applet in $(./generated/unstripped/toybox --long 2>/dev/null || ./generated/unstripped/toybox 2>&1 | tr ' ' '\n'); do
  [ "$applet" = "toybox" ] && continue
  ln -sf toybox "$DESTDIR/bin/$applet" 2>/dev/null || true
done"""

[depends]
runtime = ["musl"]
build = ["clang"]
