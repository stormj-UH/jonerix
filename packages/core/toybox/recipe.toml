[package]
name = "toybox"
version = "0.8.11"
license = "0BSD"
description = "BSD-licensed coreutils replacement"

[source]
url = "http://landley.net/toybox/downloads/toybox-0.8.11.tar.gz"
sha256 = "15aa3f832f4ec1874db761b9950617f99e1e38144c22da39a71311093bfe67dc"

[build]
system = "custom"
build = """set -e
cp "$RECIPE_DIR/toybox.config" .config
# Patch the two bash-only constructs in scripts/make.sh so mksh can run it.
# mksh supports set -o pipefail, source, CFLAGS+=, ${var/p/r}, == in [ ],
# wait -n fallback, and echo -e — only these two are mksh-incompatible:
#   1. ${B::${#A}} (bash offset-0 substring) -> ${B:0:${#A}} (ksh93/mksh form)
#   2. <(cmd) process substitution -> deleted; rm -rf generated/* does the same
sed -i 's|${B::${#A}}|${B:0:${#A}}|' scripts/make.sh
sed -i '/^cmp -s <(compflags/d' scripts/make.sh
rm -rf generated/*
CC=clang CFLAGS="-Os -fomit-frame-pointer" CPUS=$(nproc) mksh scripts/make.sh
"""
install = """set -e
mkdir -p $DESTDIR/bin
install -m755 generated/unstripped/toybox $DESTDIR/bin/toybox
llvm-strip --strip-all $DESTDIR/bin/toybox 2>/dev/null || true
# Create applet symlinks
for applet in $(./generated/unstripped/toybox --long 2>/dev/null || ./generated/unstripped/toybox 2>&1 | tr ' ' '\n'); do
  [ "$applet" = "toybox" ] && continue
  [ "$applet" = "bash" ] && continue
  ln -sf toybox "$DESTDIR/bin/$applet" 2>/dev/null || true
done"""

[depends]
runtime = ["musl"]
build = ["clang"]
