[package]
name = "toybox"
version = "0.8.11"
license = "0BSD"
pre_bootstrap = true
description = "BSD-licensed coreutils replacement"

[build]
system = "custom"
build = """
set -e
apk add --no-cache make
curl -fsSL --connect-timeout 30 --max-time 120 \
  https://landley.net/toybox/downloads/toybox-0.8.11.tar.gz -o toybox.tar.gz
printf '15aa3f832f4ec1874db761b9950617f99e1e38144c22da39a71311093bfe67dc  toybox.tar.gz\n' | sha256sum -c
tar xzf toybox.tar.gz
cd toybox-0.8.11
make defconfig
make CC=clang -j$(nproc)
make PREFIX=${DESTDIR} install
"""
install = ""

[depends]
runtime = ["musl"]
build = []
