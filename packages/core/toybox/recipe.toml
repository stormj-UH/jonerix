[package]
name = "toybox"
version = "0.8.11-r13"
license = "0BSD"
description = "BSD-licensed coreutils replacement"
# 0.8.11-r5: post_install yields to uutils.  When uutils is installed it
# takes ownership of ~100 /bin/<cmd> symlinks via `replaces = ["toybox"]`,
# but tarball extraction during a later `jpkg upgrade toybox` was silently
# stomping the takeover by re-laying down /bin/<cmd> -> toybox symlinks
# from toybox's own install layout.  post_install now reads uutils's
# manifest and restores its winning symlinks for every /bin/* entry it
# claims.  Together with uutils 0.7.0-r2 this keeps the takeover sticky
# across toybox upgrades.
#
# 0.8.11-r8: fix the real-binary case of the yield loop. r7 recovered
# symlink-case conflicts (uutils, shadow, exproxide — `replaces=["toybox"]`
# packages whose manifest entries are themselves symlinks) but the
# real-binary case (iproute-go — owns /bin/ip as a Go-built ELF binary)
# tried to recover via a recursive `jpkg install -f $owner` from inside
# toybox's own post_install. That always failed silently: jpkg's install
# lock is `flock(LockExclusiveNonblock)` (packages/core/jpkg/src/db.rs:380),
# so the inner call gets EWOULDBLOCK, and the `>/dev/null 2>&1 || true`
# swallowed the failure. Reproduced 2026-05-11 on tormenta: `ip a` returned
# "Invalid link." because /bin/ip was a toybox symlink (toybox's `ip` applet
# bails on Tailscale's tailscale0 TUN device, type ARPHRD_NONE / 65534);
# `jpkg verify iproute-go` confirmed the bin/ip hash mismatch.
#
# Fix: extract the conflicting package's payload directly from its cached
# .jpkg under /var/cache/jpkg, using the same magic+hdr_len+zstd-tar
# pattern that ci-build-*.sh uses for cached pkgs. No recursive jpkg
# call, no lock contention. If the cache is empty (rare), we print a
# pointer to the manual recovery command rather than silently failing.
#
# 0.8.11-r9: make post_install/post_remove honor JPKG_ROOT when hooks run
# outside a chroot, as happens for alternate-root installs before /bin/sh is
# present in the target root.
#
# 0.8.11-r13: extend the skip list with `brctl` and `netstat`.
# jonerix-netutils 0.1.0 now provides both alongside `ip` (all from
# the same u-root vendored source).  Toybox should stop competing.
#
# 0.8.11-r12: add `ip` to the install-time skip list.  iproute-go
# legitimately owns /bin/ip (real Go binary that handles every link
# type including TUN), declares `replaces=["toybox"]`, and the yield
# loop's real-binary recovery path is supposed to re-extract its
# .jpkg from cache when toybox upgrades — but that recovery has
# silently failed on tormenta repeatedly (2026-05-09, -05-11,
# -05-14).  Skipping the bin/ip symlink at install time makes the
# takeover survive every upgrade regardless.  Same pattern as r10
# (reboot/poweroff) and r11 (login/passwd/useradd).
#
# 0.8.11-r11: expand the install-time skip list to cover all of shadow's
# user-management surface (login, passwd, su, useradd, userdel, usermod,
# groupadd, groupdel, groupmod, adduser, addgroup, deluser, delgroup,
# chpasswd, chage, chfn, chsh, chgpasswd, gpasswd, newgrp, newusers,
# pwck, grpck, pwconv, pwunconv, grpconv, grpunconv, vipw, nologin,
# sulogin, expiry, logoutd, newgidmap, newuidmap, faillog, lastlog).
# Defense-in-depth on top of shadow r9's `replaces = ["toybox"]` claim:
# the yield-loop still handles re-link if anything slips through, but
# the dangerous toybox variants (which truncate /etc/passwd,
# /etc/shadow, /etc/group on error paths) never get installed in the
# first place.  Toybox's user-mgmt applets ate /etc/group on tormenta
# during a 2026-05-09 docker post_install — that loss-of-data path is
# now physically unreachable.
#
# 0.8.11-r10: stop shipping reboot/poweroff/halt/shutdown applet symlinks.
# Toybox's bare-syscall reboot/poweroff calls reboot(2) directly, which on
# Pi 5 leaves the SoC half-powered (won't restart from a cold start) and
# skips OpenRC's service-stop + remount-ro choreography.  Until now we
# relied on the post_install yield loop (r5..r8) to restore the OpenRC
# wrappers shipped by jonerix-raspi5-fixups after every toybox upgrade,
# but the loop silently failed on tormenta 2026-05-14 10:03 — /bin/reboot
# pointed at toybox for ~3 hours before someone noticed.  Skipping these
# applets at the install step makes the wrappers permanently sticky
# regardless of yield-loop reliability.

[source]
url = "http://landley.net/toybox/downloads/toybox-0.8.11.tar.gz"
sha256 = "15aa3f832f4ec1874db761b9950617f99e1e38144c22da39a71311093bfe67dc"

[build]
system = "custom"
build = """set -e
cp "$RECIPE_DIR/toybox.config" .config
# Shell selection — prefer brash (a bash-compatible Rust shell shipped
# at /bin/bash on jonerix). Brash understands the full bash 5.3 surface
# upstream's scripts/*.sh and configure use, so we can run them
# unmodified. If /bin/bash isn't present (first-pass bootstrap before
# brash exists in the host image), fall back to applying the
# mksh-compat patch and running everything under mksh.
if [ -x /bin/bash ]; then
    BUILD_SHELL=/bin/bash
    echo "toybox: using brash (/bin/bash) — upstream sources unmodified"
else
    BUILD_SHELL=/bin/mksh
    echo "toybox: brash unavailable — applying patches.optional/0001-mksh-compat.patch"
    patch -p1 < "$RECIPE_DIR/patches.optional/0001-mksh-compat.patch"
    for f in scripts/*.sh configure; do
        tmp=${f}.tmp
        sed 's|#!/bin/bash|#!/bin/mksh|' "$f" > "$tmp"
        cat "$tmp" > "$f"
        rm -f "$tmp"
    done
fi
# Kernel UAPI headers: needed by blockdev, ip, brctl, fdisk, losetup, etc.
# Install into ./linux/ etc so -I. resolves linux/fs.h during compilation.
if [ ! -f linux/fs.h ]; then
  # Copy from jonerix-headers to the toybox source tree (needed because -I. only).
  _KH_SRCDIR=/include
  [ -d /usr/include/linux ] && _KH_SRCDIR=/usr/include
  if [ -d "${_KH_SRCDIR}/linux" ]; then
    cp -a "${_KH_SRCDIR}/linux" linux
    cp -a "${_KH_SRCDIR}/asm-generic" asm-generic 2>/dev/null || true
    [ -d "${_KH_SRCDIR}/asm" ] && cp -a "${_KH_SRCDIR}/asm" asm || true
  else
    echo "ERROR: could not obtain kernel headers" >&2
    exit 1
  fi
fi
rm -rf generated/*
DEBUG=1 V=1 CC=clang CFLAGS="-Os -fomit-frame-pointer" CPUS=$(nproc) "$BUILD_SHELL" scripts/make.sh || {
  echo "=== generated/config.h (first 20 lines) ===" >&2
  head -20 generated/config.h >&2 || echo "config.h missing" >&2
  echo "=== generated/flags.raw (first 10 lines) ===" >&2
  head -10 generated/flags.raw >&2 || echo "flags.raw missing" >&2
  exit 1
}
"""
install = """set -e
mkdir -p $DESTDIR/bin
cp generated/unstripped/toybox $DESTDIR/bin/toybox
chmod 755 $DESTDIR/bin/toybox
llvm-strip --strip-all $DESTDIR/bin/toybox 2>/dev/null || true
# Compile instlist helper to get a clean applet list (one per line)
clang -I . scripts/install.c -o /tmp/_instlist
/tmp/_instlist > /tmp/_applets.txt
while read applet; do
  [ "$applet" = "bash" ] && continue
  case "$applet" in
    # Shutdown applets (r10).  Toybox's reboot/poweroff/halt are bare-
    # syscall implementations that call reboot(2) directly — on Pi 5
    # this leaves the SoC half-powered; on every machine it skips
    # OpenRC's service-stop + remount-ro choreography (dirty rootfs).
    # jonerix-raspi5-fixups provides safe OpenRC-driven wrappers.
    reboot|poweroff|halt|shutdown) continue ;;
    # User-management applets (r11).  Toybox's passwd/useradd/groupadd
    # variants TRUNCATE /etc/{passwd,shadow,group} on error paths —
    # reproduced 2026-04-15 (adduser), 2026-05-09 (addgroup, broke
    # wpa_supplicant when /etc/group got wiped during a docker
    # post_install).  Shadow's variants use atomic-rename and refuse
    # to write empty files; they ship at /bin/<X> -> shadow-<X> with
    # the takeover registered via shadow's `replaces = ["toybox"]`.
    # Skipping at install time means the yield-loop has no work to
    # do for these names — survivability is no longer gated on
    # post_install hook reliability.  If shadow isn't installed (only
    # the bootstrap rootfs is that minimal), there's no /bin/<X> at
    # all rather than a dangerous toybox one; the user adds shadow
    # before they need to create accounts.  raspi5-fixups owns
    # /bin/adduser and /bin/addgroup directly so those stay out too.
    login|passwd|su|useradd|userdel|usermod) continue ;;
    groupadd|groupdel|groupmod|adduser|addgroup|deluser|delgroup) continue ;;
    chpasswd|chage|chfn|chsh|chgpasswd|gpasswd|newgrp|newusers) continue ;;
    pwck|grpck|pwconv|pwunconv|grpconv|grpunconv|vipw) continue ;;
    nologin|sulogin|expiry|logoutd|newgidmap|newuidmap) continue ;;
    faillog|lastlog) continue ;;
    # `ip` (r12).  Toybox's `ip` is incomplete — it can't enumerate
    # interfaces of type ARPHRD_NONE / 65534 (Tailscale's tailscale0
    # TUN, WireGuard's wg0).  Reproduced 2026-05-09 on tormenta:
    # `ip a` returned "Invalid link." because /bin/ip was the toybox
    # symlink.  iproute-go's u-root Go reimplementation handles every
    # link type the kernel reports.  iproute-go declares
    # `replaces = ["toybox"]` AND ships /bin/ip as a real ELF binary,
    # so jpkg accepts the conflict at install time — but toybox's
    # tarball still includes bin/ip -> toybox, and on every toybox
    # upgrade the symlink REOVERWRITES iproute-go's real binary.
    # The yield-loop's real-binary recovery path (r8+) is supposed
    # to re-extract iproute-go from /var/cache/jpkg, but it has
    # silently failed on tormenta at least three times this session
    # alone (2026-05-09, -05-11, -05-14).  Skipping at install time
    # makes the takeover survive every upgrade regardless of yield-
    # loop reliability — same fix pattern as reboot/poweroff (r10)
    # and login/passwd/useradd (r11).
    #
    # r13 (2026-05-15): jonerix-netutils 0.1.0 subsumed iproute-go and
    # extended coverage to /bin/brctl and /bin/netstat (same u-root
    # source).  Skip both at install time so toybox stops fighting them
    # too.  The remaining legacy networking applets — iptunnel, arp,
    # arping, ifconfig, route, tunctl, ss, ethtool — stay because
    # jonerix doesn't ship a replacement YET; they'll move to this list
    # as jonerix-netutils 0.2.0+ adds them.
    ip|brctl|netstat) continue ;;
  esac
  ln -sf toybox "$DESTDIR/bin/$applet"
done < /tmp/_applets.txt
rm -f /tmp/_instlist /tmp/_applets.txt
install -Dm755 "$RECIPE_DIR/init.d/syslogd" "$DESTDIR/etc/init.d/syslogd"
install -Dm644 "$RECIPE_DIR/conf.d/syslogd" "$DESTDIR/etc/conf.d/syslogd"
"""

[hooks]
post_install = """_root=${JPKG_ROOT:-}
case "$_root" in
    /) _root= ;;
esac
_tar_root=${_root:-/}

mkdir -p "$_root/etc/runlevels/default"
[ -f "$_root/etc/init.d/syslogd" ] && ln -sf /etc/init.d/syslogd "$_root/etc/runlevels/default/syslogd" 2>/dev/null || true

# Yield /bin/<cmd> symlinks to packages that own a conflicting path.
# Tarball extraction has just laid down /bin/<cmd> -> toybox for every
# applet we provide; if another package's manifest claims one of those
# paths, restore the rightful owner so the takeover stays sticky
# across `jpkg upgrade toybox`.
#
# Two kinds of conflict are handled:
#
#  (a) `replaces=["toybox"]` semantics — the other package ships
#      `/bin/<cmd> -> <owner>` (a symlink to its own multicall
#      binary). Pattern: uutils (Rust GNU-coreutils rewrite),
#      exproxide (POSIX-strict expr), shadow (passwd/login etc).
#      We re-create the symlink directly.
#
#  (b) Real-binary conflict — the other package ships /bin/<cmd>
#      as an ELF binary (no `->` field). Pattern: iproute-go
#      (which owns /bin/ip and /bin/iproute as Go-built ELF). The
#      symlink we just laid down OVERWROTE the real binary, so we
#      can't restore from disk; we have to force-reinstall the
#      conflicting package. Reproduced 2026-05-09 on tormenta —
#      `ip a` returned "Invalid link." because /bin/ip was the
#      toybox symlink, and `jpkg verify iproute-go` confirmed the
#      manifest hash mismatch. `jpkg install -f iproute-go`
#      restored it.
#
# The loop is generic so any future replaces-toybox or owns-/bin/X
# package is honored without recipe changes here.
#
# IMPORTANT: jpkg's manifest stores paths as RELATIVE (no leading
# slash) — `bin/ip`, not `/bin/ip`. The previous version of this loop
# matched `^\/bin\//` which never matched anything in any real
# manifest, so the "yield" loop was a no-op for years. We strip-or-add
# the leading slash deliberately when constructing $_path for
# readlink/ln, and prefix the target root when hooks run outside chroot.
for _mfst in "$_root"/var/db/jpkg/installed/*/files; do
    [ -f "$_mfst" ] || continue
    _owner=$(basename "$(dirname "$_mfst")")
    [ "$_owner" = "toybox" ] && continue
    _need_reinstall=""
    # Collect all bin/* paths this package's manifest claims (whether
    # symlink or regular file). Manifest paths have NO leading slash.
    _claims=$(awk '$3 ~ /^bin\// { print $3 }' "$_mfst" 2>/dev/null)
    [ -z "$_claims" ] && continue
    for _rel in $_claims; do
        _path="$_root/$_rel"
        _curr=$(readlink "$_path" 2>/dev/null || echo "")
        [ "$_curr" = "toybox" ] || continue
        # Look at this manifest line — is the entry a symlink (->X)
        # or a regular file?
        _line=$(awk -v p="$_rel" '$3 == p { print; exit }' "$_mfst")
        case "$_line" in
            *" -> "*)
                # (a) Symlink case: re-link to the named target.
                # Targets may be either RELATIVE (e.g. `addgroup-safe`,
                # which the loader resolves under the link's parent
                # /bin) or ABSOLUTE (e.g. `/usr/local/bin/reboot-openrc`
                # for raspi5-fixups' /bin/reboot). Test for both
                # before recreating.
                _target=$(printf '%s\n' "$_line" | awk '
                    { for(i=1;i<=NF;i++) if($i=="->") { print $(i+1); exit } }
                ')
                if [ -z "$_target" ]; then
                    continue
                fi
                case "$_target" in
                    /*)  _target_abs="$_root$_target" ;;     # already absolute
                    *)   _target_abs="$_root/bin/$_target" ;;  # resolve under /bin
                esac
                if [ -e "$_target_abs" ]; then
                    ln -sf "$_target" "$_path" 2>/dev/null
                    echo "toybox-yield: restored $_path -> $_target (owner: $_owner)"
                fi
                ;;
            *)
                # (b) Real-binary case: needs reinstall to restore.
                # Mark and act once per owner at end of loop, since
                # `jpkg install -f` reinstalls the whole package.
                _need_reinstall="yes"
                ;;
        esac
    done
    if [ -n "$_need_reinstall" ]; then
        # Real-binary case: extract the conflicting package's payload
        # directly from its cached .jpkg.  We CANNOT call `jpkg install
        # -f $_owner` here — jpkg's install lock is non-blocking exclusive
        # (db.rs:380, LockExclusiveNonblock), so the recursive call would
        # return EWOULDBLOCK and the previous `|| true` swallowed it.
        _arch=${JPKG_ARCH:-$(uname -m)}
        _meta="$_root/var/db/jpkg/installed/$_owner/metadata.toml"
        _ver=
        [ -f "$_meta" ] && _ver=$(sed -n 's/^version = "\(.*\)".*/\1/p' "$_meta" | sed -n '1p')
        _cached=
        if [ -n "$_ver" ] && [ -f "$_root/var/cache/jpkg/${_owner}-${_ver}-${_arch}.jpkg" ]; then
            _cached="$_root/var/cache/jpkg/${_owner}-${_ver}-${_arch}.jpkg"
        else
            for _cand in "$_root"/var/cache/jpkg/${_owner}-*-"$_arch".jpkg; do
                [ -f "$_cand" ] || continue
                _cached=$_cand
            done
        fi
        if [ -n "$_cached" ] && [ -f "$_cached" ]; then
            _hdr=$(od -An -v -tu4 -N4 -j8 "$_cached" 2>/dev/null | tr -d ' ')
            if [ -n "$_hdr" ]; then
                _skip=$((12 + _hdr))
                if tail -c +$((_skip + 1)) "$_cached" | zstd -dc 2>/dev/null \
                    | tar xpf - -C "$_tar_root" 2>/dev/null
                then
                    echo "toybox-yield: restored $_owner from $(basename "$_cached") (real-binary)"
                    continue
                fi
            fi
        fi
        echo "toybox-yield: WARN could not auto-restore $_owner — run 'sudo jpkg install -f $_owner'"
    fi
done
exit 0
"""
post_remove = """_root=${JPKG_ROOT:-}
case "$_root" in
    /) _root= ;;
esac
rm -f "$_root/etc/runlevels/default/syslogd"
"""

[depends]
runtime = ["musl"]
# brash is best-effort: install_target_build_deps WARNs and continues if
# brash isn't yet built (first-pass bootstrap), so the recipe falls back
# to mksh+patch via the build-time check above.
build = ["clang", "brash", "jonerix-headers"]
