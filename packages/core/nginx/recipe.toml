[package]
name = "nginx"
version = "1.28.3"
license = "BSD-2-Clause"
pre_bootstrap = false
description = "High-performance HTTP server and reverse proxy"

[source]
url = "https://nginx.org/download/nginx-1.28.3.tar.gz"
sha256 = "2c96a946bfb0882a21744ed429770a2123ae1828c7c48665092993ddee91a918"

[build]
system = "custom"
configure = """./configure \
  --prefix=/etc/nginx \
  --sbin-path=/bin/nginx \
  --modules-path=/lib/nginx/modules \
  --conf-path=/etc/nginx/nginx.conf \
  --error-log-path=/var/log/nginx/error.log \
  --http-log-path=/var/log/nginx/access.log \
  --pid-path=/run/nginx.pid \
  --lock-path=/run/nginx.lock \
  --with-http_ssl_module \
  --with-http_v2_module \
  --with-http_realip_module \
  --with-http_gzip_static_module \
  --with-http_stub_status_module \
  --with-pcre \
  --with-threads \
  --with-cc=clang"""
build = "make -j$(nproc)"
install = """make install DESTDIR=$DESTDIR
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
mkdir -p $DESTDIR/var/log/nginx
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl", "openssl", "zlib", "pcre2"]
build = ["clang", "make"]
