[package]
name = "jcarp"
version = "0.1.0"
license = "BSD-2-Clause"
description = "OpenBSD-CARP-compatible failover daemon (Rust, no C runtime)"

[source]
# Canonical source: castle.great-morpho.ts.net:3000/jonerik/jcarp
# Mirrored to GitHub for CI (castle is behind Tailscale).
url = "https://github.com/stormj-UH/jonerix/releases/download/source-jcarp-v0.1.0/jcarp-0.1.0.tar.gz"
sha256 = "0ab1e22a4c8b2d38b7d428775e4eea685a39500dc8c985d83744fb789c1515f4"

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/jcarp-cargo
export CARGO_TARGET_DIR="$PWD/target"
export CARGO_NET_OFFLINE=true
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static"
cargo build --release --locked --bin jcarp
"""
install = """
set -e
install -Dm755 "$PWD/target/release/jcarp" "$DESTDIR/bin/jcarp"
install -Dm644 LICENSE "$DESTDIR/share/licenses/jcarp/LICENSE"
toybox mkdir -p "$DESTDIR/etc/jcarp"
llvm-strip --strip-all "$DESTDIR/bin/jcarp" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]
