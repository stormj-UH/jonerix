[package]
name = "shadow"
version = "4.19.4-r9"
license = "BSD-3-Clause"
# REPLACES toybox for the user-management + login surface.
# Installing this package redirects these /bin entries away from
# their toybox multicall symlinks to the shadow-maint binaries at
# /bin/shadow-<name>:
#
#     /bin/passwd        (was: toybox)
#     /bin/login         (was: toybox)
#     /bin/useradd       (was: toybox)
#     /bin/userdel       (was: toybox)
#     /bin/usermod       (was: toybox)
#     /bin/groupadd      (was: toybox)
#     /bin/groupdel      (was: toybox)
#     /bin/groupmod      (was: toybox)
#     /bin/chpasswd /bin/chage /bin/chfn /bin/chgpasswd
#     /bin/gpasswd /bin/newgrp /bin/newusers /bin/nologin
#     /bin/vipw /bin/pwck /bin/grpck /bin/pwconv /bin/pwunconv
#     /bin/grpconv /bin/grpunconv /bin/expiry /bin/logoutd
#     /bin/newgidmap /bin/newuidmap /bin/faillog /bin/lastlog
#     /bin/sulogin
#
# /bin/chsh stays with jonerix-util for the friendlier list-and-pick
# UX; the shadow chsh implementation is still installed at
# /bin/shadow-chsh and jonerix-util's chsh execs it as the privileged
# backend when called by a non-root user.
#
# The original targets are snapshotted to
#   /etc/jpkg/shadow/toybox-prev/
# at post_install time. `jpkg remove shadow` restores them from
# that snapshot via the post_remove hook so the host reverts to
# the pre-shadow toybox + jonerix-util layout with no user-
# visible surprise.
#
# Motivation: toybox passwd truncates /etc/shadow on a write
# error, toybox has no getty at all, and the stand-in
# /sbin/agetty is a mksh auto-login script that gives a root
# shell without auth. shadow-maint gives us real login(1) +
# passwd(1) + useradd(8), BSD-3-Clause, static-musl.
description = "shadow-utils (login, passwd, user/group management) — REPLACES toybox's passwd / login / useradd / userdel / usermod / groupadd / groupdel / groupmod. /bin/chsh is owned by jonerix-util; shadow's chsh is at /bin/shadow-chsh and jonerix-util's chsh execs it for the privileged passwd write."

# r9: add the missing `replaces = ["toybox"]` declaration.  The bare-name
# /bin/<X> -> shadow-<X> symlinks (login, passwd, useradd, …) shipped in
# r7's install step were silently rejected by jpkg at extraction time
# because toybox owns the same paths and jpkg's clobber-protection
# kicked in.  Result on tormenta: only `bin/shadow-<X>` entries ended up
# in the manifest, the post_install safety-net (line ~234) re-created
# the symlinks but they weren't manifest-tracked, so toybox's yield-loop
# had nothing to restore on the next `jpkg upgrade toybox` and `/bin/
# login -> toybox` etc. recurred every cycle.  With `replaces` in
# place the symlinks land in shadow's manifest, the yield-loop sees
# them, and the takeover survives indefinitely.
replaces = ["toybox"]

[source]
url = "https://github.com/shadow-maint/shadow/releases/download/4.19.4/shadow-4.19.4.tar.xz"
sha256 = "ce57a313e315a0a7cb04a8f50cc20753e994e487bbe9b78a2a824ca75cb486c0"

[build]
system = "autoconf"
# Minimal feature set: no PAM, no SELinux, no audit, no NLS, no sssd,
# no tcb, no utmpx/wtmp via libbsd — we sync with toybox's login
# record path (/var/log/lastlog, /var/run/utmp, /var/log/wtmp). Keep
# sha-crypt / yescrypt / bcrypt enabled so existing /etc/shadow
# hashes keep verifying after the swap. Disable shared libraries
# to avoid dragging a libshadow.so onto every runtime image.
#
# shadow's configure unconditionally probes pkg-config to gate
# libbsd / libpam / cmocka detection — even though we disable every
# one of those features below. With the real pkgconf installed
# (build-dep) the probe just reports "no modules found" for each
# query, which is exactly the answer we want, and configure
# proceeds. The previous /tmp/pkgconf-stub shell script in r1 is
# obsolete now that packages/extra/pkgconf is shipping.
configure = """CFLAGS="-Os -fstack-protector-strong --rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld" \
LDFLAGS="-fuse-ld=lld --rtlib=compiler-rt --unwindlib=libunwind" \
./configure \
    --prefix=/ \
    --exec-prefix=/ \
    --bindir=/bin \
    --sbindir=/bin \
    --libdir=/lib \
    --sysconfdir=/etc \
    --localstatedir=/var \
    --libexecdir=/lib/shadow \
    --datarootdir=/usr/share \
    --disable-nls \
    --disable-logind \
    --disable-shared \
    --enable-static \
    --enable-shadowgrp \
    --enable-lastlog \
    --enable-subordinate-ids \
    --with-sha-crypt \
    --with-bcrypt \
    --with-yescrypt \
    --without-libpam \
    --without-audit \
    --without-selinux \
    --without-acl \
    --without-attr \
    --without-skey \
    --without-tcb \
    --without-btrfs \
    --without-libbsd \
    --without-sssd \
    --without-nscd \
    --without-su \
    CC=clang"""
build = """export PATH=/tmp/pkgconf-stub:$PATH
# Force the latest jmake — 1.1.5 landed the "parser: only treat TAB-
# prefixed lines as recipes while inside a rule's recipe block" fix
# (commit 977491f) which is the closest thing in the changelog to
# shadow's automake-generated Makefile line-191 failure. The
# jonerix:builder images baked 2026-04-13 still ship jmake 1.1.4,
# so pin up before invoking make.
jpkg update >/dev/null 2>&1 || true
jpkg install jmake 2>&1 | tail -3 || true
jmake --version 2>&1 | head -1 || true
make -j$(nproc)"""
install = """set -e
make DESTDIR=$DESTDIR install

# Merged-usr: collapse any /usr/* back into /* the way every other
# jonerix recipe does.
for d in usr/bin usr/sbin sbin lib64 usr/lib; do
    if [ -d "$DESTDIR/$d" ]; then
        target="$(echo "$d" | sed 's|^usr/||; s|^sbin|bin|; s|^lib64|lib|')"
        mkdir -p "$DESTDIR/$target"
        cp -a "$DESTDIR/$d/." "$DESTDIR/$target/"
        rm -rf "$DESTDIR/$d"
    fi
done
[ -d "$DESTDIR/usr" ] && rmdir "$DESTDIR/usr" 2>/dev/null || true

# File-conflict avoidance: toybox and jonerix-util already own
# /bin/login, /bin/passwd, /bin/useradd, /bin/userdel, /bin/chsh,
# /bin/groupadd, /bin/groupdel. jpkg refuses to clobber files
# owned by another installed package, so we can't ship at those
# canonical paths directly. Rename every shadow binary to a
# "shadow-" prefix inside the payload; the post_install hook
# creates the user-facing /bin/passwd etc symlinks that point
# at the shadow copy, preserving the original toybox targets in
# /etc/jpkg/shadow/toybox-prev/ so uninstall reverts cleanly.
SHADOW_BINS="login passwd chpasswd chage chfn chsh chgpasswd useradd userdel usermod groupadd groupdel groupmod gpasswd newgrp newusers nologin vipw pwck grpck pwconv pwunconv grpconv grpunconv expiry logoutd newgidmap newuidmap faillog lastlog sulogin"
for b in $SHADOW_BINS; do
    if [ -f "$DESTDIR/bin/$b" ]; then
        mv "$DESTDIR/bin/$b" "$DESTDIR/bin/shadow-$b"
    fi
done

# Strip every binary we produce — static-musl links can get chunky.
# Using for-loops instead of `find -exec` because the backslash
# escaping for -exec semicolon terminators is flaky through the
# TOML-then-sh heredoc delivery path jpkg uses (observed find
# reports "-exec without ;").
for f in "$DESTDIR"/bin/*; do
    [ -f "$f" ] && llvm-strip --strip-all "$f" 2>/dev/null || true
done
for f in "$DESTDIR"/lib/*.a "$DESTDIR"/lib/*.so*; do
    [ -f "$f" ] && llvm-strip --strip-unneeded "$f" 2>/dev/null || true
done

# /etc/login.defs: keep tty prompts open indefinitely. The default
# LOGIN_TIMEOUT=60 caused idle HDMI logins to exit every minute.
if [ -f "$DESTDIR/etc/login.defs" ]; then
    if grep -q '^[[:space:]]*LOGIN_TIMEOUT[[:space:]]' "$DESTDIR/etc/login.defs" 2>/dev/null; then
        sed -i 's/^[[:space:]]*LOGIN_TIMEOUT[[:space:]].*/LOGIN_TIMEOUT	0/' "$DESTDIR/etc/login.defs"
    else
        echo 'LOGIN_TIMEOUT	0' >> "$DESTDIR/etc/login.defs"
    fi
fi

# shadow-getty: a ~100-line C helper that does the full agetty dance
# (setsid → open tty → TIOCSCTTY → dup2 0/1/2 → tcsetattr → execl
# /bin/login -p) without touching a shell, because toybox stty / mksh
# / setsid variants on jonerix produced a respawn-storm and 60s login
# timeout when wired together. Compile with compiler-rt + libunwind
# so we don't require libgcc.a on the builder.
clang -O2 -Wall -Wextra \
    --rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld \
    -o "$DESTDIR/../shadow-getty" "$RECIPE_DIR/src/shadow-getty.c"
install -Dm755 "$DESTDIR/../shadow-getty" "$DESTDIR/bin/shadow-getty"
llvm-strip --strip-all "$DESTDIR/bin/shadow-getty" 2>/dev/null || true

# shadow-login OpenRC service: a small mksh loop runs shadow-getty on
# /dev/tty1 and only respawns after a real logout. post_install wires the
# service into the `default` runlevel unless the operator has created
# /etc/shadow/no-console (opt-out).
install -Dm755 "$RECIPE_DIR/init.d/shadow-login" \
    "$DESTDIR/etc/init.d/shadow-login"

# Ship /bin/<bin> -> shadow-<bin> as MANIFEST-TRACKED symlinks (in the
# install step, not lazily in post_install). Without this, every
# `jpkg upgrade toybox` overwrites /bin/login -> shadow-login with
# /bin/login -> toybox from the toybox tarball, and toybox's yield-loop
# in post_install only restores symlinks that the OTHER package's
# manifest claims (toybox r7 yield-loop, scripts/recipe.toml:141-).
# Without a manifest entry, /bin/login silently flips to the toybox
# login applet, which has a hard-coded 60-second username-input
# timeout — observed on tormenta 2026-05-11 as the recurring "60s
# loop" regression on HDMI console. Manifest entries here let the
# yield-loop see what we own and re-link automatically.
#
# This mirrors raspi5-fixups 1.6.17 (commit f05526a9) shipping
# /bin/adduser -> adduser-safe the same way.
SHADOW_BINS_LINK="passwd login chpasswd chage chfn chgpasswd useradd userdel usermod groupadd groupdel groupmod gpasswd newgrp newusers nologin vipw pwck grpck pwconv pwunconv grpconv grpunconv expiry logoutd newgidmap newuidmap faillog lastlog sulogin"
for bin in $SHADOW_BINS_LINK; do
    [ -e "$DESTDIR/bin/shadow-$bin" ] || continue
    ln -sf "shadow-$bin" "$DESTDIR/bin/$bin"
done
"""

[hooks]
# r7+: The /bin/<bin> -> shadow-<bin> symlinks are now MANIFEST-TRACKED
# (created in the install step, present in the tarball) so toybox's
# yield-loop auto-restores them on every `jpkg upgrade toybox`. By the
# time post_install runs, the tarball has already laid the symlinks
# down, so this hook can't see the pre-shadow target via readlink any
# more. Instead we SEED the backup_dir with "symlink:toybox" as the
# default-pre-shadow state on every fresh jonerix image — that's what
# post_remove restores. This matches raspi5-fixups 1.6.17 (f05526a9).
post_install = """set -e

backup_dir=/etc/jpkg/shadow/toybox-prev
mkdir -p "$backup_dir"

SHADOW_BINS="passwd login chpasswd chage chfn chgpasswd useradd userdel usermod groupadd groupdel groupmod gpasswd newgrp newusers nologin vipw pwck grpck pwconv pwunconv grpconv grpunconv expiry logoutd newgidmap newuidmap faillog lastlog sulogin"
for bin in $SHADOW_BINS
do
    src=/bin/shadow-$bin
    dst=/bin/$bin
    [ -x "$src" ] || continue

    # Seed pre-shadow snapshot (first install only). Default to toybox
    # since every jonerix image ships /bin/<bin> -> toybox out of the
    # box. The tarball symlink has already been laid down by now so we
    # don't readlink $dst — that would just snapshot ourselves.
    if [ ! -e "$backup_dir/$bin" ]; then
        printf 'symlink:toybox' > "$backup_dir/$bin"
    fi

    # Safety net: if the tarball symlink isn't already in place for any
    # reason (manual deletion, partial extract), re-create it.
    if [ "$(readlink "$dst" 2>/dev/null)" != "shadow-$bin" ]; then
        ln -sf "shadow-$bin" "$dst"
    fi
done

# r6: /bin/chsh moved back to jonerix-util. On upgrade from r5,
# /bin/chsh is still our `shadow-chsh` symlink — drop it so jpkg
# can install jonerix-util's chsh binary in its place. The snapshot
# at $backup_dir/chsh (if any) is irrelevant now and removed here so
# post_remove doesn't try to restore the wrong layout.
if [ -L /bin/chsh ] && [ "$(readlink /bin/chsh 2>/dev/null)" = "shadow-chsh" ]; then
    rm -f /bin/chsh
fi
rm -f "$backup_dir/chsh" "$backup_dir/chsh.bin"

# login.defs: ship if the system doesn't already have one, but
# never clobber the operator's edited copy.
if [ ! -f /etc/login.defs ] && [ -f /etc/default/useradd ]; then
    : # configure-installed
fi
if [ -f /etc/login.defs ]; then
    if grep -q '^[[:space:]]*LOGIN_TIMEOUT[[:space:]]' /etc/login.defs 2>/dev/null; then
        sed -i 's/^[[:space:]]*LOGIN_TIMEOUT[[:space:]].*/LOGIN_TIMEOUT	0/' /etc/login.defs
    else
        echo 'LOGIN_TIMEOUT	0' >> /etc/login.defs
    fi
fi

# --- shadow-login OpenRC service wiring ---
# Put /etc/init.d/shadow-login in the default runlevel so a fresh
# core install actually hits a login prompt on HDMI. Respect
# /etc/shadow/no-console as an opt-out marker so operators who
# run their own getty / auto-login / kiosk loader aren't
# surprised. Also displace any previously-enabled tty1-console
# so two services aren't fighting over /dev/tty1 — the old name
# gets moved aside to /etc/runlevels/default/tty1-console.pre-shadow
# so post_remove can put it back.
if [ ! -e /etc/shadow/no-console ] && [ -d /etc/runlevels/default ]; then
    if [ -e /etc/runlevels/default/tty1-console ] \
        && [ ! -e /etc/runlevels/default/tty1-console.pre-shadow ]
    then
        mv /etc/runlevels/default/tty1-console \
           /etc/runlevels/default/tty1-console.pre-shadow
    fi
    # Stop the old service if it's live, so /dev/tty1 is free.
    if [ -x /bin/rc-service ] \
        && /bin/rc-service --exists tty1-console 2>/dev/null
    then
        /bin/rc-service tty1-console stop 2>/dev/null || true
    fi
    ln -sf /etc/init.d/shadow-login /etc/runlevels/default/shadow-login
    # Start now so the install takes effect immediately without a
    # reboot.
    if [ -x /bin/rc-service ]; then
        /bin/rc-service shadow-login start 2>/dev/null || true
    fi
fi

exit 0"""

post_remove = """set -e

# --- shadow-login service teardown ---
# Stop the service if it's still running, drop the runlevel
# symlink, and restore any tty1-console symlink we moved aside
# on install.
if [ -x /bin/rc-service ]; then
    /bin/rc-service shadow-login stop 2>/dev/null || true
fi
rm -f /etc/runlevels/default/shadow-login
if [ -e /etc/runlevels/default/tty1-console.pre-shadow ] \
    && [ ! -e /etc/runlevels/default/tty1-console ]
then
    mv /etc/runlevels/default/tty1-console.pre-shadow \
       /etc/runlevels/default/tty1-console
fi

backup_dir=/etc/jpkg/shadow/toybox-prev
if [ -d "$backup_dir" ]; then
    for f in "$backup_dir"/*; do
        [ -f "$f" ] || continue
        bin=$(basename "$f")
        # Skip sidecar *.bin blobs; those are consumed via their
        # parent meta file in the 'file' case below.
        case "$bin" in *.bin) continue ;; esac
        meta=$(cat "$f" 2>/dev/null || true)
        # Preserve: if something real (live file or live symlink)
        # is already at /bin/$bin, don't overwrite. Dangling
        # symlinks left behind by shadow's removal fail -e but
        # pass -L — clear those before restoring.
        if [ -e "/bin/$bin" ]; then
            continue
        fi
        if [ -L "/bin/$bin" ]; then
            rm -f "/bin/$bin"
        fi
        case "$meta" in
            symlink:*)
                target=${meta#symlink:}
                [ -n "$target" ] && ln -sf "$target" "/bin/$bin"
                ;;
            file)
                if [ -f "$f.bin" ]; then
                    cp -a "$f.bin" "/bin/$bin"
                fi
                ;;
        esac
    done
    rm -rf "$backup_dir"
    rmdir /etc/jpkg/shadow 2>/dev/null || true
    rmdir /etc/jpkg 2>/dev/null || true
fi
exit 0"""

[depends]
runtime = ["musl", "toybox"]
build = ["clang", "make", "jonerix-headers", "pkgconf"]
