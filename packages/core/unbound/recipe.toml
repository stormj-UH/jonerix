[package]
name = "unbound"
version = "1.22.0"
license = "BSD-3-Clause"
pre_bootstrap = true
description = "Validating, recursive, and caching DNS resolver"

[build]
system = "custom"
build = """
set -e
apk add --no-cache unbound
for pkg in unbound; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -v '/$' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl", "openssl"]
build = []
