[package]
name = "derper"
version = "1.96.5"
license = "BSD-3-Clause"
pre_bootstrap = false
description = "Tailscale DERP relay server"

[source]
url = "local"

[build]
system = "custom"
build = """
export GOPATH=/tmp/go
export GOCACHE=/tmp/go-cache
export GOMODCACHE=/tmp/go/pkg/mod
export CGO_ENABLED=0
go install tailscale.com/cmd/derper@v1.96.5
install -Dm755 $GOPATH/bin/derper $DESTDIR/bin/derper
"""
install = ""

[depends]
runtime = ["musl"]
build = ["go"]
