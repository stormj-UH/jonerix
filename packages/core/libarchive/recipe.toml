[package]
name = "libarchive"
version = "3.8.6-r2"
license = "Apache-2.0"
description = "Multi-format archive and compression library with bsdtar"

[source]
url = "https://github.com/libarchive/libarchive/releases/download/v3.8.6/libarchive-3.8.6.tar.xz"
sha256 = "8ac57c1f5e99550948d1fe755c806d26026e71827da228f36bef24527e372e6f"

[build]
system = "cmake"
configure = """cmake -B build -G Ninja \
  -DCMAKE_BUILD_TYPE=Release \
  -DCMAKE_C_COMPILER=clang \
  -DCMAKE_INSTALL_PREFIX=/ \
  -DCMAKE_INSTALL_LIBDIR=lib \
  -DBUILD_SHARED_LIBS=ON \
  -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
  -DENABLE_TEST=OFF \
  -DENABLE_ACL=OFF \
  -DENABLE_XATTR=OFF \
  -DENABLE_OPENSSL=ON \
  -DOPENSSL_ROOT_DIR=/ \
  -DOPENSSL_INCLUDE_DIR=/include \
  -DOPENSSL_SSL_LIBRARY=/lib/libssl.a \
  -DOPENSSL_CRYPTO_LIBRARY=/lib/libcrypto.a \
  -DOPENSSL_USE_STATIC_LIBS=ON \
  -DENABLE_EXPAT=OFF \
  -DENABLE_LIBXML2=OFF \
  -DENABLE_LIBB2=OFF \
  -DENABLE_LZ4=ON \
  -DENABLE_LZMA=ON \
  -DENABLE_ZSTD=ON \
  -DENABLE_ZLIB=ON \
  "-DCMAKE_C_FLAGS_INIT=--rtlib=compiler-rt -fuse-ld=lld" \
  "-DCMAKE_SHARED_LINKER_FLAGS_INIT=--rtlib=compiler-rt -fuse-ld=lld"
"""
build = "perl -0pi -e \"s{^#define HAVE_READPASSPHRASE 1$}{/* #undef HAVE_READPASSPHRASE */}m; s{^#define HAVE_CLOSEFROM 1$}{/* #undef HAVE_CLOSEFROM */}m; s{^#define HAVE_CLOSE_RANGE 1$}{/* #undef HAVE_CLOSE_RANGE */}m; s{^#define HAVE__FSEEKI64 1$}{/* #undef HAVE__FSEEKI64 */}m; s{^#define HAVE_ARC4RANDOM_BUF 1$}{/* #undef HAVE_ARC4RANDOM_BUF */}m; s{^#define HAVE_GETVFSBYNAME 1$}{/* #undef HAVE_GETVFSBYNAME */}m; s{^#define HAVE_CHFLAGS 1$}{/* #undef HAVE_CHFLAGS */}m; s{^#define HAVE_LCHFLAGS 1$}{/* #undef HAVE_LCHFLAGS */}m; s{^#define HAVE_LCHMOD 1$}{/* #undef HAVE_LCHMOD */}m\" build/config.h && samu -C build -j$(nproc)"
install = """DESTDIR=$DESTDIR samu -C build install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
rm -f "$DESTDIR/bin/tar"
find "$DESTDIR/bin" -type f | while read -r f; do llvm-strip --strip-all "$f" 2>/dev/null || true; done
find "$DESTDIR/lib" -name "*.so*" -type f | while read -r f; do llvm-strip --strip-unneeded "$f" 2>/dev/null || true; done"""

[depends]
runtime = ["musl", "zlib", "xz", "zstd", "lz4", "libressl"]
build = ["clang", "cmake", "samurai", "libressl", "zlib", "xz", "zstd", "lz4"]
