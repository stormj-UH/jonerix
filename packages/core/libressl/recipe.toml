[package]
name = "libressl"
version = "4.0.0"
license = "ISC"
description = "Free TLS/crypto stack forked from OpenSSL"

[build]
system = "custom"
build = """
set -e
apk add --no-cache libressl
for pkg in libressl; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl"]
build = []
