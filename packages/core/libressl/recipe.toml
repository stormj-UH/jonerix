[package]
name = "libressl"
version = "4.0.0"
license = "ISC"
pre_bootstrap = false
description = "Free TLS/crypto stack from OpenBSD (provides libssl, libcrypto, libtls)"

[source]
url = "https://ftp.openbsd.org/pub/OpenBSD/LibreSSL/libressl-4.0.0.tar.gz"
sha256 = "4d841955f0acc3dfc71d0e3dd35f283af461222350e26843fea9731c0246a1e4"

[build]
system = "cmake"
configure = "cmake -B build -G \"Unix Makefiles\" -DCMAKE_INSTALL_PREFIX=/ -DCMAKE_INSTALL_LIBDIR=lib -DCMAKE_C_COMPILER=clang -DBUILD_SHARED_LIBS=ON -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DOPENSSLDIR=/etc/ssl -DCMAKE_BUILD_TYPE=Release -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \"-DCMAKE_C_FLAGS_INIT=--rtlib=compiler-rt -fuse-ld=lld\" \"-DCMAKE_SHARED_LINKER_FLAGS_INIT=--rtlib=compiler-rt -fuse-ld=lld\""
build = "cmake --build build -j$(nproc)"
install = """DESTDIR=$DESTDIR cmake --install build
if [ -d "$DESTDIR/usr" ]; then (cd "$DESTDIR/usr" && bsdtar cf - .) | (cd "$DESTDIR" && bsdtar xf -) && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then (cd "$DESTDIR/lib64" && bsdtar cf - .) | (cd "$DESTDIR/lib" && bsdtar xf -) && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl"]
build = ["clang", "cmake", "samurai"]
