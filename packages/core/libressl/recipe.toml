[package]
name = "libressl"
version = "4.0.0"
license = "ISC"
description = "Free TLS/crypto stack forked from OpenSSL"

[source]
url = "https://ftp.openbsd.org/pub/OpenBSD/LibreSSL/libressl-4.0.0.tar.gz"
sha256 = "4d841955f0acc3dfc71d0e3dd35f283af461222350e26843fea9731c0246a1e4"

[build]
system = "cmake"
configure = "cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/usr -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF"
build = "cmake --build build -j$(nproc)"
install = "DESTDIR=$DESTDIR cmake --install build"

[depends]
runtime = ["musl"]
build = ["clang", "cmake", "samurai"]
