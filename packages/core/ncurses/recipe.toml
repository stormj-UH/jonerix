[package]
name = "ncurses"
version = "6.5"
license = "MIT"
description = "Terminal handling library"

[source]
url = "https://ftp.gnu.org/gnu/ncurses/ncurses-6.5.tar.gz"
sha256 = "136d91bc269a9a5785e5f9e980bc76ab57428f604ce3e5a5a90cebc767971cc6"

[build]
system = "autoconf"
configure = "./configure --prefix=/ --with-shared --without-static --enable-widec --without-normal --without-debug --without-manpages --without-tests --with-default-terminfo-dir=/lib/terminfo --disable-nls"
build = "make -j$(nproc)"
install = "make DESTDIR=$DESTDIR install"

[depends]
runtime = []
build = []
