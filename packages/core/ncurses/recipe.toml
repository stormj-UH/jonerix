[package]
name = "ncurses"
version = "6.5-r5"
license = "MIT"
description = "Terminal handling library"
# ncurses ships full-featured /bin/reset, /bin/clear, /bin/tput, /bin/tic,
# /bin/infocmp. Toybox has stub reset/clear applets; claim those paths
# so jpkg verify stays clean. Requires jpkg >= 1.0.4.
replaces = ["toybox"]

# 6.5-r5: Correct r4's pkg-config enablement. ncurses' configure macros treat
# `--enable-pc-files` as a boolean (must be the literal value "yes" for the
# `gen-pkgconfig` SUB_MAKEFILE guard at configure line 29263 to fire) and read
# the destination from `--with-pkg-config-libdir=DIR`. Passing
# `--enable-pc-files=/lib/pkgconfig` set `enable_pc_files` to the path string,
# which is neither "no" nor "yes" — so MAKE_PC_FILES was empty (install ran the
# pc-files target) BUT misc/gen-pkgconfig was never generated, and `make install`
# died with `gen-pkgconfig: No such file or directory` partway through. The .jpkg
# was still tarred up (without any .pc files) and got published. Split into
# `--enable-pc-files --with-pkg-config-libdir=/lib/pkgconfig` so the script
# actually gets created and `make install` lands ncursesw.pc / panelw.pc /
# formw.pc / menuw.pc / tic.pc / tinfo.pc in /lib/pkgconfig/.
#
# 6.5-r4: Add pkg-config support so `pkg-config --cflags ncursesw` returns
# `-I/include/ncursesw`. Without it, anyone probing for ncurses headers via
# pkg-config sees nothing; consumers that fall back to header probing find
# `ncursesw/curses.h` but not bare `term.h`, leaving `HAVE_TERM_H` undefined and
# breaking compiles that need `setupterm`. Specifically reproduces with CPython
# 3.14/3.15 `_curses` module on jonerix.

[source]
url = "https://invisible-island.net/archives/ncurses/ncurses-6.5.tar.gz"
sha256 = "136d91bc269a9a5785e5f9e980bc76ab57428f604ce3e5a5a90cebc767971cc6"

[build]
system = "autoconf"
configure = "CFLAGS=\"-O2 -fomit-frame-pointer\" ./configure --prefix=/ --with-shared --without-debug --enable-widec --enable-pc-files --with-pkg-config-libdir=/lib/pkgconfig --without-cxx --without-manpages --disable-stripping --without-tests CC=clang"
build = "make -C include && make -j$(nproc)"
install = """make DESTDIR=$DESTDIR install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[hooks]
post_remove = """for cmd in clear reset; do
  [ ! -e "/bin/$cmd" ] && [ -x /bin/toybox ] && ln -sf toybox "/bin/$cmd"
done"""

[depends]
runtime = []
build = ["clang", "make"]
