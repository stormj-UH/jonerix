[package]
name = "dropbear"
version = "2025.89-r2"
license = "MIT AND BSD-2-Clause AND Public-Domain"
description = "Lightweight SSH server and client"
# 2025.89-r2: keep 2025.89 for post-quantum SSH key exchange
# (sntrup761x25519-sha512 and mlkem768x25519-sha256), and backport
# upstream fdec3c9 for the Ed25519 S < L verification check.
#
# r3: republish the clean recipe after jmake 1.1.4 fixed the remaining
# dropbear blockers: TAB-indented assignments inside conditional blocks
# and the `$(wildcard ./src/*.h)` prefix-duplication regression. The
# published r2 payloads were empty or failed to build because dropbear's
# Makefiles hit those jmake bugs.
#
# r2: restored the clean recipe after jmake 1.1.1 landed.
# The 2024.86-r1 recipe carried three stacked workarounds for jmake bugs
# that are now fixed upstream:
#   * `$(wildcard ./dir/*.ext)` no longer doubles the prefix
#   * TAB-indented `VAR=…` inside `ifndef`/`ifeq` blocks is no
#     longer mis-classified as a recipe line
# Builds produce dropbear (271 KB) + dbclient (253 KB) + the
# usual dropbearkey/dropbearconvert/scp set with plain `make`.

[source]
url = "https://matt.ucc.asn.au/dropbear/releases/dropbear-2025.89.tar.bz2"
sha256 = "0d1f7ca711cfc336dc8a85e672cab9cfd8223a02fe2da0a4a7aeb58c9e113634"

[build]
system = "autoconf"
configure = "CFLAGS=\"-O2 -fomit-frame-pointer\" ./configure --prefix=/ --bindir=/bin --disable-zlib CC=clang"
build = "make -j$(nproc)"
install = """make DESTDIR=$DESTDIR install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
if [ -d "$DESTDIR/sbin" ]; then cp -a "$DESTDIR/sbin/." "$DESTDIR/bin/" && rm -rf "$DESTDIR/sbin"; fi
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \; 2>/dev/null || true"""

[depends]
runtime = ["musl", "libressl"]
build = ["clang", "make", "jonerix-headers"]
