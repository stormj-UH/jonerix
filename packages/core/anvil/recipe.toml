[package]
name = "anvil"
version = "0.1.0"
license = "MIT"
description = "Clean-room MIT Rust ext2/3/4 userland (mkfs.ext4, e2fsck, tune2fs, debugfs, ...)"

[source]
# Canonical source of truth is the Forgejo repo jonerik/anvil on
# castle.great-morpho.ts.net:3000 at commit
# bb7e8062a5350db8b72abecd2c78d7db69df1dab. That host sits behind
# Tailscale and GitHub's cloud-hosted runners can't reach it, so
# the tarball is mirrored to a jonerix GH release
# (source-anvil-v0.1.0) for CI to fetch. sha256 matches the
# `git archive --prefix=anvil-0.1.0/` output at the pinned commit.
#
# Forgejo URL (primary, reachable from inside the jonerix network):
#   https://castle.great-morpho.ts.net:3000/jonerik/anvil/archive/bb7e8062a5350db8b72abecd2c78d7db69df1dab.tar.gz
url = "https://github.com/stormj-UH/jonerix/releases/download/source-anvil-v0.1.0/anvil-0.1.0.tar.gz"
sha256 = "ec5dcfb103f40a9772411365069253ab9c7419f43a508eeb1e7aa7845766a7e0"

[build]
system = "custom"
# Workspace-wide release build. Cargo.lock is committed in the
# upstream tree so the build is reproducible; --offline + --frozen
# would also work once the vendor dir lands, but for the first-pass
# recipe we let cargo fetch normally (same pattern as ripgrep).
#
# -crt-static matches gitoxide / lsusb-rs: we dynamically link
# against musl so the ext4 tools use /lib/ld-musl-*.so.1 at runtime
# instead of bloating each of the 17 binaries with a static libc.
build = """
set -e
export RUSTFLAGS="-C strip=symbols -C target-feature=-crt-static"
cargo fetch
cargo build --workspace --release
"""
install = """
set -e
B=target/release

# mkfs family ------------------------------------------------------
install -Dm755 "$B/mkfs_ext4" "$DESTDIR/bin/mkfs.ext4"
ln -sf mkfs.ext4 "$DESTDIR/bin/mkfs.ext2"
ln -sf mkfs.ext4 "$DESTDIR/bin/mkfs.ext3"

# e2fsck family ----------------------------------------------------
install -Dm755 "$B/e2fsck" "$DESTDIR/bin/e2fsck"
ln -sf e2fsck "$DESTDIR/bin/fsck.ext2"
ln -sf e2fsck "$DESTDIR/bin/fsck.ext3"
ln -sf e2fsck "$DESTDIR/bin/fsck.ext4"

# Remaining binaries installed under their cargo bin names --------
# Keep the for-loop on a single line: jpkg runs the install script
# under mksh, whose backslash-newline handling inside a heredoc'd TOML
# string ate the '\' we had here the first time around and left
# `e2freefrag` dangling as a standalone word.
for b in dumpe2fs tune2fs debugfs resize2fs e4defrag e2image e2label e2freefrag logsave findfs filefrag blkid chattr lsattr; do
    install -Dm755 "$B/$b" "$DESTDIR/bin/$b"
done

# mklostfound: cargo can't have '+' in a bin name, so ship it as
# both mklostfound and the conventional mklost+found alias.
install -Dm755 "$B/mklostfound" "$DESTDIR/bin/mklostfound"
ln -sf mklostfound "$DESTDIR/bin/mklost+found"

# Man pages --------------------------------------------------------
for m in docs/man/*.1; do
    [ -f "$m" ] && install -Dm644 "$m" "$DESTDIR/share/man/man1/$(basename "$m")"
done
for m in docs/man/*.8; do
    [ -f "$m" ] && install -Dm644 "$m" "$DESTDIR/share/man/man8/$(basename "$m")"
done

# License tracking (same convention as lsusb-rs) ------------------
install -Dm644 LICENSE "$DESTDIR/share/licenses/anvil/LICENSE"

# merged-usr flatten + strip (same post-pass as ripgrep / lsusb-rs)
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
find "$DESTDIR/bin" -type f -exec llvm-strip --strip-all {} \\; 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]
