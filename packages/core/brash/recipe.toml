[package]
# Clean-room Rust implementation of bash 5.3 with no GNU runtime and no
# bash source-code reference.  Byte-identical with bash on 1100+ test
# corpora across the bash 5.3 upstream suite, realworld scripts, dash
# POSIX, busybox/mksh edge cases, and shellcheck/shfmt parser parity.
# Beats bash on 10/13 hot-path benchmarks (median across ITER=10).
name = "brash"
version = "1.0.9"
license = "MIT"
description = "Clean-room Rust reimplementation of bash 5.3 (no GNU runtime)"
# Brash provides /bin/bash and /bin/rash.  /bin/sh stays with mksh, which
# is the system POSIX shell on jonerix; brash is for scripts and users
# that want bashisms, associative arrays, [[ ]], etc.
#
# No `replaces` needed: jonerix has no prior /bin/bash or /bin/rash
# provider (toybox skips the bash applet, gnu-compat-symlinks ships
# library symlinks only, mksh installs /bin/sh).

[source]
# Canonical source: Forgejo jonerik/brash on castle.great-morpho.ts.net:3000.
# That host is behind Tailscale and unreachable from GitHub-hosted runners,
# so the v1.0.5 tarball is mirrored to a jonerix GH release tag for CI.
#
# Forgejo URL (primary, reachable from inside the jonerix network):
#   https://castle.great-morpho.ts.net:3000/jonerik/brash/archive/v1.0.9.tar.gz
#
# 1.0.9 ships two critical drop-in fixes:
# 1. O(n²) tokenization eliminated — bash-completion (3475 lines) sources in
#    25ms instead of 31.8s.  Start-line metadata replaces newline padding.
# 2. History expansion suppressed in sourced files — ${!var}, ${!arr[@]}, and
#    !() extglob no longer trigger "event not found" during rc/profile load.
url = "https://github.com/stormj-UH/jonerix/releases/download/source-brash-v1.0.9/brash-1.0.9.tar.gz"
sha256 = "fa21f4c98ab4a0c29490868e16c46227c6f43597757d69c5b7057e21f9d40566"

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/brash-cargo
export CARGO_TARGET_DIR="$PWD/target"
# brash's source tarball doesn't ship a `vendor/` directory, so cargo
# must reach crates.io to resolve `glob`/`nix`/`libc`/`bitflags`. Match
# the jmake recipe pattern (online cargo + jonerix CA bundle) instead
# of stormwall's offline+vendored pattern.
export CARGO_HTTP_CAINFO=/etc/ssl/certs/ca-certificates.crt
export OPENSSL_DIR=/
export OPENSSL_INCLUDE_DIR=/include
export OPENSSL_LIB_DIR=/lib
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static"
cargo build --release --locked --bin brash
"""
install = """
set -e
BIN="$PWD/target/release/brash"
install -Dm755 "$BIN" "$DESTDIR/bin/brash"
ln -sf brash "$DESTDIR/bin/bash"
ln -sf brash "$DESTDIR/bin/rash"
# Skel: drop .brashrc + .brash_profile that mirror the macOS zsh prompt.
install -Dm644 examples/dotfiles/brashrc       "$DESTDIR/share/brash/skel/.brashrc"
install -Dm644 examples/dotfiles/brash_profile "$DESTDIR/share/brash/skel/.brash_profile"
llvm-strip --strip-all "$DESTDIR/bin/brash" 2>/dev/null || true
"""

[hooks]
# Seed ~/.brashrc and ~/.brash_profile for /root and /home/* users so a
# first brash login picks up the prompt + history config without any
# manual setup.  Mirrors mksh's seed_mkshrc pattern.  We only overwrite
# if the destination is missing OR still carries the shipped marker
# comment, so user customisations are never clobbered.
post_install = """
seed_brash_rc() {
    home=$1
    owner=$2
    for base in brashrc brash_profile; do
        src=/share/brash/skel/.$base
        dest=$home/.$base
        [ -r "$src" ] || continue
        if [ ! -f "$dest" ] ||
           grep -q '^# ~/\\.brashrc — brash interactive-shell init for ' "$dest" 2>/dev/null ||
           grep -q '^# ~/\\.brash_profile — brash login-shell init for ' "$dest" 2>/dev/null; then
            cp "$src" "$dest"
            chown "$owner" "$dest" 2>/dev/null || true
        fi
    done
}

[ -d /root ] && seed_brash_rc /root root:root
if [ -d /home ]; then
    for home in /home/*; do
        [ -d "$home" ] || continue
        user=$(basename "$home")
        id -u "$user" >/dev/null 2>&1 || continue
        seed_brash_rc "$home" "$user:$user"
    done
fi
exit 0
"""

# On removal, jpkg already deletes /bin/brash and the /bin/bash and
# /bin/rash symlinks pointing to it.  This hook's job is only to put a
# fallback /bin/bash back so scripts with `#!/bin/bash` don't suddenly
# fail with "exec format error".  Prefer mksh (closest semantic match
# to bash among the POSIX shells on a jonerix system) and fall back to
# toybox.  If neither is available we leave /bin/bash absent — better
# an honest "command not found" than silently running the wrong shell.
post_remove = """
if [ -e /bin/bash ] || [ -L /bin/bash ]; then
    exit 0
fi
if [ -x /bin/mksh ]; then
    ln -sf mksh /bin/bash
elif [ -x /bin/toybox ]; then
    ln -sf toybox /bin/bash
fi
exit 0
"""

[depends]
runtime = ["musl"]
build = ["rust"]
