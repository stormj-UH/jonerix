[package]
name = "openrc"
version = "0.54-r6"
license = "BSD-2-Clause"
description = "Dependency-based init system for Unix-like systems"

[source]
url = "https://github.com/OpenRC/openrc/archive/refs/tags/0.54.tar.gz"
sha256 = "c84ff1d8e468c043fe136d11d3d34d6bb28328267d1352526a5d18cdf4c60fb0"

[build]
system = "meson"
configure = """# seedrng requires linux/random.h, which the current jonerix builder
# image does not ship yet. Drop that optional service until kernel headers
# are packaged in-tree for builders.
sed -i "/subdir('seedrng')/d" src/meson.build
sed -i "/'seedrng.in',/d" init.d/meson.build
sed -i "/'seedrng',/d" conf.d/meson.build
sed -i 's/ seedrng / /g; s/ seedrng"/"/g' tools/meson_runlevels.sh
meson setup build --prefix=/ --libdir=lib --bindir=bin --sbindir=bin -Dbuildtype=release -Dpam=false -Dselinux=disabled"""
build = "samu -C build -j$(nproc)"
install = """DESTDIR=$DESTDIR samu -C build install
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi
if [ -d "$DESTDIR/sbin" ]; then cp -a "$DESTDIR/sbin/." "$DESTDIR/bin/" && rm -rf "$DESTDIR/sbin"; fi
# Pin OpenRC's shell scripts at /bin/mksh instead of /bin/sh.
# Background: jonerix's /bin/sh is often symlinked to toybox. Toybox sh
# can't parse the heredocs, nested conditionals, and function-override
# patterns that OpenRC uses — reproduced 2026-04-15: `rc-service unbound
# status` errors with "unexpected end of file", and user-supplied start()
# functions in init.d scripts are silently skipped. mksh handles all of
# it correctly. Rewrite `#!/bin/sh` -> `#!/bin/mksh` in every OpenRC-
# shipped script so OpenRC stays functional regardless of what /bin/sh
# points at.
for d in "$DESTDIR/lib/rc/sh" "$DESTDIR/lib/rc/bin" "$DESTDIR/bin" "$DESTDIR/etc/init.d"; do
    [ -d "$d" ] || continue
    find "$d" -type f | while read -r f; do
        head1=$(head -n 1 "$f" 2>/dev/null || true)
        case "$head1" in
            "#!/bin/sh"*|"#! /bin/sh"*)
                sed -i "1s|^#![[:space:]]*/bin/sh|#!/bin/mksh|" "$f"
                ;;
        esac
    done
done
# u-root ip compatibility: OpenRC's /etc/init.d/network uses
#   `ip route flush scope global`
# to wipe default/global routes on stop(). u-root's ip (which we ship
# as /bin/ip via iproute-go since toybox's ip can't see TUN ifaces)
# does not implement the `scope <name>` filter on flush and dies with:
#   strconv.ParseInt: parsing "global": invalid syntax
# Rewrite that ONE line to a show+del loop that works with both
# iproute2 ip and u-root ip. Using shell read+case avoids awk-field-$1
# quoting issues inside sed replacement text. Reproduced 2026-04-16
# on jonerix-tormenta: `rc-service ntp-set start` cascaded through
# `need net`, started `network`, which tried the flush and returned
# non-zero — partial flush state caused the dhcpcd lease to be dropped
# and took the box offline until power cycle.
if [ -f "$DESTDIR/etc/init.d/network" ]; then
    sed -i 's~ip route flush scope global~ip -o -4 route show 2>/dev/null | while read -r _pfx _rest; do case " $_rest " in *" scope global "*) ip route del "$_pfx" 2>/dev/null || true;; esac; done~' "$DESTDIR/etc/init.d/network"
fi
# toybox sysctl compatibility: OpenRC's /etc/init.d/sysctl calls
#   sysctl --system
# on Linux. Toybox sysctl only supports -p [FILE] — --system errors
# with "Unknown option 'system'". BSD_sysctl's `sysctl -w "$var"` path
# also fails since toybox -w requires strict key=value with no spaces.
# Replace start() with a simple per-file `sysctl -p` loop that works
# with both toybox and procps-ng sysctl. Reproduced 2026-04-16 on
# jonerix-tormenta: sysctl service errored during boot runlevel,
# non-critical but pollutes the log and blocks dependents.
if [ -f "$DESTDIR/etc/init.d/sysctl" ]; then
    cat > "$DESTDIR/etc/init.d/sysctl" <<'SYSCTL_INIT'
#!/bin/mksh
# Rewritten by jonerix openrc jpkg — toybox sysctl only supports
# `-p [FILE]`; --system and strict -w fail. See recipe.toml for context.

depend() {
    after clock
    before bootmisc logger
    keyword -prefix -systemd-nspawn -vserver
}

start() {
    local rc=0 conf
    ebegin "Configuring kernel parameters"
    for conf in /etc/sysctl.conf /etc/sysctl.d/*.conf; do
        [ -r "$conf" ] || continue
        sysctl -p "$conf" >/dev/null 2>&1 || rc=1
    done
    eend $rc "Unable to configure some kernel parameters"
}
SYSCTL_INIT
    chmod 755 "$DESTDIR/etc/init.d/sysctl"
fi
# gendepends.sh relative-path fix: upstream hard-codes `etc/init.d` (no
# leading slash) as the first init-script dir, then does `cd "$_dir"`
# followed by `. "$_dir/$RC_SVCNAME"`. After the cd, the relative path
# resolves wrong and every init script sourcing fails with:
#   /lib/rc/sh/gendepends.sh[129]: .: etc/init.d/<svc>: No such file
# ~40 of those errors per invocation pollute the boot log. The
# earlier sed here used `\\$` as the end-of-line match, which
# GNU sed accepts but toybox sed (jonerix's sed) silently fails
# to match — so the fix was a no-op on every real install. The
# prefix-only match below works on both.
if [ -f "$DESTDIR/lib/rc/sh/gendepends.sh" ]; then
    sed -i 's|^etc/init|/etc/init|' "$DESTDIR/lib/rc/sh/gendepends.sh"
fi
# Ensure basic runlevel symlinks exist. OpenRC's upstream install
# creates /etc/runlevels/{sysinit,boot,default,shutdown} directories
# but leaves them empty — the distro is expected to populate them.
# Without at least sysfs/procfs/devfs in sysinit, /dev/pts never gets
# mounted and interactive SSH fails with "PTY allocation request
# failed" (reproduced 2026-04-16 on jonerix-tormenta). Seed the bare
# minimum so fresh installs boot usable.
for rl_dir in sysinit boot default shutdown; do
    mkdir -p "$DESTDIR/etc/runlevels/$rl_dir"
done
for svc in sysfs procfs devfs dmesg modules; do
    if [ -f "$DESTDIR/etc/init.d/$svc" ]; then
        ln -sf "/etc/init.d/$svc" "$DESTDIR/etc/runlevels/sysinit/$svc"
    fi
done
for svc in localmount loopback hostname sysctl root; do
    if [ -f "$DESTDIR/etc/init.d/$svc" ]; then
        ln -sf "/etc/init.d/$svc" "$DESTDIR/etc/runlevels/boot/$svc"
    fi
done
for svc in killprocs mount-ro savecache; do
    if [ -f "$DESTDIR/etc/init.d/$svc" ]; then
        ln -sf "/etc/init.d/$svc" "$DESTDIR/etc/runlevels/shutdown/$svc"
    fi
done
find $DESTDIR/bin -type f -exec llvm-strip --strip-all {} \\; 2>/dev/null || true
find $DESTDIR/lib -name "*.so*" -type f -exec llvm-strip --strip-unneeded {} \\; 2>/dev/null || true"""

[depends]
# mksh: OpenRC's shell scripts are rewritten at install time to use
# #!/bin/mksh explicitly (see install step). Declaring mksh a runtime
# dep makes that contract visible — OpenRC cannot function without a
# proper POSIX shell, and toybox sh is insufficient.
runtime = ["musl", "mksh"]
build = ["clang", "meson", "samurai", "jonerix-headers"]
