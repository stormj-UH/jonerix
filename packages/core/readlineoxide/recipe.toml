[package]
# Clean-room Rust compatibility layer for the GPL-3 GNU Readline and
# History libraries. The package follows the oxide convention used by
# exproxide and m4oxide: package/source name stays readlineoxide, while
# installed ABI names are the conventional libreadline/libhistory names
# so configure scripts and existing consumers can find them.
name = "readlineoxide"
version = "0.1.12-r0"
license = "MIT"
description = "Clean-room Rust libreadline/libhistory compatibility layer for jonerix"

[source]
# 0.1.12: clean-room readline compatibility closure on top of 0.1.11's
# Python/REPL hardening.  This release keeps the callback and terminal
# fixes below, then adds the broad ABI, inputrc, edit-command, vi-command,
# completion, history, panic-audit, invariant-ledger, and unsafe-audit work
# needed for readlineoxide to behave as a practical drop-in libreadline and
# libhistory replacement for jonerix consumers.
#
# 0.1.11 fixed three gaps surfaced by real REPL use after 0.1.10 unmasked
# the select-driven hang:
#
# (1) Default emacs keymap was nearly empty.  Only printable ASCII
# plus \r/\n were bound; arrow keys, Home/End, Delete, Meta-word
# commands, the Ctrl-X chord, and Ctrl-{A,E,B,F,D,L,K,N,P,R,S,T,U,V,
# W,Y,_} were absent.  Some Ctrl keys still worked through a fallback
# table inside process_edit_key, but multi-byte escape sequences
# (ESC [ A, ESC O B, ESC [ 3 ~, ESC f, ...) fell through as raw bytes
# and got displayed literally — so Up-arrow in a REPL inserted
# "^[[A" instead of recalling history.  install_default_emacs_bindings
# now wires up the full GNU-readline default set: single-byte Ctrl
# keys, DEL, both CSI and SS3 arrow / Home / End encodings, Meta
# word-motion / case commands, ESC [ 1~/4~/7~/8~ Home/End variants,
# ESC [ 3~ Delete, ESC [ 2/5/6 ~ Insert/PgUp/PgDn, and Ctrl-X
# {Ctrl-E,(,),Ctrl-R,Ctrl-U,Ctrl-V}.
#
# (2) rl_prep_terminal / rl_deprep_terminal were termios no-ops.  GNU
# readline switches the input fd into raw cbreak mode (clear ICANON|
# ECHO|ECHOE|ECHOK|ECHONL|IEXTEN on lflag; clear IXON|ICRNL|INLCR|
# ISTRIP|INPCK|BRKINT on iflag; VMIN=1, VTIME=0) so character-at-a-
# time editing actually works.  Without it the kernel canonical mode
# echoed every keystroke twice and ESC sequences only arrived after
# Enter flushed the line.  rl_prep_terminal now stashes the original
# termios via tcgetattr, applies the raw-cbreak profile via
# tcsetattr TCSADRAIN, and rl_deprep_terminal restores it.  Field
# offsets validated against a small C probe; they are stable on every
# arm/musl jonerix target.
#
# (3) using_history() was a no-op.  GNU's using_history() parks the
# temporary cursor one past the most-recent entry so the next
# previous_history() returns the latest line.  CPython's readline.c
# calls it on every input(); every well-behaved REPL is expected to
# follow the same convention.  Without it the cursor stayed at 0
# forever and Up-arrow did nothing inside a session that had recorded
# history.  The fix is a one-liner inside using_history() — the
# history_basic C simulation pins the opposite invariant for
# add_history (must not move the cursor), so the reset must live in
# using_history() and not in add_history().
#
# Verified on CPython 3.15.0a1 on tormenta:
#   Lib/test/test_readline.py — 14 pass, 1 skip (free-threading), 0
#   fail.  Same scoreboard as 0.1.10, no regressions.
#   Interactive pty libreadline smoke: prompt, basic input, Ctrl-A,
#   Ctrl-E, Ctrl-U, Tab completion, arrow-up history recall — all
#   six checks pass.
#
# Three new Rust unit tests pin the invariants:
#   default_emacs_keymap_binds_arrows_and_emacs_chords
#   using_history_resets_cursor_for_recall
#   callback_install_fires_startup_and_pre_input_hooks (carried from
#     0.1.11's first commit, now with tightened test infra)
#
# Canonical source: Forgejo jonerik/readlineoxide on
# castle.great-morpho.ts.net:3000.  That host sits behind Tailscale
# so GitHub Actions can't reach it; the tarball is mirrored to the
# stormj-UH/jonerix GH release source-readlineoxide-v0.1.12 for CI.
# Forgejo URL (reachable from inside the jonerix network):
#   https://castle.great-morpho.ts.net:3000/jonerik/readlineoxide/archive/v0.1.12.tar.gz
url = "https://github.com/stormj-UH/jonerix/releases/download/source-readlineoxide-v0.1.12/readlineoxide-v0.1.12.tar.gz"
sha256 = "70aff665d17ce2d9523ee591bef1ffffb530e64d42ffbb9917df43a36b96f722"

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/readlineoxide-cargo
export CARGO_TARGET_DIR=/tmp/readlineoxide-target
export CARGO_NET_OFFLINE=true
export RUSTFLAGS="-C strip=symbols -C target-feature=-crt-static"
cargo rustc --release --offline --frozen -p readlineoxide-readline -- -C link-arg=-Wl,-soname,libreadline.so.8
cargo rustc --release --offline --frozen -p readlineoxide-history -- -C link-arg=-Wl,-soname,libhistory.so.8
"""
install = """
set -e
LIB=/tmp/readlineoxide-target/release

install -Dm755 "$LIB/libreadline.so" "$DESTDIR/lib/libreadline.so.8.0"
ln -sf libreadline.so.8.0 "$DESTDIR/lib/libreadline.so.8"
ln -sf libreadline.so.8 "$DESTDIR/lib/libreadline.so"

install -Dm755 "$LIB/libhistory.so" "$DESTDIR/lib/libhistory.so.8.0"
ln -sf libhistory.so.8.0 "$DESTDIR/lib/libhistory.so.8"
ln -sf libhistory.so.8 "$DESTDIR/lib/libhistory.so"

for h in include/readline/*.h; do
    install -Dm644 "$h" "$DESTDIR/include/readline/$(basename "$h")"
done

mkdir -p "$DESTDIR/lib/pkgconfig"
cat > "$DESTDIR/lib/pkgconfig/readline.pc" <<'PC'
prefix=/
exec_prefix=${prefix}
libdir=${exec_prefix}/lib
includedir=${prefix}/include

Name: readlineoxide
Description: Clean-room libreadline compatibility layer
Version: 0.1.11
Libs: -L${libdir} -lreadline
Cflags: -I${includedir}
PC
cat > "$DESTDIR/lib/pkgconfig/history.pc" <<'PC'
prefix=/
exec_prefix=${prefix}
libdir=${exec_prefix}/lib
includedir=${prefix}/include

Name: readlineoxide-history
Description: Clean-room libhistory compatibility layer
Version: 0.1.11
Libs: -L${libdir} -lhistory
Cflags: -I${includedir}
PC

install -Dm644 LICENSE "$DESTDIR/share/licenses/readlineoxide/LICENSE"
llvm-strip --strip-unneeded "$DESTDIR/lib/libreadline.so.8.0" 2>/dev/null || true
llvm-strip --strip-unneeded "$DESTDIR/lib/libhistory.so.8.0" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]
