[package]
# Clean-room Rust compatibility layer for the GPL-3 GNU Readline and
# History libraries. The package follows the oxide convention used by
# exproxide and m4oxide: package/source name stays readlineoxide, while
# installed ABI names are the conventional libreadline/libhistory names
# so configure scripts and existing consumers can find them.
name = "readlineoxide"
version = "0.1.10-r0"
license = "MIT"
description = "Clean-room Rust libreadline/libhistory compatibility layer for jonerix"

[source]
# 0.1.10: rl_callback_read_char dispatch under select()-driven outer
# loops. 0.1.9 routed the callback-driven byte path through stdio's
# fgetc on rl_instream — libc absorbed every available byte in one
# read(2) and stranded the remainder beyond the kernel-level readiness
# layer. select() then reported the fd idle and the registered line
# handler never fired, so CPython 3.15's `input()` (and any other
# select-driven readline consumer matching the readline(3) man-page
# pattern) hung indefinitely under a pty. Repro: 5 of 15 tests in
# CPython's test_readline (test_auto_history_disabled,
# test_auto_history_enabled, test_history_size, test_nonascii,
# test_set_complete_delims) all blocked at the 20 s pty timeout.
# Fix: introduce callback_read_byte, a one-byte unbuffered read(2)
# against fileno(rl_instream) that honors the same rl_pending_input /
# macro / pending_input / rl_getc_function short-circuits as
# rl_read_key. Rewire rl_callback_read_char to it so every byte stays
# visible to the readiness layer while still feeding the shared
# key-binding / line-completion machinery one character at a time.
# Adds 3 Rust unit tests + 2 C simulations (callback_unbuffered_fd
# exercises the pipe path; callback_pty_select reproduces the
# man-page select() loop end to end via forkpty). After 0.1.10 the
# three previously-hung tests pass cleanly on tormenta; the two
# completion-related failures that remain are unrelated semantic
# bugs surfaced by the dispatch fix.
#
# Canonical source: Forgejo jonerik/readlineoxide on
# castle.great-morpho.ts.net:3000. That host sits behind Tailscale so
# GitHub Actions can't reach it; the tarball is mirrored to the
# stormj-UH/jonerix GH release source-readlineoxide-v0.1.10 for CI.
# Forgejo URL (reachable from inside the jonerix network):
#   https://castle.great-morpho.ts.net:3000/jonerik/readlineoxide/archive/v0.1.10.tar.gz
url = "https://github.com/stormj-UH/jonerix/releases/download/source-readlineoxide-v0.1.10/readlineoxide-v0.1.10.tar.gz"
sha256 = "4a37859dbf76a5ab4d8aa60a8b66e2a548b11495a55f6ef3ce96479a3edead4f"

[build]
system = "custom"
build = """
set -e
export CARGO_HOME=/tmp/readlineoxide-cargo
export CARGO_TARGET_DIR=/tmp/readlineoxide-target
export CARGO_NET_OFFLINE=true
export RUSTFLAGS="-C strip=symbols -C target-feature=-crt-static"
cargo rustc --release --offline --frozen -p readlineoxide-readline -- -C link-arg=-Wl,-soname,libreadline.so.8
cargo rustc --release --offline --frozen -p readlineoxide-history -- -C link-arg=-Wl,-soname,libhistory.so.8
"""
install = """
set -e
LIB=/tmp/readlineoxide-target/release

install -Dm755 "$LIB/libreadline.so" "$DESTDIR/lib/libreadline.so.8.0"
ln -sf libreadline.so.8.0 "$DESTDIR/lib/libreadline.so.8"
ln -sf libreadline.so.8 "$DESTDIR/lib/libreadline.so"

install -Dm755 "$LIB/libhistory.so" "$DESTDIR/lib/libhistory.so.8.0"
ln -sf libhistory.so.8.0 "$DESTDIR/lib/libhistory.so.8"
ln -sf libhistory.so.8 "$DESTDIR/lib/libhistory.so"

for h in include/readline/*.h; do
    install -Dm644 "$h" "$DESTDIR/include/readline/$(basename "$h")"
done

mkdir -p "$DESTDIR/lib/pkgconfig"
cat > "$DESTDIR/lib/pkgconfig/readline.pc" <<'PC'
prefix=/
exec_prefix=${prefix}
libdir=${exec_prefix}/lib
includedir=${prefix}/include

Name: readlineoxide
Description: Clean-room libreadline compatibility layer
Version: 0.1.10
Libs: -L${libdir} -lreadline
Cflags: -I${includedir}
PC
cat > "$DESTDIR/lib/pkgconfig/history.pc" <<'PC'
prefix=/
exec_prefix=${prefix}
libdir=${exec_prefix}/lib
includedir=${prefix}/include

Name: readlineoxide-history
Description: Clean-room libhistory compatibility layer
Version: 0.1.10
Libs: -L${libdir} -lhistory
Cflags: -I${includedir}
PC

install -Dm644 LICENSE "$DESTDIR/share/licenses/readlineoxide/LICENSE"
llvm-strip --strip-unneeded "$DESTDIR/lib/libreadline.so.8.0" 2>/dev/null || true
llvm-strip --strip-unneeded "$DESTDIR/lib/libhistory.so.8.0" 2>/dev/null || true
"""

[depends]
runtime = ["musl"]
build = ["rust"]
