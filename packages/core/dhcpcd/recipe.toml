[package]
name = "dhcpcd"
version = "10.1.0"
license = "BSD-2-Clause"
pre_bootstrap = false
description = "RFC2131-compliant DHCP client daemon"

[build]
system = "custom"
build = """
set -e
apk add --no-cache dhcpcd
for pkg in dhcpcd; do
  apk info --contents "$pkg" 2>/dev/null | tail -n +2 | grep -Ev '(/$|^$)' | while IFS= read -r f; do
    f="${f%/}"
    src="/${f}"
    [ -e "$src" ] || continue
    dst="${DESTDIR}/${f}"
    mkdir -p "$(dirname "$dst")"
    cp -aP "$src" "$dst" 2>/dev/null || true
  done
done
if [ -d "${DESTDIR}/usr" ]; then
  cp -a "${DESTDIR}/usr/." "${DESTDIR}/"
  rm -rf "${DESTDIR}/usr"
fi
"""
install = ""

[depends]
runtime = ["musl"]
build = []
