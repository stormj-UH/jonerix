[package]
name = "jpkg-rs"
version = "2.0.0-r1"
license = "MIT"
description = "jonerix package manager — Rust port of jpkg (side-by-side, does NOT replace jpkg yet)"
# This recipe builds the Rust port of jpkg into TWO binaries (jpkg-rs and
# jpkg-rs-local) installed at /bin/jpkg-rs and /bin/jpkg-rs-local.  It
# DOES NOT replace the C-built /bin/jpkg, /bin/jpkg-local, or /bin/jpkg-conform
# — those continue to ship from packages/jpkg/ until jpkg-rs has been
# validated against the full CI chain.  After validation, this recipe will
# be amended to add `replaces = ["jpkg"]` and the binaries renamed to
# /bin/jpkg / /bin/jpkg-local.
#
# The Rust port is feature-equivalent with C jpkg 1.1.5: the .jpkg archive
# format (`JPKG\x00\x01\x00\x00` magic + LE32 hdr + TOML metadata + zstd(tar)),
# the /var/db/jpkg/installed/<name>/{metadata.toml,files} on-disk layout,
# the INDEX format, the Ed25519 signing flow, the merged-/usr flattening
# in `build`, and the `replaces=[…]` ownership-transfer semantics are all
# byte-equivalent.  158 in-crate tests pass, plus a complete real-jpkg
# smoke test (build → install → info → verify → tamper-detect → remove).

[source]
# Local-only build from $RECIPE_DIR — there is no external upstream URL.
# The whole crate (Cargo.toml, src/, tests/, .cargo/config.toml) is staged
# from $RECIPE_DIR by the configure step and built with cargo.

[build]
system = "custom"
configure = "cp -a $RECIPE_DIR/Cargo.toml $RECIPE_DIR/Cargo.lock $RECIPE_DIR/src $RECIPE_DIR/.cargo ."
build = """set -e
export CARGO_HTTP_CAINFO=/etc/ssl/certs/ca-certificates.crt
export OPENSSL_DIR=/
export OPENSSL_INCLUDE_DIR=/include
export OPENSSL_LIB_DIR=/lib
# crt-static + strip=symbols on the FINAL binaries (not on the host
# proc-macro build).  Passing `--target $TRIPLE` (where TRIPLE matches the
# host) splits cargo's compilation lanes: proc-macros build for the host
# without crt-static (so they can be loaded as dylibs by the compiler),
# while the target binaries see RUSTFLAGS and link statically against musl.
# Without --target the global RUSTFLAGS would also poison clap_derive /
# serde_derive / der_derive proc-macro builds with crt-static, and cargo
# would refuse with "cannot produce proc-macro for X".
TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
export RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static"
cargo build --release --locked --target "$TRIPLE" --bin jpkg --bin jpkg-local
# Cargo with --target writes artifacts under target/<triple>/release/ — surface
# them at the same target/release/ path the install step expects.
mkdir -p target/release
cp -f "target/$TRIPLE/release/jpkg" target/release/jpkg
cp -f "target/$TRIPLE/release/jpkg-local" target/release/jpkg-local
"""
install = """set -e
# Install under -rs suffixes for the side-by-side rollout.  When this
# recipe is promoted to replace packages/jpkg/, drop the suffixes here
# and add `replaces = ["jpkg"]` to [package] above.
install -Dm755 target/release/jpkg "$DESTDIR/bin/jpkg-rs"
install -Dm755 target/release/jpkg-local "$DESTDIR/bin/jpkg-rs-local"
llvm-strip --strip-all "$DESTDIR/bin/jpkg-rs" 2>/dev/null || true
llvm-strip --strip-all "$DESTDIR/bin/jpkg-rs-local" 2>/dev/null || true
# Even with -C target-feature=+crt-static, Rust binaries still carry the
# string "/lib64/ld-linux-..." in the .interp/.comment area of the ELF
# (it's emitted by the linker as the dynamic-linker fallback path, even
# when nothing actually loads it). jpkg's audit_layout_tree refuses to
# package any binary containing a literal "/lib64" substring because the
# merged-/usr layout has no /lib64 directory. Null-pad "/lib64" → "/lib\0\0"
# in-place — same byte length, harmless to strict-static binaries because
# nothing reads .interp on a statically-linked program. Same pattern that
# packages/extra/runc, packages/extra/containerd, and packages/extra/nerdctl
# use for their Go binaries.
ELF_LIST=$(mktemp)
find "$DESTDIR" -type f -exec sh -c '
    head -c 4 "$1" 2>/dev/null | od -An -tx1 | tr -d " " | grep -q "^7f454c46" && printf "%s\\n" "$1"
' _ {} ';' > "$ELF_LIST" 2>/dev/null || true
if [ -s "$ELF_LIST" ]; then
    python3 - "$ELF_LIST" <<'PYEOF' || true
import sys
with open(sys.argv[1]) as f:
    files = [ln.rstrip("\n") for ln in f if ln.strip()]
for p in files:
    with open(p, "rb") as fh: d = fh.read()
    n = d.count(b"/lib64")
    if not n: continue
    d = d.replace(b"/lib64", b"/lib\x00\x00")
    with open(p, "wb") as fh: fh.write(d)
    print(f"jpkg-rs lib64-fix: {p} replaced {n} refs")
PYEOF
fi
rm -f "$ELF_LIST"
# Ensure the standard jpkg directory tree exists so the new binary can be
# pointed at it for testing without first running C jpkg.
install -d "$DESTDIR/etc/jpkg/keys"
install -d "$DESTDIR/var/db/jpkg/installed"
install -d "$DESTDIR/var/cache/jpkg"
"""

[depends]
runtime = ["musl"]
build = ["rust"]
