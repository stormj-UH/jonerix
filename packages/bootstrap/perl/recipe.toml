[package]
name = "perl"
version = "5.40.0"
license = "Artistic-2.0"
description = "Practical Extraction and Report Language"

[source]
url = "https://www.cpan.org/src/5.0/perl-5.40.0.tar.gz"
sha256 = "c740348f357396327a9795d3e8323bafd0fe8a5c7835fc1cbaba0cc8dfe7161f"

[build]
system = "custom"
configure = """./Configure -des \
  -Dprefix=/ \
  -Dcc=clang \
  -Dld=clang \
  -Dar=llvm-ar \
  -Dnm=llvm-nm \
  -Dranlib=llvm-ranlib \
  -Dlibc=/lib/libc.so \
  -Dlibpth='/lib /usr/lib' \
  -Dglibpth='/lib /usr/lib' \
  -Dplibpth='/lib /usr/lib' \
  -Dloclibpth='/lib' \
  -Dlocincpth='/include' \
  -Dusrinc='/include' \
  -Uuseshrplib \
  -Uusenm \
  -Dusethreads=n \
  -Doptimize='-Os' \
  -Dd_eaccess=undef"""
build = "make -j$(nproc)"
install = "make install DESTDIR=$DESTDIR"

[depends]
runtime = ["musl"]
build = ["clang", "make"]
