[package]
name = "lz4"
version = "1.10.0"
license = "BSD-2-Clause"
description = "Extremely fast lossless compression library and tool"

[source]
url = "https://github.com/lz4/lz4/archive/v1.10.0.tar.gz"
sha256 = "537512904744b35e232912055ccf8ec66d768639ff3abe5788d90d792ec5f48b"

[build]
system = "make"
build = "make CC=clang CFLAGS=\"-Os -pipe -fstack-protector-strong -fPIE\" LDFLAGS=\"-Wl,-z,relro,-z,now -pie\" PREFIX=/ -j$(nproc)"
install = "make install PREFIX=/ DESTDIR=$DESTDIR"

[depends]
runtime = ["musl"]
build = ["clang"]
