[package]
name = "lz4"
version = "1.10.0"
license = "BSD-2-Clause"
description = "Extremely fast lossless compression library and tool"

[source]
url = "https://github.com/lz4/lz4/archive/v1.10.0.tar.gz"
sha256 = "537512904744b35e232912055ccf8ec66d768639ff3abe5788d90d792ec5f48b"

[build]
system = "cmake"
configure = "cmake -S build/cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/ -DCMAKE_C_COMPILER=clang -DCMAKE_C_FLAGS=\"-Os -pipe -fstack-protector-strong -fPIE\" -DBUILD_SHARED_LIBS=ON -DBUILD_STATIC_LIBS=ON -DLZ4_BUILD_CLI=ON"
build = "cmake --build build -j$(nproc)"
install = """DESTDIR=$DESTDIR cmake --install build
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi"""

[depends]
runtime = ["musl"]
build = ["clang", "cmake", "samurai"]
