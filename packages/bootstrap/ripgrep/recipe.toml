[package]
name = "ripgrep"
version = "15.1.0"
license = "MIT"
description = "Fast line-oriented search tool (grep replacement)"

[source]
url = "https://github.com/BurntSushi/ripgrep/archive/refs/tags/15.1.0.tar.gz"
sha256 = "046fa01a216793b8bd2750f9d68d4ad43986eb9c0d6122600f993906012972e8"

[build]
system = "custom"
configure = ""
build = """set -e
export CARGO_HOME=/tmp/cargo-home
export CC=clang
export CXX=clang++
export AR=llvm-ar
export RANLIB=llvm-ranlib
export RUSTFLAGS="-C target-feature=-crt-static -C linker=clang -C link-arg=-fuse-ld=lld"
mkdir -p .cargo
printf '[profile.release]\nlto = false\ncodegen-units = 4\n' > .cargo/config.toml
cargo build --release --features pcre2 2>/dev/null || cargo build --release
"""
install = """
set -e
mkdir -p "$DESTDIR/bin"
install -m755 target/release/rg "$DESTDIR/bin/rg"
"""

[depends]
runtime = ["musl"]
build = ["rust"]
