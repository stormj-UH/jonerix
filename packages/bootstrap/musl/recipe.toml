[package]
name = "musl"
version = "1.2.5"
license = "MIT"
description = "Lightweight, fast, and standards-conformant C library"

[source]
url = "https://musl.libc.org/releases/musl-1.2.5.tar.gz"
sha256 = "a9a118bbe84d8764da0ea0d28b3ab3fae8477fc7e4085d90102b8596fc7c75e4"

[build]
system = "autoconf"
configure = "CC=clang AR=llvm-ar RANLIB=llvm-ranlib ./configure --prefix=/"
build = "make -j$(nproc)"
install = "make DESTDIR=$DESTDIR install"

[depends]
runtime = []
build = ["clang"]
