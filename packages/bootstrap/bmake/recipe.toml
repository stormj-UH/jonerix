[package]
name = "bmake"
version = "20240808"
license = "MIT"
description = "Portable version of NetBSD make"

[source]
url = "https://www.crufty.net/ftp/pub/sjg/bmake-20240808.tar.gz"
sha256 = "b59189251b483decd4492f1f74387b2a584c03d5aa4637cd48b38ec62b9c0848"

[build]
system = "custom"
configure = """
patch -p0 < $RECIPE_DIR/gnu-compat.patch
./configure --prefix=/ CC=clang
"""
build = "sh make-bootstrap.sh"
install = """
install -Dm755 bmake $DESTDIR/bin/bmake
ln -sf bmake $DESTDIR/bin/make
# Install system makefiles (sys.mk etc.) — bmake needs these to function
mkdir -p $DESTDIR/share/mk
if [ -d mk ]; then
  cp -a mk/*.mk $DESTDIR/share/mk/
elif [ -d /usr/share/mk ]; then
  cp -a /usr/share/mk/*.mk $DESTDIR/share/mk/
fi
"""

[depends]
runtime = ["musl"]
build = ["clang"]
