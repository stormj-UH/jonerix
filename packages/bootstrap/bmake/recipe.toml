[package]
name = "bmake"
version = "20240808"
license = "MIT"
description = "Portable version of NetBSD make"

[source]
url = "https://www.crufty.net/ftp/pub/sjg/bmake-20240808.tar.gz"
sha256 = "b59189251b483decd4492f1f74387b2a584c03d5aa4637cd48b38ec62b9c0848"

[build]
system = "custom"
configure = "./configure --prefix=/ CC=clang"
build = "sh make-bootstrap.sh"
install = "install -Dm755 bmake $DESTDIR/bin/bmake"

[depends]
runtime = ["musl"]
build = ["clang"]
