[package]
name = "bc"
version = "7.0.3"
license = "BSD-2-Clause"
description = "Implementation of the bc calculator language"

[source]
url = "https://github.com/gavinhoward/bc/releases/download/7.0.3/bc-7.0.3.tar.xz"
sha256 = "91eb74caed0ee6655b669711a4f350c25579778694df248e28363318e03c7fc4"

[build]
system = "configure"
configure = "CC=clang ./configure --prefix=/ --disable-nls"
build = "make -j$(nproc)"
install = "make install DESTDIR=$DESTDIR"

[depends]
runtime = ["musl"]
build = ["clang", "make"]
