[package]
name = "pico"
version = "2.26"
license = "Apache-2.0"
description = "Easy text editor from the Alpine email suite"

[source]
url = "https://alpineapp.email/alpine/release/src/alpine-2.26.tar.xz"
sha256 = "c0779c2be6c47d30554854a3e14ef5e36539502b331068851329275898a9baba"

[build]
system = "autoconf"
configure = "./configure --prefix=/ --without-ldap --without-krb5 --without-tcl --without-ssl CC=clang CFLAGS=-Os"
build = """# Build imap c-client without SSL (pico/browse.c needs ../c-client/mail.h)
echo y | make -C imap slx SSLTYPE=none
# pico/browse.c includes ../c-client/mail.h — expects c-client at root level
ln -sf imap/c-client c-client
make -C pico"""
install = "make -C pico DESTDIR=$DESTDIR install"

[depends]
runtime = ["ncurses"]
build = ["clang", "bmake", "ncurses", "openssl"]
