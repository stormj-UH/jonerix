[package]
name = "go"
version = "1.17.13"
license = "BSD-3-Clause"
description = "Go programming language (intermediate bootstrap, built from Go 1.4)"

# Go 1.17 is the last version bootstrappable from Go 1.4.
# Bootstrap chain: C → Go 1.4 → Go 1.17 → Go 1.26+
# After this, packages/bootstrap/go can be updated to build Go 1.26+
# using Go 1.17 as GOROOT_BOOTSTRAP.

[source]
url = "https://go.dev/dl/go1.17.13.src.tar.gz"
sha256 = "a1a48b23afb206f95e7bbaa9b898d965f90826f6f1d1fc0c1d784ada0cd300fd"

[build]
system = "custom"
configure = ""
build = """
ARCH=$(uname -m)
if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
  echo "SKIP: Go 1.17 bootstrap requires Go 1.4 which is x86_64-only."
  echo "On aarch64, use prebuilt Go (core/go) as bootstrap."
  exit 1
fi
# Ensure Go 1.4 bootstrap is available
if [ ! -x /lib/go-bootstrap/bin/go ]; then
  # Try building go-bootstrap first
  if command -v jpkg >/dev/null 2>&1; then
    echo "Building Go 1.4 bootstrap first..."
    RECIPE_DIR="$(cd "$(dirname "$0")/../go-bootstrap" 2>/dev/null && pwd)"
    if [ -f "$RECIPE_DIR/recipe.toml" ]; then
      jpkg build "$RECIPE_DIR" || true
    fi
  fi
  if [ ! -x /lib/go-bootstrap/bin/go ]; then
    echo "ERROR: Go 1.4 bootstrap not found at /lib/go-bootstrap/bin/go"
    echo "Build go-bootstrap first: jpkg build packages/bootstrap/go-bootstrap"
    exit 1
  fi
fi
mkdir -p /var/tmp /tmp
cd src
CGO_ENABLED=0 \
GOROOT_BOOTSTRAP=/lib/go-bootstrap \
GOROOT_FINAL=/lib/go \
TMPDIR=/tmp \
  bash ./make.bash
"""
install = """
mkdir -p "$DESTDIR/lib/go"
cp -a bin pkg src "$DESTDIR/lib/go/"
mkdir -p "$DESTDIR/bin"
ln -sf ../lib/go/bin/go "$DESTDIR/bin/go"
ln -sf ../lib/go/bin/gofmt "$DESTDIR/bin/gofmt"
"""

[depends]
runtime = ["musl"]
build = ["clang", "go-bootstrap"]
