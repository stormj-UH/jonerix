[package]
name = "curl"
version = "8.11.1"
license = "MIT"
description = "Command-line tool and library for transferring data with URLs"

[source]
url = "https://curl.se/download/curl-8.11.1.tar.gz"
sha256 = "a889ac9dbba3644271bd9d1302b5c22a088893719b72be3487bc3d401e5c4e80"

[build]
system = "cmake"
configure = "cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/ -DCMAKE_INSTALL_LIBDIR=lib -DCMAKE_C_COMPILER=clang -DCURL_USE_OPENSSL=ON -DOPENSSL_ROOT_DIR=/ -DUSE_NGHTTP2=ON -DCURL_USE_LIBPSL=OFF -DCURL_USE_LIBSSH2=OFF -DCURL_DISABLE_LDAP=ON -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF -DCMAKE_BUILD_TYPE=Release"
build = "cmake --build build -j$(nproc)"
install = """DESTDIR=$DESTDIR cmake --install build
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi
if [ -d "$DESTDIR/lib64" ]; then cp -a "$DESTDIR/lib64/." "$DESTDIR/lib/" && rm -rf "$DESTDIR/lib64"; fi"""

[depends]
runtime = ["musl", "openssl", "nghttp2"]
build = ["clang", "openssl", "nghttp2", "cmake", "samurai"]
