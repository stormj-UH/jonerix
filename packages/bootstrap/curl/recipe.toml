[package]
name = "curl"
version = "8.11.1"
license = "MIT"
description = "Command-line tool and library for transferring data with URLs"

[source]
url = "https://curl.se/download/curl-8.11.1.tar.gz"
sha256 = "a889ac9dbba3644271bd9d1302b5c22a088893719b72be3487bc3d401e5c4e80"

[build]
system = "cmake"
configure = "cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=/ -DCMAKE_C_COMPILER=clang -DCURL_USE_OPENSSL=ON -DCURL_USE_LIBPSL=OFF -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF -DCMAKE_BUILD_TYPE=Release"
build = "cmake --build build -j$(nproc)"
install = "DESTDIR=$DESTDIR cmake --install build"

[depends]
runtime = ["musl", "openssl"]
build = ["clang", "openssl", "cmake"]
