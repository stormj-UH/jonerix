[package]
name = "unbound"
version = "1.22.0"
license = "BSD-3-Clause"
description = "Validating, recursive, and caching DNS resolver"

[source]
url = "https://nlnetlabs.nl/downloads/unbound/unbound-1.22.0.tar.gz"
sha256 = "c5dd1bdef5d5685b2cedb749158dd152c52d44f65529a34ac15cd88d4b1b3d43"

[build]
system = "configure"
configure = "CC=clang ./configure --prefix=/ --with-ssl=/"
build = "make -j$(nproc)"
install = "make install DESTDIR=$DESTDIR"

[depends]
runtime = ["musl", "openssl"]
build = ["clang", "make", "openssl"]
