[package]
name = "libatomic"
version = "21.1.2"
license = "Apache-2.0"
description = "Atomic operations runtime library built from LLVM compiler-rt (Apache-2.0)"

# compiler-rt/lib/atomic/atomic.c provides C11 fallback atomics (lock-based
# for 16-byte ops; hardware instructions used for ≤8-byte ops on aarch64).
# Output: libatomic.so.1 — drop-in replacement for GCC's libatomic.so.1.
# Required by Node.js 24 on aarch64 for 128-bit atomic compare-exchange.

[source]
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.2/llvm-project-21.1.2.src.tar.xz"
sha256 = "1a417d1c8faf8d93e73fec1cbb76d393ed3218974c2283c7bac9672d3d47c54b"

[build]
system = "custom"
build = """
set -e
# We are in llvm-project-21.1.2.src/ (jpkg auto-detects the extracted subdir)

# Locate atomic.c — in LLVM 18+ it is in compiler-rt/lib/atomic/
ATOMIC_C=""
for candidate in \
    compiler-rt/lib/atomic/atomic.c \
    compiler-rt/lib/builtins/atomic.c
do
    [ -f "$candidate" ] && ATOMIC_C="$candidate" && break
done

if [ -z "$ATOMIC_C" ]; then
    echo "ERROR: could not find atomic.c in compiler-rt/lib/" >&2
    find compiler-rt/lib -name "atomic.c" 2>/dev/null | head -5 >&2
    exit 1
fi
echo "Building libatomic from: $ATOMIC_C"

mkdir -p "$DESTDIR/lib"

# Compile directly — no cmake needed for a single source file.
# -Icompiler-rt/lib exposes sanitizer_common/sanitizer_internal_defs.h
# which atomic.c may include for SANITIZER_WEAK_ATTRIBUTE.
clang -shared -fPIC -O2 \
    -Wl,-soname,libatomic.so.1 \
    -Icompiler-rt/lib \
    "$ATOMIC_C" \
    -o "$DESTDIR/lib/libatomic.so.1.2.0"

ln -sf libatomic.so.1.2.0 "$DESTDIR/lib/libatomic.so.1"
ln -sf libatomic.so.1     "$DESTDIR/lib/libatomic.so"
"""
install = ""

[depends]
runtime = ["musl"]
build = ["clang"]
