[package]
name = "runc"
version = "1.4.1"
license = "Apache-2.0"
description = "OCI container runtime"

[source]
url = "https://github.com/opencontainers/runc/archive/refs/tags/v1.4.1.tar.gz"
sha256 = "a09f5e2f5b3b5e488bd3ee45c0be8f1e9078692174411dc5193f56a7e0de8078"

[build]
system = "custom"
configure = ""
build = """
mkdir -p /var/tmp /tmp
export TMPDIR=/tmp
export GOPATH=/tmp/gopath
export GOPROXY=https://proxy.golang.org,direct

# runc requires CGO for nsenter (C code for namespace operations).
# Build with clang as C compiler, no seccomp (needs libseccomp).
# Dynamic linking — static requires musl-static which isn't in the dev image.
CC=clang CGO_ENABLED=1 go build -trimpath \
  -tags "netgo osusergo urfave_cli_no_docs" \
  -ldflags "-s -w" \
  -o runc .
"""
install = """
mkdir -p "$DESTDIR/bin"
install -m755 runc "$DESTDIR/bin/runc"
"""

[depends]
runtime = ["musl"]
build = ["go-current"]
