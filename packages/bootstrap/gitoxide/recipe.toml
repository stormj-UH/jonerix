[package]
name = "gitoxide"
version = "0.52.0"
license = "MIT OR Apache-2.0"
description = "Pure Rust implementation of git (gix + ein)"

[source]
url = "https://github.com/GitoxideLabs/gitoxide/archive/refs/tags/v0.52.0.tar.gz"
sha256 = "8c4edd66f19e9c672040f8a4f76de5f3feafff5c443fc54554ae142a36bc10af"

[build]
system = "custom"
configure = ""
build = """set -e
export CARGO_HOME=/tmp/cargo-home
export CC=clang
export CXX=clang++
export AR=llvm-ar
export RANLIB=llvm-ranlib
export RUSTFLAGS="-C target-feature=-crt-static -C linker=clang -C link-arg=-fuse-ld=lld"
# Disable LTO to prevent OOM during linking
mkdir -p .cargo
printf '[profile.release]\nlto = false\ncodegen-units = 4\n' > .cargo/config.toml
cargo build --release --no-default-features --features max-pure
"""
install = """set -e
mkdir -p "$DESTDIR/bin"
install -m755 target/release/gix "$DESTDIR/bin/gix"
install -m755 target/release/ein "$DESTDIR/bin/ein"
ln -sf gix "$DESTDIR/bin/git"
"""

[depends]
runtime = ["musl"]
build = ["rust"]
