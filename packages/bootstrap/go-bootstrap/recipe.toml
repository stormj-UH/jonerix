[package]
name = "go-bootstrap"
version = "1.4"
license = "BSD-3-Clause"
description = "Go 1.4 bootstrap compiler (built from C, no Go required)"

# Go 1.4 is the last version buildable with only a C compiler.
# Bootstrap chain: C compiler → Go 1.4 → Go 1.17 → Go 1.26+
# This produces a minimal Go toolchain used only to compile newer Go.

[source]
url = "https://go.dev/dl/go1.4-bootstrap-20171003.tar.gz"
sha256 = "f4ff5b5eb3a3cae1c993723f3eab519c5bae18866b5e5f96fe1102f0cb5c3e52"

[build]
system = "custom"
configure = ""
build = """
# Go 1.4 only supports amd64/386/arm — not arm64/aarch64.
# On aarch64, skip the build (use prebuilt Go from core/go instead).
ARCH=$(uname -m)
if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
  echo "SKIP: Go 1.4 does not support aarch64. Use prebuilt Go (core/go) to bootstrap."
  exit 1
fi
cd src
CGO_ENABLED=0 CC=clang GOROOT_FINAL=/lib/go-bootstrap \
  bash ./make.bash
"""
install = """
mkdir -p "$DESTDIR/lib/go-bootstrap"
cp -a bin pkg src "$DESTDIR/lib/go-bootstrap/"
mkdir -p "$DESTDIR/bin"
ln -sf ../lib/go-bootstrap/bin/go "$DESTDIR/bin/go-bootstrap"
"""

[depends]
runtime = ["musl"]
build = ["clang"]
