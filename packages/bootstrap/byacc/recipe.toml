[package]
name = "byacc"
version = "20241231"
license = "public domain"
description = "Berkeley Yacc parser generator"

[source]
url = "https://invisible-island.net/archives/byacc/byacc-20241231.tgz"
sha256 = "192c2fae048d4e7f514ba451627f9c4e612765099f819c19191f9fde3e609673"

[build]
system = "configure"
configure = "CC=clang ./configure --prefix=/"
build = "make -j$(nproc)"
install = """
# byacc's make install puts the binary as 'yacc' — rename to byacc
make install DESTDIR=$DESTDIR
if [ -f "$DESTDIR/bin/yacc" ] && [ ! -L "$DESTDIR/bin/yacc" ]; then
  mv "$DESTDIR/bin/yacc" "$DESTDIR/bin/byacc"
fi
ln -sf byacc "$DESTDIR/bin/yacc"
"""

[depends]
runtime = ["musl"]
build = ["clang", "make"]
