[package]
name = "uutils"
version = "0.7.0"
license = "MIT"
description = "Rust rewrite of GNU coreutils (tr, expr, sort, wc, cut, and 70+ more)"

[source]
url = "https://github.com/uutils/coreutils/archive/refs/tags/0.7.0.tar.gz"
sha256 = "dc56a3c4632742357d170d60a7dcecb9693de710daeaafa3ad925750b1905522"

[build]
system = "custom"
configure = ""
build = """set -e
export CARGO_HOME=/tmp/cargo-home
export CC=clang
export CXX=clang++
export AR=llvm-ar
export RANLIB=llvm-ranlib
export RUSTFLAGS="-C target-feature=-crt-static -C linker=clang -C link-arg=-fuse-ld=lld"
# Override release profile to disable LTO (requires too much RAM for linking)
mkdir -p .cargo
printf '[profile.release]\nlto = false\ncodegen-units = 4\n' > .cargo/config.toml
cargo build --release --features unix --no-default-features --bin coreutils
"""
install = """set -e
mkdir -p "$DESTDIR/bin"
install -m755 target/release/coreutils "$DESTDIR/bin/uutils"

# Create symlinks for each uutils command.
# Force overwrite toybox symlinks — uutils provides better POSIX compliance.
for cmd in \
  arch base32 base64 basename basenc cat chgrp chmod chown chroot cksum \
  comm cp csplit cut date dd df dir dircolors dirname du echo env expand \
  expr factor false fmt fold groups head hostid hostname id install join \
  kill link ln logname ls md5sum mkdir mkfifo mknod mktemp more mv nice \
  nl nohup nproc numfmt od paste pathchk pinky pr printenv printf ptx pwd \
  readlink realpath rm rmdir seq sha1sum sha224sum sha256sum sha384sum \
  sha512sum shred shuf sleep sort split stat stdbuf stty sum sync tac \
  tail tee test timeout touch tr true truncate tsort tty uname unexpand \
  uniq unlink uptime users vdir wc who whoami yes; do
  rm -f "$DESTDIR/bin/$cmd" 2>/dev/null
  ln -sf uutils "$DESTDIR/bin/$cmd"
done
"""

[depends]
runtime = ["musl"]
build = ["rust"]
