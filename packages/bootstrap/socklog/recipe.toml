[package]
name = "socklog"
version = "2.2.3"
license = "BSD-3-Clause"
description = "Small and secure syslogd replacement (DJB-style)"

# Note: smarden.org serves bzip2 despite .tar.gz extension
[source]
url = "https://smarden.org/socklog/socklog-2.2.3.tar.gz"
sha256 = "960410d2b54b165e636afc9fb201effdbf48aa032cbfefd544adf0b0656a91d3"

[build]
system = "custom"
build = """
cd admin/socklog-2.2.3
printf '%s\n' 'clang -Os -pipe -fstack-protector-strong -fPIE' > src/conf-cc
printf '%s\n' 'clang -Wl,-z,relro,-z,now -pie' > src/conf-ld
cd src && make
install -Dm755 socklog "${DESTDIR}/bin/socklog"
install -Dm755 socklog-check "${DESTDIR}/bin/socklog-check"
install -Dm755 tryto "${DESTDIR}/bin/tryto"
install -Dm755 uncat "${DESTDIR}/bin/uncat"
mkdir -p "${DESTDIR}/var/log/socklog"
"""
install = ""

[depends]
runtime = ["musl"]
build = ["clang"]
