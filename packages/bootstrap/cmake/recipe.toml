[package]
name = "cmake"
version = "4.1.0"
license = "BSD-3-Clause"
description = "Cross-platform build system generator"

[source]
url = "https://github.com/Kitware/CMake/releases/download/v4.1.0/cmake-4.1.0.tar.gz"
sha256 = "81ee8170028865581a8e10eaf055afb620fa4baa0beb6387241241a975033508"

[build]
system = "custom"
configure = "CC=clang CXX=clang++ ./bootstrap --prefix=/ --parallel=$(nproc) -- -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_USE_OPENSSL=OFF"
build = "make -j$(nproc)"
install = """make install DESTDIR=$DESTDIR
rm -rf "$DESTDIR/share/cmake"*/Help
if [ -d "$DESTDIR/usr" ]; then cp -a "$DESTDIR/usr/." "$DESTDIR/" && rm -rf "$DESTDIR/usr"; fi"""

[depends]
runtime = ["musl"]
build = ["clang", "make"]
