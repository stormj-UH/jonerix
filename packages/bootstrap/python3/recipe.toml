[package]
name = "python3"
version = "3.12.8"
license = "PSF-2.0"
description = "Python programming language interpreter"

[source]
url = "https://www.python.org/ftp/python/3.12.8/Python-3.12.8.tar.xz"
sha256 = "c909157bb25ec114e5869124cc2a9c4a4d4c1e957ca4ff553f1edc692101154e"

[build]
system = "configure"
configure = "./configure --prefix=/ --with-ensurepip=install --with-openssl=/ --disable-test-modules CC=clang"
build = "make -j$(nproc)"
install = "make install DESTDIR=$DESTDIR"

[depends]
runtime = ["musl", "libressl"]
build = ["clang", "make", "libressl"]
