[package]
name = "nodejs"
version = "24.14.1"
license = "MIT"
description = "JavaScript runtime built on V8 (LTS, bundles npm 11.11.0)"

[source]
url = "https://nodejs.org/dist/v24.14.1/node-v24.14.1.tar.gz"
sha256 = "8298cf1f5774093ca819f41b8dd392fd2cff058688b4d5c8805026352e2d31b3"

[build]
system = "custom"
configure = """
# Always ensure llvm-ar/nm/ranlib are in PATH (unconditional).
# Alpine has GNU ar from binutils which masks llvm-ar — we MUST override it.
for _tool in llvm-ar llvm-nm llvm-ranlib; do
  for _bin in /usr/lib/llvm*/bin/"$_tool"; do
    [ -x "$_bin" ] && ln -sf "$_bin" /usr/local/bin/"$_tool" && break
  done
done
# Also symlink ar→llvm-ar to ensure V8's gyp finds it
ln -sf /usr/local/bin/llvm-ar /usr/local/bin/ar 2>/dev/null || true

# Node.js links -latomic — provide stub if missing (musl has builtins)
if ! [ -f /lib/libatomic.so ] && ! [ -f /usr/lib/libatomic.so ]; then
  echo 'void __atomic_stub(void){}' | clang -shared -o /lib/libatomic.so -x c - 2>/dev/null || true
fi

# libstdc++ symlinks for gyp linker (only if /usr/lib != /lib)
if [ "$(readlink -f /lib)" != "$(readlink -f /usr/lib)" ]; then
  mkdir -p /usr/lib
  for lib in /lib/libstdc++* /lib/libgcc_s*; do
    [ -f "$lib" ] && ln -sf "$lib" /usr/lib/ 2>/dev/null || true
  done
fi

CC=clang CXX=clang++ AR=llvm-ar \
CFLAGS="-Wno-deprecated-builtins" \
CXXFLAGS="-Wno-deprecated-builtins" \
LDFLAGS="-L/lib $LDFLAGS" \
python3 configure.py \
  --prefix=/ \
  --ninja \
  --with-intl=none \
  --shared-zlib \
  --without-node-snapshot
"""
build = "make -j1"
install = "make install DESTDIR=$DESTDIR"

[depends]
runtime = ["musl", "zlib"]
build = ["clang", "python3", "make", "samurai", "zlib"]
