[package]
name = "nodejs"
version = "24.14.1"
license = "MIT"
description = "JavaScript runtime built on V8 (LTS, bundles npm 11.11.0)"

[source]
url = "https://nodejs.org/dist/v24.14.1/node-v24.14.1.tar.gz"
sha256 = "8298cf1f5774093ca819f41b8dd392fd2cff058688b4d5c8805026352e2d31b3"

[build]
system = "custom"
configure = """
# Node.js links -latomic on all platforms — provide stub if missing
# (musl has atomic builtins, so the stub just needs to exist)
if ! [ -f /lib/libatomic.so ] && ! [ -f /usr/lib/libatomic.so ]; then
  echo 'void __atomic_stub(void){}' | clang -shared -o /lib/libatomic.so -x c - 2>/dev/null || true
fi
# Only create /usr/lib symlinks if /usr/lib and /lib are different directories
# (on merged-usr systems they resolve to the same path, creating symlink loops)
if [ "$(readlink -f /lib)" != "$(readlink -f /usr/lib)" ]; then
  mkdir -p /usr/lib
  for lib in /lib/libstdc++* /lib/libgcc_s*; do
    [ -f "$lib" ] && ln -sf "$lib" /usr/lib/ 2>/dev/null || true
  done
fi
CC=clang CXX=clang++ \
LDFLAGS="-L/lib $LDFLAGS $ATOMIC_FLAG" \
python3 configure.py \
  --prefix=/ \
  --ninja \
  --with-intl=none \
  --shared-zlib \
  --without-node-snapshot
"""
build = "make -j$(nproc)"
install = "make install DESTDIR=$DESTDIR"

[depends]
runtime = ["musl", "zlib"]
build = ["clang", "python3", "make", "samurai"]
