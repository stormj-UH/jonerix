[package]
name = "nodejs"
version = "22.12.0"
license = "MIT"
description = "JavaScript runtime built on V8"

[source]
url = "https://nodejs.org/dist/v22.12.0/node-v22.12.0.tar.gz"
sha256 = "3157e7c002b6e964bdbefb331ec38db1e2dceb064ab11c038275155461b22ce3"

[build]
# Node.js Makefile is heavily GNU make-specific. Use ninja directly since
# --ninja flag already generates build.ninja files.
system = "custom"
configure = "CC=clang CXX=clang++ python3 configure.py --prefix=/ --ninja --partly-static --with-intl=none --shared-zlib"
build = "ninja -C out/Release -j$(nproc)"
install = """
set -e
mkdir -p "$DESTDIR/bin" "$DESTDIR/lib/node_modules"
install -m755 out/Release/node "$DESTDIR/bin/node"
cp -a deps/npm "$DESTDIR/lib/node_modules/npm"
ln -sf ../lib/node_modules/npm/bin/npm-cli.js "$DESTDIR/bin/npm"
ln -sf ../lib/node_modules/npm/bin/npx-cli.js "$DESTDIR/bin/npx"
"""

[depends]
runtime = ["musl", "zlib"]
build = ["clang", "python3", "samurai"]
