[package]
name = "jpkg"
version = "1.0.0"
license = "MIT"
description = "jonerix package manager — built from source"

[source]
url = "local"

[build]
system = "custom"
build = """
set -e
cd packages/jpkg
find src -name '*.o' -delete
make CC=clang LDFLAGS="-static -fuse-ld=lld" jpkg -j$(nproc)
install -Dm755 jpkg $DESTDIR/bin/jpkg
"""
install = ""

[depends]
runtime = ["musl", "curl", "zstd", "bsdtar"]
build = ["clang", "musl"]
