[package]
name = "ca-certificates"
version = "2026-03-19"
license = "MPL-2.0"
description = "Mozilla CA certificate bundle for TLS verification"

# Downloaded directly from curl.se — the canonical PEM extract of
# Mozilla's NSS certificate store. No compilation needed.

[source]
url = "https://curl.se/ca/cacert-2026-03-19.pem"
sha256 = "b6e66569cc3d438dd5abe514d0df50005d570bfc96c14dca8f768d020cb96171"

[build]
system = "custom"
build = """
set -e
mkdir -p "$DESTDIR/etc/ssl/certs"
cp cacert-2026-03-19.pem "$DESTDIR/etc/ssl/certs/ca-certificates.crt"
"""
install = ""

[depends]
runtime = []
build = []
