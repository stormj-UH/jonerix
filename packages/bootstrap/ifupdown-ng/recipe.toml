[package]
name = "ifupdown-ng"
version = "0.12.1"
license = "ISC"
description = "Next-generation network interface configuration tool"

[source]
url = "https://github.com/ifupdown-ng/ifupdown-ng/archive/ifupdown-ng-0.12.1.tar.gz"
sha256 = "d42c8c18222efbce0087b92a14ea206de4e865d5c9dde6c0864dcbb2b45f2d85"

[build]
# ifupdown-ng Makefile uses GNU-specific features (ifdef, % pattern rules,
# $(addprefix), $(patsubst)). Use a custom build to avoid GNU make dependency.
system = "custom"
build = """
set -e
CC=clang
CFLAGS="-Os -pipe -fstack-protector-strong -fPIE -Wall"
LDFLAGS="-Wl,-z,relro,-z,now -pie"

CPPFLAGS="-DINTERFACES_FILE=\\\"/etc/network/interfaces\\\" \
  -DSTATE_FILE=\\\"/run/ifstate\\\" \
  -DCONFIG_FILE=\\\"/etc/network/ifupdown-ng.conf\\\" \
  -DEXECUTOR_PATH=\\\"/lib/ifupdown-ng\\\" \
  -DPACKAGE_NAME=\\\"ifupdown-ng\\\" \
  -DPACKAGE_VERSION=\\\"0.12.1\\\" \
  -DPACKAGE_BUGREPORT=\\\"https://github.com/ifupdown-ng/ifupdown-ng/issues\\\""

# Compile libifupdown
LIBOBJS=""
for f in libifupdown/*.c; do
  obj="${f%.c}.o"
  $CC $CFLAGS $CPPFLAGS -I. -c -o "$obj" "$f"
  LIBOBJS="$LIBOBJS $obj"
done

# Compile cmd sources
CMDOBJS=""
for f in cmd/*.c; do
  obj="${f%.c}.o"
  $CC $CFLAGS $CPPFLAGS -I. -c -o "$obj" "$f"
  CMDOBJS="$CMDOBJS $obj"
done

# Link multicall binary
$CC $LDFLAGS -o ifupdown $CMDOBJS $LIBOBJS
"""
install = """
set -e
mkdir -p "$DESTDIR/bin" "$DESTDIR/etc/network" "$DESTDIR/lib/ifupdown-ng"
install -m755 ifupdown "$DESTDIR/bin/ifupdown"
for cmd in ifup ifdown ifquery ifctrstat ifparse; do
  ln -sf ifupdown "$DESTDIR/bin/$cmd"
done
"""

[depends]
runtime = ["musl"]
build = ["clang"]
