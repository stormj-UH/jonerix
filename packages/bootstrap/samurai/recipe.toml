[package]
name = "samurai"
version = "1.2"
license = "Apache-2.0"
description = "ninja-compatible build tool written in C"

[source]
url = "https://github.com/michaelforney/samurai/releases/download/1.2/samurai-1.2.tar.gz"
sha256 = "3b8cf51548dfc49b7efe035e191ff5e1963ebc4fe8f6064a5eefc5343eaf78a5"

[build]
system = "custom"
configure = ""
build = "make CC=clang PREFIX=/ -j$(nproc)"
install = """make install PREFIX=/ DESTDIR=$DESTDIR
ln -sf samu "$DESTDIR/bin/ninja"
"""

[depends]
runtime = ["musl"]
build = ["clang", "make"]
