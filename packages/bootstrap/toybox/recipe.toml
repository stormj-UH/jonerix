[package]
name = "toybox"
version = "0.8.11"
license = "0BSD"
description = "BSD-licensed coreutils replacement"

[source]
url = "https://landley.net/toybox/downloads/toybox-0.8.11.tar.gz"
sha256 = "15aa3f832f4ec1874db761b9950617f99e1e38144c22da39a71311093bfe67dc"

[build]
system = "custom"
configure = """
# toybox scripts use #!/bin/bash — ensure bash is available or use sh
if ! command -v bash >/dev/null 2>&1; then
  ln -sf sh /bin/bash 2>/dev/null || true
fi
make defconfig
"""
build = "make CC=clang CFLAGS=\"-Os -pipe -fstack-protector-strong -fPIE\" LDFLAGS=\"-Wl,-z,relro,-z,now -pie\" -j$(nproc)"
install = "make PREFIX=$DESTDIR install"

[depends]
runtime = ["musl"]
build = ["clang"]
