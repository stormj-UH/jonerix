[package]
name = "toybox"
version = "0.8.11"
license = "0BSD"
description = "BSD-licensed coreutils replacement"

[source]
url = "https://landley.net/toybox/downloads/toybox-0.8.11.tar.gz"
sha256 = "15aa3f832f4ec1874db761b9950617f99e1e38144c22da39a71311093bfe67dc"

[build]
system = "custom"
configure = "HOSTCC=clang CC=clang make defconfig"
build = """
CC=clang CFLAGS="-Os -pipe -fstack-protector-strong -fPIE" LDFLAGS="-Wl,-z,relro,-z,now -pie" \
  scripts/make.sh
"""
install = """
mkdir -p "$DESTDIR/bin"
install -m755 generated/unstripped/toybox "$DESTDIR/bin/toybox"
for cmd in $(./generated/unstripped/toybox --long); do
  ln -sf toybox "$DESTDIR/bin/$cmd"
done
"""

[depends]
runtime = ["musl"]
build = ["clang"]
