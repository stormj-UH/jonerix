[package]
name = "zsh"
version = "5.10"
license = "MIT"
description = "Z shell — bash-compatible permissive shell for build scripts"

[source]
url = "https://sourceforge.net/projects/zsh/files/zsh/5.10/zsh-5.10.tar.xz/download"
sha256 = "71c5cc3d3cbddf00e534ba9243c6a243d12d4267311afbf5634bf11a76fe092b"

[build]
system = "custom"
build = """
set -e
CC=clang ./configure --prefix=/ --enable-multibyte --enable-pcre --disable-gdbm --without-tcsetpgrp
make -j$(nproc)
make DESTDIR=$DESTDIR install
# Symlink as bash — enables #!/bin/bash scripts to run via zsh
ln -sf zsh $DESTDIR/bin/bash
ln -sf zsh $DESTDIR/bin/sh
"""
install = ""

[depends]
runtime = ["musl", "ncurses"]
build = ["clang", "make"]
