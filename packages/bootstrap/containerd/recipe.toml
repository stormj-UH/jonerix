[package]
name = "containerd"
version = "2.2.2"
license = "Apache-2.0"
description = "Industry-standard container runtime"

[source]
url = "https://github.com/containerd/containerd/archive/refs/tags/v2.2.2.tar.gz"
sha256 = "d6e8e6424c544cdab9b51cae320c3a9aa5590e8e1ffbd1f862eb395fd8c5bc28"

[build]
system = "custom"
configure = ""
build = """
mkdir -p /var/tmp /tmp
export TMPDIR=/tmp
export GOPATH=/tmp/gopath
export GOPROXY=https://proxy.golang.org,direct

# Build directly with go build — no GNU make needed
TAGS="no_btrfs no_devmapper no_cri urfave_cli_no_docs"
LDFLAGS="-s -w"

CGO_ENABLED=0 go build -trimpath -tags "$TAGS" -ldflags "$LDFLAGS" \
  -o bin/containerd ./cmd/containerd
CGO_ENABLED=0 go build -trimpath -tags "$TAGS" -ldflags "$LDFLAGS" \
  -o bin/ctr ./cmd/ctr
CGO_ENABLED=0 go build -trimpath -tags "$TAGS no_grpc" -ldflags "$LDFLAGS -extldflags -static" \
  -o bin/containerd-shim-runc-v2 ./cmd/containerd-shim-runc-v2
"""
install = """
mkdir -p "$DESTDIR/bin"
install -m755 bin/containerd "$DESTDIR/bin/containerd"
install -m755 bin/containerd-shim-runc-v2 "$DESTDIR/bin/containerd-shim-runc-v2"
install -m755 bin/ctr "$DESTDIR/bin/ctr"
"""

[depends]
runtime = ["musl", "runc"]
build = ["go-current"]
