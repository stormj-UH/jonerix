name: Publish Pi 5 image

on:
  # Tag push is the canonical release trigger (attaches to a GH release).
  # Main-branch pushes that touch the image builder, the Pi 5 fixups
  # recipe, or any core-package recipe version rebuild the image and
  # upload it as a workflow artifact (no release — that's reserved for
  # tag pushes). The concurrency group below collapses rapid pushes so
  # we don't pile up runs when a merge touches multiple files.
  push:
    branches: [main]
    tags:
      - 'pi5-image-v*'
    paths:
      - 'image/pi5/**'
      - 'packages/extra/jonerix-raspi5-fixups/**'
      - 'packages/core/**/recipe.toml'
      - '.github/workflows/publish-pi5-image.yml'
  workflow_dispatch:
    inputs:
      size:
        description: 'Image size (e.g. 4G, 8G)'
        required: false
        default: '4G'
      hostname:
        description: 'Hostname baked into the image'
        required: false
        default: 'jonerix-pi'
      packages:
        description: 'Comma-separated extra packages (additive to defaults)'
        required: false
        default: ''

# Only one publish run at a time -- they all touch the same GH release.
concurrency:
  group: publish-pi5-image
  cancel-in-progress: false

env:
  # Alpine-based builder. Pi 5 image assembly needs util-linux / dosfstools
  # / e2fsprogs at BUILD time (sfdisk / mkfs.vfat / mkfs.ext4) — those are
  # GPL and forbidden in jonerix's runtime userland, so we don't ship them
  # in the builder container. Alpine has them one apk-install away and
  # matches the pattern the WSL rootfs CI already uses. The produced image
  # is populated via jpkg, so runtime stays permissive-only.
  BUILDER_IMAGE_AARCH64: alpine:latest

jobs:
  build:
    name: Build Pi 5 image (aarch64)
    # Native arm64 runner so jpkg resolves aarch64 packages without emulation.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # GHCR login removed: we no longer pull a private builder image. The
      # Alpine public image needs no auth and the apk install below
      # replaces everything the old stormj-uh/jonerix:builder-arm64 provided.

      - name: Cache firmware tarball
        id: fw-cache
        uses: actions/cache@v4
        with:
          # Cache a DIRECTORY, not a single file. The docker step below
          # bind-mounts this into the container; with a single-file
          # source, Python's `tmp.rename(dest)` against the bind-mount
          # target hits EBUSY because rename(2) can't replace a mount
          # point. A directory mount lets fetch_firmware write its
          # `.partial` and then rename-within-dir normally.
          path: /tmp/pi5-cache
          # Pin cache key to the tag the Python script expects. Bump when
          # FIRMWARE_REPO_TAG in build-image.py changes.
          key: pi5-firmware-1.20240306

      - name: Prepare output directory
        run: |
          mkdir -p /tmp/pi5-out
          chmod 0777 /tmp/pi5-out
          # Ensure the firmware-cache directory exists. actions/cache
          # doesn't create it on miss; docker would auto-create it if
          # missing, which is fine, but being explicit avoids a race.
          mkdir -p /tmp/pi5-cache
          chmod 0777 /tmp/pi5-cache

      - name: Build image in jonerix:builder container
        env:
          IMG_SIZE: ${{ inputs.size || '4G' }}
          IMG_HOSTNAME: ${{ inputs.hostname || 'jonerix-pi' }}
          IMG_PACKAGES: ${{ inputs.packages || '' }}
        run: |
          # --privileged gives us losetup + loop partscan. Hosted runners do
          # not allow losetup from a non-privileged container.
          docker run --rm --privileged --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/pi5-out:/out" \
            -v "/tmp/pi5-cache:/cache" \
            -w /workspace \
            -e IMG_SIZE \
            -e IMG_HOSTNAME \
            -e IMG_PACKAGES \
            "$BUILDER_IMAGE_AARCH64" /bin/sh -euc '
              set -e

              # Alpine base: install everything the Python builder shells
              # out to + the toolchain for a fresh jpkg build. libretls/
              # libretls-static provide the libtls API jpkg links against
              # since Alpine dropped libressl in 3.15 (same pattern as the
              # WSL rootfs CI). samurai is ninja; jpkg is build.ninja-
              # based. Everything installed here is build-time only and
              # never leaks into the produced disk image.
              apk update -q
              apk add -q \
                clang lld musl-dev samurai \
                util-linux dosfstools e2fsprogs \
                zstd libarchive-tools curl ca-certificates \
                libretls-dev libretls-static openssl-libs-static zstd-static zstd-dev \
                python3 tar

              # Build jpkg from source against libretls — matches what
              # .github/workflows/wsl-rootfs.yml does, so the binaries
              # match byte-for-byte (and we do not depend on whatever
              # arbitrarily-old jpkg a pre-built builder image might ship).
              cd /workspace/packages/core/jpkg
              LDLIBS="-ltls -lssl -lcrypto -lzstd" samu
              ./jpkg --version
              install -m 755 jpkg /usr/local/bin/jpkg
              cd /workspace

              # Sanity assertion (Python script also checks, but fail
              # fast here with a clearer message).
              for need in sfdisk mkfs.vfat mkfs.ext4 losetup blkid zstd bsdtar python3 jpkg; do
                command -v "$need" >/dev/null 2>&1 \
                  || { echo "missing required tool: $need" >&2; exit 1; }
              done

              # jpkg config: point the builder at the GitHub release mirror
              # + install the jonerix signing key so INDEX verification
              # works. Previously the jonerix builder image shipped /etc/jpkg
              # baked in; Alpine does not, so we write it out per-run.
              # Using printf instead of a heredoc so YAML indentation
              # doesnt leak into the generated TOML.
              mkdir -p /etc/jpkg/keys
              printf "%s\n" "[repo]" "url = \"https://github.com/stormj-UH/jonerix/releases/download/packages\"" > /etc/jpkg/repos.conf
              cp /workspace/config/defaults/etc/jpkg/keys/jonerix.pub /etc/jpkg/keys/jonerix.pub

              # Pre-populate the firmware cache if the CI cache restored one.
              FW_ARG=""
              if [ -s /cache/firmware.tar.gz ]; then
                FW_ARG="--firmware-cache /cache/firmware.tar.gz"
              else
                # Empty cache file from actions/cache miss; let the script
                # download fresh and stash the result back into the cache.
                FW_ARG="--firmware-cache /cache/firmware.tar.gz"
              fi

              PKG_ARG=""
              if [ -n "${IMG_PACKAGES:-}" ]; then
                PKG_ARG="--packages ${IMG_PACKAGES}"
              fi

              jpkg update

              python3 /workspace/image/pi5/build-image.py \
                --output /out/jonerix-pi5.img \
                --size "${IMG_SIZE}" \
                --hostname "${IMG_HOSTNAME}" \
                $PKG_ARG \
                $FW_ARG
            '

      - name: List output
        run: ls -lh /tmp/pi5-out

      # ── Tag push: publish to a GitHub Release ────────────────────────────
      - name: Create release (tag push)
        if: startsWith(github.ref, 'refs/tags/pi5-image-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG" --repo "$GH_REPO" > /dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GH_REPO" \
              --title "jonerix Pi 5 image ${TAG}" \
              --notes "Bootable Raspberry Pi 5 image built by image/pi5/build-image.py. Flash with: \`zstd -d < jonerix-pi5.img.zst | sudo dd of=/dev/sdX bs=4M status=progress conv=fsync\`"
          fi

      - name: Upload release assets (tag push)
        if: startsWith(github.ref, 'refs/tags/pi5-image-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" --repo "$GH_REPO" --clobber \
            /tmp/pi5-out/jonerix-pi5.img.zst \
            /tmp/pi5-out/SHA256SUMS

      # ── Manual dispatch: upload as workflow artifact instead ─────────────
      - name: Upload workflow artifact (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: jonerix-pi5-image
          path: |
            /tmp/pi5-out/jonerix-pi5.img.zst
            /tmp/pi5-out/SHA256SUMS
          if-no-files-found: error
          # Hosted runners give artifacts a 90-day default; keep short since
          # manual runs are for ad-hoc testing, not distribution.
          retention-days: 14
