name: Build WSL rootfs

on:
  # Push trigger disabled — building locally.
  # push:
  #   branches: [main]
  #   paths:
  #     - 'packages/core/**'
  #     - 'install/wsl/**'
  #     - '.github/workflows/wsl-rootfs.yml'
  workflow_dispatch:

# Only one rootfs build at a time; a newer push supersedes an in-progress one.
concurrency:
  group: wsl-rootfs
  cancel-in-progress: true

jobs:
  # ── x86_64 rootfs ────────────────────────────────────────────────────────
  build-x86_64:
    name: Build rootfs (x86_64)
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --privileged
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Restore apk cache
        uses: actions/cache@v5
        with:
          path: /var/cache/apk
          key: apk-wsl-x86_64-${{ hashFiles('.github/workflows/wsl-rootfs.yml') }}
          restore-keys: apk-wsl-x86_64-

      - name: Install build dependencies
        run: |
          mkdir -p /var/cache/apk && ln -sf /var/cache/apk /etc/apk/cache
          apk update -q
          apk add -q \
            clang lld musl-dev make \
            curl tar zstd \
            zstd-dev zstd-static \
            github-cli

      - name: Restore jpkg binary cache
        uses: actions/cache@v5
        id: jpkg-cache
        with:
          path: /tmp/jpkg-bin-x86_64
          key: jpkg-bin-x86_64-${{ hashFiles('packages/jpkg/src/**') }}

      - name: Build jpkg
        if: steps.jpkg-cache.outputs.cache-hit != 'true'
        run: |
          cd packages/jpkg
          make CC=clang LDFLAGS="-static -fuse-ld=lld" jpkg
          mkdir -p /tmp/jpkg-bin-x86_64
          cp jpkg /tmp/jpkg-bin-x86_64/jpkg

      - name: Install jpkg
        run: install -m 755 /tmp/jpkg-bin-x86_64/jpkg /usr/local/bin/jpkg

      - name: Download packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /var/cache/jpkg
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --pattern "INDEX.zst" \
            --dir /var/cache/jpkg 2>/dev/null || true
          echo "Downloaded: $(ls /var/cache/jpkg/ 2>/dev/null | wc -l) file(s)"

      - name: Build rootfs
        env:
          ARCH: x86_64
          GITHUB_REPO: ${{ github.repository }}
          STAGING: /tmp/jonerix-rootfs
          OUTPUT_DIR: /tmp/rootfs-out
          # Point jpkg at the already-downloaded cache so we avoid re-fetching
          JPKG_CACHE: /var/cache/jpkg
        run: |
          mkdir -p /tmp/rootfs-out

          # Run the shared build script; it will find jpkg on PATH
          sh install/wsl/build-rootfs.sh

          ls -lh /tmp/rootfs-out/

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v7
        with:
          name: jonerix-rootfs-x86_64
          path: /tmp/rootfs-out/jonerix-rootfs-x86_64.tar.gz
          retention-days: 7

      - name: Publish rootfs to packages release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload packages \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            /tmp/rootfs-out/jonerix-rootfs-x86_64.tar.gz
          echo "Uploaded jonerix-rootfs-x86_64.tar.gz"

  # ── aarch64 rootfs ───────────────────────────────────────────────────────
  # JS GitHub checkout actions don't work in Alpine on ARM64.
  # Check out on the Ubuntu host then exec the build inside an Alpine container.
  build-aarch64:
    name: Build rootfs (aarch64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Restore apk cache (aarch64)
        uses: actions/cache@v5
        with:
          path: /tmp/apk-cache-aarch64
          key: apk-wsl-aarch64-${{ hashFiles('.github/workflows/wsl-rootfs.yml') }}
          restore-keys: apk-wsl-aarch64-

      - name: Restore jpkg binary cache (aarch64)
        uses: actions/cache@v5
        id: jpkg-cache-aarch64
        with:
          path: /tmp/jpkg-bin-aarch64
          key: jpkg-bin-aarch64-${{ hashFiles('packages/jpkg/src/**') }}

      - name: Download packages from release (aarch64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/jpkg-cache
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --pattern "INDEX.zst" \
            --dir /tmp/jpkg-cache 2>/dev/null || true
          echo "Downloaded: $(ls /tmp/jpkg-cache/ 2>/dev/null | wc -l) file(s)"

      - name: Build rootfs in Alpine container
        run: |
          mkdir -p /tmp/apk-cache-aarch64 /tmp/jpkg-bin-aarch64 /tmp/rootfs-out-aarch64
          JPKG_CACHE_HIT="${{ steps.jpkg-cache-aarch64.outputs.cache-hit }}"

          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/jpkg-cache:/var/cache/jpkg" \
            -v "/tmp/apk-cache-aarch64:/var/cache/apk" \
            -v "/tmp/jpkg-bin-aarch64:/jpkg-bin" \
            -v "/tmp/rootfs-out-aarch64:/tmp/rootfs-out" \
            -w /workspace \
            -e ARCH=aarch64 \
            -e GITHUB_REPO="${{ github.repository }}" \
            -e STAGING=/tmp/jonerix-rootfs \
            -e OUTPUT_DIR=/tmp/rootfs-out \
            -e JPKG_CACHE_HIT="$JPKG_CACHE_HIT" \
            alpine:latest sh -c '
              set -e
              mkdir -p /var/cache/apk && ln -sf /var/cache/apk /etc/apk/cache
              apk update -q
              apk add -q \
                clang lld musl-dev make \
                curl tar zstd \
                zstd-dev zstd-static

              if [ "$JPKG_CACHE_HIT" = "true" ] && [ -f /jpkg-bin/jpkg ]; then
                install -m 755 /jpkg-bin/jpkg /usr/local/bin/jpkg
                echo "jpkg: using cached binary"
              else
                cd /workspace/packages/jpkg
                make CC=clang LDFLAGS="-static -fuse-ld=lld" jpkg
                install -m 755 jpkg /usr/local/bin/jpkg
                cp jpkg /jpkg-bin/jpkg
              fi

              sh /workspace/install/wsl/build-rootfs.sh
              ls -lh /tmp/rootfs-out/
            '

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v7
        with:
          name: jonerix-rootfs-aarch64
          path: /tmp/rootfs-out-aarch64/jonerix-rootfs-aarch64.tar.gz
          retention-days: 7

      - name: Publish rootfs to packages release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload packages \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            /tmp/rootfs-out-aarch64/jonerix-rootfs-aarch64.tar.gz
          echo "Uploaded jonerix-rootfs-aarch64.tar.gz"
