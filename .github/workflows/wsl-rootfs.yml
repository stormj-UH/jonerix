name: Build WSL rootfs

on:
  # Auto-rebuild when the rootfs recipe, installer, default configs, or
  # any core-package version changes land on main. The `concurrency:`
  # group below collapses rapid pushes so we don't pile up runs when a
  # PR merges touching multiple files.
  push:
    branches: [main]
    paths:
      - 'install/wsl/**'
      - 'config/defaults/etc/**'
      - 'packages/core/**/recipe.toml'
      - 'packages/core/jpkg/**'
      - '.github/workflows/wsl-rootfs.yml'
  workflow_dispatch:

# Only one rootfs build at a time; a newer push supersedes an in-progress one.
concurrency:
  group: wsl-rootfs
  cancel-in-progress: true

jobs:
  # ── x86_64 rootfs ────────────────────────────────────────────────────────
  build-x86_64:
    name: Build rootfs (x86_64)
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --privileged
    permissions:
      contents: write

    steps:
      - name: Install checkout tools
        run: apk add --no-cache git git-lfs

      - name: Checkout source
        uses: actions/checkout@v5
        with:
          # WSL rootfs builds jpkg from in-tree code and then `jpkg install`s
          # prebuilt packages from the release INDEX — none of the LFS-tracked
          # source tarballs (linux/llvm/rust/node/gitredoxide) are read here.
          # `lfs: true` would burn LFS bandwidth on every push and fail when
          # the repo's LFS quota is exhausted; only full-bootstrap.yml needs
          # them and it's a manual-only workflow.
          lfs: false

      - name: Install build dependencies
        run: |
          mkdir -p /var/cache/apk && ln -sf /var/cache/apk /etc/apk/cache
          apk update -q
          # jpkg 2.0 is the Rust port — built via cargo, no libretls needed
          # (the Rust port uses ureq + rustls + webpki-roots).
          apk add -q \
            cargo rust \
            curl tar zstd libarchive-tools ca-certificates \
            python3 \
            github-cli

      - name: Restore jpkg binary cache
        uses: actions/cache@v5
        id: jpkg-cache
        with:
          path: /tmp/jpkg-bin-x86_64
          # Cache key v5: include jpkg-local plus recipe/config/vendor inputs.
          key: jpkg-bin-x86_64-v5-${{ hashFiles('packages/core/jpkg/src/**', 'packages/core/jpkg/Cargo.toml', 'packages/core/jpkg/Cargo.lock', 'packages/core/jpkg/.cargo/config.toml', 'packages/core/jpkg/bin/jpkg-conform', 'packages/core/jpkg/vendor/**') }}

      - name: Build jpkg
        if: steps.jpkg-cache.outputs.cache-hit != 'true'
        run: |
          cd packages/core/jpkg
          # jpkg 2.0 = Rust port. crt-static + --target $HOST_TRIPLE is the
          # canonical pattern (matches Dockerfile.minimal/core/full); --target
          # splits compile lanes so proc-macros (curve25519-dalek-derive etc.)
          # still build host-side without crt-static.
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static" \
            cargo build --release --frozen --target "$TRIPLE" --bin jpkg --bin jpkg-local
          install -m 755 "target/$TRIPLE/release/jpkg" jpkg
          install -m 755 "target/$TRIPLE/release/jpkg-local" jpkg-local
          # Null-pad /lib64 references in the binary (audit_layout_tree gate;
          # Alpine BusyBox sed can't emit real NUL bytes — use Python).
          for b in jpkg jpkg-local; do
            python3 -c "import sys; p=sys.argv[1]; d=open(p,'rb').read(); n=d.count(b'/lib64'); open(p,'wb').write(d.replace(b'/lib64', b'/lib\x00\x00')); print(f'{p}: {n} /lib64 refs nulled')" "$b"
          done
          mkdir -p /tmp/jpkg-bin-x86_64
          cp jpkg /tmp/jpkg-bin-x86_64/jpkg
          cp jpkg-local /tmp/jpkg-bin-x86_64/jpkg-local
          ./jpkg --version

      - name: Install jpkg
        run: |
          install -m 755 /tmp/jpkg-bin-x86_64/jpkg /usr/local/bin/jpkg
          install -m 755 /tmp/jpkg-bin-x86_64/jpkg-local /usr/local/bin/jpkg-local

      - name: Download packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /var/cache/jpkg
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --pattern "INDEX.zst" \
            --dir /var/cache/jpkg 2>/dev/null || true
          echo "Downloaded: $(ls /var/cache/jpkg/ 2>/dev/null | wc -l) file(s)"

      - name: Build rootfs
        env:
          ARCH: x86_64
          GITHUB_REPO: ${{ github.repository }}
          STAGING: /tmp/jonerix-rootfs
          OUTPUT_DIR: /tmp/rootfs-out
          # Point jpkg at the already-downloaded cache so we avoid re-fetching
          JPKG_CACHE: /var/cache/jpkg
        run: |
          mkdir -p /tmp/rootfs-out

          # Run the shared build script; it will find jpkg on PATH
          sh install/wsl/build-rootfs.sh

          ls -lh /tmp/rootfs-out/

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v7
        with:
          name: jonerix-rootfs-x86_64
          path: /tmp/rootfs-out/jonerix-rootfs-x86_64.tar.gz
          retention-days: 7

      - name: Publish rootfs to packages release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sh scripts/gh-release-upload-retry.sh \
            packages \
            "$GITHUB_REPOSITORY" \
            /tmp/rootfs-out/jonerix-rootfs-x86_64.tar.gz
          echo "Publish step completed for jonerix-rootfs-x86_64.tar.gz"

  # ── aarch64 rootfs ───────────────────────────────────────────────────────
  # JS GitHub checkout actions don't work in Alpine on ARM64.
  # Check out on the Ubuntu host then exec the build inside an Alpine container.
  build-aarch64:
    name: Build rootfs (aarch64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          # See lfs-quota note above on the x86_64 job — the WSL rootfs build
          # path never reads /workspace/sources, so LFS data is dead weight.
          lfs: false

      - name: Restore apk cache (aarch64)
        uses: actions/cache@v5
        with:
          path: /tmp/apk-cache-aarch64
          key: apk-wsl-aarch64-${{ hashFiles('.github/workflows/wsl-rootfs.yml', 'install/wsl/build-rootfs.sh') }}
          restore-keys: apk-wsl-aarch64-

      - name: Restore jpkg binary cache (aarch64)
        uses: actions/cache@v5
        id: jpkg-cache-aarch64
        with:
          path: /tmp/jpkg-bin-aarch64
          # v5: include jpkg-local plus recipe/config/vendor inputs.
          key: jpkg-bin-aarch64-v5-${{ hashFiles('packages/core/jpkg/src/**', 'packages/core/jpkg/Cargo.toml', 'packages/core/jpkg/Cargo.lock', 'packages/core/jpkg/.cargo/config.toml', 'packages/core/jpkg/bin/jpkg-conform', 'packages/core/jpkg/vendor/**') }}

      - name: Download packages from release (aarch64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/jpkg-cache
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --pattern "INDEX.zst" \
            --dir /tmp/jpkg-cache 2>/dev/null || true
          echo "Downloaded: $(ls /tmp/jpkg-cache/ 2>/dev/null | wc -l) file(s)"

      - name: Build rootfs in Alpine container
        run: |
          mkdir -p /tmp/apk-cache-aarch64 /tmp/jpkg-bin-aarch64 /tmp/rootfs-out-aarch64
          JPKG_CACHE_HIT="${{ steps.jpkg-cache-aarch64.outputs.cache-hit }}"

          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/jpkg-cache:/var/cache/jpkg" \
            -v "/tmp/apk-cache-aarch64:/var/cache/apk" \
            -v "/tmp/jpkg-bin-aarch64:/jpkg-bin" \
            -v "/tmp/rootfs-out-aarch64:/tmp/rootfs-out" \
            -w /workspace \
            -e ARCH=aarch64 \
            -e GITHUB_REPO="${{ github.repository }}" \
            -e STAGING=/tmp/jonerix-rootfs \
            -e OUTPUT_DIR=/tmp/rootfs-out \
            -e JPKG_CACHE_HIT="$JPKG_CACHE_HIT" \
            alpine:latest sh -c '
              set -e
              mkdir -p /var/cache/apk && ln -sf /var/cache/apk /etc/apk/cache
              apk update -q
              # jpkg 2.0 is the Rust port — no libretls / no samurai needed.
              apk add -q \
                cargo rust \
                curl tar zstd libarchive-tools ca-certificates \
                python3

              if [ "$JPKG_CACHE_HIT" = "true" ] && [ -f /jpkg-bin/jpkg ] && [ -f /jpkg-bin/jpkg-local ]; then
                install -m 755 /jpkg-bin/jpkg /usr/local/bin/jpkg
                install -m 755 /jpkg-bin/jpkg-local /usr/local/bin/jpkg-local
                echo "jpkg: using cached binary"
              else
                cd /workspace/packages/core/jpkg
                TRIPLE=$(rustc -vV | sed -n "s/^host: //p")
                RUSTFLAGS="-C strip=symbols -C target-feature=+crt-static" \
                  cargo build --release --frozen --target "$TRIPLE" --bin jpkg --bin jpkg-local
                install -m 755 "target/$TRIPLE/release/jpkg" jpkg
                install -m 755 "target/$TRIPLE/release/jpkg-local" jpkg-local
                for b in jpkg jpkg-local; do
                  python3 -c "import sys; p=sys.argv[1]; d=open(p,\"rb\").read(); n=d.count(b\"/lib64\"); open(p,\"wb\").write(d.replace(b\"/lib64\", b\"/lib\x00\x00\")); print(p+\": \"+str(n)+\" /lib64 refs nulled\")" "$b"
                done
                ./jpkg --version
                install -m 755 jpkg /usr/local/bin/jpkg
                install -m 755 jpkg-local /usr/local/bin/jpkg-local
                cp jpkg /jpkg-bin/jpkg
                cp jpkg-local /jpkg-bin/jpkg-local
              fi

              sh /workspace/install/wsl/build-rootfs.sh
              ls -lh /tmp/rootfs-out/
            '

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v7
        with:
          name: jonerix-rootfs-aarch64
          path: /tmp/rootfs-out-aarch64/jonerix-rootfs-aarch64.tar.gz
          retention-days: 7

      - name: Publish rootfs to packages release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sh scripts/gh-release-upload-retry.sh \
            packages \
            "$GITHUB_REPOSITORY" \
            /tmp/rootfs-out-aarch64/jonerix-rootfs-aarch64.tar.gz
          echo "Publish step completed for jonerix-rootfs-aarch64.tar.gz"
