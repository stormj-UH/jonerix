name: Publish Pi 5 netboot payload

# Generates a TFTP-ready payload tree for Raspberry Pi 5 by
# running image/pi5/network-boot.py on a POSIX runner. The
# script's only runtime dep is Python 3.9+ stdlib; it pulls
# the Raspberry Pi firmware tarball straight from
# github.com/raspberrypi/firmware, so this workflow needs no
# apt-get step beyond what the ubuntu-latest runner ships.

on:
  push:
    branches: [main]
    tags:
      - 'pi5-netboot-v*'
    paths:
      - 'image/pi5/network-boot.py'
      - '.github/workflows/pi5-netboot.yml'
  workflow_dispatch:
    inputs:
      serial:
        description: 'Pi 5 board serial (16 hex, lower-case) or "any"'
        required: false
        default: 'any'
      root_source:
        description: 'Root filesystem source (nfs|http|local|none)'
        required: false
        default: 'none'
      nfs_server:
        description: 'NFS server IP (root_source=nfs)'
        required: false
        default: ''
      nfs_path:
        description: 'NFS exported path (root_source=nfs)'
        required: false
        default: ''
      firmware_tag:
        description: 'raspberrypi/firmware branch or tag'
        required: false
        default: 'stable'

concurrency:
  group: pi5-netboot
  cancel-in-progress: false

jobs:
  build:
    name: Build Pi 5 netboot payload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax-check network-boot.py
        run: |
          python3 -c "import py_compile; py_compile.compile('image/pi5/network-boot.py', doraise=True)"

      - name: Build netboot payload
        env:
          SERIAL: ${{ inputs.serial || 'any' }}
          ROOT_SOURCE: ${{ inputs.root_source || 'none' }}
          NFS_SERVER: ${{ inputs.nfs_server || '' }}
          NFS_PATH: ${{ inputs.nfs_path || '' }}
          FIRMWARE_TAG: ${{ inputs.firmware_tag || 'stable' }}
        run: |
          set -eu
          # Pin to the source tree's VERSION_ID so the netboot payload's
          # build-info.json records exactly the jonerix release this
          # tree corresponds to. Downstream tooling (jonerix-pi5-netboot.sh)
          # uses this to decide which `jpkg conform <ver>` post-boot
          # makes the netbooted Pi a deterministic match for the v1.1.6
          # package set.
          VER=$(awk -F= '/^VERSION_ID=/{gsub(/"/,"",$2); print $2}' \
                config/defaults/etc/os-release)
          RELEASE_TAG="v${VER}"
          ARGS="--output out/tftp --serial ${SERIAL} --firmware-tag ${FIRMWARE_TAG} --root-source ${ROOT_SOURCE} --release-tag ${RELEASE_TAG} --yes"
          if [ "${ROOT_SOURCE}" = "nfs" ]; then
            ARGS="${ARGS} --nfs-server ${NFS_SERVER} --nfs-path ${NFS_PATH}"
          fi
          python3 image/pi5/network-boot.py ${ARGS}
          ls -lR out/tftp | head -200
          cat out/tftp/build-info.json

      - name: Package payload as tarball
        run: |
          set -eu
          cd out
          tar czf jonerix-pi5-netboot.tar.gz tftp
          sha256sum jonerix-pi5-netboot.tar.gz > SHA256SUMS
          ls -lh jonerix-pi5-netboot.tar.gz SHA256SUMS

      # ── Always publish to the rolling `pi5-netboot` release ────────────
      # Mirrors how `packages` is the rolling release for jpkg artifacts:
      # `jonerix-pi5-netboot.sh` (and any other tooling) always knows
      # where to fetch from without chasing tag names. The matching
      # versioned `v*` release also gets the artifact below if it
      # already exists (i.e. the v1.1.6 release is "complete" with both
      # jpkg packages AND a netboot payload pinned to the same set).
      - name: Publish to rolling `pi5-netboot` release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: pi5-netboot
        run: |
          if ! gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GH_REPO" \
              --title "jonerix Pi 5 netboot payload (rolling)" \
              --notes "Rolling TFTP payload for Raspberry Pi 5. Replaced on every main push." \
              --prerelease
          fi
          gh release upload "$TAG" --repo "$GH_REPO" --clobber \
            out/jonerix-pi5-netboot.tar.gz \
            out/SHA256SUMS

      # ── Versioned `v*` release: attach if it exists ─────────────────────
      # When `config/defaults/etc/os-release` is at version 1.1.6 and the
      # `v1.1.6` release exists (created by the package-set release flow),
      # mirror the netboot tarball there too so a single release tag has
      # everything needed for a fully reproducible install + netboot.
      - name: Attach to matching versioned release (if present)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -eu
          VER=$(awk -F= '/^VERSION_ID=/{gsub(/"/,"",$2); print $2}' \
                config/defaults/etc/os-release)
          TAG="v${VER}"
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "$GH_REPO" --clobber \
              out/jonerix-pi5-netboot.tar.gz \
              out/SHA256SUMS
            echo "attached netboot payload to $TAG"
          else
            echo "$TAG release does not exist yet — skipping versioned attach"
          fi

      # ── Legacy: pi5-netboot-v* tag push ─────────────────────────────────
      - name: Create release (legacy tag push)
        if: startsWith(github.ref, 'refs/tags/pi5-netboot-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG" --repo "$GH_REPO" > /dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GH_REPO" \
              --title "jonerix Pi 5 netboot payload ${TAG}" \
              --notes "TFTP-ready payload tree for Raspberry Pi 5. See README.md inside the tarball."
          fi
          gh release upload "$TAG" --repo "$GH_REPO" --clobber \
            out/jonerix-pi5-netboot.tar.gz \
            out/SHA256SUMS

      # ── Manual dispatch / main push: workflow artifact ──────────────────
      - name: Upload workflow artifact
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: jonerix-pi5-netboot
          path: |
            out/jonerix-pi5-netboot.tar.gz
            out/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
