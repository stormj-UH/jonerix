          mkdir rust-src && tar xJf rustc-src.tar.xz -C rust-src --strip-components=1
          cd rust-src

          cat > config.toml <<CONF
          profile = "dist"
          change-id = 999999

          [build]
          target = ["${TRIPLE}"]
          host = ["${TRIPLE}"]
          cargo-native-static = false
          extended = true
          tools = ["cargo"]
          docs = false
          compiler-docs = false

          [llvm]
          link-shared = true
          download-ci-llvm = false
          optimize = true
          assertions = false
          ninja = true
          targets = "X86;AArch64"
          experimental-targets = ""
          cflags = "--rtlib=compiler-rt --unwindlib=libunwind"
          cxxflags = "--rtlib=compiler-rt --unwindlib=libunwind -stdlib=libc++"
          ldflags = "--rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld"

          [rust]
          codegen-units = 1
          codegen-units-std = 1
          debug = false
          debug-assertions = false
          debug-logging = false
          optimize = true
          channel = "stable"
          lld = true
          llvm-tools = false
          omit-git-hash = true

          [target.${TRIPLE}]
          cc = "clang"
          cxx = "clang++"
          ar = "llvm-ar"
          ranlib = "llvm-ranlib"
          linker = "clang"
          musl-root = "/"
          crt-static = false
          llvm-libunwind = "system"

          [target.aarch64-unknown-linux-musl]
          cc = "clang"
          cxx = "clang++"
          ar = "llvm-ar"
          ranlib = "llvm-ranlib"
          linker = "clang"
          musl-root = "/"
          crt-static = false
          llvm-libunwind = "system"
          CONF

          export OPENSSL_DIR=/
          export OPENSSL_INCLUDE_DIR=/include
          export OPENSSL_LIB_DIR=/lib
          export PKG_CONFIG_ALLOW_CROSS=1
          BOOTSTRAP_SKIP_TARGET_SANITY=1 python3 x.py dist --stage 2 2>&1

          echo "=== Dist artifacts ==="
          ls -lh build/dist/

          cp build/dist/rust-${RUST_VERSION}-${TRIPLE}.tar.gz /out/ 2>/dev/null || \
          cp build/dist/rust-*-${TRIPLE}.tar.gz /out/ 2>/dev/null || {
            echo "=== Available dist files ==="
            ls build/dist/*.tar.gz
            cp build/dist/*.tar.gz /out/
          }
          '

      - name: Upload dist tarball
        run: |
          RUST_VERSION="${{ inputs.rust_version }}"
          ls -lh rust-out/
          FILE=$(ls rust-out/rust-*-aarch64-jonerix-linux-musl.tar.gz 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "FATAL: no aarch64 dist tarball produced"
            ls rust-out/
            exit 1
          fi
          SHA=$(sha256sum "$FILE" | cut -d' ' -f1)
          echo "aarch64 tarball: $(basename "$FILE")"
          echo "SHA256: $SHA"
          echo "ARM_SHA=$SHA" >> "$GITHUB_ENV"

          TAG="source-rust-v${RUST_VERSION}"
          gh release create "$TAG" --title "Rust ${RUST_VERSION} dist" \
            --notes "Self-built Rust ${RUST_VERSION} dist tarballs (jonerix-linux-musl triple)." \
