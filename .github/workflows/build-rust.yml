      - name: Summary
        run: |
          echo "### Rust ${{ inputs.rust_version }} aarch64 build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA256:** ${{ env.ARM_SHA }}" >> "$GITHUB_STEP_SUMMARY"
