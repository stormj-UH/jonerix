      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Rust dist tarball
        run: |
          RUST_VERSION="${{ inputs.rust_version }}"
          TRIPLE="aarch64-jonerix-linux-musl"
          docker run --rm \
            -v "$PWD/rust-out:/out" \
            $BUILDER_IMAGE_AARCH64 \
            --entrypoint /bin/mksh \
            /bin/mksh -c '
          set -ex

          RUST_VERSION="'"$RUST_VERSION"'"
          TRIPLE="'"$TRIPLE"'"

          [ -e /bin/sh ] || ln -sf mksh /bin/sh
          [ -e /bin/bash ] || ln -sf mksh /bin/bash

          ln -sf libunwind.so.1 /lib/libgcc_s.so.1 2>/dev/null || true
          ln -sf libc++.so.1 /lib/libstdc++.so.6 2>/dev/null || true

          if [ ! -f /include/asm/hwcap.h ]; then
            jpkg update 2>&1 | tail -2
            jpkg install --force jonerix-headers 2>/dev/null || true
          fi

          cd /tmp
          curl -fsSL -o rustc-src.tar.xz \
