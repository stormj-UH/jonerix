name: Publish container images

on:
  push:
    branches: [master]
    paths:
      - 'Dockerfile*'
      - 'config/**'
      - 'packages/jpkg/**'
      - 'scripts/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  minimal:
    name: Build and push jonerix-minimal
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (minimal)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=minimal
            type=sha,prefix=minimal-

      - name: Build and push minimal
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.minimal
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=minimal
          cache-to: type=gha,mode=max,scope=minimal

      - name: Image size
        run: |
          echo "Minimal image digest: ${{ steps.build.outputs.digest }}"
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:minimal 2>/dev/null | \
            python3 -c "
          import json,sys
          m = json.load(sys.stdin)
          for p in m.get('manifests', []):
              sz = p.get('size', 0)
              plat = p.get('platform', {})
              print(f\"{plat.get('os','?')}/{plat.get('architecture','?')}: {sz/1024/1024:.1f} MB\")
          " || true

  all:
    name: Build and push jonerix-all
    needs: minimal
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image ref
        id: refs
        run: |
          echo "minimal=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:minimal' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Docker metadata (all)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=all
            type=sha,prefix=all-

      - name: Build and push all
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.all.new
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            MINIMAL_IMAGE=${{ steps.refs.outputs.minimal }}
          cache-from: type=gha,scope=all-v5
          cache-to: type=gha,mode=max,scope=all-v5
