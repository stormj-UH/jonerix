name: Publish container images

on:
  push:
    branches: [master]
    paths:
      - 'Dockerfile*'
      - 'config/**'
      - 'packages/jpkg/**'
      - 'scripts/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/stormj-uh/jonerix

jobs:
  minimal-arm64:
    name: Build minimal (arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push minimal (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.minimal
          push: true
          tags: ${{ env.IMAGE }}:minimal-arm64
          platforms: linux/arm64
          build-args: |
            BUILDER=ghcr.io/stormj-uh/jonerix:minimal
          cache-from: type=gha,scope=minimal-arm64
          cache-to: type=gha,mode=max,scope=minimal-arm64

  minimal-amd64:
    name: Build minimal (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push minimal (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.minimal
          push: true
          tags: ${{ env.IMAGE }}:minimal-amd64
          platforms: linux/amd64
          build-args: |
            BUILDER=alpine:latest
          cache-from: type=gha,scope=minimal-amd64
          cache-to: type=gha,mode=max,scope=minimal-amd64

  minimal-manifest:
    name: Merge minimal manifest
    needs: [minimal-arm64, minimal-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:minimal \
            ${{ env.IMAGE }}:minimal-arm64 \
            ${{ env.IMAGE }}:minimal-amd64

  all-arm64:
    name: Build all (arm64)
    needs: minimal-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push all (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.all.new
          push: true
          tags: ${{ env.IMAGE }}:all-arm64
          platforms: linux/arm64
          build-args: |
            MINIMAL_IMAGE=${{ env.IMAGE }}:minimal-arm64
          cache-from: type=gha,scope=all-arm64
          cache-to: type=gha,mode=max,scope=all-arm64

  all-amd64:
    name: Build all (amd64)
    needs: minimal-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push all (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.all.new
          push: true
          tags: ${{ env.IMAGE }}:all-amd64
          platforms: linux/amd64
          build-args: |
            MINIMAL_IMAGE=alpine:latest
          cache-from: type=gha,scope=all-amd64
          cache-to: type=gha,mode=max,scope=all-amd64

  all-manifest:
    name: Merge all manifest
    needs: [all-arm64, all-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:all \
            ${{ env.IMAGE }}:all-arm64 \
            ${{ env.IMAGE }}:all-amd64
