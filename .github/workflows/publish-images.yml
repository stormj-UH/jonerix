name: Publish container images

on:
  push:
    branches: [master]
    paths:
      - 'Dockerfile*'
      - 'config/**'
      - 'packages/jpkg/**'
      - 'scripts/**'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/stormj-uh/jonerix

jobs:
  # ── Check vendored sources ──────────────────────────────────────────────
  check-sources:
    name: Verify vendored sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all recipes have vendored source
        run: |
          MISSING=0
          # Packages that are too large to vendor (built from APK extraction or huge source)
          SKIP="rust go llvm nodejs"
          for recipe in packages/core/*/recipe.toml; do
            pkg=$(basename "$(dirname "$recipe")")
            # Skip packages without source URL
            url=$(grep '^url' "$recipe" | head -1 | sed 's/.*= *"\(.*\)"/\1/' || true)
            [ -z "$url" ] && continue
            # Skip large packages
            echo "$SKIP" | tr ' ' '\n' | grep -qx "$pkg" && continue
            # Check sources/ directory for vendored tarball
            ver=$(grep '^version' "$recipe" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            found=0
            for ext in tar.gz tar.xz tar.bz2 tgz tar.zst; do
              [ -f "sources/${pkg}-${ver}.${ext}" ] && found=1 && break
            done
            # Also check with different naming patterns
            if [ "$found" -eq 0 ]; then
              matches=$(ls sources/${pkg}*${ver}* 2>/dev/null | head -1)
              [ -n "$matches" ] && found=1
            fi
            if [ "$found" -eq 0 ]; then
              echo "MISSING: sources/ for $pkg-$ver (from $url)"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::$MISSING package(s) missing vendored source in sources/"
          fi
          echo "Source check complete."

  # ── Minimal image (both architectures) ──────────────────────────────────
  minimal-arm64:
    name: Build minimal (arm64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push minimal (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.minimal
          push: true
          tags: ${{ env.IMAGE }}:minimal-arm64
          platforms: linux/arm64
          build-args: |
            BUILDER=alpine:latest
          cache-from: type=gha,scope=minimal-arm64
          cache-to: type=gha,mode=max,scope=minimal-arm64

  minimal-amd64:
    name: Build minimal (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push minimal (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.minimal
          push: true
          tags: ${{ env.IMAGE }}:minimal-amd64
          platforms: linux/amd64
          build-args: |
            BUILDER=alpine:latest
          cache-from: type=gha,scope=minimal-amd64
          cache-to: type=gha,mode=max,scope=minimal-amd64

  minimal-manifest:
    name: Merge minimal manifest
    needs: [minimal-arm64, minimal-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:minimal \
            -t ${{ env.IMAGE }}:minimal-${{ github.sha }} \
            ${{ env.IMAGE }}:minimal-arm64 \
            ${{ env.IMAGE }}:minimal-amd64

  # ── Core image (both architectures) ─────────────────────────────────────
  core-arm64:
    name: Build core (arm64)
    needs: minimal-manifest
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push core (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.core
          push: true
          tags: ${{ env.IMAGE }}:core-arm64
          platforms: linux/arm64
          build-args: |
            MINIMAL_IMAGE=${{ env.IMAGE }}:minimal-arm64
          cache-from: type=gha,scope=core-arm64
          cache-to: type=gha,mode=max,scope=core-arm64

  core-amd64:
    name: Build core (amd64)
    needs: minimal-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push core (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.core
          push: true
          tags: ${{ env.IMAGE }}:core-amd64
          platforms: linux/amd64
          build-args: |
            MINIMAL_IMAGE=${{ env.IMAGE }}:minimal-amd64
          cache-from: type=gha,scope=core-amd64
          cache-to: type=gha,mode=max,scope=core-amd64

  core-manifest:
    name: Merge core manifest
    needs: [core-arm64, core-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:core \
            -t ${{ env.IMAGE }}:core-${{ github.sha }} \
            ${{ env.IMAGE }}:core-arm64 \
            ${{ env.IMAGE }}:core-amd64

  # ── Builder image (both architectures) ──────────────────────────────────
  builder-arm64:
    name: Build builder (arm64)
    needs: core-manifest
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push builder (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.builder
          push: true
          tags: ${{ env.IMAGE }}:builder-arm64
          platforms: linux/arm64
          build-args: |
            CORE_IMAGE=${{ env.IMAGE }}:core-arm64
          cache-from: type=gha,scope=builder-arm64
          cache-to: type=gha,mode=max,scope=builder-arm64

  builder-amd64:
    name: Build builder (amd64)
    needs: core-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push builder (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.builder
          push: true
          tags: ${{ env.IMAGE }}:builder-amd64
          platforms: linux/amd64
          build-args: |
            CORE_IMAGE=${{ env.IMAGE }}:core-amd64
          cache-from: type=gha,scope=builder-amd64
          cache-to: type=gha,mode=max,scope=builder-amd64

  builder-manifest:
    name: Merge builder manifest
    needs: [builder-arm64, builder-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:builder \
            -t ${{ env.IMAGE }}:builder-${{ github.sha }} \
            ${{ env.IMAGE }}:builder-arm64 \
            ${{ env.IMAGE }}:builder-amd64

  # ── Smoke tests ─────────────────────────────────────────────────────────
  smoke-test-arm64:
    name: Smoke test (arm64)
    needs: builder-manifest
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Test compilers and tools
        run: |
          docker run --rm ${{ env.IMAGE }}:builder-arm64 -c '
          set -e
          FAIL=0
          pass() { echo "PASS: $1"; }
          fail() { echo "FAIL: $1"; FAIL=$((FAIL+1)); }

          # C compiler
          echo "int main(){return 0;}" | clang -x c - -o /tmp/test_c && pass "C (clang)" || fail "C (clang)"

          # C++ compiler
          printf "#include <iostream>\nint main(){std::cout<<\"ok\";return 0;}" | \
            clang++ -x c++ -std=c++17 - -o /tmp/test_cpp && /tmp/test_cpp >/dev/null && pass "C++ (clang++)" || fail "C++ (clang++)"

          # Go
          printf "package main\nimport \"fmt\"\nfunc main(){fmt.Println(\"ok\")}" > /tmp/t.go && \
            go build -o /tmp/test_go /tmp/t.go && pass "Go" || fail "Go"

          # Rust
          echo "fn main(){}" > /tmp/t.rs && \
            rustc /tmp/t.rs -o /tmp/test_rust 2>/dev/null && pass "Rust" || fail "Rust"

          # Node.js
          node -e "process.exit(0)" && pass "Node.js" || fail "Node.js"

          # Python
          python3 -c "pass" && pass "Python" || fail "Python"

          # Build tools
          cmake --version >/dev/null 2>&1 && pass "cmake" || fail "cmake"
          samu --version >/dev/null 2>&1 && pass "samu (ninja)" || fail "samu"

          # jpkg
          jpkg --version >/dev/null 2>&1 && pass "jpkg" || fail "jpkg"

          echo "---"
          if [ "$FAIL" -gt 0 ]; then
            echo "$FAIL test(s) failed"
            exit 1
          fi
          echo "All tests passed"
          '

  smoke-test-amd64:
    name: Smoke test (amd64)
    needs: builder-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Test compilers and tools
        run: |
          docker run --rm ${{ env.IMAGE }}:builder-amd64 -c '
          set -e
          FAIL=0
          pass() { echo "PASS: $1"; }
          fail() { echo "FAIL: $1"; FAIL=$((FAIL+1)); }

          # C compiler
          echo "int main(){return 0;}" | clang -x c - -o /tmp/test_c && pass "C (clang)" || fail "C (clang)"

          # C++ compiler
          printf "#include <iostream>\nint main(){std::cout<<\"ok\";return 0;}" | \
            clang++ -x c++ -std=c++17 - -o /tmp/test_cpp && /tmp/test_cpp >/dev/null && pass "C++ (clang++)" || fail "C++ (clang++)"

          # Go
          printf "package main\nimport \"fmt\"\nfunc main(){fmt.Println(\"ok\")}" > /tmp/t.go && \
            go build -o /tmp/test_go /tmp/t.go && pass "Go" || fail "Go"

          # Rust
          echo "fn main(){}" > /tmp/t.rs && \
            rustc /tmp/t.rs -o /tmp/test_rust 2>/dev/null && pass "Rust" || fail "Rust"

          # Node.js
          node -e "process.exit(0)" && pass "Node.js" || fail "Node.js"

          # Python
          python3 -c "pass" && pass "Python" || fail "Python"

          # Build tools
          cmake --version >/dev/null 2>&1 && pass "cmake" || fail "cmake"
          samu --version >/dev/null 2>&1 && pass "samu (ninja)" || fail "samu"

          # jpkg
          jpkg --version >/dev/null 2>&1 && pass "jpkg" || fail "jpkg"

          echo "---"
          if [ "$FAIL" -gt 0 ]; then
            echo "$FAIL test(s) failed"
            exit 1
          fi
          echo "All tests passed"
          '
