name: Publish container images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'config/**'
      - 'packages/jpkg/**'
      - 'scripts/**'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/stormj-uh/jonerix

jobs:
  # ── Check vendored sources ──────────────────────────────────────────────
  check-sources:
    name: Verify vendored sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check all recipes have vendored source
        run: |
          MISSING=0
          # Packages that are too large to vendor or intentionally left unvendored.
          SKIP="rust go llvm nodejs linux libcxx"
          for recipe in packages/core/*/recipe.toml packages/develop/*/recipe.toml packages/extra/*/recipe.toml; do
            [ -f "$recipe" ] || continue
            pkg=$(basename "$(dirname "$recipe")")
            # Skip packages without source URL
            url=$(grep '^url' "$recipe" | head -1 | sed 's/.*= *"\(.*\)"/\1/' || true)
            [ -z "$url" ] && continue
            [ "$url" = "local" ] && continue
            # Skip large packages
            echo "$SKIP" | tr ' ' '\n' | grep -qx "$pkg" && continue
            # Prefer the exact upstream basename; fall back to package/version naming.
            ver=$(grep '^version' "$recipe" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            base_ver=$(printf '%s\n' "$ver" | sed 's/-r[0-9][0-9]*$//')
            url_base=$(basename "${url%%\?*}")
            found=0
            [ -n "$url_base" ] && [ -f "sources/$url_base" ] && found=1
            if [ "$found" -eq 0 ]; then
              for ext in tar.gz tar.xz tar.bz2 tgz tar.zst; do
                [ -f "sources/${pkg}-${base_ver}.${ext}" ] && found=1 && break
              done
            fi
            # Also check with different naming patterns for older vendored names.
            if [ "$found" -eq 0 ]; then
              matches=$(ls sources/${pkg}*${base_ver}* 2>/dev/null | head -1)
              [ -n "$matches" ] && found=1
            fi
            if [ "$found" -eq 0 ]; then
              echo "MISSING: sources/ for $pkg-$ver (from $url)"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::$MISSING package(s) missing vendored source in sources/"
          fi
          echo "Source check complete."

  # ── Minimal image (both architectures) ──────────────────────────────────
  minimal-arm64:
    name: Build minimal (arm64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push minimal (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.minimal
          push: true
          tags: ${{ env.IMAGE }}:minimal-arm64
          platforms: linux/arm64
          build-args: |
            BUILDER=ghcr.io/stormj-uh/jonerix:minimal
          cache-from: type=gha,scope=minimal-arm64
          cache-to: type=gha,mode=max,scope=minimal-arm64

  minimal-amd64:
    name: Build minimal (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push minimal (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.minimal
          push: true
          tags: ${{ env.IMAGE }}:minimal-amd64
          platforms: linux/amd64
          build-args: |
            BUILDER=ghcr.io/stormj-uh/jonerix:minimal
          cache-from: type=gha,scope=minimal-amd64
          cache-to: type=gha,mode=max,scope=minimal-amd64

  minimal-manifest:
    name: Merge minimal manifest
    needs: [minimal-arm64, minimal-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:minimal \
            -t ${{ env.IMAGE }}:minimal-${{ github.sha }} \
            ${{ env.IMAGE }}:minimal-arm64 \
            ${{ env.IMAGE }}:minimal-amd64

  # ── Core image (both architectures) ─────────────────────────────────────
  core-arm64:
    name: Build core (arm64)
    needs: minimal-manifest
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push core (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.core
          push: true
          tags: ${{ env.IMAGE }}:core-arm64
          platforms: linux/arm64
          build-args: |
            MINIMAL_IMAGE=${{ env.IMAGE }}:minimal-arm64
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha,scope=core-arm64
          cache-to: type=gha,mode=max,scope=core-arm64

  core-amd64:
    name: Build core (amd64)
    needs: minimal-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push core (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.core
          push: true
          tags: ${{ env.IMAGE }}:core-amd64
          platforms: linux/amd64
          build-args: |
            MINIMAL_IMAGE=${{ env.IMAGE }}:minimal-amd64
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha,scope=core-amd64
          cache-to: type=gha,mode=max,scope=core-amd64

  core-manifest:
    name: Merge core manifest
    needs: [core-arm64, core-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:core \
            -t ${{ env.IMAGE }}:core-${{ github.sha }} \
            ${{ env.IMAGE }}:core-arm64 \
            ${{ env.IMAGE }}:core-amd64

  # ── Builder image (both architectures) ──────────────────────────────────
  builder-arm64:
    name: Build builder (arm64)
    needs: core-manifest
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push builder (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.builder
          push: true
          tags: ${{ env.IMAGE }}:builder-arm64
          platforms: linux/arm64
          build-args: |
            CORE_IMAGE=${{ env.IMAGE }}:core-arm64
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha,scope=builder-arm64
          cache-to: type=gha,mode=max,scope=builder-arm64

  builder-amd64:
    name: Build builder (amd64)
    needs: core-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push builder (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.builder
          push: true
          tags: ${{ env.IMAGE }}:builder-amd64
          platforms: linux/amd64
          build-args: |
            CORE_IMAGE=${{ env.IMAGE }}:core-amd64
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha,scope=builder-amd64
          cache-to: type=gha,mode=max,scope=builder-amd64

  builder-manifest:
    name: Merge builder manifest
    needs: [builder-arm64, builder-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:builder \
            -t ${{ env.IMAGE }}:builder-${{ github.sha }} \
            ${{ env.IMAGE }}:builder-arm64 \
            ${{ env.IMAGE }}:builder-amd64

  # ── Router image (both architectures) ────────────────────────────────────
  router-arm64:
    name: Build router (arm64)
    needs: core-manifest
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push router (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.router
          push: true
          tags: ${{ env.IMAGE }}:router-arm64
          platforms: linux/arm64
          build-args: |
            CORE_IMAGE=${{ env.IMAGE }}:core-arm64
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha,scope=router-arm64
          cache-to: type=gha,mode=max,scope=router-arm64

  router-amd64:
    name: Build router (amd64)
    needs: core-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push router (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.router
          push: true
          tags: ${{ env.IMAGE }}:router-amd64
          platforms: linux/amd64
          build-args: |
            CORE_IMAGE=${{ env.IMAGE }}:core-amd64
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha,scope=router-amd64
          cache-to: type=gha,mode=max,scope=router-amd64

  router-manifest:
    name: Merge router manifest
    needs: [router-arm64, router-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:router \
            -t ${{ env.IMAGE }}:router-${{ github.sha }} \
            ${{ env.IMAGE }}:router-arm64 \
            ${{ env.IMAGE }}:router-amd64

  # ── Smoke tests ─────────────────────────────────────────────────────────
  smoke-test-arm64:
    name: Smoke test (arm64)
    needs: [builder-manifest, router-manifest]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Test compilers and tools
        run: |
          docker run --rm ${{ env.IMAGE }}:builder-arm64 -c '
          set -e
          FAIL=0
          pass() { echo "PASS: $1"; }
          fail() { echo "FAIL: $1"; FAIL=$((FAIL+1)); }

          # C compiler
          echo "int main(){return 0;}" | clang -x c - -o /tmp/test_c && pass "C (clang)" || fail "C (clang)"

          # C++ compiler
          printf "#include <iostream>\nint main(){std::cout<<\"ok\";return 0;}" | \
            clang++ -x c++ -std=c++17 - -o /tmp/test_cpp && /tmp/test_cpp >/dev/null && pass "C++ (clang++)" || fail "C++ (clang++)"

          # Go
          printf "package main\nimport \"fmt\"\nfunc main(){fmt.Println(\"ok\")}" > /tmp/t.go && \
            go build -o /tmp/test_go /tmp/t.go && pass "Go" || fail "Go"

          # Rust
          echo "fn main(){}" > /tmp/t.rs && \
            rustc /tmp/t.rs -o /tmp/test_rust 2>/dev/null && pass "Rust" || fail "Rust"

          # Node.js
          node -e "process.exit(0)" && pass "Node.js" || fail "Node.js"

          # Python
          python3 -c "pass" && pass "Python" || fail "Python"
          python3 -m pip --version >/dev/null 2>&1 && pass "pip" || fail "pip"
          perl -e 'exit 0' && pass "Perl" || fail "Perl"

          # Build tools
          cmake --version >/dev/null 2>&1 && pass "cmake" || fail "cmake"
          samu --version >/dev/null 2>&1 && pass "samu (ninja)" || fail "samu"

          # jpkg
          jpkg --version >/dev/null 2>&1 && pass "jpkg" || fail "jpkg"

          # bsdtar (must link against LibreSSL, not OpenSSL 3)
          bsdtar --version >/dev/null 2>&1 && pass "bsdtar" || fail "bsdtar"

          echo "---"
          if [ "$FAIL" -gt 0 ]; then
            echo "$FAIL test(s) failed"
            exit 1
          fi
          echo "All tests passed"
          '
      - name: Test router (arm64)
        run: |
          docker run --rm ${{ env.IMAGE }}:router-arm64 -c '
          set -e
          FAIL=0
          pass() { echo "PASS: $1"; }
          fail() { echo "FAIL: $1"; FAIL=$((FAIL+1)); }


          # Networking daemons
          unbound -V 2>&1 | grep -qi "unbound" && pass "unbound" || fail "unbound"
          dhcpcd --version >/dev/null 2>&1 && pass "dhcpcd" || echo "WARN: dhcpcd (known issue)"
          hostapd -v 2>&1 | grep -qi "hostapd" && pass "hostapd" || fail "hostapd"
          wpa_supplicant -v 2>&1 | grep -qi "wpa_supplicant" && pass "wpa_supplicant" || fail "wpa_supplicant"

          # Config files present (these are COPY-ed, always present)
          [ -f /etc/unbound/unbound.conf ] && pass "unbound.conf" || fail "unbound.conf"
          [ -f /etc/hostapd/hostapd.conf ] && pass "hostapd.conf" || fail "hostapd.conf"
          [ -f /etc/sysctl.conf ] && pass "sysctl.conf" || fail "sysctl.conf"
          [ -f /etc/network/interfaces ] && pass "interfaces" || fail "interfaces"

          # Shell must work
          echo "test" | toybox grep -q "test" && pass "toybox grep" || fail "toybox grep"
          toybox ls / >/dev/null 2>&1 && pass "toybox ls" || fail "toybox ls"

          echo "---"
          if [ "$FAIL" -gt 0 ]; then
            echo "$FAIL router test(s) failed"
            exit 1
          fi
          echo "All router tests passed"
          '

  smoke-test-amd64:
    name: Smoke test (amd64)
    needs: [builder-manifest, router-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Test builder (amd64)
        run: |
          docker run --rm ${{ env.IMAGE }}:builder-amd64 -c '
          set -e
          FAIL=0
          pass() { echo "PASS: $1"; }
          fail() { echo "FAIL: $1"; FAIL=$((FAIL+1)); }


          # Compilers
          echo "int main(){return 0;}" | clang -x c - -o /tmp/test_c && pass "C (clang)" || fail "C (clang)"
          echo "fn main(){}" > /tmp/t.rs && \
            rustc /tmp/t.rs -o /tmp/test_rust 2>/dev/null && pass "Rust" || fail "Rust"

          # Languages
          go version >/dev/null 2>&1 && pass "Go" || fail "Go"
          node -e "process.exit(0)" && pass "Node.js" || fail "Node.js"
          python3 -c "pass" && pass "Python" || fail "Python"
          python3 -m pip --version >/dev/null 2>&1 && pass "pip" || fail "pip"
          perl -e 'exit 0' && pass "Perl" || fail "Perl"

          # Build tools (always present — these work)
          cmake --version >/dev/null 2>&1 && pass "cmake" || fail "cmake"
          samu --version >/dev/null 2>&1 && pass "samu (ninja)" || fail "samu"

          # jpkg
          jpkg --version >/dev/null 2>&1 && pass "jpkg" || fail "jpkg"

          # bsdtar (must link against LibreSSL, not OpenSSL 3)
          bsdtar --version >/dev/null 2>&1 && pass "bsdtar" || fail "bsdtar"

          echo "---"
          if [ "$FAIL" -gt 0 ]; then
            echo "$FAIL builder test(s) failed"
            exit 1
          fi
          echo "All builder tests passed"
          '
      - name: Test router (amd64)
        run: |
          docker run --rm ${{ env.IMAGE }}:router-amd64 -c '
          set -e
          FAIL=0
          pass() { echo "PASS: $1"; }
          fail() { echo "FAIL: $1"; FAIL=$((FAIL+1)); }


          # Networking daemons
          unbound -V 2>&1 | grep -qi "unbound" && pass "unbound" || fail "unbound"
          dhcpcd --version >/dev/null 2>&1 && pass "dhcpcd" || echo "WARN: dhcpcd (known issue)"
          hostapd -v 2>&1 | grep -qi "hostapd" && pass "hostapd" || fail "hostapd"
          wpa_supplicant -v 2>&1 | grep -qi "wpa_supplicant" && pass "wpa_supplicant" || fail "wpa_supplicant"

          # Config files present (these are COPY-ed, always present)
          [ -f /etc/unbound/unbound.conf ] && pass "unbound.conf" || fail "unbound.conf"
          [ -f /etc/hostapd/hostapd.conf ] && pass "hostapd.conf" || fail "hostapd.conf"
          [ -f /etc/sysctl.conf ] && pass "sysctl.conf" || fail "sysctl.conf"
          [ -f /etc/network/interfaces ] && pass "interfaces" || fail "interfaces"

          # Shell must work
          echo "test" | toybox grep -q "test" && pass "toybox grep" || fail "toybox grep"
          toybox ls / >/dev/null 2>&1 && pass "toybox ls" || fail "toybox ls"

          echo "---"
          if [ "$FAIL" -gt 0 ]; then
            echo "$FAIL router test(s) failed"
            exit 1
          fi
          echo "All router tests passed"
          '
