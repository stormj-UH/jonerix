name: Build jonerix

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      skip_stage1:
        description: 'Skip stage1 (use cached sysroot)'
        required: false
        default: 'false'
        type: boolean

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  JONERIX_VERSION: "0.1.0-dev"

jobs:
  # ---------------------------------------------------------------------------
  # Stage 0: Set up the Alpine build host
  # ---------------------------------------------------------------------------
  build:
    name: Bootstrap jonerix
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --privileged
    timeout-minutes: 180

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Alpine build dependencies
        run: |
          apk update
          apk add \
            clang lld llvm-dev musl-dev \
            cmake samurai git curl patch \
            tar gzip zstd xz \
            perl linux-headers \
            dosfstools e2fsprogs sgdisk \
            coreutils findutils file

      - name: Cache stage1 sysroot
        uses: actions/cache@v4
        id: cache-sysroot
        with:
          path: /jonerix-sysroot
          key: sysroot-${{ runner.arch }}-${{ hashFiles('packages/core/*/Makefile', 'bootstrap/config.sh') }}
          restore-keys: |
            sysroot-${{ runner.arch }}-

      # -------------------------------------------------------------------
      # Stage 0: Prepare build environment
      # -------------------------------------------------------------------
      - name: "Stage 0: Prepare build environment"
        run: |
          echo "=== Stage 0: Preparing build environment ==="

          # Create build directories
          mkdir -p /jonerix-sysroot
          mkdir -p /jonerix-build
          mkdir -p /jonerix-output

          # Run stage0 if it exists
          if [ -f bootstrap/stage0.sh ]; then
            sh bootstrap/stage0.sh
          else
            echo "bootstrap/stage0.sh not found, skipping (deps installed above)"
          fi

          echo "Stage 0 complete."

      # -------------------------------------------------------------------
      # Stage 1: Cross-compile the permissive world
      # -------------------------------------------------------------------
      - name: "Stage 1: Cross-compile components"
        if: steps.cache-sysroot.outputs.cache-hit != 'true' && github.event.inputs.skip_stage1 != 'true'
        run: |
          echo "=== Stage 1: Cross-compiling jonerix components ==="

          if [ -f bootstrap/stage1.sh ]; then
            sh bootstrap/stage1.sh
          else
            echo "bootstrap/stage1.sh not found — this is expected during early development."
            echo "Stage 1 will be populated as package build recipes are added."
            echo "Creating placeholder sysroot structure..."

            # Create minimal sysroot structure for stage2 testing
            mkdir -p /jonerix-sysroot/bin
            mkdir -p /jonerix-sysroot/lib
            mkdir -p /jonerix-sysroot/etc
            mkdir -p /jonerix-sysroot/boot
          fi

          echo "Stage 1 complete."

      # -------------------------------------------------------------------
      # Stage 2: Assemble the root filesystem
      # -------------------------------------------------------------------
      - name: "Stage 2: Assemble rootfs"
        run: |
          echo "=== Stage 2: Assembling jonerix rootfs ==="

          if [ -f bootstrap/stage2.sh ]; then
            sh bootstrap/stage2.sh
          else
            echo "bootstrap/stage2.sh not found — assembling from config/ defaults."

            ROOTFS="/jonerix-output/rootfs"
            mkdir -p "$ROOTFS"

            # Create FHS directory structure
            for d in bin lib etc boot dev proc sys run tmp home root var/log var/cache/jpkg var/db/jpkg; do
              mkdir -p "$ROOTFS/$d"
            done

            # Symlink /usr -> / for merged-usr
            ln -sf / "$ROOTFS/usr" 2>/dev/null || true

            # Install default configs
            if [ -d config/defaults/etc ]; then
              cp -a config/defaults/etc/* "$ROOTFS/etc/" 2>/dev/null || true
            fi
            if [ -d config/defaults/var ]; then
              cp -a config/defaults/var/* "$ROOTFS/var/" 2>/dev/null || true
            fi

            # Install OpenRC configs
            if [ -d config/openrc ]; then
              mkdir -p "$ROOTFS/etc/init.d"
              cp -a config/openrc/init.d/* "$ROOTFS/etc/init.d/" 2>/dev/null || true
              [ -f config/openrc/inittab ] && cp config/openrc/inittab "$ROOTFS/etc/inittab"
            fi

            # Set permissions
            chmod 0700 "$ROOTFS/root"
            chmod 1777 "$ROOTFS/tmp"
            chmod 0600 "$ROOTFS/etc/shadow" 2>/dev/null || true

            echo "Rootfs structure created at $ROOTFS"
          fi

          echo "Stage 2 complete."

      # -------------------------------------------------------------------
      # Create rootfs tarball
      # -------------------------------------------------------------------
      - name: Create rootfs tarball
        run: |
          ROOTFS="/jonerix-output/rootfs"
          OUTPUT="/jonerix-output/jonerix-rootfs-${JONERIX_VERSION}.tar.zst"

          if [ -d "$ROOTFS" ]; then
            echo "Creating rootfs tarball..."
            tar -C "$ROOTFS" -cf - . | zstd -T0 -19 > "$OUTPUT"
            echo "Tarball: $OUTPUT"
            ls -lh "$OUTPUT"
          else
            echo "No rootfs directory found, skipping tarball creation."
            exit 1
          fi

      # -------------------------------------------------------------------
      # Size report
      # -------------------------------------------------------------------
      - name: Rootfs size report
        if: always()
        run: |
          ROOTFS="/jonerix-output/rootfs"
          if [ -d "$ROOTFS" ] && [ -f scripts/size-report.sh ]; then
            sh scripts/size-report.sh --target server "$ROOTFS" || true
          fi

      # -------------------------------------------------------------------
      # License audit
      # -------------------------------------------------------------------
      - name: License audit
        if: always()
        run: |
          if [ -f scripts/license-audit.sh ]; then
            sh scripts/license-audit.sh --recipes --verbose || true
          fi

      # -------------------------------------------------------------------
      # Upload artifacts
      # -------------------------------------------------------------------
      - name: Upload rootfs tarball
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jonerix-rootfs
          path: /jonerix-output/jonerix-rootfs-*.tar.zst
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            /jonerix-build/**/*.log
            /tmp/jonerix-*.log
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # OCI image (runs after build)
  # ---------------------------------------------------------------------------
  oci-image:
    name: Build OCI image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: jonerix-rootfs
          path: ./output/

      - name: Build OCI image
        run: |
          TARBALL="$(ls output/jonerix-rootfs-*.tar.zst 2>/dev/null | head -1)"
          if [ -z "$TARBALL" ]; then
            echo "No rootfs tarball found, skipping OCI build."
            exit 0
          fi

          sh image/oci.sh "$TARBALL" "output/jonerix-oci.tar" "jonerix:${JONERIX_VERSION}"

      - name: Upload OCI image
        uses: actions/upload-artifact@v4
        with:
          name: jonerix-oci
          path: output/jonerix-oci.tar
          retention-days: 30
          if-no-files-found: warn
