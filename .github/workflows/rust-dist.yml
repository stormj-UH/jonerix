name: Build Rust dist (jonerix-linux-musl)

on:
  workflow_dispatch:
    inputs:
      rust_version:
        description: 'Rust version to build (e.g. 1.95.0)'
        required: true
        default: '1.95.0'

env:
  BUILDER_IMAGE_X86_64: ghcr.io/stormj-uh/jonerix:builder-amd64
  BUILDER_IMAGE_AARCH64: ghcr.io/stormj-uh/jonerix:builder-arm64

jobs:
  build-x86_64:
    name: "Build Rust ${{ inputs.rust_version }} (x86_64)"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Rust dist tarball
        run: |
          RUST_VERSION="${{ inputs.rust_version }}"
          TRIPLE="x86_64-jonerix-linux-musl"
          docker run --rm \
            -v "$PWD/rust-out:/out" \
            -e "RUST_VERSION=$RUST_VERSION" \
            -e "TRIPLE=$TRIPLE" \
            --entrypoint /bin/mksh \
            $BUILDER_IMAGE_X86_64 \
            -c "$(cat <<'DOCKERSCRIPT'
          set -ex

          # Provide /bin/sh and /bin/bash -- Rust x.py and configure
          # scripts expect both; the builder image only ships mksh.
          [ -e /bin/sh ] || ln -sf mksh /bin/sh
          [ -e /bin/bash ] || ln -sf mksh /bin/bash

          # Stage0 cargo/rustc from rust-lang.org are GCC-linked
          ln -sf libunwind.so.1 /lib/libgcc_s.so.1 2>/dev/null || true
          ln -sf libc++.so.1 /lib/libstdc++.so.6 2>/dev/null || true

          # Kernel headers for LLVM build (if needed)
          if [ ! -f /include/asm/prctl.h ]; then
            jpkg update 2>&1 | tail -2
            jpkg install --force jonerix-headers 2>/dev/null || true
          fi

          cd /tmp
          curl -fsSL -o rustc-src.tar.xz \
            "https://static.rust-lang.org/dist/rustc-${RUST_VERSION}-src.tar.xz"
          mkdir rust-src && tar xJf rustc-src.tar.xz -C rust-src --strip-components=1
          cd rust-src

          # ---------------------------------------------------------------
          # Bake aarch64-jonerix-linux-musl + x86_64-jonerix-linux-musl into
          # rustc's builtin target table.  Without this, stable rustc rejects
          # the triple with "could not find specification for target ..."
          # because custom JSON specs require -Zunstable-options.  The 1.94
          # dist had this patch; for 1.95 we re-apply it inline.
          # ---------------------------------------------------------------
          # 1. Insert two new entries in `supported_targets!{}` in mod.rs,
          #    placed right after their `*-unknown-linux-musl` siblings so
          #    the new files hash next to the existing ones.  Done via
          #    python rather than sed because the jonerix/uutils sed
          #    surface doesn't reliably accept '\n' in replacements.
          python3 - <<'PYTHON_PATCH'
          import pathlib, sys
          mod = pathlib.Path("compiler/rustc_target/src/spec/mod.rs")
          src = mod.read_text()
          for tuple_str, mod_ident in [
              ("aarch64-unknown-linux-musl", "aarch64_unknown_linux_musl"),
              ("x86_64-unknown-linux-musl", "x86_64_unknown_linux_musl"),
          ]:
              old = f'    ("{tuple_str}", {mod_ident}),'
              jonerix_tuple = tuple_str.replace("-unknown-", "-jonerix-")
              jonerix_mod = mod_ident.replace("_unknown_", "_jonerix_")
              new = f'{old}\n    ("{jonerix_tuple}", {jonerix_mod}),'
              if old not in src:
                  sys.exit(f"FATAL: {old!r} not found in mod.rs")
              if jonerix_tuple in src:
                  print(f"already patched: {jonerix_tuple}")
                  continue
              src = src.replace(old, new, 1)
          mod.write_text(src)
          for line in src.splitlines():
              if "jonerix-linux-musl" in line:
                  print(f"  {line}")
          PYTHON_PATCH

          # 2. Drop the new target spec files.  Each is a verbatim copy of
          #    the corresponding `*-unknown-linux-musl` file with vendor
          #    bumped to "jonerix" (TargetOptions::vendor) and the metadata
          #    description tagged so `rustc --print target-list-detailed`
          #    distinguishes them.
          cat > compiler/rustc_target/src/spec/targets/aarch64_jonerix_linux_musl.rs <<'JONERIX_AARCH64'
          use crate::spec::{
              Arch, FramePointer, SanitizerSet, StackProbeType, Target, TargetMetadata, TargetOptions, base,
          };

          pub(crate) fn target() -> Target {
              let mut base = base::linux_musl::opts();
              base.max_atomic_width = Some(128);
              base.supports_xray = true;
              base.features = "+v8a,+outline-atomics".into();
              base.stack_probes = StackProbeType::Inline;
              base.supported_sanitizers = SanitizerSet::ADDRESS
                  | SanitizerSet::CFI
                  | SanitizerSet::LEAK
                  | SanitizerSet::MEMORY
                  | SanitizerSet::THREAD;
              base.crt_static_default = true;
              base.vendor = "jonerix".into();

              Target {
                  llvm_target: "aarch64-unknown-linux-musl".into(),
                  metadata: TargetMetadata {
                      description: Some("ARM64 Linux with musl 1.2.5 (jonerix)".into()),
                      tier: Some(3),
                      host_tools: Some(true),
                      std: Some(true),
                  },
                  pointer_width: 64,
                  data_layout: "e-m:e-p270:32:32-p271:32:32-p272:64:64-i8:8:32-i16:16:32-i64:64-i128:128-n32:64-S128-Fn32".into(),
                  arch: Arch::AArch64,
                  options: TargetOptions {
                      frame_pointer: FramePointer::NonLeaf,
                      mcount: "\u{1}_mcount".into(),
                      ..base
                  },
              }
          }
          JONERIX_AARCH64

          cat > compiler/rustc_target/src/spec/targets/x86_64_jonerix_linux_musl.rs <<'JONERIX_X86_64'
          use crate::spec::{
              Arch, Cc, LinkerFlavor, Lld, SanitizerSet, StackProbeType, Target, TargetMetadata, base,
          };

          pub(crate) fn target() -> Target {
              let mut base = base::linux_musl::opts();
              base.cpu = "x86-64".into();
              base.plt_by_default = false;
              base.max_atomic_width = Some(64);
              base.add_pre_link_args(LinkerFlavor::Gnu(Cc::Yes, Lld::No), &["-m64"]);
              base.stack_probes = StackProbeType::Inline;
              base.static_position_independent_executables = true;
              base.supported_sanitizers = SanitizerSet::ADDRESS
                  | SanitizerSet::CFI
                  | SanitizerSet::LEAK
                  | SanitizerSet::MEMORY
                  | SanitizerSet::THREAD;
              base.supports_xray = true;
              base.crt_static_default = true;
              base.vendor = "jonerix".into();

              Target {
                  llvm_target: "x86_64-unknown-linux-musl".into(),
                  metadata: TargetMetadata {
                      description: Some("64-bit Linux with musl 1.2.5 (jonerix)".into()),
                      tier: Some(3),
                      host_tools: Some(true),
                      std: Some(true),
                  },
                  pointer_width: 64,
                  data_layout: "e-m:e-p270:32:32-p271:32:32-p272:64:64-i64:64-i128:128-f80:128-n8:16:32:64-S128".into(),
                  arch: Arch::X86_64,
                  options: base,
              }
          }
          JONERIX_X86_64

          # 3. Sanity-check the patch landed.
          grep -q "aarch64-jonerix-linux-musl" compiler/rustc_target/src/spec/mod.rs || \
              { echo "FATAL: aarch64-jonerix entry missing from mod.rs"; exit 1; }
          grep -q "x86_64-jonerix-linux-musl" compiler/rustc_target/src/spec/mod.rs || \
              { echo "FATAL: x86_64-jonerix entry missing from mod.rs"; exit 1; }
          test -f compiler/rustc_target/src/spec/targets/aarch64_jonerix_linux_musl.rs || \
              { echo "FATAL: aarch64_jonerix_linux_musl.rs missing"; exit 1; }
          test -f compiler/rustc_target/src/spec/targets/x86_64_jonerix_linux_musl.rs || \
              { echo "FATAL: x86_64_jonerix_linux_musl.rs missing"; exit 1; }

          # JSON target spec so stage0 can resolve the jonerix vendor triple.
          # Identical to x86_64-unknown-linux-musl with vendor = "jonerix".
          cat > x86_64-jonerix-linux-musl.json <<'TGTSPEC'
          {
            "arch": "x86_64",
            "crt-objects-fallback": "musl",
            "crt-static-default": true,
            "crt-static-respected": true,
            "data-layout": "e-m:e-p270:32:32-p271:32:32-p272:64:64-i64:64-i128:128-f80:128-n8:16:32:64-S128",
            "dynamic-linking": true,
            "env": "musl",
            "has-rpath": true,
            "has-thread-local": true,
            "llvm-target": "x86_64-unknown-linux-musl",
            "max-atomic-width": 64,
            "os": "linux",
            "position-independent-executables": true,
            "relro-level": "full",
            "stack-probes": {"kind": "inline"},
            "static-position-independent-executables": true,
            "target-family": ["unix"],
            "target-mcount": "_mcount",
            "target-pointer-width": 64,
            "vendor": "jonerix"
          }
          TGTSPEC
          export RUST_TARGET_PATH="$PWD"

          cat > config.toml <<CONF
          profile = "dist"
          change-id = 999999

          [build]
          # description sets CFG_VER_DESCRIPTION which becomes the trailing
          # parenthesised tag in `rustc --version` output.  Without it,
          # bootstrap defaults to "built from a source tarball" because the
          # source is unpacked from a downloaded tarball (no .git dir).
          description = "jonerix"
          target = ["${TRIPLE}"]
          host = ["${TRIPLE}"]
          cargo-native-static = false
          extended = true
          tools = ["cargo", "rustdoc", "rustfmt"]
          docs = false
          compiler-docs = false

          [llvm]
          link-shared = true
          download-ci-llvm = false
          optimize = true
          assertions = false
          ninja = true
          targets = "X86;AArch64"
          experimental-targets = ""
          cflags = "--rtlib=compiler-rt --unwindlib=libunwind"
          cxxflags = "--rtlib=compiler-rt --unwindlib=libunwind -stdlib=libc++"
          ldflags = "--rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld"

          [rust]
          codegen-units = 1
          codegen-units-std = 1
          debug = false
          debug-assertions = false
          debug-logging = false
          optimize = true
          channel = "stable"
          lld = true
          llvm-tools = false
          omit-git-hash = true
          # Setting `vendor = "jonerix"` in the new target spec files trips
          # rustc's internal `rustc_lint_opt_deny_field_access` lint
          # (recommends `Target::is_like_*` instead — irrelevant for the
          # vendor field).  Stop deny-warnings = true (default for dist
          # profile) from turning that warning into a build-failing error.
          deny-warnings = false

          [target.x86_64-jonerix-linux-musl]
          cc = "clang"
          cxx = "clang++"
          ar = "llvm-ar"
          ranlib = "llvm-ranlib"
          linker = "clang"
          musl-root = "/"
          crt-static = false
          llvm-libunwind = "system"

          [target.x86_64-unknown-linux-musl]
          cc = "clang"
          cxx = "clang++"
          ar = "llvm-ar"
          ranlib = "llvm-ranlib"
          linker = "clang"
          musl-root = "/"
          crt-static = false
          llvm-libunwind = "system"
          CONF

          export OPENSSL_DIR=/
          export OPENSSL_INCLUDE_DIR=/include
          export OPENSSL_LIB_DIR=/lib
          export PKG_CONFIG_ALLOW_CROSS=1
          BOOTSTRAP_SKIP_TARGET_SANITY=1 python3 x.py dist --stage 2 2>&1

          echo "=== Dist artifacts ==="
          ls -lh build/dist/

          cp build/dist/rust-${RUST_VERSION}-${TRIPLE}.tar.gz /out/ 2>/dev/null || \
          cp build/dist/rust-*-${TRIPLE}.tar.gz /out/ 2>/dev/null || {
            echo "=== Available dist files ==="
            ls build/dist/*.tar.gz
            cp build/dist/*.tar.gz /out/
          }
          DOCKERSCRIPT
          )"

      - name: Upload dist tarball
        run: |
          RUST_VERSION="${{ inputs.rust_version }}"
          ls -lh rust-out/
          FILE=$(ls rust-out/rust-*-x86_64-jonerix-linux-musl.tar.gz 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "FATAL: no x86_64 dist tarball produced"
            ls rust-out/
            exit 1
          fi
          SHA=$(sha256sum "$FILE" | cut -d' ' -f1)
          echo "x86_64 tarball: $(basename $FILE)"
          echo "SHA256: $SHA"
          echo "X86_SHA=$SHA" >> "$GITHUB_ENV"
          echo "X86_FILE=$FILE" >> "$GITHUB_ENV"

          TAG="source-rust-v${RUST_VERSION}"
          gh release create "$TAG" --title "Rust ${RUST_VERSION} dist" \
            --notes "Self-built Rust ${RUST_VERSION} dist tarballs (jonerix-linux-musl triple)." \
            2>/dev/null || true
          # Retry the upload — GITHUB_TOKEN's per-installation rate limit
          # has eaten 3-hour builds before (run 25591573031). Back off and
          # retry up to 5 times (waits 30s, 60s, 120s, 240s, 480s = 15.5
          # minutes total worst case) before giving up.
          attempts=0
          until gh release upload "$TAG" "$FILE" --clobber; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge 5 ]; then
                  echo "FATAL: gh release upload failed after $attempts attempts" >&2
                  exit 1
              fi
              wait_secs=$((30 * (1 << (attempts - 1))))
              echo "gh release upload failed (attempt $attempts), retrying in ${wait_secs}s..." >&2
              sleep "$wait_secs"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### Rust ${{ inputs.rust_version }} x86_64 build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA256:** ${{ env.X86_SHA }}" >> "$GITHUB_STEP_SUMMARY"

  build-aarch64:
    name: "Build Rust ${{ inputs.rust_version }} (aarch64)"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Rust dist tarball
        run: |
          RUST_VERSION="${{ inputs.rust_version }}"
          TRIPLE="aarch64-jonerix-linux-musl"
          docker run --rm \
            -v "$PWD/rust-out:/out" \
            -e "RUST_VERSION=$RUST_VERSION" \
            -e "TRIPLE=$TRIPLE" \
            --entrypoint /bin/mksh \
            $BUILDER_IMAGE_AARCH64 \
            -c "$(cat <<'DOCKERSCRIPT'
          set -ex

          [ -e /bin/sh ] || ln -sf mksh /bin/sh
          [ -e /bin/bash ] || ln -sf mksh /bin/bash

          ln -sf libunwind.so.1 /lib/libgcc_s.so.1 2>/dev/null || true
          ln -sf libc++.so.1 /lib/libstdc++.so.6 2>/dev/null || true

          if [ ! -f /include/asm/hwcap.h ]; then
            jpkg update 2>&1 | tail -2
            jpkg install --force jonerix-headers 2>/dev/null || true
          fi

          cd /tmp
          curl -fsSL -o rustc-src.tar.xz \
            "https://static.rust-lang.org/dist/rustc-${RUST_VERSION}-src.tar.xz"
          mkdir rust-src && tar xJf rustc-src.tar.xz -C rust-src --strip-components=1
          cd rust-src

          # ---------------------------------------------------------------
          # Bake aarch64-jonerix-linux-musl + x86_64-jonerix-linux-musl into
          # rustc's builtin target table.  See the equivalent block in the
          # x86_64 job above for the full rationale.
          # ---------------------------------------------------------------
          sed -i 's|^    ("aarch64-unknown-linux-musl", aarch64_unknown_linux_musl),$|&\n    ("aarch64-jonerix-linux-musl", aarch64_jonerix_linux_musl),|' \
              compiler/rustc_target/src/spec/mod.rs
          sed -i 's|^    ("x86_64-unknown-linux-musl", x86_64_unknown_linux_musl),$|&\n    ("x86_64-jonerix-linux-musl", x86_64_jonerix_linux_musl),|' \
              compiler/rustc_target/src/spec/mod.rs

          cat > compiler/rustc_target/src/spec/targets/aarch64_jonerix_linux_musl.rs <<'JONERIX_AARCH64'
          use crate::spec::{
              Arch, FramePointer, SanitizerSet, StackProbeType, Target, TargetMetadata, TargetOptions, base,
          };

          pub(crate) fn target() -> Target {
              let mut base = base::linux_musl::opts();
              base.max_atomic_width = Some(128);
              base.supports_xray = true;
              base.features = "+v8a,+outline-atomics".into();
              base.stack_probes = StackProbeType::Inline;
              base.supported_sanitizers = SanitizerSet::ADDRESS
                  | SanitizerSet::CFI
                  | SanitizerSet::LEAK
                  | SanitizerSet::MEMORY
                  | SanitizerSet::THREAD;
              base.crt_static_default = true;
              base.vendor = "jonerix".into();

              Target {
                  llvm_target: "aarch64-unknown-linux-musl".into(),
                  metadata: TargetMetadata {
                      description: Some("ARM64 Linux with musl 1.2.5 (jonerix)".into()),
                      tier: Some(3),
                      host_tools: Some(true),
                      std: Some(true),
                  },
                  pointer_width: 64,
                  data_layout: "e-m:e-p270:32:32-p271:32:32-p272:64:64-i8:8:32-i16:16:32-i64:64-i128:128-n32:64-S128-Fn32".into(),
                  arch: Arch::AArch64,
                  options: TargetOptions {
                      frame_pointer: FramePointer::NonLeaf,
                      mcount: "\u{1}_mcount".into(),
                      ..base
                  },
              }
          }
          JONERIX_AARCH64

          cat > compiler/rustc_target/src/spec/targets/x86_64_jonerix_linux_musl.rs <<'JONERIX_X86_64'
          use crate::spec::{
              Arch, Cc, LinkerFlavor, Lld, SanitizerSet, StackProbeType, Target, TargetMetadata, base,
          };

          pub(crate) fn target() -> Target {
              let mut base = base::linux_musl::opts();
              base.cpu = "x86-64".into();
              base.plt_by_default = false;
              base.max_atomic_width = Some(64);
              base.add_pre_link_args(LinkerFlavor::Gnu(Cc::Yes, Lld::No), &["-m64"]);
              base.stack_probes = StackProbeType::Inline;
              base.static_position_independent_executables = true;
              base.supported_sanitizers = SanitizerSet::ADDRESS
                  | SanitizerSet::CFI
                  | SanitizerSet::LEAK
                  | SanitizerSet::MEMORY
                  | SanitizerSet::THREAD;
              base.supports_xray = true;
              base.crt_static_default = true;
              base.vendor = "jonerix".into();

              Target {
                  llvm_target: "x86_64-unknown-linux-musl".into(),
                  metadata: TargetMetadata {
                      description: Some("64-bit Linux with musl 1.2.5 (jonerix)".into()),
                      tier: Some(3),
                      host_tools: Some(true),
                      std: Some(true),
                  },
                  pointer_width: 64,
                  data_layout: "e-m:e-p270:32:32-p271:32:32-p272:64:64-i64:64-i128:128-f80:128-n8:16:32:64-S128".into(),
                  arch: Arch::X86_64,
                  options: base,
              }
          }
          JONERIX_X86_64

          grep -q "aarch64-jonerix-linux-musl" compiler/rustc_target/src/spec/mod.rs || \
              { echo "FATAL: aarch64-jonerix entry missing from mod.rs"; exit 1; }
          grep -q "x86_64-jonerix-linux-musl" compiler/rustc_target/src/spec/mod.rs || \
              { echo "FATAL: x86_64-jonerix entry missing from mod.rs"; exit 1; }
          test -f compiler/rustc_target/src/spec/targets/aarch64_jonerix_linux_musl.rs || \
              { echo "FATAL: aarch64_jonerix_linux_musl.rs missing"; exit 1; }
          test -f compiler/rustc_target/src/spec/targets/x86_64_jonerix_linux_musl.rs || \
              { echo "FATAL: x86_64_jonerix_linux_musl.rs missing"; exit 1; }

          # JSON target spec for aarch64-jonerix-linux-musl.
          # Identical to aarch64-unknown-linux-musl with vendor = "jonerix".
          cat > aarch64-jonerix-linux-musl.json <<'TGTSPEC'
          {
            "arch": "aarch64",
            "crt-objects-fallback": "musl",
            "crt-static-default": true,
            "crt-static-respected": true,
            "data-layout": "e-m:e-p270:32:32-p271:32:32-p272:64:64-i8:8:32-i16:16:32-i64:64-i128:128-n32:64-S128-Fn32",
            "dynamic-linking": true,
            "env": "musl",
            "features": "+v8a",
            "has-rpath": true,
            "has-thread-local": true,
            "llvm-target": "aarch64-unknown-linux-musl",
            "max-atomic-width": 128,
            "os": "linux",
            "position-independent-executables": true,
            "relro-level": "full",
            "stack-probes": {"kind": "inline"},
            "static-position-independent-executables": true,
            "supported-sanitizers": ["address","cfi","hwaddress","kcfi","leak","memory","memtag","thread"],
            "target-family": ["unix"],
            "target-mcount": "_mcount",
            "target-pointer-width": 64,
            "vendor": "jonerix"
          }
          TGTSPEC
          export RUST_TARGET_PATH="$PWD"

          cat > config.toml <<CONF
          profile = "dist"
          change-id = 999999

          [build]
          # CFG_VER_DESCRIPTION — see x86_64 job above for rationale.
          description = "jonerix"
          target = ["${TRIPLE}"]
          host = ["${TRIPLE}"]
          cargo-native-static = false
          extended = true
          tools = ["cargo", "rustdoc", "rustfmt"]
          docs = false
          compiler-docs = false

          [llvm]
          link-shared = true
          download-ci-llvm = false
          optimize = true
          assertions = false
          ninja = true
          targets = "X86;AArch64"
          experimental-targets = ""
          cflags = "--rtlib=compiler-rt --unwindlib=libunwind"
          cxxflags = "--rtlib=compiler-rt --unwindlib=libunwind -stdlib=libc++"
          ldflags = "--rtlib=compiler-rt --unwindlib=libunwind -fuse-ld=lld"

          [rust]
          codegen-units = 1
          codegen-units-std = 1
          debug = false
          debug-assertions = false
          debug-logging = false
          optimize = true
          channel = "stable"
          lld = true
          llvm-tools = false
          omit-git-hash = true
          # Setting `vendor = "jonerix"` in the new target spec files trips
          # rustc's internal `rustc_lint_opt_deny_field_access` lint
          # (recommends `Target::is_like_*` instead — irrelevant for the
          # vendor field).  Stop deny-warnings = true (default for dist
          # profile) from turning that warning into a build-failing error.
          deny-warnings = false

          [target.aarch64-jonerix-linux-musl]
          cc = "clang"
          cxx = "clang++"
          ar = "llvm-ar"
          ranlib = "llvm-ranlib"
          linker = "clang"
          musl-root = "/"
          crt-static = false
          llvm-libunwind = "system"

          [target.aarch64-unknown-linux-musl]
          cc = "clang"
          cxx = "clang++"
          ar = "llvm-ar"
          ranlib = "llvm-ranlib"
          linker = "clang"
          musl-root = "/"
          crt-static = false
          llvm-libunwind = "system"
          CONF

          export OPENSSL_DIR=/
          export OPENSSL_INCLUDE_DIR=/include
          export OPENSSL_LIB_DIR=/lib
          export PKG_CONFIG_ALLOW_CROSS=1
          BOOTSTRAP_SKIP_TARGET_SANITY=1 python3 x.py dist --stage 2 2>&1

          echo "=== Dist artifacts ==="
          ls -lh build/dist/

          cp build/dist/rust-${RUST_VERSION}-${TRIPLE}.tar.gz /out/ 2>/dev/null || \
          cp build/dist/rust-*-${TRIPLE}.tar.gz /out/ 2>/dev/null || {
            echo "=== Available dist files ==="
            ls build/dist/*.tar.gz
            cp build/dist/*.tar.gz /out/
          }
          DOCKERSCRIPT
          )"

      - name: Upload dist tarball
        run: |
          RUST_VERSION="${{ inputs.rust_version }}"
          ls -lh rust-out/
          FILE=$(ls rust-out/rust-*-aarch64-jonerix-linux-musl.tar.gz 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "FATAL: no aarch64 dist tarball produced"
            ls rust-out/
            exit 1
          fi
          SHA=$(sha256sum "$FILE" | cut -d' ' -f1)
          echo "aarch64 tarball: $(basename $FILE)"
          echo "SHA256: $SHA"
          echo "ARM_SHA=$SHA" >> "$GITHUB_ENV"

          TAG="source-rust-v${RUST_VERSION}"
          gh release create "$TAG" --title "Rust ${RUST_VERSION} dist" \
            --notes "Self-built Rust ${RUST_VERSION} dist tarballs (jonerix-linux-musl triple)." \
            2>/dev/null || true
          # Retry the upload — GITHUB_TOKEN's per-installation rate limit
          # has eaten 3-hour builds before (run 25591573031). Back off and
          # retry up to 5 times (waits 30s, 60s, 120s, 240s, 480s = 15.5
          # minutes total worst case) before giving up.
          attempts=0
          until gh release upload "$TAG" "$FILE" --clobber; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge 5 ]; then
                  echo "FATAL: gh release upload failed after $attempts attempts" >&2
                  exit 1
              fi
              wait_secs=$((30 * (1 << (attempts - 1))))
              echo "gh release upload failed (attempt $attempts), retrying in ${wait_secs}s..." >&2
              sleep "$wait_secs"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### Rust ${{ inputs.rust_version }} aarch64 build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA256:** ${{ env.ARM_SHA }}" >> "$GITHUB_STEP_SUMMARY"
