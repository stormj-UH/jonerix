name: Bootstrap packages (from source)

# Manually triggered ONLY.
# Run this after the minimal publish-packages CI is working and producing
# a working jpkg binary. Bootstrap builds every package from source,
# replacing the pre_bootstrap APK-extracted versions in the release.
#
# After successful builds, packages graduate: their recipe.toml
# gets pre_bootstrap set to false, and a PR is created with the changes.
on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to build (leave empty to build all in order)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── x86_64 bootstrap ───────────────────────────────────────────────────────
  bootstrap-x86_64:
    name: Bootstrap packages (x86_64)
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --privileged
    permissions:
      contents: write
    outputs:
      built-packages: ${{ steps.build.outputs.built }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          apk update
          apk add \
            clang lld musl-dev make \
            curl patch tar xz bash \
            zstd-dev zstd-static \
            linux-headers git \
            github-cli \
            cmake samurai \
            ncurses-dev openssl-dev \
            zlib-dev byacc m4 meson \
            python3 perl && \
          ln -sf /usr/bin/samu /usr/local/bin/ninja

      - name: Build jpkg
        run: |
          cd packages/jpkg
          make CC=clang LDFLAGS="-static -fuse-ld=lld" jpkg
          install -m 755 jpkg /usr/local/bin/jpkg

      - name: Download existing packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /var/cache/jpkg
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --dir /var/cache/jpkg 2>/dev/null || true

      - name: Build bootstrap packages from source
        id: build
        run: |
          PKG_INPUT="${{ github.event.inputs.package }}"
          BUILT=""
          FAILED=""

          build_one() {
            _pkg="$1"
            _recipe_dir="packages/bootstrap/${_pkg}"
            [ -f "${_recipe_dir}/recipe.toml" ] || { echo "WARNING: no bootstrap recipe for ${_pkg}"; return 0; }
            echo "=== Building ${_pkg} from source ==="
            if timeout 3600 jpkg build "${_recipe_dir}" --build-jpkg --output /var/cache/jpkg; then
              echo "SUCCESS: ${_pkg}"
              BUILT="${BUILT:+${BUILT},}${_pkg}"
            else
              echo "FAILED: ${_pkg}"
              FAILED="${FAILED:+${FAILED},}${_pkg}"
            fi
          }

          if [ -n "$PKG_INPUT" ]; then
            build_one "$PKG_INPUT"
          elif [ -f bootstrap/build-order.txt ]; then
            # Read build order from file (dependency-sorted)
            while IFS= read -r line; do
              line="$(echo "$line" | sed 's/#.*//' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              [ -z "$line" ] && continue
              build_one "$line"
            done < bootstrap/build-order.txt
          else
            # Fallback: iterate bootstrap recipes alphabetically
            echo "WARNING: bootstrap/build-order.txt not found, building in alphabetical order"
            for recipe in packages/bootstrap/*/recipe.toml; do
              pkg_name="$(basename "$(dirname "$recipe")")"
              build_one "$pkg_name"
            done
          fi

          echo "built=${BUILT}" >> "$GITHUB_OUTPUT"

          if [ -n "$FAILED" ]; then
            echo "::warning::Failed packages: ${FAILED}"
          fi
          echo "Built: ${BUILT:-none}"
          echo "Failed: ${FAILED:-none}"

      - name: List built packages
        run: ls -lh /var/cache/jpkg/*.jpkg 2>/dev/null || echo "(none)"

      - name: Upload packages to release (replaces pre-bootstrap versions)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=0
          for pkg in /var/cache/jpkg/*.jpkg; do [ -f "$pkg" ] && count=$((count+1)); done
          [ "$count" -eq 0 ] && { echo "No packages built."; exit 0; }
          gh release upload packages --repo "$GITHUB_REPOSITORY" --clobber /var/cache/jpkg/*.jpkg
          echo "Uploaded $count package(s) (x86_64)."

  # ── aarch64 bootstrap ──────────────────────────────────────────────────────
  bootstrap-aarch64:
    name: Bootstrap packages (aarch64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    outputs:
      built-packages: ${{ steps.build.outputs.built }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Download existing packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/jpkg-output
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --dir /tmp/jpkg-output 2>/dev/null || true

      - name: Build bootstrap packages in Alpine container
        id: build
        env:
          PKG_INPUT: ${{ github.event.inputs.package }}
        run: |
          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/jpkg-output:/var/cache/jpkg" \
            -w /workspace \
            -e PKG_INPUT="$PKG_INPUT" \
            alpine:latest sh -c '
              set -e
              apk update -q
              apk add -q \
                clang lld musl-dev make \
                curl patch tar xz bash \
                zstd-dev zstd-static \
                linux-headers git \
                cmake samurai \
                ncurses-dev openssl-dev \
                zlib-dev byacc m4 meson \
                python3 perl
              ln -sf /usr/bin/samu /usr/local/bin/ninja

              cd /workspace/packages/jpkg
              make CC=clang LDFLAGS="-static -fuse-ld=lld" jpkg
              install -m 755 jpkg /usr/local/bin/jpkg

              BUILT=""
              FAILED=""

              build_one() {
                _pkg="$1"
                _recipe_dir="/workspace/packages/bootstrap/${_pkg}"
                [ -f "${_recipe_dir}/recipe.toml" ] || { echo "WARNING: no bootstrap recipe for ${_pkg}"; return 0; }
                echo "=== Building ${_pkg} from source ==="
                if timeout 3600 jpkg build "${_recipe_dir}" --build-jpkg --output /var/cache/jpkg; then
                  echo "SUCCESS: ${_pkg}"
                  BUILT="${BUILT:+${BUILT},}${_pkg}"
                else
                  echo "FAILED: ${_pkg}"
                  FAILED="${FAILED:+${FAILED},}${_pkg}"
                fi
              }

              if [ -n "$PKG_INPUT" ]; then
                build_one "$PKG_INPUT"
              elif [ -f /workspace/bootstrap/build-order.txt ]; then
                # Read build order from file (dependency-sorted)
                while IFS= read -r line; do
                  line="$(echo "$line" | sed '"'"'s/#.*//'"'"' | sed '"'"'s/^[[:space:]]*//;s/[[:space:]]*$//'"'"')"
                  [ -z "$line" ] && continue
                  build_one "$line"
                done < /workspace/bootstrap/build-order.txt
              else
                # Fallback: iterate bootstrap recipes alphabetically
                echo "WARNING: bootstrap/build-order.txt not found, building in alphabetical order"
                for recipe in /workspace/packages/bootstrap/*/recipe.toml; do
                  pkg_name="$(basename "$(dirname "$recipe")")"
                  build_one "$pkg_name"
                done
              fi

              # Write built list to a file the host can read
              echo "$BUILT" > /var/cache/jpkg/.built-list
              if [ -n "$FAILED" ]; then
                echo "WARNING: Failed packages: ${FAILED}" >&2
              fi
              echo "Built: ${BUILT:-none}"
              echo "Failed: ${FAILED:-none}"
            '

          # Read built list from container output
          BUILT=""
          [ -f /tmp/jpkg-output/.built-list ] && BUILT="$(cat /tmp/jpkg-output/.built-list)"
          echo "built=${BUILT}" >> "$GITHUB_OUTPUT"
          rm -f /tmp/jpkg-output/.built-list

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=0
          for pkg in /tmp/jpkg-output/*.jpkg; do [ -f "$pkg" ] && count=$((count+1)); done
          [ "$count" -eq 0 ] && { echo "No packages built."; exit 0; }
          gh release upload packages --repo "$GITHUB_REPOSITORY" --clobber /tmp/jpkg-output/*.jpkg
          echo "Uploaded $count package(s) (aarch64)."

  # ── Graduate packages from pre_bootstrap ─────────────────────────────────
  graduate:
    name: Graduate packages (pre_bootstrap → false)
    needs: [bootstrap-x86_64, bootstrap-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Determine successfully built packages
        id: packages
        run: |
          # Intersect x86_64 and aarch64 built lists — only graduate if both succeeded
          BUILT_X86="${{ needs.bootstrap-x86_64.outputs.built-packages }}"
          BUILT_ARM="${{ needs.bootstrap-aarch64.outputs.built-packages }}"

          echo "x86_64 built: ${BUILT_X86:-none}"
          echo "aarch64 built: ${BUILT_ARM:-none}"

          # Find packages that built on BOTH architectures
          GRADUATED=""
          IFS=',' read -ra X86_LIST <<< "$BUILT_X86"
          for pkg in "${X86_LIST[@]}"; do
            [ -z "$pkg" ] && continue
            if echo ",$BUILT_ARM," | grep -q ",${pkg},"; then
              GRADUATED="${GRADUATED:+${GRADUATED} }${pkg}"
            fi
          done

          echo "Packages to graduate: ${GRADUATED:-none}"
          echo "graduated=${GRADUATED}" >> "$GITHUB_OUTPUT"

      - name: Update pre_bootstrap in core recipes
        id: update
        run: |
          GRADUATED="${{ steps.packages.outputs.graduated }}"
          [ -z "$GRADUATED" ] && { echo "No packages to graduate."; exit 0; }

          CHANGED=false
          for pkg in $GRADUATED; do
            recipe=""
            for _d in core develop extra; do
              [ -f "packages/${_d}/${pkg}/recipe.toml" ] && recipe="packages/${_d}/${pkg}/recipe.toml" && break
            done
            if [ -n "$recipe" ] && grep -q 'pre_bootstrap = true' "$recipe"; then
              sed -i 's/pre_bootstrap = true/pre_bootstrap = false/' "$recipe"
              echo "Graduated: ${pkg}"
              CHANGED=true
            fi
          done

          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Create PR with graduation changes
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GRADUATED="${{ steps.packages.outputs.graduated }}"
          BRANCH="bootstrap/graduate-$(date +%Y%m%d-%H%M%S)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packages/core/*/recipe.toml packages/develop/*/recipe.toml packages/extra/*/recipe.toml
          COMMIT_BODY="Packages built from source on both x86_64 and aarch64:"
          for pkg in $GRADUATED; do COMMIT_BODY="${COMMIT_BODY}
            - ${pkg}"; done
          COMMIT_BODY="${COMMIT_BODY}

          These packages no longer need APK extraction — they are built from
          source in the bootstrap pipeline."
          git commit -m "Graduate bootstrap packages: set pre_bootstrap = false" -m "$COMMIT_BODY"

          git push origin "$BRANCH"
          # Build PR body with package list
          PKG_LIST=""
          for pkg in $GRADUATED; do PKG_LIST="${PKG_LIST}- ${pkg}\n"; done

          gh pr create \
            --title "Graduate bootstrap packages from pre_bootstrap" \
            --body "$(printf '## Summary\nPackages built from source on both x86_64 and aarch64:\n\n%b\n## Effect\n- publish-packages.yml skips these (now handled by bootstrap-packages.yml)\n- Source-built versions replace the APK-extracted versions\n\nGenerated by bootstrap-packages.yml.' "$PKG_LIST")" \
            --base master

  # ── Regenerate INDEX ──────────────────────────────────────────────────────
  regenerate-index:
    name: Trigger INDEX regeneration
    needs: [bootstrap-x86_64, bootstrap-aarch64]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch publish-packages to rebuild INDEX
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish-packages.yml \
            --repo "$GITHUB_REPOSITORY" \
            --field package=""
