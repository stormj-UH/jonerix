name: Publish packages

on:
  # Push trigger disabled --- building locally and uploading manually.
  # Re-enable when ready to use CI for package builds.
  # push:
  #   branches: [main]
  #   paths:
  #     - 'packages/core/**'
  #     - 'packages/core/jpkg/**'
  #     - '.github/workflows/publish-packages.yml'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to build (leave empty to build all)'
        required: false
        default: ''
      arch:
        description: 'Architecture to build (all, x86_64, or aarch64)'
        required: false
        default: 'all'
      index_only:
        description: 'Only regenerate INDEX (skip package builds)'
        required: false
        default: 'false'
        type: boolean
      rebuild:
        description: 'Rebuild even if the package already exists in the release'
        required: false
        default: 'false'
        type: boolean

# Cancel in-progress runs when a new commit arrives --- safe because
# skip-if-published means the next run picks up where this one left off.
concurrency:
  group: publish-packages
  cancel-in-progress: true

env:
  # Fresh builder images were published 2026-04-13 with working LLVM,
  # LibreSSL, Python 3.14, Perl, and all smoke tests passing.
  BUILDER_IMAGE_X86_64: ghcr.io/stormj-uh/jonerix:builder-amd64
  BUILDER_IMAGE_AARCH64: ghcr.io/stormj-uh/jonerix:builder-arm64

jobs:
  # ------ Create the packages release once ------------------------------------------------------------------------------------------------------------------
  create-release:
    name: Create packages release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release if absent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view packages --repo "$GH_REPO" > /dev/null 2>&1; then
            gh release create packages \
              --repo "$GH_REPO" \
              --title "Package repository" \
              --notes "Pre-built jpkg packages. Updated automatically on push to master." \
              --prerelease
          fi

  # ── x86_64: checkout on Ubuntu host, build inside jonerix:builder ─────────
  # Uses the builder image which has the full LLVM toolchain with
  # compiler-rt, libunwind, and libc++ so packages link against
  # jonerix's runtime, not Alpine's.
  build-x86_64:
    name: Build packages (x86_64)
    if: ${{ !inputs.index_only && (inputs.arch == '' || inputs.arch == 'all' || inputs.arch == 'x86_64') }}
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          lfs: false

      - name: Restore jpkg binary cache (x86_64)
        uses: actions/cache@v5
        id: jpkg-cache-x86_64
        with:
          path: /tmp/jpkg-bin-x86_64
          key: jpkg-bin-x86_64-v3-${{ hashFiles('packages/core/jpkg/src/**', 'packages/core/jpkg/Cargo.toml', 'packages/core/jpkg/Cargo.lock', 'packages/core/jpkg/.cargo/config.toml', 'packages/core/jpkg/bin/jpkg-conform', 'packages/core/jpkg/vendor/**') }}

      - name: Download existing x86_64 packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/jpkg-published /tmp/jpkg-output
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --dir /tmp/jpkg-published 2>/dev/null || true
          echo "Existing x86_64 packages: $(ls /tmp/jpkg-published/*.jpkg 2>/dev/null | wc -l)"

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Materialise signing key (x86_64)
        env:
          JPKG_SIGNING_KEY: ${{ secrets.JPKG_SIGNING_KEY || '' }}
        run: |
          if [ -n "$JPKG_SIGNING_KEY" ]; then
            _key_file="$(mktemp /tmp/jpkg-signing-XXXXXX.sec)"
            printf '%s' "$JPKG_SIGNING_KEY" | base64 -d > "$_key_file"
            chmod 600 "$_key_file"
            echo "JPKG_SIGN_KEY=$_key_file" >> "$GITHUB_ENV"
            echo "jpkg signing key materialised."
          else
            echo "::warning::JPKG_SIGNING_KEY secret not configured — packages will be unsigned. See docs/signing-keys.md for setup."
          fi

      - name: Build packages in jonerix:builder container
        env:
          PKG_INPUT: ${{ inputs.package }}
          REBUILD_INPUT: ${{ inputs.rebuild && 'true' || 'false' }}
        run: |
          mkdir -p /tmp/jpkg-bin-x86_64
          docker run --rm --privileged --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/jpkg-output:/var/cache/jpkg" \
            -v "/tmp/jpkg-published:/var/cache/jpkg-published" \
            -v "/tmp/jpkg-bin-x86_64:/jpkg-bin" \
            ${JPKG_SIGN_KEY:+-v "${JPKG_SIGN_KEY}:${JPKG_SIGN_KEY}:ro"} \
            -w /workspace \
            -e PKG_INPUT="$PKG_INPUT" \
            -e REBUILD_INPUT="$REBUILD_INPUT" \
            ${JPKG_SIGN_KEY:+-e "JPKG_SIGN_KEY=$JPKG_SIGN_KEY"} \
            "$BUILDER_IMAGE_X86_64" /bin/sh /workspace/scripts/ci-build-x86_64.sh

      - name: Remove signing key (x86_64)
        if: always()
        run: |
          if [ -n "${JPKG_SIGN_KEY:-}" ]; then
            rm -f "$JPKG_SIGN_KEY"
            echo "Signing key removed."
          fi

      - name: Upload packages to release
        # Run even on partial build failure — see aarch64 sibling
        # step for rationale.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          manifest=/tmp/published-assets-x86_64.txt
          : > "$manifest"
          count=0
          for pkg in /tmp/jpkg-output/*.jpkg; do
            [ -f "$pkg" ] || continue
            basename "$pkg" >> "$manifest"
            count=$((count+1))
          done
          [ "$count" -eq 0 ] && { echo "No new packages to upload."; exit 0; }
          gh release upload packages --repo "$GITHUB_REPOSITORY" --clobber /tmp/jpkg-output/*.jpkg
          echo "Uploaded $count package(s) (x86_64)."

      - name: Upload published asset manifest
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: published-assets-x86_64
          path: /tmp/published-assets-x86_64.txt
          if-no-files-found: warn

  build-aarch64:
    name: Build packages (aarch64)
    if: ${{ !inputs.index_only && (inputs.arch == '' || inputs.arch == 'all' || inputs.arch == 'aarch64') }}
    needs: create-release
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          lfs: false

      - name: Restore jpkg binary cache (aarch64)
        uses: actions/cache@v5
        id: jpkg-cache-aarch64
        with:
          path: /tmp/jpkg-bin-aarch64
          key: jpkg-bin-aarch64-v3-${{ hashFiles('packages/core/jpkg/src/**', 'packages/core/jpkg/Cargo.toml', 'packages/core/jpkg/Cargo.lock', 'packages/core/jpkg/.cargo/config.toml', 'packages/core/jpkg/bin/jpkg-conform', 'packages/core/jpkg/vendor/**') }}

      - name: Download existing aarch64 packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/jpkg-published /tmp/jpkg-output
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --dir /tmp/jpkg-published 2>/dev/null || true
          echo "Existing aarch64 packages: $(ls /tmp/jpkg-published/*.jpkg 2>/dev/null | wc -l)"

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Materialise signing key (aarch64)
        env:
          JPKG_SIGNING_KEY: ${{ secrets.JPKG_SIGNING_KEY || '' }}
        run: |
          if [ -n "$JPKG_SIGNING_KEY" ]; then
            _key_file="$(mktemp /tmp/jpkg-signing-XXXXXX.sec)"
            printf '%s' "$JPKG_SIGNING_KEY" | base64 -d > "$_key_file"
            chmod 600 "$_key_file"
            echo "JPKG_SIGN_KEY=$_key_file" >> "$GITHUB_ENV"
            echo "jpkg signing key materialised."
          else
            echo "::warning::JPKG_SIGNING_KEY secret not configured — packages will be unsigned. See docs/signing-keys.md for setup."
          fi

      - name: Build packages in jonerix:builder container
        env:
          PKG_INPUT: ${{ inputs.package }}
          REBUILD_INPUT: ${{ inputs.rebuild && 'true' || 'false' }}
        run: |
          mkdir -p /tmp/jpkg-bin-aarch64
          docker run --rm --privileged --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/jpkg-output:/var/cache/jpkg" \
            -v "/tmp/jpkg-published:/var/cache/jpkg-published" \
            -v "/tmp/jpkg-bin-aarch64:/jpkg-bin" \
            ${JPKG_SIGN_KEY:+-v "${JPKG_SIGN_KEY}:${JPKG_SIGN_KEY}:ro"} \
            -w /workspace \
            -e PKG_INPUT="$PKG_INPUT" \
            -e REBUILD_INPUT="$REBUILD_INPUT" \
            ${JPKG_SIGN_KEY:+-e "JPKG_SIGN_KEY=$JPKG_SIGN_KEY"} \
            "$BUILDER_IMAGE_AARCH64" /bin/sh /workspace/scripts/ci-build-aarch64.sh

      - name: Remove signing key (aarch64)
        if: always()
        run: |
          if [ -n "${JPKG_SIGN_KEY:-}" ]; then
            rm -f "$JPKG_SIGN_KEY"
            echo "Signing key removed."
          fi

      - name: Upload packages to release
        # Run even when the preceding Build step exits 1 — a single
        # failed recipe shouldn't starve a batch of otherwise-good
        # packages of publication. Reproduced 2026-04-20 run
        # 24651362217: wpa_supplicant failed, 10+ other recipes
        # built cleanly but were never uploaded so INDEX stayed
        # stale and Pi 5 image builds couldn't pick up the new
        # anvil / openrc / openntpd.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          manifest=/tmp/published-assets-aarch64.txt
          : > "$manifest"
          count=0
          for pkg in /tmp/jpkg-output/*.jpkg; do
            [ -f "$pkg" ] || continue
            basename "$pkg" >> "$manifest"
            count=$((count+1))
          done
          [ "$count" -eq 0 ] && { echo "No new packages to upload."; exit 0; }
          gh release upload packages --repo "$GITHUB_REPOSITORY" --clobber /tmp/jpkg-output/*.jpkg
          echo "Uploaded $count package(s) (aarch64)."

      - name: Upload published asset manifest
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: published-assets-aarch64
          path: /tmp/published-assets-aarch64.txt
          if-no-files-found: warn

  # ------ Generate combined INDEX from all uploaded packages ------------------------------------------------------------
  index:
    name: Generate combined INDEX
    # Changed from `success || skipped` to `!= cancelled` so a partial
    # build failure still rebuilds INDEX over whatever DID upload.
    # Without this, one flaky recipe pins the whole fleet to the last
    # green INDEX and blocks downstream image builds indefinitely.
    if: ${{ always() && needs.build-x86_64.result != 'cancelled' && needs.build-aarch64.result != 'cancelled' }}
    needs: [create-release, build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          lfs: false

      - name: Install CI tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd

      - name: Download all packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/jpkg-index
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --dir /tmp/jpkg-index 2>/dev/null || true
          echo "Downloaded packages:"
          ls -lh /tmp/jpkg-index/*.jpkg 2>/dev/null || echo "(none)"

      - name: Extract jpkg binary from package
        run: |
          # Find the x86_64 jpkg package (already downloaded above).
          pkg=$(ls /tmp/jpkg-index/jpkg-*-x86_64.jpkg 2>/dev/null | sort -V | tail -1)
          if [ -z "$pkg" ] || [ ! -f "$pkg" ]; then
            echo "FATAL: no jpkg x86_64 package found in release"
            exit 1
          fi
          echo "Extracting jpkg from: $(basename "$pkg")"
          # jpkg format: 8B magic + 4B LE header_len + TOML + zstd(tar)
          mkdir -p /tmp/jpkg-extract
          hdr_len=$(od -An -v -tu4 -N4 -j8 "$pkg" | tr -d ' ')
          skip=$((12 + hdr_len))
          tail -c +$((skip + 1)) "$pkg" | zstd -dc | tar xf - -C /tmp/jpkg-extract
          sudo install -m 755 /tmp/jpkg-extract/bin/jpkg /usr/local/bin/jpkg
          jpkg --version

      - name: Download published asset manifests
        if: ${{ !inputs.index_only }}
        uses: actions/download-artifact@v5
        with:
          pattern: published-assets-*
          path: /tmp/published-assets
          merge-multiple: true

      - name: Build open release mirror list
        env:
          INDEX_ONLY_INPUT: ${{ inputs.index_only && 'true' || 'false' }}
          PKG_INPUT: ${{ inputs.package }}
        run: |
          manifest=/tmp/jpkg-index/.open-release-assets
          : > "$manifest"
          if [ -d /tmp/published-assets ]; then
            for list in /tmp/published-assets/*; do
              [ -f "$list" ] || continue
              cat "$list"
            done | sort -u > "$manifest"
          fi

          if [ ! -s "$manifest" ] && [ "$INDEX_ONLY_INPUT" = "true" ] && [ -n "$PKG_INPUT" ] && [ "$PKG_INPUT" != "all" ]; then
            read_meta_len() {
              dd if="$1" bs=1 skip=8 count=4 2>/dev/null | od -An -tu4 | tr -d ' \n'
            }

            read_meta() {
              _len="$(read_meta_len "$1")"
              [ -n "$_len" ] && [ "$_len" -gt 0 ] 2>/dev/null || return 1
              dd if="$1" bs=1 skip=12 count="$_len" 2>/dev/null
            }

            meta_field() {
              printf '%s' "$1" | grep "^$2 " | head -1 | sed 's/.*= *"\(.*\)"/\1/'
            }

            for pkg in /tmp/jpkg-index/*.jpkg; do
              [ -f "$pkg" ] || continue
              meta="$(read_meta "$pkg" || true)"
              [ -n "$meta" ] || continue
              name="$(meta_field "$meta" name)"
              [ "$name" = "$PKG_INPUT" ] || continue
              basename "$pkg"
            done | sort -u > "$manifest"
          fi

          echo "Open release mirror candidates:"
          cat "$manifest"
          echo "Candidate count: $(wc -l < "$manifest" | tr -d ' ')"

      - name: Generate INDEX.zst
        # scripts/gen-index.sh:
        #   - Deduplicates (name, arch) groups: highest version wins.
        #   - Writes stale asset filenames to $STALE_LIST for cleanup step.
        #   - Emits ::warning:: annotations on the PR/run for visibility.
        # Duplicates are always a bug — jonerix's package model is one
        # version per package name. If we ever need two versions, the newer
        # one should get a distinct package name (e.g. python313 vs python3).
        env:
          PKG_DIR: /tmp/jpkg-index
          OUT_INDEX: /tmp/jpkg-index/INDEX
          STALE_LIST: /tmp/jpkg-index/.stale-assets
          RECIPES_ROOT: ${{ github.workspace }}/packages
        run: |
          set -e
          "$GITHUB_WORKSPACE/scripts/gen-index.sh"
          echo "Generated INDEX:"
          cat "$OUT_INDEX"
          INDEX_ZST=/tmp/jpkg-index/INDEX.zst
          zstd -19 -f -o "$INDEX_ZST" "$OUT_INDEX"
          echo "INDEX.zst size: $(ls -lh "$INDEX_ZST" | awk '{print $5}')"

      - name: Delete stale (superseded) release assets
        # When the INDEX generator finds two versions of a (name, arch) —
        # e.g. after a version bump where the old .jpkg filename is still
        # on the release — remove the loser from the release. Otherwise the
        # next `gh release download` will redownload it and we'll rediscover
        # the duplicate every single run.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STALE_LIST: /tmp/jpkg-index/.stale-assets
        run: |
          if [ ! -s "$STALE_LIST" ]; then
            echo "No stale assets to delete."
            exit 0
          fi
          count=0
          while read -r asset; do
            [ -n "$asset" ] || continue
            echo "Deleting stale asset: $asset"
            if gh release delete-asset packages "$asset" --yes --repo "$GITHUB_REPOSITORY" 2>&1; then
              count=$((count + 1))
            else
              echo "  (delete failed — may already be gone)"
            fi
          done < "$STALE_LIST"
          echo "Removed $count stale asset(s)."

      - name: Sign INDEX.zst
        env:
          JPKG_SIGNING_KEY: ${{ secrets.JPKG_SIGNING_KEY }}
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          printf '%s' "$JPKG_SIGNING_KEY" | base64 -d > "$tmp/jpkg-sign.sec"
          chmod 600 "$tmp/jpkg-sign.sec"
          jpkg sign /tmp/jpkg-index/INDEX.zst --key "$tmp/jpkg-sign.sec"
          echo "INDEX.zst.sig: $(wc -c < /tmp/jpkg-index/INDEX.zst.sig) bytes"

      - name: Upload INDEX.zst and signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload packages \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            /tmp/jpkg-index/INDEX.zst \
            /tmp/jpkg-index/INDEX.zst.sig
          echo "INDEX.zst and INDEX.zst.sig uploaded."

      - name: Mirror open package release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JPKG_SIGNING_KEY: ${{ secrets.JPKG_SIGNING_KEY }}
          PKG_DIR: /tmp/jpkg-index
          STALE_LIST: /tmp/jpkg-index/.stale-assets
          OPEN_RELEASE_ASSET_LIST: /tmp/jpkg-index/.open-release-assets
          RECIPES_ROOT: ${{ github.workspace }}/packages
          PKG_INPUT: ${{ inputs.package }}
        run: sh "$GITHUB_WORKSPACE/scripts/sync-open-package-release.sh"
