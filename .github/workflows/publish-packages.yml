name: Publish packages

on:
  # Push trigger disabled — building locally and uploading manually.
  # Re-enable when ready to use CI for package builds.
  # push:
  #   branches: [master]
  #   paths:
  #     - 'packages/core/**'
  #     - 'packages/jpkg/**'
  #     - '.github/workflows/publish-packages.yml'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to build (leave empty to build all)'
        required: false
        default: ''
      index_only:
        description: 'Only regenerate INDEX (skip package builds)'
        required: false
        default: 'false'
        type: boolean

# Cancel in-progress runs when a new commit arrives — safe because
# skip-if-published means the next run picks up where this one left off.
concurrency:
  group: publish-packages
  cancel-in-progress: true

jobs:
  # ── Create the packages release once ──────────────────────────────────────
  create-release:
    name: Create packages release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release if absent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view packages --repo "$GH_REPO" > /dev/null 2>&1; then
            gh release create packages \
              --repo "$GH_REPO" \
              --title "Package repository" \
              --notes "Pre-built jpkg packages. Updated automatically on push to master." \
              --prerelease
          fi

  # ── x86_64: Alpine runner + jonerix packages for runtime deps ─────────────
  # Build tools (clang, cmake, samu) come from Alpine.
  # Runtime/library deps (LibreSSL, zlib, musl) come from the jonerix release
  # via the prebuilt bin/jpkg-x86_64 binary — so packages link against
  # jonerix's LibreSSL (libssl.so.58), not Alpine's OpenSSL 3.x.
  build-x86_64:
    name: Build packages (x86_64)
    if: ${{ github.event.inputs.index_only != 'true' }}
    needs: create-release
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --privileged
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Restore apk cache
        uses: actions/cache@v4
        with:
          path: /var/cache/apk
          key: apk-x86_64-${{ hashFiles('.github/workflows/publish-packages.yml') }}
          restore-keys: apk-x86_64-

      - name: Install build tools (no openssl-dev / zlib-dev from Alpine)
        run: |
          mkdir -p /var/cache/apk && ln -sf /var/cache/apk /etc/apk/cache
          apk update
          apk add \
            clang lld musl-dev make \
            curl patch tar xz bash \
            zstd \
            linux-headers git \
            github-cli \
            cmake samurai \
            byacc m4 meson python3 && \
          ln -sf /usr/bin/samu /usr/local/bin/ninja

      - name: Restore jpkg build cache
        uses: actions/cache@v4
        with:
          path: packages/jpkg/src/*.o
          key: jpkg-obj-x86_64-${{ hashFiles('packages/jpkg/src/**') }}

      - name: Build jpkg
        run: |
          cd packages/jpkg
          make CC=clang LDFLAGS="-static -fuse-ld=lld" jpkg
          install -m 755 jpkg /usr/local/bin/jpkg

      - name: Upload jpkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: jpkg-x86_64
          path: packages/jpkg/jpkg
          retention-days: 1

      - name: Install jonerix runtime deps (LibreSSL, zlib) from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the prebuilt jpkg x86_64 binary (already in /usr/local/bin/jpkg)
          # to install jonerix's LibreSSL and zlib into / so packages link against
          # the correct shared libraries (libssl.so.58, libz.so.1.x).
          jpkg update
          jpkg install openssl zlib || true
          # Ensure libz.so symlink exists for cmake find_package(ZLIB)
          [ -f /lib/libz.so ] || ln -sf libz.so.1 /lib/libz.so || true
          echo "=== Installed SSL libs ==="
          ls /lib/libssl* /lib/libcrypto* 2>/dev/null || true
          echo "=== OpenSSL headers ==="
          ls /include/openssl/ssl.h 2>/dev/null || true

      - name: Download existing packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /var/cache/jpkg-published /var/cache/jpkg
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --dir /var/cache/jpkg-published 2>/dev/null || true
          echo "Existing x86_64 packages: $(ls /var/cache/jpkg-published/*.jpkg 2>/dev/null | wc -l)"

      - name: Build packages
        run: |
          PKG_INPUT="${{ github.event.inputs.package }}"
          if [ -n "$PKG_INPUT" ]; then
            recipe_dir="packages/core/${PKG_INPUT}"
            [ -f "${recipe_dir}/recipe.toml" ] || { echo "ERROR: no recipe at ${recipe_dir}/recipe.toml"; exit 1; }
            echo "=== Building ${PKG_INPUT} (forced) ==="
            timeout 600 jpkg build "${recipe_dir}" --build-jpkg --output /var/cache/jpkg || echo "FAILED: ${PKG_INPUT}"
          else
            for recipe in packages/core/*/recipe.toml; do
              pkg_dir="$(dirname "$recipe")"
              pkg_name="$(basename "$pkg_dir")"
              pkg_ver=$(grep '^version' "$recipe" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
              expected="/var/cache/jpkg-published/${pkg_name}-${pkg_ver}-x86_64.jpkg"
              legacy="/var/cache/jpkg-published/${pkg_name}-${pkg_ver}.jpkg"
              if [ -f "$expected" ] || [ -f "$legacy" ]; then
                echo "=== Skipping ${pkg_name}-${pkg_ver} (already published) ==="
                continue
              fi
              echo "=== Building ${pkg_name} ==="
              timeout 300 jpkg build "${pkg_dir}" --build-jpkg --output /var/cache/jpkg || echo "FAILED: ${pkg_name}"
            done
          fi

      - name: List built packages
        run: ls -lh /var/cache/jpkg/*.jpkg 2>/dev/null || echo "(none)"

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=0
          for pkg in /var/cache/jpkg/*.jpkg; do [ -f "$pkg" ] && count=$((count+1)); done
          [ "$count" -eq 0 ] && { echo "No new packages to upload."; exit 0; }
          gh release upload packages --repo "$GITHUB_REPOSITORY" --clobber /var/cache/jpkg/*.jpkg
          echo "Uploaded $count package(s) (x86_64)."

  # ── aarch64: checkout on Ubuntu ARM host, build inside jonerix:all ────────
  # JS GitHub Actions (checkout@v4) don't work in Alpine containers on ARM64;
  # run bare on ubuntu-24.04-arm and exec the jonerix build via docker run.
  # jonerix:all already has clang, cmake, samu, LibreSSL 4.0.0, zlib — no apk.
  build-aarch64:
    name: Build packages (aarch64)
    if: ${{ github.event.inputs.index_only != 'true' }}
    needs: create-release
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Restore jpkg binary cache (aarch64)
        uses: actions/cache@v4
        id: jpkg-cache-aarch64
        with:
          path: /tmp/jpkg-bin-aarch64
          key: jpkg-bin-aarch64-${{ hashFiles('packages/jpkg/src/**') }}

      - name: Download existing aarch64 packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/jpkg-published /tmp/jpkg-output
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --dir /tmp/jpkg-published 2>/dev/null || true
          echo "Existing aarch64 packages: $(ls /tmp/jpkg-published/*.jpkg 2>/dev/null | wc -l)"

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build packages in jonerix:all container
        env:
          PKG_INPUT: ${{ github.event.inputs.package }}
        run: |
          mkdir -p /tmp/jpkg-bin-aarch64
          docker run --rm --privileged --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/jpkg-output:/var/cache/jpkg" \
            -v "/tmp/jpkg-published:/var/cache/jpkg-published" \
            -v "/tmp/jpkg-bin-aarch64:/jpkg-bin" \
            -w /workspace \
            -e PKG_INPUT="$PKG_INPUT" \
            ghcr.io/stormj-uh/jonerix:all /bin/zsh /workspace/scripts/ci-build-aarch64.sh

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=0
          for pkg in /tmp/jpkg-output/*.jpkg; do [ -f "$pkg" ] && count=$((count+1)); done
          [ "$count" -eq 0 ] && { echo "No new packages to upload."; exit 0; }
          gh release upload packages --repo "$GITHUB_REPOSITORY" --clobber /tmp/jpkg-output/*.jpkg
          echo "Uploaded $count package(s) (aarch64)."

  # ── Generate combined INDEX from all uploaded packages ────────────────────
  index:
    name: Generate combined INDEX
    if: ${{ always() }}
    needs: [create-release, build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --privileged
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install tools
        run: apk add --no-cache curl github-cli zstd

      - name: Download all packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /var/cache/jpkg
          gh release download packages \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jpkg" \
            --dir /var/cache/jpkg 2>/dev/null || true
          echo "Downloaded packages:"
          ls -lh /var/cache/jpkg/*.jpkg 2>/dev/null || echo "(none)"

      - name: Generate INDEX.zst
        run: |
          set -e
          INDEX_PLAIN=/var/cache/jpkg/INDEX
          INDEX_ZST=/var/cache/jpkg/INDEX.zst

          printf '[meta]\ntimestamp = "%s"\n\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$INDEX_PLAIN"

          for pkg in /var/cache/jpkg/*.jpkg; do
            [ -f "$pkg" ] || continue
            pkg_base="$(basename "$pkg")"

            meta_len=$(dd if="$pkg" bs=1 skip=8 count=4 2>/dev/null | od -An -tu4 | tr -d ' \n')
            if [ -z "$meta_len" ] || [ "$meta_len" -eq 0 ] 2>/dev/null; then
              echo "WARNING: could not read metadata from $pkg_base, skipping"
              continue
            fi

            meta=$(dd if="$pkg" bs=1 skip=12 count="$meta_len" 2>/dev/null)

            name=$(printf '%s' "$meta"    | grep '^name '        | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            version=$(printf '%s' "$meta" | grep '^version '     | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            license=$(printf '%s' "$meta" | grep '^license '     | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            desc=$(printf '%s' "$meta"    | grep '^description ' | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            arch=$(printf '%s' "$meta"    | grep '^arch '        | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            # Prefer recipe.toml (source of truth) for depends; fall back to .jpkg metadata
            recipe_file="${GITHUB_WORKSPACE}/packages/core/${name}/recipe.toml"
            if [ -f "$recipe_file" ]; then
              depends_arr=$(grep '^runtime = ' "$recipe_file" | head -1 | sed 's/^runtime = //')
            else
              depends_arr=$(printf '%s' "$meta" | grep '^runtime = \[' | head -1 | sed 's/^runtime = //')
            fi
            [ "$depends_arr" = "[]" ] && depends_arr=""

            sha256=$(sha256sum "$pkg" | cut -d' ' -f1)
            size_val=$(stat -c %s "$pkg" 2>/dev/null || echo 0)

            [ -z "$name" ]    && name="$(echo "$pkg_base" | sed 's/-[^-]*-[^-]*\.jpkg$//')"
            [ -z "$version" ] && version="0"
            [ -z "$arch" ]    && arch="x86_64"

            # Section key is "name-arch" so x86_64 and aarch64 packages coexist.
            # jpkg's repo_find_package() tries "name-arch" before falling back to "name".
            section="${name}-${arch}"

            {
              printf '[%s]\n' "$section"
              printf 'version = "%s"\n' "$version"
              [ -n "$license" ]     && printf 'license = "%s"\n' "$license"
              [ -n "$desc" ]        && printf 'description = "%s"\n' "$desc"
              printf 'arch = "%s"\n' "$arch"
              [ -n "$depends_arr" ] && printf 'depends = %s\n' "$depends_arr"
              [ -n "$sha256" ]      && printf 'sha256 = "%s"\n' "$sha256"
              printf 'size = %s\n' "$size_val"
              printf '\n'
            } >> "$INDEX_PLAIN"

            echo "  indexed: ${section}-${version}"
          done

          echo "Generated INDEX:"
          cat "$INDEX_PLAIN"

          zstd -19 -f -o "$INDEX_ZST" "$INDEX_PLAIN"
          echo "INDEX.zst size: $(ls -lh "$INDEX_ZST" | awk '{print $5}')"

      - name: Install jpkg for signing
        run: |
          install -m 755 "$GITHUB_WORKSPACE/bin/jpkg-x86_64" /usr/local/bin/jpkg
          jpkg --version || true

      - name: Sign INDEX.zst
        env:
          JPKG_SIGNING_KEY: ${{ secrets.JPKG_SIGNING_KEY }}
        run: |
          printf '%s' "$JPKG_SIGNING_KEY" | base64 -d > /tmp/jpkg-sign.sec
          chmod 600 /tmp/jpkg-sign.sec
          jpkg sign /var/cache/jpkg/INDEX.zst --key /tmp/jpkg-sign.sec
          rm -f /tmp/jpkg-sign.sec
          echo "INDEX.zst.sig: $(wc -c < /var/cache/jpkg/INDEX.zst.sig) bytes"

      - name: Upload INDEX.zst and signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload packages \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            /var/cache/jpkg/INDEX.zst \
            /var/cache/jpkg/INDEX.zst.sig
          echo "INDEX.zst and INDEX.zst.sig uploaded."
