name: Build from source

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target architecture'
        required: true
        type: choice
        options:
          - both
          - aarch64
          - x86_64
        default: both
      push_image:
        description: 'Push jonerix:all image to GHCR after build'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (show what would be built without building)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── aarch64: native ARM64 runner, jonerix rootfs via docker export ────────
  # Extract jonerix:minimal rootfs to disk, then run build-all.sh natively
  # using the jonerix toolchain. No Docker container overhead.
  build-aarch64:
    name: Build all packages (aarch64)
    if: inputs.architecture == 'aarch64' || inputs.architecture == 'both'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore package cache (aarch64)
        uses: actions/cache@v4
        with:
          path: /tmp/jpkg-output
          key: build-from-source-aarch64-${{ hashFiles('bootstrap/build-order.txt') }}
          restore-keys: build-from-source-aarch64-

      - name: Extract jonerix:minimal rootfs and set up chroot
        run: |
          IMAGE=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:minimal' | tr '[:upper:]' '[:lower:]')
          docker pull "$IMAGE"
          sudo mkdir -p /jonerix
          CID=$(docker create "$IMAGE" /bin/true)
          docker export "$CID" | sudo tar -xf - -C /jonerix
          docker rm "$CID" > /dev/null
          # Mount filesystems for chroot
          sudo mount -t proc proc /jonerix/proc
          sudo mount -t sysfs sys /jonerix/sys
          sudo mount --bind /dev /jonerix/dev
          sudo mount --bind /tmp /jonerix/tmp
          sudo mkdir -p /jonerix/workspace
          sudo mount --bind "$GITHUB_WORKSPACE" /jonerix/workspace
          echo "Extracted jonerix:minimal to /jonerix"

      - name: Install build toolchain via jpkg
        if: ${{ !inputs.dry_run }}
        run: |
          sudo chroot /jonerix /bin/sh -c '
            jpkg update
            for pkg in llvm cmake bmake samurai flex bc byacc perl python3 pip \
                       zsh ncurses zlib xz zstd lz4 curl bsdtar libcxx libatomic; do
              jpkg install "$pkg" || echo "WARN: $pkg"
            done
            # Build symlinks
            ln -sf clang   /bin/cc      2>/dev/null || true
            ln -sf clang++ /bin/c++     2>/dev/null || true
            ln -sf ld.lld  /bin/ld      2>/dev/null || true
            ln -sf bmake   /bin/make    2>/dev/null || true
            ln -sf samu    /bin/ninja   2>/dev/null || true
            ln -sf python3 /bin/python  2>/dev/null || true
            ln -sf byacc   /bin/yacc    2>/dev/null || true
            ln -sf flex    /bin/lex     2>/dev/null || true
            LLVM_BIN=
            for d in /lib/llvm*/bin; do [ -d "$d" ] && LLVM_BIN="$d" && break; done
            if [ -n "$LLVM_BIN" ]; then
              for tool in ar nm ranlib strip objcopy objdump readelf; do
                ln -sf "$LLVM_BIN/llvm-$tool" "/bin/$tool"       2>/dev/null || true
                ln -sf "$LLVM_BIN/llvm-$tool" "/bin/llvm-$tool"  2>/dev/null || true
              done
            fi
          '
          echo "Build toolchain installed"

      - name: Build samurai (samu) from source
        if: ${{ !inputs.dry_run }}
        run: |
          sudo chroot /jonerix /bin/sh -c '
            cd /tmp
            tar xf /workspace/sources/samurai-1.2.tar.gz
            cd samurai-1.2
            cc -O2 -o samu *.c
            install -m 755 samu /bin/samu
            ln -sf samu /bin/ninja
            samu --version
          '

      - name: Build jpkg from source
        if: ${{ !inputs.dry_run }}
        run: |
          sudo chroot /jonerix /bin/sh -c '
            cd /workspace/packages/jpkg && samu
            install -m 755 jpkg /bin/jpkg
            jpkg --version
          '

      - name: Build all packages from source
        run: |
          mkdir -p /tmp/jpkg-output
          DRY_RUN_FLAG=""
          [ "${{ inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          if [ -n "$DRY_RUN_FLAG" ]; then
            # Dry run: use Ubuntu's bash/grep/sed (no musl needed)
            bash bootstrap/build-all.sh --output /tmp/jpkg-output --dry-run
          else
            # Real build: run inside jonerix chroot
            sudo chroot /jonerix /bin/sh -c "
              mkdir -p /tmp/jpkg-output
              sh /workspace/bootstrap/build-all.sh --output /tmp/jpkg-output
            "
          fi

      - name: List built packages
        run: ls -lhS /tmp/jpkg-output/*.jpkg 2>/dev/null || echo "(none)"

      - name: Upload packages to release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=0
          for pkg in /tmp/jpkg-output/*.jpkg; do [ -f "$pkg" ] && count=$((count+1)); done
          [ "$count" -eq 0 ] && { echo "No packages built."; exit 0; }
          gh release upload packages --repo "$GITHUB_REPOSITORY" --clobber /tmp/jpkg-output/*.jpkg
          echo "Uploaded $count package(s) (aarch64)."

      - name: Upload packages as artifacts
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: packages-aarch64
          path: /tmp/jpkg-output/*.jpkg
          if-no-files-found: warn
          retention-days: 7

      - name: Cleanup mounts
        if: always()
        run: |
          sudo umount /jonerix/workspace 2>/dev/null || true
          sudo umount /jonerix/tmp 2>/dev/null || true
          sudo umount /jonerix/dev 2>/dev/null || true
          sudo umount /jonerix/sys 2>/dev/null || true
          sudo umount /jonerix/proc 2>/dev/null || true

  # ── x86_64: Alpine container (no x86_64 jonerix:minimal exists yet) ──────
  build-x86_64:
    name: Build all packages (x86_64)
    if: inputs.architecture == 'x86_64' || inputs.architecture == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: alpine:latest
      options: --privileged
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Restore package cache (x86_64)
        uses: actions/cache@v4
        with:
          path: /var/cache/jpkg
          key: build-from-source-x86_64-${{ hashFiles('bootstrap/build-order.txt') }}
          restore-keys: build-from-source-x86_64-

      - name: Install build dependencies
        run: |
          apk update -q
          apk add -q \
            clang lld musl-dev make \
            curl patch tar xz bash \
            zstd-dev zstd-static \
            linux-headers git \
            cmake samurai \
            ncurses-dev openssl-dev \
            zlib-dev byacc m4 meson \
            python3 perl github-cli
          ln -sf /usr/bin/samu /usr/local/bin/ninja

      - name: Build jpkg
        run: |
          cd packages/jpkg && samu
          install -m 755 jpkg /usr/local/bin/jpkg

      - name: Build all packages from source
        run: |
          mkdir -p /var/cache/jpkg
          DRY_RUN_FLAG=""
          [ "${{ inputs.dry_run }}" = "true" ] && DRY_RUN_FLAG="--dry-run"
          sh bootstrap/build-all.sh --output /var/cache/jpkg $DRY_RUN_FLAG

      - name: List built packages
        run: ls -lhS /var/cache/jpkg/*.jpkg 2>/dev/null || echo "(none)"

      - name: Upload packages to release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=0
          for pkg in /var/cache/jpkg/*.jpkg; do [ -f "$pkg" ] && count=$((count+1)); done
          [ "$count" -eq 0 ] && { echo "No packages built."; exit 0; }
          gh release upload packages --repo "$GITHUB_REPOSITORY" --clobber /var/cache/jpkg/*.jpkg
          echo "Uploaded $count package(s) (x86_64)."

      - name: Upload packages as artifacts
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: packages-x86_64
          path: /var/cache/jpkg/*.jpkg
          if-no-files-found: warn
          retention-days: 7

  # ── Regenerate INDEX ─────────────────────────────────────────────────────
  regenerate-index:
    name: Regenerate package INDEX
    needs: [build-aarch64, build-x86_64]
    if: |
      always() &&
      !inputs.dry_run &&
      (needs.build-aarch64.result == 'success' || needs.build-x86_64.result == 'success')
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install tools
        run: apk add --no-cache clang lld musl-dev samurai curl github-cli zstd

      - name: Build jpkg
        run: |
          cd packages/jpkg && samu
          install -m 755 jpkg /usr/local/bin/jpkg

      - name: Download all packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /var/cache/jpkg
          gh release download packages --repo "$GITHUB_REPOSITORY" --pattern "*.jpkg" --dir /var/cache/jpkg || true
          ls /var/cache/jpkg/*.jpkg 2>/dev/null | wc -l

      - name: Generate INDEX
        run: |
          set -e
          IDX=/var/cache/jpkg/INDEX
          printf '[meta]\ntimestamp = "%s"\n\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$IDX"
          for pkg in /var/cache/jpkg/*.jpkg; do
            [ -f "$pkg" ] || continue
            ml=$(dd if="$pkg" bs=1 skip=8 count=4 2>/dev/null | od -An -tu4 | tr -d ' \n')
            [ -z "$ml" ] || [ "$ml" -eq 0 ] 2>/dev/null && continue
            m=$(dd if="$pkg" bs=1 skip=12 count="$ml" 2>/dev/null)
            n=$(printf '%s' "$m" | grep '^name '    | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            v=$(printf '%s' "$m" | grep '^version ' | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            l=$(printf '%s' "$m" | grep '^license ' | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            d=$(printf '%s' "$m" | grep '^description ' | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            a=$(printf '%s' "$m" | grep '^arch '    | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            rf="packages/bootstrap/${n}/recipe.toml"
            [ -f "$rf" ] || rf="packages/core/${n}/recipe.toml"
            if [ -f "$rf" ]; then
              deps=$(grep '^runtime = ' "$rf" | head -1 | sed 's/^runtime = //')
            else
              deps=$(printf '%s' "$m" | grep '^runtime = ' | head -1 | sed 's/^runtime = //')
            fi
            [ "$deps" = "[]" ] && deps=""
            s=$(sha256sum "$pkg" | cut -d' ' -f1)
            sz=$(stat -c %s "$pkg" 2>/dev/null || echo 0)
            [ -z "$n" ] && continue
            [ -z "$a" ] && a="x86_64"
            printf '[%s-%s]\nversion = "%s"\n' "$n" "$a" "$v" >> "$IDX"
            [ -n "$l" ] && printf 'license = "%s"\n' "$l" >> "$IDX"
            [ -n "$d" ] && printf 'description = "%s"\n' "$d" >> "$IDX"
            printf 'arch = "%s"\n' "$a" >> "$IDX"
            [ -n "$deps" ] && printf 'depends = %s\n' "$deps" >> "$IDX"
            printf 'sha256 = "%s"\nsize = %s\n\n' "$s" "$sz" >> "$IDX"
          done
          zstd -19 -f -o /var/cache/jpkg/INDEX.zst "$IDX"

      - name: Sign INDEX
        env:
          JPKG_SIGNING_KEY: ${{ secrets.JPKG_SIGNING_KEY }}
        run: |
          printf '%s' "$JPKG_SIGNING_KEY" | base64 -d > /tmp/k.sec
          jpkg sign /var/cache/jpkg/INDEX.zst --key /tmp/k.sec
          rm -f /tmp/k.sec

      - name: Upload INDEX
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload packages --repo "$GITHUB_REPOSITORY" --clobber \
            /var/cache/jpkg/INDEX.zst /var/cache/jpkg/INDEX.zst.sig

  # ── Optional: push jonerix:all image ─────────────────────────────────────
  push-image:
    name: Push jonerix:all image
    needs: [regenerate-index]
    if: inputs.push_image && needs.regenerate-index.result == 'success'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: refs
        run: echo "minimal=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:minimal' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.all.new
          push: true
          tags: ghcr.io/stormj-uh/jonerix:all
          platforms: linux/arm64
          build-args: MINIMAL_IMAGE=${{ steps.refs.outputs.minimal }}
          cache-from: type=gha,scope=all-v5
          cache-to: type=gha,mode=max,scope=all-v5
