name: Mirror to Forgejo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  checks: read
  contents: read
  statuses: read

concurrency:
  group: mirror-to-forgejo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout canonical repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for green CI
        shell: sh
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -eu

          checks_file="${RUNNER_TEMP}/check-runs.json"
          status_file="${RUNNER_TEMP}/combined-status.json"
          attempts=120

          sleep 30
          while [ "${attempts}" -gt 0 ]; do
            gh api "repos/${REPO}/commits/${SHA}/check-runs?per_page=100" --paginate >"${checks_file}"
            gh api "repos/${REPO}/commits/${SHA}/status" >"${status_file}"

            bad_checks=$(
              jq -r --arg run_id "${RUN_ID}" '
                .check_runs[]?
                | select((((.details_url // "") | contains("/actions/runs/" + $run_id)) | not))
                | select(.status == "completed")
                | select((.conclusion // "") as $c | ((["success", "skipped", "neutral"] | index($c)) | not))
                | "\(.name): \(.conclusion)"
              ' "${checks_file}"
            )
            if [ -n "${bad_checks}" ]; then
              printf 'Refusing to mirror because CI is not green:\n%s\n' "${bad_checks}"
              exit 1
            fi

            bad_statuses=$(
              jq -r '
                .statuses[]?
                | select(.state != "success" and .state != "pending")
                | "\(.context): \(.state)"
              ' "${status_file}"
            )
            if [ -n "${bad_statuses}" ]; then
              printf 'Refusing to mirror because commit statuses are not green:\n%s\n' "${bad_statuses}"
              exit 1
            fi

            pending_checks=$(
              jq -r --arg run_id "${RUN_ID}" '
                .check_runs[]?
                | select((((.details_url // "") | contains("/actions/runs/" + $run_id)) | not))
                | select(.status != "completed")
                | "\(.name): \(.status)"
              ' "${checks_file}"
            )
            pending_statuses=$(
              jq -r '
                .statuses[]?
                | select(.state == "pending")
                | "\(.context): pending"
              ' "${status_file}"
            )
            if [ -z "${pending_checks}" ] && [ -z "${pending_statuses}" ]; then
              exit 0
            fi

            printf 'Waiting for CI before mirroring:\n%s\n%s\n' "${pending_checks}" "${pending_statuses}"
            attempts=$((attempts - 1))
            sleep 30
          done

          printf 'Timed out waiting for CI to finish.\n'
          exit 1

      - name: Push main to Forgejo mirror
        shell: sh
        env:
          FORGEJO_MIRROR_TOKEN: ${{ secrets.FORGEJO_MIRROR_TOKEN }}
        run: |
          set -eu

          git remote add forgejo-mirror "https://jonerik:${FORGEJO_MIRROR_TOKEN}@castle.great-morpho.ts.net:3000/jonerik/jonerix.git"
          git fetch forgejo-mirror main
          git push --force-with-lease=refs/heads/main forgejo-mirror HEAD:refs/heads/main
          git push forgejo-mirror --tags
