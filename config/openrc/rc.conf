# /etc/rc.conf — OpenRC global configuration.
#
# Documentation: rc.conf(5) and OpenRC's user guide.  Every variable
# is optional; OpenRC ships sane defaults if unset.  Comments below
# call out the choices that matter on jonerix.

# ── Logging ─────────────────────────────────────────────────────────────
# Capture all init.d stdout/stderr to /var/log/rc.log.  Off by default;
# turn on if you want a single file with every service's output (saves
# poking at /var/log/<service>.log for each).
#rc_logger="YES"

# Strip ANSI colour codes from rc.log even when stdout is a tty.
#rc_log_no_colors="YES"

# ── Parallel start ──────────────────────────────────────────────────────
# Start services in parallel where dependencies allow.  Cuts boot time
# noticeably (~25-40%).  Some legacy services need YES_OR_NO toggles
# (e.g. fsck doesn't parallelise); leave those alone.
rc_parallel="YES"

# How aggressive — number of concurrent service starts.  "0" = ncpu.
rc_shell_path="/bin/mksh"

# ── Console output ──────────────────────────────────────────────────────
# Colour codes on console.  Some serial-only installs prefer this off
# (raw ANSI on a recording terminal is noisy).  Default on; comment in
# the profile/minimal layer for cloud VMs if you don't want it.
rc_colors="YES"

# How verbose to print service-start lines.  "normal" is the default.
# "verbose" adds the started/stopped reason; "quiet" drops the OK lines.
rc_verbose="normal"

# ── Hotplugging ─────────────────────────────────────────────────────────
# jonerix uses mdev (toybox applet) or systemd-udevd via the udev
# package — leave OpenRC's own hotplug off so the two don't fight.
rc_hotplug="!*"

# ── Cgroup mode ─────────────────────────────────────────────────────────
# jonerix is cgroup v2 unified hierarchy.  OpenRC happily reads
# /sys/fs/cgroup as v2.
rc_cgroup_mode="unified"

# Move runaway services to their own cgroup on stop so the parent
# can be killed cleanly.  Required for `rc-service X stop` to reliably
# kill child processes.
rc_cgroup_cleanup="YES"

# ── Banner ──────────────────────────────────────────────────────────────
# Show OpenRC's start banner on console.  Off — jonerix has its own
# boot-trace service that prints what matters; OpenRC's banner just
# eats vertical space.
rc_send_sighup="NO"
