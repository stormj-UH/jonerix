# /etc/dhcpcd.conf — jonerix DHCP client defaults.
#
# dhcpcd is the canonical DHCPv4 + DHCPv6 + IPv6 RA client on
# jonerix.  Documentation: dhcpcd.conf(5).

# ── Identity ────────────────────────────────────────────────────────────
# Use a DUID-LLT (link-layer + time) for IPv6 leases.  Generated once
# on first boot and persisted to /var/lib/dhcpcd/duid; subsequent
# boots reuse it so the same MAC consistently gets the same IPv6
# address from a stable router.
duid

# Don't broadcast the hostname in the DHCP request.  Privacy-friendly
# default; the network admin already knows your MAC.  Comment out if
# your local DHCP server uses hostname-based reservation.
#hostname

# Persist obtained leases across reboots — `dhcpcd -k` releases, but
# the default behaviour without -k is to re-lease the previously held
# address if it's still on offer.  Reduces boot-time delay on the
# common case (network unchanged since last boot).
persistent

# ── Routes ──────────────────────────────────────────────────────────────
# Default route metric.  dhcpcd uses interface index by default; this
# explicit value keeps eth0 winning over wlan0 when both are up.
#metric eth0 100

# ── Options to request from the server ──────────────────────────────────
option domain_name_servers, domain_name, domain_search, host_name
option classless_static_routes
option interface_mtu

# Require the next-server / boot-file pair for PXE-style installs.
require dhcp_server_identifier

# ── Slaac (IPv6 stateless autoconfiguration) ────────────────────────────
# Use a stable random IPv6 instead of EUI-64 (which leaks the MAC).
slaac private

# ── Privacy extensions (RFC 4941 temporary IPv6 addresses) ──────────────
# Generate ephemeral source addresses for outbound IPv6 connections.
# The stable SLAAC address is still used for incoming.
ipv6ra_noautoconf

# ── Per-interface overrides ─────────────────────────────────────────────
# Override the defaults above for specific interfaces.  Uncomment and
# edit as needed.
#interface eth0
#  static ip_address=192.168.1.50/24
#  static routers=192.168.1.1
#  static domain_name_servers=192.168.1.1 1.1.1.1

# Router-profile hosts should `denyinterfaces eth1` here (or
# whichever interface is the LAN-side) so dhcpcd doesn't try to
# request a lease on a network it's supposed to BE.
#denyinterfaces eth1
