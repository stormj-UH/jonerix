# /etc/host.conf — name-resolution order for glibc-style apps.
#
# musl ignores this file entirely (musl always does hosts then DNS
# with the keys multi+nospoof+nowarn baked in).  Some glibc binaries
# that occasionally end up on jonerix — proprietary cloud agents,
# Java's getByName, a few Go binaries that don't use the pure-Go
# resolver — DO read it.  Ship a sane default so they behave.

# Try /etc/hosts first, then fall back to DNS.
order hosts,bind

# Return all matching addresses for a name (RFC 1101).  Required for
# IPv4+IPv6 dual-stack to work on the glibc apps that read this.
multi on
