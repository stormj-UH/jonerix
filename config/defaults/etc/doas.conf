# /etc/doas.conf — jonerix privilege escalation configuration
#
# Members of the 'wheel' group may execute commands as root.
# A password is required by default (no NOPASSWD).
#
# See doas.conf(5) for syntax details.

# Allow wheel group members to run commands as root
permit persist :wheel

# Allow wheel group members to run shutdown/reboot without password
permit nopass :wheel cmd reboot
permit nopass :wheel cmd poweroff
permit nopass :wheel cmd halt

# Deny root from using doas (use su if needed)
deny root
