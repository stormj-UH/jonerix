# /etc/locale.conf — system-wide locale.
#
# Read by OpenRC's hostname / sysinit path and exported to every login
# session via /etc/profile.  Per-user overrides go in ~/.profile.
#
# musl ships UTF-8 by default and only really cares about LANG for
# strftime / collation — most "locale" magic on jonerix is just
# "are bytes UTF-8?".  C.UTF-8 is the safe choice; en_US.UTF-8 is
# also fine if you've got the localedata installed.

LANG=C.UTF-8
LC_COLLATE=C
