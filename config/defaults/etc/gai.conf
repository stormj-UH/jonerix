# /etc/gai.conf — RFC 3484 getaddrinfo source-address selection rules.
#
# musl (jonerix's libc) ignores this file entirely — its getaddrinfo
# implementation is hard-coded to RFC 6724 defaults with no override
# hook.  Glibc binaries that occasionally end up on jonerix DO read
# it.  Ship empty (i.e. use the compiled-in defaults) — the upstream
# glibc default is already RFC 6724 which is what almost everyone
# wants.
#
# If you need to bias one address family over another for a specific
# corner case (e.g. force IPv4-first on a flaky IPv6 network), the
# format is documented at gai.conf(5).  Common one-liner to prefer
# IPv4 over IPv6 globally (NOT a good idea outside corporate jails):
#
#   precedence ::ffff:0:0/96  100
#
# Leave commented; if you uncomment any rule the compiled-in table
# is replaced entirely with this file's contents.
