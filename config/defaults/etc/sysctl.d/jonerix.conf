# jonerix sysctl configuration
# Optimized for containerized Node.js / Python workloads on musl libc.
#
# Settings marked [HOST-ONLY] can only be set on the host kernel, not
# inside a container (requires CAP_SYS_ADMIN or privileged mode).
# Settings marked [CONTAINER-OK] can be set inside unprivileged containers
# if the sysctl is namespaced.
#
# Apply: sysctl -p /etc/sysctl.d/jonerix.conf

# =========================================================================
# Memory
# =========================================================================

# Allow overcommit — Node.js V8 and Python both allocate large virtual
# address spaces (V8 uses mmap for heap segments). Mode 1 = always allow.
# Mode 0 (default heuristic) can cause spurious ENOMEM on fork().
# [HOST-ONLY]
vm.overcommit_memory = 1

# Low swappiness — prefer keeping application pages in RAM.
# Containerized workloads should avoid swap; 10 is a good safety net
# that still allows the kernel to swap under extreme pressure.
# [HOST-ONLY]
vm.swappiness = 10

# V8 (Node.js) uses mmap for heap segments. Default 65530 is usually
# sufficient, but Elasticsearch and large Node.js apps may need more.
# 262144 is safe for servers with >=4GB RAM.
# [HOST-ONLY]
vm.max_map_count = 262144

# Reclaim dentry/inode caches more aggressively — containerized apps
# rarely benefit from large VFS caches.
# [HOST-ONLY]
vm.vfs_cache_pressure = 150

# =========================================================================
# Network
# =========================================================================

# Max listen backlog — default 4096 is fine for most Node.js servers.
# Increase if running high-connection-rate reverse proxies.
# [CONTAINER-OK: namespaced since Linux 4.18]
net.core.somaxconn = 4096

# TCP keepalive — detect dead connections faster.
# Default 7200s (2hr) is too slow for containerized microservices.
# 60s idle, 10s interval, 6 probes = dead connection detected in ~2 min.
# [CONTAINER-OK: namespaced]
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6

# Ephemeral port range — widen for high-connection-count services.
# Default 32768-60999; widen low end for more outbound connections.
# [CONTAINER-OK: namespaced since Linux 4.18]
net.ipv4.ip_local_port_range = 1024 65535

# TCP SYN backlog — per-socket SYN queue for connection bursts.
# [HOST-ONLY]
net.ipv4.tcp_max_syn_backlog = 4096

# Enable TCP fast open for both client and server.
# Reduces latency for repeated connections (common in microservices).
# [HOST-ONLY]
net.ipv4.tcp_fastopen = 3

# Reuse TIME_WAIT sockets for new outbound connections.
# Essential for high-throughput HTTP clients (curl, Node.js fetch).
# [HOST-ONLY]
net.ipv4.tcp_tw_reuse = 1

# Increase default and max socket receive/send buffers.
# Helps throughput for streaming and large HTTP responses.
# [HOST-ONLY]
net.core.rmem_default = 262144
net.core.wmem_default = 262144
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# Allow ALL unprivileged users to send ICMP echo (ping) via the
# SOCK_DGRAM/IPPROTO_ICMP path.  Default is `1 0` (an empty
# range — nobody is allowed) which makes `ping` fail with
# "Permission denied" for every non-root user.  Toybox and busybox
# ping use this path, so without this every fresh jonerix install
# can't ping out of the box.  Range below = "gid 0 through gid
# INT_MAX", i.e. every group.  See ip-sysctl(7).
# [HOST-ONLY — namespaced in newer kernels but default still 1 0 there]
net.ipv4.ping_group_range = 0 2147483647

# =========================================================================
# File descriptors
# =========================================================================

# System-wide file descriptor limit. Each Node.js connection uses one fd.
# Default ~100k is low for servers handling thousands of connections.
# [HOST-ONLY]
fs.file-max = 1048576

# inotify watches — Node.js dev tools (nodemon, webpack, vite) watch
# thousands of files. Default 8192 causes ENOSPC on large projects.
# [HOST-ONLY]
fs.inotify.max_user_watches = 524288

# inotify instances — one per watching process.
# [HOST-ONLY]
fs.inotify.max_user_instances = 1024

# =========================================================================
# Process limits
# =========================================================================

# Max PIDs — default 32768 is fine for most containers.
# Increase if running many short-lived worker processes.
# [HOST-ONLY]
kernel.pid_max = 131072

# Max threads — Node.js uses a thread pool (libuv, default 4 threads)
# plus V8 background threads. Python's threading is lightweight.
# Default is usually sufficient; set explicitly for predictability.
# [HOST-ONLY]
kernel.threads-max = 65536

# =========================================================================
# Security
# =========================================================================

# Full ASLR — always enabled. Protects against memory corruption exploits.
# [HOST-ONLY]
kernel.randomize_va_space = 2

# Restrict dmesg to root — prevents information leakage from kernel logs.
# [HOST-ONLY]
kernel.dmesg_restrict = 1

# Restrict kernel pointer exposure in /proc — prevents KASLR bypass.
# [HOST-ONLY]
kernel.kptr_restrict = 2

# Disable SysRq key — not useful on headless servers, potential abuse vector.
# [HOST-ONLY]
kernel.sysrq = 0

# Restrict perf_event — prevent unprivileged performance monitoring
# which can be used for side-channel attacks.
# [HOST-ONLY]
kernel.perf_event_paranoid = 3

# Restrict unprivileged BPF — mitigates Spectre-style attacks via BPF JIT.
# [HOST-ONLY]
kernel.unprivileged_bpf_disabled = 1

# Harden BPF JIT against spraying attacks.
# [HOST-ONLY]
net.core.bpf_jit_harden = 2

# =========================================================================
# Container-specific notes
# =========================================================================
# The following settings are relevant but NOT sysctl-configurable.
# They must be set via environment variables or container runtime flags:
#
# Node.js V8 heap:
#   NODE_OPTIONS="--max-old-space-size=<MB>"  (default: ~1.5GB)
#   UV_THREADPOOL_SIZE=<N>  (default: 4, max: 1024; set to CPU count)
#
# Python:
#   PYTHONHASHSEED=random  (enabled by default, ASLR for dict ordering)
#   PYTHONUNBUFFERED=1     (disable stdout buffering in containers)
#   PYTHONDONTWRITEBYTECODE=1  (skip .pyc in read-only containers)
#
# Container runtime (set on host or in compose/k8s):
#   --ulimit nofile=1048576:1048576  (match fs.file-max)
#   --ulimit nproc=65536:65536       (match kernel.threads-max)
#   --pids-limit=4096                (per-container PID limit via cgroup)
#   --memory=<bytes>                 (cgroup memory limit)
#   --cpus=<N>                       (cgroup CPU limit)
