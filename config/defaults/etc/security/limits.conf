# /etc/security/limits.conf — system-wide ulimit floor.
#
# Read by /bin/login via pam_limits — but jonerix doesn't ship PAM,
# so shadow-login parses this file directly to set the per-session
# resource limits.  Per-user / per-group overrides go in
# /etc/security/limits.d/*.conf which shadow-login reads after this.
#
# Format: <domain> <type> <item> <value>
#   domain = user | group (@grp) | * (default for everyone) |
#            % (default for all groups)
#   type   = soft | hard
#   item   = nofile | nproc | core | data | fsize | memlock | stack |
#            cpu | as | maxlogins | maxsyslogins | priority | locks |
#            sigpending | msgqueue | nice | rtprio
#
# This file is the BASELINE.  The builder profile bumps nofile + nproc
# further via limits.d/builder.conf; the router profile lowers some
# limits to make exhaustion attacks harder via limits.d/router.conf.

# ── File descriptors ────────────────────────────────────────────────────
# Modern apps want way more than the kernel default of 1024.  Even a
# trivial Python aiohttp server holds dozens of fds for connections;
# Node.js + Docker can chew through 10K easily.
*               soft    nofile          65536
*               hard    nofile          1048576

# ── Processes / threads ─────────────────────────────────────────────────
# Default kernel cap is huge; this just sets a per-user floor so a
# runaway fork bomb in one user account can't starve the whole system.
*               soft    nproc           32768
*               hard    nproc           65536

# ── Core dumps ──────────────────────────────────────────────────────────
# Off by default — production hosts shouldn't write coredumps to /
# (fills the rootfs the first time something crashes).  Developers
# can `ulimit -c unlimited` per-session if they want them.
*               soft    core            0
*               hard    core            unlimited

# ── Memory locking (mlockall) ───────────────────────────────────────────
# Required by tailscaled, dropbear's ed25519 key handling, redis if
# you turn on huge-pages.  Default kernel value (8MB) is too small.
*               soft    memlock         unlimited
*               hard    memlock         unlimited

# ── Stack ───────────────────────────────────────────────────────────────
# 8MB default is fine for everything except a recursive parser that
# really wants more.  No override needed at the system level.
#*              soft    stack           8192
#*              hard    stack           unlimited
