# /etc/dnsmasq.conf — DHCP server for the LAN side.
#
# DNS resolution itself is handled by unbound on this profile
# (recursive validating resolver, see /etc/unbound/unbound.conf).
# dnsmasq here is configured as DHCP-ONLY — `port=0` disables the
# built-in DNS service so we don't fight unbound for port 53.

# ── No DNS — only DHCP / TFTP ───────────────────────────────────────────
port=0

# ── Interface ──────────────────────────────────────────────────────────
# Listen on the LAN interface only.  Never bind to eth0 (WAN).
interface=eth1
interface=wlan0
bind-interfaces

# ── DHCP range ─────────────────────────────────────────────────────────
# 192.168.1.100 - 192.168.1.199 dynamic.  Reservations go below.
# Lease time: 12h (long enough that mobile devices don't re-lease
# constantly, short enough that subnet changes propagate same-day).
dhcp-range=192.168.1.100,192.168.1.199,12h

# ── DHCP options ───────────────────────────────────────────────────────
# Gateway (router) for clients.  Same as the LAN-side router IP.
dhcp-option=option:router,192.168.1.1

# DNS servers — point clients at THIS router's unbound on port 53.
dhcp-option=option:dns-server,192.168.1.1

# Domain name announced via DHCP option 15.
dhcp-option=option:domain-name,lan

# Don't announce a NetBIOS server (no SMB on the router).
dhcp-option=option:netbios-ns

# ── Static reservations ─────────────────────────────────────────────────
# Example: lock a specific MAC to a stable IP.  Uncomment + edit.
#dhcp-host=aa:bb:cc:dd:ee:ff,192.168.1.50,my-server,infinite

# ── DHCPv6 / RA — IPv6 ──────────────────────────────────────────────────
# Stateless address autoconfiguration (SLAAC) — clients pick their
# own IPv6 from the prefix advertised here.  Edit the prefix to match
# whatever your ISP delegates (DHCPv6-PD).
#enable-ra
#dhcp-range=fd00::100,fd00::1ff,constructor:eth1,ra-names,slaac,12h

# ── Logging ────────────────────────────────────────────────────────────
# Log lease activity to /var/log/dnsmasq.log.  Useful for "which
# device just connected" diagnostics.
log-dhcp
log-facility=/var/log/dnsmasq.log

# Lease file location.  dnsmasq writes here; format documented at
# the top of the file.
dhcp-leasefile=/var/lib/dnsmasq/dnsmasq.leases

# Drop-in directory for per-host or per-subnet additions.
conf-dir=/etc/dnsmasq.d,*.conf
