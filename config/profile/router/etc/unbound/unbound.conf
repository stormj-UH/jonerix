# jonerix router — Unbound recursive DNS resolver
#
# Listens on LAN interface, provides DNSSEC-validated recursive resolution.
# No forwarding by default — queries root servers directly.

server:
    interface: 0.0.0.0
    port: 53
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: 127.0.0.0/8 allow
    access-control: ::1/128 allow

    # Privacy and security
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-referral-path: yes

    # Performance
    num-threads: 2
    msg-cache-size: 16m
    rrset-cache-size: 32m
    cache-min-ttl: 300
    cache-max-ttl: 86400
    prefetch: yes

    # Logging (minimal by default)
    verbosity: 1
    log-queries: no

    # DNSSEC trust anchor (auto-updated)
    auto-trust-anchor-file: "/etc/unbound/root.key"

    # Root hints
    root-hints: "/etc/unbound/root.hints"

    # Block private addresses in public responses (rebind protection)
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10
