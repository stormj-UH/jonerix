# /etc/sysctl.d/router.conf — kernel parameters for the `router` profile.
#
# Activates IPv4/IPv6 forwarding and applies the anti-spoofing /
# ICMP-redirect hardening that every router should have.  Applied
# at boot via the `sysctl` OpenRC service.

# ── Forwarding (the whole reason this profile exists) ──────────────────
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# ── Anti-spoofing — reverse-path filtering ──────────────────────────────
# Mode 1 = strict (RFC 3704).  Drop packets whose source can't be
# reached via the receiving interface's routing table.  Necessary
# for any NAT or multi-homed router.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# ── ICMP — refuse redirects, ignore broadcast pings ────────────────────
# Don't accept ICMP redirects (they let an attacker reshape routing).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't SEND redirects either — a router that doesn't tell endpoints
# to bypass it is harder to fingerprint.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Source-routed packets are basically a Smurf vector.  Drop them.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Don't reply to broadcast pings (Smurf amplification).
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Drop ICMP_ECHO from sources that look bogus.
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Log packets with impossible source addresses.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# ── SYN flood protection ────────────────────────────────────────────────
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 4096
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_syn_retries = 3

# ── Connection tracking — table size ───────────────────────────────────
# Default 65K runs out on busy routers.  Bump to 1M; conntrack uses
# ~300 bytes per entry so 1M = ~300MB.  Fine on a 4GB-RAM Pi 5.
net.netfilter.nf_conntrack_max = 1048576
net.netfilter.nf_conntrack_tcp_timeout_established = 86400

# ── Network buffer sizes — for high throughput ─────────────────────────
net.core.rmem_default = 262144
net.core.rmem_max = 16777216
net.core.wmem_default = 262144
net.core.wmem_max = 16777216
net.core.netdev_max_backlog = 16384

# TCP buffer auto-tuning bounds.
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# ── Congestion control ─────────────────────────────────────────────────
# BBR fights bufferbloat in the modem on the WAN uplink.  Pair with
# NET_SCH_CAKE on the WAN interface for a complete fq_codel-style
# setup.
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = cake

# ── IPv6 ────────────────────────────────────────────────────────────────
# Accept Router Advertisements on WAN even though forwarding is on
# (default is to refuse RAs when forwarding=1).  =2 means "accept
# RAs even when forwarding".  Edit the interface name to match your
# WAN port.
net.ipv6.conf.eth0.accept_ra = 2

# Disable IPv6 privacy extensions on the router itself — the router
# should be reachable on stable addresses.  Per-client privacy
# extensions are managed by client devices.
net.ipv6.conf.all.use_tempaddr = 0
net.ipv6.conf.default.use_tempaddr = 0
