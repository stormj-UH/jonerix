# /etc/sysctl.d/minimal.conf — overrides for the `minimal` profile.
#
# Targets: cloud VMs, container guests, recovery images.  These
# tweaks lower kernel memory pressure and trim background timers
# that don't earn their keep on a low-RAM single-purpose host.

# Idle CPUs don't need a tick interrupt — better residency in deeper
# C-states on cloud VMs that bill on usage.  Already on for most
# kernels via CONFIG_NO_HZ_IDLE; this sysctl just lets userspace
# verify.  Informational.
#kernel.timer_migration = 1

# Drop the kernel's page cache and slab caches aggressively when
# memory pressure rises.  On a single-purpose VM (e.g. running ONE
# Node app) there's no benefit to caching parts of the rootfs we
# never read again.
vm.vfs_cache_pressure = 200

# Don't swap until the cliff edge.  Cloud VMs usually have no swap
# device at all; this is a safety net if one's been added.  Lower
# than the global default (10) to lean even harder on RAM.
vm.swappiness = 5

# Aggressive dirty-page writeback so a sudden shutdown doesn't lose
# more than 5 seconds of writes.
vm.dirty_writeback_centisecs = 500
vm.dirty_expire_centisecs = 1000

# Skip the random-entropy mixing from disk I/O — minimal VMs usually
# get entropy from virtio-rng or the hypervisor's RDRAND passthrough.
#kernel.randomize_va_space = 2  # already the global default
