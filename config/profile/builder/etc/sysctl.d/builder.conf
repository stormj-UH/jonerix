# /etc/sysctl.d/builder.conf — overrides for the `builder` profile.
#
# Targets: build hosts, CI runners, dev workstations.  Tuned for
# compilers (large mmap usage), file watchers (inotify), containers
# (lots of namespaces + cgroups), and KVM nested virt.

# ── File watchers (npm/vite/cargo-watch/inotifywait) ────────────────────
# Defaults (8K) starve any modern JS toolchain.  vite, webpack,
# turbopack, and rspack all hold thousands of watches each.
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 8192
fs.inotify.max_queued_events = 65536

# ── File descriptors ────────────────────────────────────────────────────
# Match limits.d/builder.conf — pointless to bump user limit above the
# kernel's per-file-table ceiling.
fs.file-max = 2097152
fs.nr_open = 1048576

# ── Processes / threads ────────────────────────────────────────────────
# Some build matrices (LLVM, Chromium, ChromiumOS) fan out tens of
# thousands of make/ninja jobs; default pid_max (~32K) wraps mid-build.
kernel.pid_max = 4194304
kernel.threads-max = 524288

# ── mmap ────────────────────────────────────────────────────────────────
# V8 (Node), the rust toolchain, and clang each want lots of mmap
# slots.  Default is 65530.  Elasticsearch needs 262144 and so do
# large Rust workspaces with cargo-nextest sharding.
vm.max_map_count = 524288

# ── Overcommit ──────────────────────────────────────────────────────────
# Build tools fork+exec with large RSS that they don't actually use
# (libstdc++, jemalloc reservations).  Strict accounting refuses
# fork(); always-overcommit lets it through.  Safe on a build host
# because OOM only fires on real touch, not reservation.
vm.overcommit_memory = 1

# ── Kernel facilities builders want available ───────────────────────────
# Allow unprivileged user namespaces — required for rootless docker,
# podman, buildah, distrobox.  Off on hardened public hosts; on for
# anyone building images.
kernel.unprivileged_userns_clone = 1

# Allow BPF syscalls without CAP_SYS_ADMIN (BPF audit-style tools
# still need cap_bpf via subset).
kernel.unprivileged_bpf_disabled = 0
net.core.bpf_jit_enable = 1
net.core.bpf_jit_harden = 1

# Allow perf_event_open(2) for non-root (heaptrack, flamegraph,
# parca).  -1 = unrestricted, 1 = kernel profiling forbidden, 2 =
# user profiling only.  Builder profile uses 1 — kernel symbols
# only for root, but userspace profiling open to all.
kernel.perf_event_paranoid = 1

# ── Networking — container traffic ──────────────────────────────────────
# Required by docker/podman bridge networking and KVM bridge.
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1
net.ipv4.ip_forward = 1

# Defaults-friendly congestion control on the build host's outbound
# (npm/cargo pulls go faster).
net.ipv4.tcp_congestion_control = bbr
