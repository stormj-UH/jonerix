# /etc/security/limits.d/builder.conf — limit overrides for the
# `builder` profile.  Read AFTER defaults/limits.conf, so any rule
# here wins.
#
# Format: see limits.conf(5).  Identical syntax.

# ── File descriptors — even higher than the baseline ───────────────────
# A clang LTO link can open 16K+ object files.  cargo-nextest opens
# one fd per test binary; rust-analyzer keeps thousands of source
# files mapped.  256K soft / 1M hard is comfortable.
*               soft    nofile          262144
*               hard    nofile          1048576

# ── Processes ──────────────────────────────────────────────────────────
# Match kernel.pid_max for the wheel group (developers).  Regular
# users keep the baseline.
@wheel          soft    nproc           unlimited
@wheel          hard    nproc           unlimited

# ── Stack ──────────────────────────────────────────────────────────────
# clang's parser stack on heavily-templated C++ can blow past 8MB.
# rust-analyzer's salsa cache likewise.  64MB stack is plenty.
*               soft    stack           65536
*               hard    stack           unlimited

# ── Address space (virtual memory) ─────────────────────────────────────
# Many sanitizers (ASan, MSan, UBSan) reserve a 16TB shadow region.
# Default 'as' limit is unlimited, but some hardening profiles cap
# it; pin to unlimited so the sanitizers don't OOM at startup.
*               soft    as              unlimited
*               hard    as              unlimited
