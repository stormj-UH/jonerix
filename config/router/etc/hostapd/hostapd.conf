# jonerix router — hostapd wireless access point
#
# Disabled by default. To enable:
#   1. Set interface= to your wireless device (e.g., wlan0)
#   2. Set ssid= and wpa_passphrase=
#   3. Start: rc-service hostapd start

interface=wlan0
driver=nl80211
ssid=jonerix
hw_mode=g
channel=6
ieee80211n=1
ieee80211ac=1

# WPA2 (recommended minimum)
wpa=2
wpa_passphrase=CHANGEME
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# Country code (set for your region — required for 5GHz)
#country_code=US
#ieee80211d=1

# 802.11ax (WiFi 6) — uncomment if hardware supports it
#ieee80211ax=1
