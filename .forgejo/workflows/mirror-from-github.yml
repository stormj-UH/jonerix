name: Mirror from GitHub

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-from-github
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror green GitHub main
        shell: sh
        env:
          GH_MIRROR_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
          FORGEJO_API_TOKEN: ${{ secrets.FORGEJO_API_TOKEN }}
        run: |
          set -eu

          repo=stormj-UH/jonerix
          work="${RUNNER_TEMP}/mirror"
          checks_file="${RUNNER_TEMP}/check-runs.json"
          status_file="${RUNNER_TEMP}/combined-status.json"

          mkdir -p "${work}"
          cd "${work}"
          git init
          git remote add github "https://x-access-token:${GH_MIRROR_TOKEN}@github.com/${repo}.git"
          git remote add forgejo "https://jonerik:${FORGEJO_API_TOKEN}@castle.great-morpho.ts.net:3000/jonerik/jonerix.git"
          git fetch --prune github '+refs/heads/main:refs/remotes/github/main' '+refs/tags/*:refs/tags/*'

          sha=$(git rev-parse refs/remotes/github/main)
          curl -fsS \
            -H "Authorization: Bearer ${GH_MIRROR_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/commits/${sha}/check-runs?per_page=100" \
            >"${checks_file}"
          curl -fsS \
            -H "Authorization: Bearer ${GH_MIRROR_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/commits/${sha}/status" \
            >"${status_file}"

          bad_checks=$(
            jq -r '
              .check_runs[]?
              | select(.status == "completed")
              | select((.conclusion // "") as $c | ((["success", "skipped", "neutral"] | index($c)) | not))
              | "\(.name): \(.conclusion)"
            ' "${checks_file}"
          )
          if [ -n "${bad_checks}" ]; then
            printf 'Refusing to mirror because GitHub CI is not green:\n%s\n' "${bad_checks}"
            exit 1
          fi

          bad_statuses=$(
            jq -r '
              .statuses[]?
              | select(.state != "success" and .state != "pending")
              | "\(.context): \(.state)"
            ' "${status_file}"
          )
          if [ -n "${bad_statuses}" ]; then
            printf 'Refusing to mirror because GitHub statuses are not green:\n%s\n' "${bad_statuses}"
            exit 1
          fi

          pending_checks=$(
            jq -r '
              .check_runs[]?
              | select(.status != "completed")
              | "\(.name): \(.status)"
            ' "${checks_file}"
          )
          pending_statuses=$(
            jq -r '
              .statuses[]?
              | select(.state == "pending")
              | "\(.context): pending"
            ' "${status_file}"
          )
          if [ -n "${pending_checks}" ] || [ -n "${pending_statuses}" ]; then
            printf 'GitHub CI is still running; leaving Forgejo unchanged:\n%s\n%s\n' "${pending_checks}" "${pending_statuses}"
            exit 0
          fi

          git fetch forgejo '+refs/heads/main:refs/remotes/forgejo/main'
          git push --force-with-lease=refs/heads/main forgejo refs/remotes/github/main:refs/heads/main
          git ls-remote --tags forgejo >"${RUNNER_TEMP}/forgejo-tags.txt"
          git for-each-ref --format='%(refname)' refs/tags | while IFS= read -r tag_ref; do
            if ! awk -v ref="${tag_ref}" '$2 == ref { found = 1 } END { exit !found }' "${RUNNER_TEMP}/forgejo-tags.txt"; then
              git push forgejo "${tag_ref}:${tag_ref}"
            fi
          done
